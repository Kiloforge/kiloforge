<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crelay dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>crelay</h1>
      <span class="badge" id="conn-status">connecting</span>
    </div>
    <nav>
      <a id="gitea-link" href="#" target="_blank" rel="noopener">Gitea</a>
    </nav>
  </header>

  <main>
    <section class="stats">
      <div class="stat-card">
        <div class="stat-label">Agents</div>
        <div class="stat-value" id="total-agents">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Cost</div>
        <div class="stat-value" id="total-cost">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rate Limit</div>
        <div class="stat-value" id="rate-status">OK</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tokens In / Out</div>
        <div class="stat-value" id="token-counts">0 / 0</div>
      </div>
    </section>

    <section class="panel">
      <h2>Agents</h2>
      <div class="agent-grid" id="agent-grid">
        <p class="empty-state">No agents running</p>
      </div>
    </section>

    <section class="panel">
      <h2>Tracks</h2>
      <div id="track-list">
        <p class="empty-state">Loading tracks...</p>
      </div>
    </section>

    <div class="modal" id="log-modal" hidden>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Log: <span id="log-agent-id"></span></h3>
          <button class="btn-close" id="log-close">&times;</button>
        </div>
        <pre class="log-viewer" id="log-viewer"></pre>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
