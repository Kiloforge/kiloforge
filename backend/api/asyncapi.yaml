asyncapi: 3.0.0
info:
  title: Kiloforge Event API
  version: 0.1.0
  description: |
    Event-driven interfaces for the Kiloforge Cortex.
    Covers server-sent events for real-time UI updates and
    consumed Gitea webhook payloads.

defaultContentType: application/json

channels:
  sseEvents:
    address: /-/events
    description: |
      Server-Sent Events channel for real-time agent and quota updates.
      Clients connect via EventSource. Events are non-durable — slow
      clients that can't keep up will miss events.
    messages:
      agentUpdate:
        $ref: '#/components/messages/AgentUpdate'
      agentRemoved:
        $ref: '#/components/messages/AgentRemoved'
      quotaUpdate:
        $ref: '#/components/messages/QuotaUpdate'
      trackUpdate:
        $ref: '#/components/messages/TrackUpdate'
      trackRemoved:
        $ref: '#/components/messages/TrackRemoved'
      boardUpdate:
        $ref: '#/components/messages/BoardUpdate'
      traceUpdate:
        $ref: '#/components/messages/TraceUpdate'
      projectUpdate:
        $ref: '#/components/messages/ProjectUpdate'
      projectRemoved:
        $ref: '#/components/messages/ProjectRemoved'
      lockUpdate:
        $ref: '#/components/messages/LockUpdate'
      lockReleased:
        $ref: '#/components/messages/LockReleased'
      notificationCreated:
        $ref: '#/components/messages/NotificationCreated'
      notificationDismissed:
        $ref: '#/components/messages/NotificationDismissed'

  giteaWebhook:
    address: /webhook
    description: |
      Consumed Gitea webhook events. Gitea POSTs event payloads to this
      endpoint. The event type is indicated by the X-Gitea-Event header.
    messages:
      issueEvent:
        $ref: '#/components/messages/GiteaIssueEvent'
      pullRequestEvent:
        $ref: '#/components/messages/GiteaPullRequestEvent'
      issueCommentEvent:
        $ref: '#/components/messages/GiteaIssueCommentEvent'
      pullRequestReviewEvent:
        $ref: '#/components/messages/GiteaPullRequestReviewEvent'

operations:
  publishSSE:
    action: send
    channel:
      $ref: '#/channels/sseEvents'
    summary: Server pushes real-time updates to connected SSE clients.
    messages:
      - $ref: '#/channels/sseEvents/messages/agentUpdate'
      - $ref: '#/channels/sseEvents/messages/agentRemoved'
      - $ref: '#/channels/sseEvents/messages/quotaUpdate'
      - $ref: '#/channels/sseEvents/messages/trackUpdate'
      - $ref: '#/channels/sseEvents/messages/trackRemoved'
      - $ref: '#/channels/sseEvents/messages/boardUpdate'
      - $ref: '#/channels/sseEvents/messages/traceUpdate'
      - $ref: '#/channels/sseEvents/messages/projectUpdate'
      - $ref: '#/channels/sseEvents/messages/projectRemoved'
      - $ref: '#/channels/sseEvents/messages/lockUpdate'
      - $ref: '#/channels/sseEvents/messages/lockReleased'
      - $ref: '#/channels/sseEvents/messages/notificationCreated'
      - $ref: '#/channels/sseEvents/messages/notificationDismissed'

  consumeWebhook:
    action: receive
    channel:
      $ref: '#/channels/giteaWebhook'
    summary: Server receives webhook events from Gitea.
    messages:
      - $ref: '#/channels/giteaWebhook/messages/issueEvent'
      - $ref: '#/channels/giteaWebhook/messages/pullRequestEvent'
      - $ref: '#/channels/giteaWebhook/messages/issueCommentEvent'
      - $ref: '#/channels/giteaWebhook/messages/pullRequestReviewEvent'

components:
  messages:
    AgentUpdate:
      name: agent_update
      title: Agent Update
      summary: Emitted when an agent's status changes or a new agent appears.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AgentPayload'

    AgentRemoved:
      name: agent_removed
      title: Agent Removed
      summary: Emitted when a previously tracked agent is no longer present.
      contentType: application/json
      payload:
        type: object
        required:
          - id
        properties:
          id:
            type: string
            description: The ID of the removed agent.

    QuotaUpdate:
      name: quota_update
      title: Quota Update
      summary: Emitted when quota usage or rate-limit status changes.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/QuotaPayload'

    TrackUpdate:
      name: track_update
      title: Track Update
      summary: Emitted when a track's status or metadata changes.
      contentType: application/json
      payload:
        type: object
        required: [id, status]
        properties:
          id:
            type: string
          title:
            type: string
          status:
            type: string
          project:
            type: string

    TrackRemoved:
      name: track_removed
      title: Track Removed
      summary: Emitted when a track is deleted or archived.
      contentType: application/json
      payload:
        type: object
        required: [id]
        properties:
          id:
            type: string

    BoardUpdate:
      name: board_update
      title: Board Update
      summary: Emitted when a board card moves between columns.
      contentType: application/json
      payload:
        type: object
        properties:
          track_id:
            type: string
          from_column:
            type: string
          to_column:
            type: string

    TraceUpdate:
      name: trace_update
      title: Trace Update
      summary: Emitted when a new trace span is recorded.
      contentType: application/json
      payload:
        type: object
        properties:
          trace_id:
            type: string
          span_id:
            type: string
          name:
            type: string

    ProjectUpdate:
      name: project_update
      title: Project Update
      summary: Emitted when a project is added or modified.
      contentType: application/json
      payload:
        type: object
        required: [slug]
        properties:
          slug:
            type: string
          repo_name:
            type: string
          active:
            type: boolean

    ProjectRemoved:
      name: project_removed
      title: Project Removed
      summary: Emitted when a project is removed.
      contentType: application/json
      payload:
        type: object
        required: [slug]
        properties:
          slug:
            type: string

    LockUpdate:
      name: lock_update
      title: Lock Update
      summary: Emitted when a lock is acquired or renewed.
      contentType: application/json
      payload:
        type: object
        required: [scope, holder]
        properties:
          scope:
            type: string
          holder:
            type: string
          expires_at:
            type: string
            format: date-time

    LockReleased:
      name: lock_released
      title: Lock Released
      summary: Emitted when a lock is released.
      contentType: application/json
      payload:
        type: object
        required: [scope]
        properties:
          scope:
            type: string

    NotificationCreated:
      name: notification_created
      title: Notification Created
      summary: Emitted when an agent needs user attention (turn ended, waiting for input).
      contentType: application/json
      payload:
        type: object
        required: [id, agent_id, title, body]
        properties:
          id:
            type: string
            description: Notification ID (UUID)
          agent_id:
            type: string
            description: ID of the agent needing attention
          title:
            type: string
            description: Notification title
          body:
            type: string
            description: Additional detail

    NotificationDismissed:
      name: notification_dismissed
      title: Notification Dismissed
      summary: Emitted when an agent resumes work or enters terminal status, dismissing its notification.
      contentType: application/json
      payload:
        type: object
        required: [agent_id]
        properties:
          agent_id:
            type: string
            description: ID of the agent whose notification was dismissed

    GiteaIssueEvent:
      name: gitea_issue
      title: Gitea Issue Event
      summary: Issue created, updated, closed, or label changed.
      headers:
        type: object
        properties:
          X-Gitea-Event:
            type: string
            enum: [issues]
      contentType: application/json
      payload:
        $ref: '#/components/schemas/GiteaIssuePayload'

    GiteaPullRequestEvent:
      name: gitea_pull_request
      title: Gitea Pull Request Event
      summary: Pull request opened, closed, merged, or synchronized.
      headers:
        type: object
        properties:
          X-Gitea-Event:
            type: string
            enum: [pull_request]
      contentType: application/json
      payload:
        $ref: '#/components/schemas/GiteaPullRequestPayload'

    GiteaIssueCommentEvent:
      name: gitea_issue_comment
      title: Gitea Issue Comment Event
      summary: Comment added to an issue or pull request.
      headers:
        type: object
        properties:
          X-Gitea-Event:
            type: string
            enum: [issue_comment]
      contentType: application/json
      payload:
        $ref: '#/components/schemas/GiteaIssueCommentPayload'

    GiteaPullRequestReviewEvent:
      name: gitea_pull_request_review
      title: Gitea Pull Request Review Event
      summary: Review submitted on a pull request.
      headers:
        type: object
        properties:
          X-Gitea-Event:
            type: string
            enum: [pull_request_review]
      contentType: application/json
      payload:
        $ref: '#/components/schemas/GiteaPullRequestReviewPayload'

  schemas:
    AgentPayload:
      type: object
      required:
        - id
        - role
        - status
        - started_at
      properties:
        id:
          type: string
          description: Unique agent identifier.
        role:
          type: string
          enum: [developer]
          description: Agent role.
        ref:
          type: string
          description: Track ID or reference this agent is working on.
        status:
          type: string
          enum: [running, waiting, halted, stopped, completed, resume-failed]
          description: Current agent status.
        session_id:
          type: string
          description: Claude Code session ID.
        pid:
          type: integer
          description: OS process ID.
        worktree_dir:
          type: string
          description: Git worktree directory path.
        log_file:
          type: string
          description: Path to the agent's log file.
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        suspended_at:
          type: string
          format: date-time
          description: When the agent was suspended (if applicable).
        shutdown_reason:
          type: string
          description: Reason for shutdown (if applicable).

    QuotaPayload:
      type: object
      properties:
        input_tokens:
          type: integer
          description: Total input tokens across all agents.
        output_tokens:
          type: integer
          description: Total output tokens across all agents.
        cache_read_tokens:
          type: integer
          description: Total cache read tokens across all agents.
        cache_creation_tokens:
          type: integer
          description: Total cache creation tokens across all agents.
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate.
        agent_count:
          type: integer
          description: Number of tracked agents.
        rate_limited:
          type: boolean
          description: Whether any agent is currently rate-limited.
        retry_after_seconds:
          type: integer
          description: Seconds until rate limit expires (if rate_limited).

    GiteaIssuePayload:
      type: object
      description: |
        Gitea issue webhook payload. See Gitea API documentation for
        the full schema. Key fields used by kiloforge are listed here.
      properties:
        action:
          type: string
          enum: [opened, closed, reopened, label_updated, edited]
        number:
          type: integer
        issue:
          type: object
          properties:
            number:
              type: integer
            title:
              type: string
            state:
              type: string
            labels:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
        sender:
          type: object
          properties:
            login:
              type: string

    GiteaPullRequestPayload:
      type: object
      description: Gitea pull request webhook payload (key fields).
      properties:
        action:
          type: string
          enum: [opened, closed, synchronize, edited, reviewed]
        number:
          type: integer
        pull_request:
          type: object
          properties:
            number:
              type: integer
            title:
              type: string
            state:
              type: string
            merged:
              type: boolean
            head:
              type: object
              properties:
                ref:
                  type: string
            base:
              type: object
              properties:
                ref:
                  type: string

    GiteaIssueCommentPayload:
      type: object
      description: Gitea issue comment webhook payload (key fields).
      properties:
        action:
          type: string
          enum: [created, edited, deleted]
        comment:
          type: object
          properties:
            body:
              type: string
        issue:
          type: object
          properties:
            number:
              type: integer
        sender:
          type: object
          properties:
            login:
              type: string

    GiteaPullRequestReviewPayload:
      type: object
      description: Gitea pull request review webhook payload (key fields).
      properties:
        action:
          type: string
          enum: [submitted]
        review:
          type: object
          properties:
            type:
              type: string
              enum: [approved, changes_requested, comment]
            body:
              type: string
        pull_request:
          type: object
          properties:
            number:
              type: integer
        sender:
          type: object
          properties:
            login:
              type: string
