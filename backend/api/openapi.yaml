              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ReplaceAgentRequest:
      type: object
      properties:
        model:
          type: string
          description: Override model for the replacement agent (optional, defaults to original agent's model)
        flags:
          type: string
          description: Additional flags for the replacement agent (optional)

    SwarmCapacity:
      type: object
      required: [max, active, available]
      properties:
        max:
          type: integer
        active:
          type: integer
        available:
          type: integer

    SwarmCapacityResponse:
      type: object
      required: [error, capacity]
      properties:
        error:
          type: string
        capacity:
          $ref: "#/components/schemas/SwarmCapacity"

    QueueStatus:
      type: object
      required: [running, max_workers, active_workers, items, total_items]
      properties:
        running:
          type: boolean
        max_workers:
          type: integer
        active_workers:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/QueueItem"
        next_cursor:
          type: string
          description: Opaque cursor for the next page of items. Empty string means no more pages.
        total_items:
          type: integer
          description: Total number of queue items matching current filters.

    QueueItem:
      type: object
      required: [track_id, project_slug, status, enqueued_at]
      properties:
        track_id:
          type: string
        project_slug:
          type: string
        status:
          type: string
          enum: [queued, assigned, completed, failed]
        agent_id:
          type: string
        enqueued_at:
          type: string
          format: date-time
        assigned_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    ConfigResponse:
      type: object
      required: [dashboard_enabled]
      properties:
        dashboard_enabled:
          type: boolean
        analytics_enabled:
          type: boolean
        agent_max_duration:
          type: string
          description: "Max duration for non-interactive agents (Go duration string, e.g. \"2h\", \"30m\"). Empty or \"0s\" disables timeout."
        budget_usd:
          type: number
          format: double
          description: "Global budget limit in USD. 0 means unlimited (default)."
        agent_idle_suspend_seconds:
          type: integer
          description: "Grace period before auto-suspending idle interactive agents (seconds). 0 disables."

    UpdateConfigRequest:
      type: object
      properties:
        dashboard_enabled:
          type: boolean
        analytics_enabled:
          type: boolean
        agent_max_duration:
          type: string
          description: "Max duration for non-interactive agents (Go duration string, e.g. \"2h\", \"30m\"). \"0s\" disables timeout."
        budget_usd:
          type: number
          format: double
          description: "Global budget limit in USD. 0 means unlimited."
        agent_idle_suspend_seconds:
          type: integer
          description: "Grace period before auto-suspending idle interactive agents (seconds). 0 disables."

    PreflightResponse:
      type: object
      required: [claude_authenticated, skills_ok, consent_given, setup_required]
      properties:
        claude_authenticated:
          type: boolean
          description: Whether Claude CLI is authenticated
        claude_auth_error:
          type: string
          description: Auth error message if not authenticated
        skills_ok:
          type: boolean
          description: Whether required skills are installed
        skills_missing:
          type: array
          items:
            type: string
          description: Names of missing skills
        consent_given:
          type: boolean
          description: Whether agent permissions consent has been given
        setup_required:
          type: boolean
          description: Whether kiloforge setup is required for the active project

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SetupStatusResponse:
      type: object
      required: [setup_complete, project_slug]
      properties:
        setup_complete:
          type: boolean
          description: Whether kiloforge setup is complete for this project
        project_slug:
          type: string
          description: The project slug

    ProjectMetadataResponse:
      type: object
      required: [product, tech_stack, quick_links, track_summary]
      properties:
        product:
          type: string
          description: Product definition (product.md content)
        product_guidelines:
          type: string
          description: Product guidelines (product-guidelines.md content)
        tech_stack:
          type: string
          description: Tech stack reference (tech-stack.md content)
        workflow:
          type: string
          description: Workflow reference (workflow.md content)
        quick_links:
          type: array
          items:
            $ref: "#/components/schemas/QuickLink"
          description: Navigation links from quick-links.md
        style_guides:
          type: array
          items:
            $ref: "#/components/schemas/StyleGuideEntry"
          description: Code style guide files
        track_summary:
          $ref: "#/components/schemas/TrackSummary"

    QuickLink:
      type: object
      required: [label, path]
      properties:
        label:
          type: string
        path:
          type: string

    StyleGuideEntry:
      type: object
      required: [name, content]
      properties:
        name:
          type: string
          description: Filename without extension (e.g., "go")
        content:
          type: string
          description: Full markdown content

    TrackSummary:
      type: object
      required: [total, pending, in_progress, completed, archived]
      properties:
        total:
          type: integer
        pending:
          type: integer
        in_progress:
          type: integer
        completed:
          type: integer
        archived:
          type: integer

    SetupRequiredResponse:
      type: object
      required: [error, project]
      properties:
        error:
          type: string
        project:
          type: string
          description: Project slug that needs setup

    SkillsMissingResponse:
      type: object
      required: [error, missing_skills]
      properties:
        error:
          type: string
        missing_skills:
          type: array
          items:
            type: object
            required: [name, reason]
            properties:
              name:
                type: string
              reason:
                type: string

    HealthResponse:
      type: object
      required: [status, projects]
      properties:
        status:
          type: string
          example: ok
        projects:
          type: integer

    Agent:
      type: object
      required: [id, role, ref, status, pid, started_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
          description: Random human-friendly display name
        role:
          type: string
          enum: [developer, reviewer, interactive]
        ref:
          type: string
        status:
          type: string
          enum: [running, waiting, halted, stopped, completed, failed, suspended, suspending, force-killed, resume-failed, waiting-review]
        session_id:
          type: string
        pid:
          type: integer
        worktree_dir:
          type: string
        log_file:
          type: string
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        suspended_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        shutdown_reason:
          type: string
        uptime_seconds:
          type: integer
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer
        model:
          type: string
        connected_clients:
          type: integer
          description: Number of active WebSocket connections observing this agent

    AgentLog:
      type: object
      required: [agent_id, lines, total]
      properties:
        agent_id:
          type: string
        lines:
          type: array
          items:
            type: string
        total:
          type: integer

    QuotaInfo:
      type: object
      required: [input_tokens, output_tokens, cache_read_tokens, cache_creation_tokens, rate_limited, estimated_cost_usd, agent_count]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer
        rate_limited:
          type: boolean
        retry_after_seconds:
          type: integer
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate
        agent_count:
          type: integer
        budget_usd:
          type: number
          format: double
          description: Configured budget limit in USD. 0 means unlimited.
        budget_used_pct:
          type: number
          format: double
          description: Percentage of budget consumed (0-100). Omitted when budget is 0.
        rate_tokens_per_min:
          type: number
          format: double
          description: Average tokens (input+output) per minute over a 5-minute sliding window.
        rate_cost_per_hour:
          type: number
          format: double
          description: Average cost per hour over a 30-minute sliding window.
        time_to_budget_mins:
          type: number
          format: double
          description: Estimated minutes until budget is exhausted at current rate. Omitted when budget is 0 or rate is 0.
        agents:
          type: array
          items:
            $ref: "#/components/schemas/QuotaAgentUsage"

    QuotaAgentUsage:
      type: object
      required: [agent_id, estimated_cost_usd, input_tokens, output_tokens, cache_read_tokens, cache_creation_tokens]
      properties:
        agent_id:
          type: string
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer

    AddProjectRequest:
      type: object
      properties:
        remote_url:
          type: string
          description: Git remote URL (SSH or HTTPS). If omitted, a fresh local repo is created (name becomes required).
        name:
          type: string
          description: Project slug. Required when remote_url is omitted; defaults to repo name from URL otherwise.
        ssh_key:
          type: string
          description: Path to SSH private key to use for cloning

    SSHKeyInfo:
      type: object
      required: [name, path, type]
      properties:
        name:
          type: string
          description: Key filename (e.g., "id_ed25519")
        path:
          type: string
          description: Full path to private key
        type:
          type: string
          description: Key type (e.g., "ed25519", "rsa")
        comment:
          type: string
          description: Key comment from public key file

    Project:
      type: object
      required: [slug, repo_name, active]
      properties:
        slug:
          type: string
        repo_name:
          type: string
        origin_remote:
          type: string
        active:
          type: boolean

    Track:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [complete, in-progress, pending]
        project:
          type: string
        deps_count:
          type: integer
          description: Number of dependencies this track has
        deps_met:
          type: integer
          description: Number of dependencies that are completed
        conflict_count:
          type: integer
          description: Number of active conflict risk pairs

    TrackDetail:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        type:
          type: string
          description: Track type (feature, bug, chore, refactor)
        spec:
          type: string
          description: Raw markdown content of spec.md
        plan:
          type: string
          description: Raw markdown content of plan.md
        phases_total:
          type: integer
        phases_completed:
          type: integer
        tasks_total:
          type: integer
        tasks_completed:
          type: integer
        created_at:
          type: string
          description: ISO 8601 timestamp
        updated_at:
          type: string
          description: ISO 8601 timestamp
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/TrackDependency"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/TrackConflict"

    TrackDependency:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [complete, in-progress, pending]

    TrackConflict:
      type: object
      required: [track_id, risk]
      properties:
        track_id:
          type: string
        track_title:
          type: string
        risk:
          type: string
          enum: [high, medium, low]
        note:
          type: string

    StatusInfo:
      type: object
      required: [agent_counts, total_agents, active_agents, sse_clients]
      properties:
        agent_counts:
          type: object
          additionalProperties:
            type: integer
          description: Counts by status (active statuses only)
        total_agents:
          type: integer
          description: Total number of agents in history
        active_agents:
          type: integer
          description: Number of currently active agents (running, waiting)
        sse_clients:
          type: integer
        rate_limited:
          type: boolean
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate

    LockInfo:
      type: object
      required: [scope, holder, acquired_at, expires_at, ttl_remaining_seconds]
      properties:
        scope:
          type: string
        holder:
          type: string
        acquired_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        ttl_remaining_seconds:
          type: number
          format: double

    LockAcquireRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string
        ttl_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 0
          description: "0 = non-blocking. >0 = server-side long-poll wait."

    LockHeartbeatRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string
        ttl_seconds:
          type: integer
          default: 60

    LockReleaseRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string

    LockConflictResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        current_holder:
          type: string

    TraceSummary:
      type: object
      required: [trace_id, root_name, span_count, start_time, end_time]
      properties:
        trace_id:
          type: string
        root_name:
          type: string
        span_count:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time

    TraceDetail:
      type: object
      required: [trace_id, spans]
      properties:
        trace_id:
          type: string
        spans:
          type: array
          items:
            $ref: "#/components/schemas/SpanInfo"

    SpanInfo:
      type: object
      required: [trace_id, span_id, name, start_time, end_time, duration_ms, status]
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64
        status:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/SpanEvent"

    SpanEvent:
      type: object
      required: [name, timestamp]
      properties:
        name:
          type: string
        timestamp:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties:
            type: string

    BoardState:
      type: object
      required: [columns, cards]
      properties:
        columns:
          type: array
          items:
            type: string
        cards:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BoardCard"

    BoardCard:
      type: object
      required: [track_id, title, column, position, moved_at, created_at]
      properties:
        track_id:
          type: string
        title:
          type: string
        type:
          type: string
        column:
          type: string
          enum: [backlog, approved, in_progress, done]
        position:
          type: integer
        agent_id:
          type: string
        agent_status:
          type: string
        assigned_worker:
          type: string
        pr_number:
          type: integer
        moved_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    MoveCardRequest:
      type: object
      required: [track_id, to_column]
      properties:
        track_id:
          type: string
        to_column:
          type: string
          enum: [backlog, approved, in_progress, done]

    MoveCardResult:
      type: object
      required: [track_id, from_column, to_column]
      properties:
        track_id:
          type: string
        from_column:
          type: string
        to_column:
          type: string

    SyncBoardResult:
      type: object
      required: [created, updated, unchanged]
      properties:
        created:
          type: integer
        updated:
          type: integer
        unchanged:
          type: integer

    LockReleasedResponse:
      type: object
      required: [released]
      properties:
        released:
          type: boolean

    SkillsStatus:
      type: object
      required: [installed_version, update_available, skills]
      properties:
        installed_version:
          type: string
        available_version:
          type: string
        update_available:
          type: boolean
        repo:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillDetail"

    SkillDetail:
      type: object
      required: [name, modified]
      properties:
        name:
          type: string
        modified:
          type: boolean
        changed_files:
          type: array
          items:
            type: string

    SkillUpdateRequest:
      type: object
      properties:
        force:
          type: boolean
          default: false
        project_slug:
          type: string
          description: When provided, install skills locally into the project's .claude/skills/ directory instead of the global directory.

    SkillUpdateResponse:
      type: object
      required: [version, installed_count]
      properties:
        version:
          type: string
        installed_count:
          type: integer
        skills:
          type: array
          items:
            type: string

    SkillUpdateConflict:
      type: object
      required: [error, modified]
      properties:
        error:
          type: string
        modified:
          type: array
          items:
            $ref: "#/components/schemas/SkillDetail"

    ConsentState:
      type: object
      required: [consented]
      properties:
        consented:
          type: boolean
        consented_at:
          type: string
          description: RFC3339 timestamp of when consent was given

    AdminOperationRequest:
      type: object
      required: [operation]
      properties:
        operation:
          type: string
          enum: [bulk-archive, compact-archive, report]
          description: Admin operation to run
        project:
          type: string
          description: Project slug (determines working directory)

    AdminOperationResult:
      type: object
      required: [agent_id, ws_url]
      properties:
        agent_id:
          type: string
        ws_url:
          type: string
          description: WebSocket URL for agent conversation

    GenerateTracksRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Feature description for track generation
        project:
          type: string
          description: Project slug (optional — determines working directory)

    GenerateTracksResult:
      type: object
      required: [agent_id, ws_url]
      properties:
        agent_id:
          type: string
        ws_url:
          type: string
          description: WebSocket URL for agent conversation

    SpawnInteractiveRequest:
      type: object
      properties:
        work_dir:
          type: string
          description: Working directory for the agent (defaults to cwd)
        model:
          type: string
          description: Claude model alias (e.g., "opus", "sonnet")
        project:
          type: string
          description: Project slug (optional — used for setup prerequisite check)
        role:
          type: string
          enum: [interactive, architect, advisor-product, advisor-reliability]
          description: Agent role — determines which skill is invoked. Defaults to "interactive" for backwards compatibility.
        prompt:
          type: string
          description: Optional initial prompt sent to the agent after skill invocation

    PushProjectRequest:
      type: object
      required: [remote_branch]
      properties:
        remote_branch:
          type: string
          description: Target branch name on the remote (e.g., "kf/main")
        force:
          type: boolean
          default: false
          description: Force push (not recommended)

    PushResult:
      type: object
      required: [success, local_branch, remote_branch]
      properties:
        success:
          type: boolean
        local_branch:
          type: string
        remote_branch:
          type: string

    PullProjectRequest:
      type: object
      properties:
        remote_branch:
          type: string
          default: "main"
          description: Remote branch to pull from (defaults to "main")

    PullResult:
      type: object
      required: [success, new_head]
      properties:
        success:
          type: boolean
        new_head:
          type: string
          description: New HEAD commit hash after pull

    MirrorSyncResult:
      type: object
      required: [synced]
      properties:
        synced:
          type: boolean

    SyncStatusResponse:
      type: object
      required: [local_branch, ahead, behind, status]
      properties:
        local_branch:
          type: string
        remote_url:
          type: string
        ahead:
          type: integer
        behind:
          type: integer
        status:
          type: string
          enum: [synced, ahead, behind, diverged, unknown]

    SyncConflictResponse:
      type: object
      required: [error, direction]
      properties:
        error:
          type: string
        direction:
          type: string
          enum: [push, pull]
          description: Whether the conflict was detected during push or pull
        ahead:
          type: integer
          description: Number of commits local is ahead of remote
        behind:
          type: integer
          description: Number of commits local is behind remote

    ResolveConflictRequest:
      type: object
      required: [direction, remote_branch]
      properties:
        direction:
          type: string
          enum: [push, pull]
          description: Whether the conflict originated from a push or pull
        remote_branch:
          type: string
          description: Remote branch involved in the conflict

    DiffResponse:
      type: object
      required: [branch, base, stats, files]
      properties:
        branch:
          type: string
        base:
          type: string
        stats:
          $ref: "#/components/schemas/DiffStats"
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileDiff"
        truncated:
          type: boolean

    DiffStats:
      type: object
      required: [files_changed, insertions, deletions]
      properties:
        files_changed:
          type: integer
        insertions:
          type: integer
        deletions:
          type: integer

    FileDiff:
      type: object
      required: [path, status, insertions, deletions, is_binary, hunks]
      properties:
        path:
          type: string
        old_path:
          type: string
        status:
          type: string
          enum: [added, modified, deleted, renamed]
        insertions:
          type: integer
        deletions:
          type: integer
        is_binary:
          type: boolean
        hunks:
          type: array
          items:
            $ref: "#/components/schemas/DiffHunk"

    DiffHunk:
      type: object
      required: [old_start, old_lines, new_start, new_lines, header, lines]
      properties:
        old_start:
          type: integer
        old_lines:
          type: integer
        new_start:
          type: integer
        new_lines:
          type: integer
        header:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/DiffLine"

    DiffLine:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [context, add, delete]
        content:
          type: string
        old_no:
          type: integer
          nullable: true
        new_no:
          type: integer
          nullable: true

    BranchInfo:
      type: object
      required: [branch, status]
      properties:
        branch:
          type: string
        agent_id:
          type: string
        track_id:
          type: string
        status:
          type: string

    ProjectSettingsResponse:
      type: object
      required: [primary_branch, enforce_dep_ordering]
      properties:
        primary_branch:
          type: string
        enforce_dep_ordering:
          type: boolean

    UpdateProjectSettingsRequest:
      type: object
      properties:
        primary_branch:
          type: string
        enforce_dep_ordering:
          type: boolean

    PaginatedAgents:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        next_cursor:
          type: string
          description: Opaque cursor for the next page. Empty string means no more pages.
        total_count:
          type: integer
          description: Total number of items matching the current filters.

    PaginatedTracks:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Track"
        next_cursor:
          type: string
          description: Opaque cursor for the next page. Empty string means no more pages.
        total_count:
          type: integer
          description: Total number of items matching the current filters.

    PaginatedTraces:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TraceSummary"
        next_cursor:
          type: string
          description: Opaque cursor for the next page. Empty string means no more pages.
        total_count:
          type: integer
          description: Total number of items matching the current filters.

    ReliabilityEvent:
      type: object
      required: [id, event_type, severity, created_at]
      properties:
        id:
          type: string
          description: Unique event identifier (UUID)
        event_type:
          type: string
          enum: [lock_contention, lock_timeout, agent_timeout, agent_spawn_failure, agent_resume_failure, merge_conflict, quota_exceeded]
        severity:
          type: string
          enum: [warn, error, critical]
        agent_id:
          type: string
          description: Associated agent ID (nullable)
        scope:
          type: string
          description: Event scope (e.g. "merge" for lock events, track ID for agent events)
        detail:
          type: object
          additionalProperties: true
          description: Event-specific detail data (JSON)
        created_at:
          type: string
          format: date-time

    PaginatedReliabilityEvents:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReliabilityEvent"
        next_cursor:
          type: string
          description: Opaque cursor for the next page. Empty string means no more pages.
        total_count:
          type: integer
          description: Total number of items matching the current filters.

    ReliabilitySummaryResponse:
      type: object
      required: [window, buckets, totals]
      properties:
        window:
          type: string
          description: Time window used for aggregation (e.g. "24h")
        bucket_duration:
          type: string
          description: Duration of each bucket (e.g. "1h")
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/ReliabilityBucket"
        totals:
          $ref: "#/components/schemas/ReliabilityTotals"

    ReliabilityBucket:
      type: object
      required: [start, end, counts]
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        counts:
          type: object
          additionalProperties:
            type: integer
          description: Event counts by type within this time bucket

    ReliabilityTotals:
      type: object
      required: [total, by_type, by_severity]
      properties:
        total:
          type: integer
        by_type:
          type: object
          additionalProperties:
            type: integer
          description: Total counts by event type
        by_severity:
          type: object
          additionalProperties:
            type: integer
          description: Total counts by severity
