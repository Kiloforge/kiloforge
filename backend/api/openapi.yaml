openapi: "3.0.3"
info:
  title: Kiloforge API
  description: Kiloforge orchestrator API for agent management, quota tracking, lock coordination, and system status.
  version: 0.1.0

servers:
  - url: http://localhost:4001
    description: Local development server

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [Agents]
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: boolean
          description: If true (default), return only active agents + recently finished (30 min). If false, return all agents.
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/interactive:
    post:
      operationId: spawnInteractiveAgent
      summary: Spawn an interactive agent with WebSocket IO
      tags: [Agents]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnInteractiveRequest"
      responses:
        "201":
          description: Interactive agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "428":
          description: Kiloforge setup required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRequiredResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent by ID or ID prefix
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID or ID prefix
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Missing agent ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAgent
      summary: Delete an agent record
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID
      responses:
        "204":
          description: Agent deleted
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent still running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/log:
    get:
      operationId: getAgentLog
      summary: Get recent log lines for an agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID or ID prefix
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Number of tail lines to return
      responses:
        "200":
          description: Agent log output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLog"
        "400":
          description: Missing agent ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent or log file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/stop:
    post:
      operationId: stopAgent
      summary: Stop a running agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID
      responses:
        "200":
          description: Agent stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/resume:
    post:
      operationId: resumeAgent
      summary: Resume a stopped agent session
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID
      responses:
        "200":
          description: Agent resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/quota:
    get:
      operationId: getQuota
      summary: Get quota and cost usage
      tags: [Quota]
      responses:
        "200":
          description: Quota usage information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaInfo"

  /api/projects:
    get:
      operationId: listProjects
      summary: List registered projects
      tags: [Projects]
      responses:
        "200":
          description: List of registered projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: addProject
      summary: Register a new project from a remote URL
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request (bad URL format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Project already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}:
    delete:
      operationId: removeProject
      summary: Remove a registered project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
        - name: cleanup
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: If true, also delete Gitea repo and filesystem data
      responses:
        "204":
          description: Project removed
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/push:
    post:
      operationId: pushProject
      summary: Push local main to a remote branch
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushProjectRequest"
      responses:
        "200":
          description: Push succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Push failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/pull:
    post:
      operationId: pullProject
      summary: Pull latest from upstream and fast-forward merge
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullProjectRequest"
      responses:
        "200":
          description: Pull succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullResult"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Branches have diverged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Pull failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/sync-status:
    get:
      operationId: getSyncStatus
      summary: Get ahead/behind sync status vs upstream
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/diff:
    get:
      operationId: getProjectDiff
      summary: Get structured diff between a branch and main
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
        - name: branch
          in: query
          required: true
          schema:
            type: string
          description: Branch name to diff against main
        - name: max_files
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Maximum number of files to return (0 for unlimited)
      responses:
        "200":
          description: Structured diff result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiffResponse"
        "400":
          description: Missing branch parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or branch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/branches:
    get:
      operationId: getProjectBranches
      summary: List active worktree branches for a project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: List of active branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BranchInfo"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/metadata:
    get:
      operationId: getProjectMetadata
      summary: Get project metadata including product info, guidelines, tech stack, and track summary
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Project metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMetadataResponse"
        "404":
          description: Project not found or kiloforge not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/setup-status:
    get:
      operationId: getProjectSetupStatus
      summary: Check if kiloforge setup is complete for a project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/setup:
    post:
      operationId: startProjectSetup
      summary: Spawn an interactive setup agent for a project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "201":
          description: Setup agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTracksResult"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ssh-keys:
    get:
      operationId: listSSHKeys
      summary: List available SSH keys
      tags: [System]
      responses:
        "200":
          description: List of SSH keys found on the server
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/SSHKeyInfo"

  /api/tracks:
    get:
      operationId: listTracks
      summary: List conductor tracks
      tags: [Tracks]
      parameters:
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Filter tracks by project slug
      responses:
        "200":
          description: List of tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tracks/generate:
    post:
      operationId: generateTracks
      summary: Spawn an interactive track-generator agent with a prompt
      tags: [Tracks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTracksRequest"
      responses:
        "201":
          description: Track-generator agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTracksResult"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "428":
          description: Kiloforge setup required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRequiredResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tracks/{trackId}:
    get:
      operationId: getTrackDetail
      summary: Get full detail for a track including spec, plan, and metadata
      tags: [Tracks]
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
          description: Track ID
        - name: project
          in: query
          required: true
          schema:
            type: string
          description: Project slug to locate track artifacts
      responses:
        "200":
          description: Track detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackDetail"
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTrack
      summary: Delete a track's artifacts and board card
      tags: [Tracks]
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
          description: Track ID to delete
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Project slug for board card removal
      responses:
        "204":
          description: Track deleted
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/consent/agent-permissions:
    get:
      operationId: getAgentPermissionsConsent
      summary: Check agent permissions consent state
      tags: [Consent]
      responses:
        "200":
          description: Consent state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentState"
    post:
      operationId: recordAgentPermissionsConsent
      summary: Record user consent for agent permissions
      tags: [Consent]
      responses:
        "200":
          description: Consent recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentState"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/run:
    post:
      operationId: runAdminOperation
      summary: Spawn an interactive agent to run an admin operation
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminOperationRequest"
      responses:
        "201":
          description: Admin operation agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOperationResult"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed or another admin operation is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "428":
          description: Kiloforge setup required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRequiredResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/preflight:
    get:
      operationId: getPreflight
      summary: Pre-flight check status for agent spawning
      tags: [System]
      responses:
        "200":
          description: Pre-flight check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreflightResponse"

  /api/config:
    get:
      operationId: getConfig
      summary: Get current configuration
      tags: [System]
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
    put:
      operationId: updateConfig
      summary: Update configuration
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfigRequest"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/status:
    get:
      operationId: getStatus
      summary: Get system status overview
      tags: [System]
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusInfo"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/skills:
    get:
      operationId: getSkillsStatus
      summary: Get installed skills status
      tags: [Skills]
      responses:
        "200":
          description: Skills status information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsStatus"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/skills/update:
    post:
      operationId: updateSkills
      summary: Trigger skill update
      tags: [Skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillUpdateRequest"
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUpdateResponse"
        "400":
          description: Bad request (e.g. no repo configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Local modifications prevent update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUpdateConflict"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/traces:
    get:
      operationId: listTraces
      summary: List trace summaries
      tags: [Traces]
      parameters:
        - name: track_id
          in: query
          required: false
          schema:
            type: string
          description: Filter traces by track ID attribute
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: Filter traces by session ID attribute
      responses:
        "200":
          description: List of trace summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TraceSummary"

  /api/traces/{traceId}:
    get:
      operationId: getTrace
      summary: Get trace detail with all spans
      tags: [Traces]
      parameters:
        - name: traceId
          in: path
          required: true
          schema:
            type: string
          description: Trace ID
      responses:
        "200":
          description: Trace with span tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceDetail"
        "404":
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/board/{project}:
    get:
      operationId: getBoard
      summary: Get board state for a project
      tags: [Board]
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Board state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardState"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/board/{project}/move:
    post:
      operationId: moveCard
      summary: Move a board card to a different column
      tags: [Board]
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveCardRequest"
      responses:
        "200":
          description: Card moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveCardResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/board/{project}/sync:
    post:
      operationId: syncBoard
      summary: Sync board from conductor tracks
      tags: [Board]
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncBoardResult"
        "400":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/locks:
    get:
      operationId: listLocks
      summary: List all active locks
      tags: [Locks]
      responses:
        "200":
          description: List of active locks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LockInfo"

  /api/locks/{scope}/acquire:
    post:
      operationId: acquireLock
      summary: Acquire a scoped lock
      tags: [Locks]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: Lock scope name (e.g. "merge")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockAcquireRequest"
      responses:
        "200":
          description: Lock acquired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockInfo"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Lock held by another holder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockConflictResponse"

  /api/locks/{scope}/heartbeat:
    post:
      operationId: heartbeatLock
      summary: Extend lock TTL
      tags: [Locks]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: Lock scope name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockHeartbeatRequest"
      responses:
        "200":
          description: Lock TTL extended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockInfo"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lock not found or not owned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/locks/{scope}:
    delete:
      operationId: releaseLock
      summary: Release a scoped lock
      tags: [Locks]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: Lock scope name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockReleaseRequest"
      responses:
        "200":
          description: Lock released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockReleasedResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lock not found or not owned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ConfigResponse:
      type: object
      required: [dashboard_enabled]
      properties:
        dashboard_enabled:
          type: boolean

    UpdateConfigRequest:
      type: object
      properties:
        dashboard_enabled:
          type: boolean

    PreflightResponse:
      type: object
      required: [claude_authenticated, skills_ok, consent_given, setup_required]
      properties:
        claude_authenticated:
          type: boolean
          description: Whether Claude CLI is authenticated
        claude_auth_error:
          type: string
          description: Auth error message if not authenticated
        skills_ok:
          type: boolean
          description: Whether required skills are installed
        skills_missing:
          type: array
          items:
            type: string
          description: Names of missing skills
        consent_given:
          type: boolean
          description: Whether agent permissions consent has been given
        setup_required:
          type: boolean
          description: Whether kiloforge setup is required for the active project

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SetupStatusResponse:
      type: object
      required: [setup_complete, project_slug]
      properties:
        setup_complete:
          type: boolean
          description: Whether conductor setup is complete for this project
        project_slug:
          type: string
          description: The project slug

    ProjectMetadataResponse:
      type: object
      required: [product, tech_stack, quick_links, track_summary]
      properties:
        product:
          type: string
          description: Product definition (product.md content)
        product_guidelines:
          type: string
          description: Product guidelines (product-guidelines.md content)
        tech_stack:
          type: string
          description: Tech stack reference (tech-stack.md content)
        workflow:
          type: string
          description: Workflow reference (workflow.md content)
        quick_links:
          type: array
          items:
            $ref: "#/components/schemas/QuickLink"
          description: Navigation links from quick-links.md
        style_guides:
          type: array
          items:
            $ref: "#/components/schemas/StyleGuideEntry"
          description: Code style guide files
        track_summary:
          $ref: "#/components/schemas/TrackSummary"

    QuickLink:
      type: object
      required: [label, path]
      properties:
        label:
          type: string
        path:
          type: string

    StyleGuideEntry:
      type: object
      required: [name, content]
      properties:
        name:
          type: string
          description: Filename without extension (e.g., "go")
        content:
          type: string
          description: Full markdown content

    TrackSummary:
      type: object
      required: [total, pending, in_progress, completed, archived]
      properties:
        total:
          type: integer
        pending:
          type: integer
        in_progress:
          type: integer
        completed:
          type: integer
        archived:
          type: integer

    SetupRequiredResponse:
      type: object
      required: [error, project]
      properties:
        error:
          type: string
        project:
          type: string
          description: Project slug that needs setup

    SkillsMissingResponse:
      type: object
      required: [error, missing_skills]
      properties:
        error:
          type: string
        missing_skills:
          type: array
          items:
            type: object
            required: [name, reason]
            properties:
              name:
                type: string
              reason:
                type: string

    HealthResponse:
      type: object
      required: [status, projects]
      properties:
        status:
          type: string
          example: ok
        projects:
          type: integer

    Agent:
      type: object
      required: [id, role, ref, status, pid, started_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
          description: Random human-friendly display name
        role:
          type: string
          enum: [developer, reviewer, interactive]
        ref:
          type: string
        status:
          type: string
          enum: [running, waiting, halted, stopped, completed, failed, suspended, suspending, force-killed, resume-failed, waiting-review]
        session_id:
          type: string
        pid:
          type: integer
        worktree_dir:
          type: string
        log_file:
          type: string
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        suspended_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        shutdown_reason:
          type: string
        uptime_seconds:
          type: integer
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer
        model:
          type: string

    AgentLog:
      type: object
      required: [agent_id, lines, total]
      properties:
        agent_id:
          type: string
        lines:
          type: array
          items:
            type: string
        total:
          type: integer

    QuotaInfo:
      type: object
      required: [input_tokens, output_tokens, cache_read_tokens, cache_creation_tokens, rate_limited, estimated_cost_usd, agent_count]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer
        rate_limited:
          type: boolean
        retry_after_seconds:
          type: integer
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate
        agent_count:
          type: integer
        agents:
          type: array
          items:
            $ref: "#/components/schemas/QuotaAgentUsage"

    QuotaAgentUsage:
      type: object
      required: [agent_id, estimated_cost_usd, input_tokens, output_tokens, cache_read_tokens, cache_creation_tokens]
      properties:
        agent_id:
          type: string
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer

    AddProjectRequest:
      type: object
      required: [remote_url]
      properties:
        remote_url:
          type: string
          description: Git remote URL (SSH or HTTPS)
        name:
          type: string
          description: Override project slug (defaults to repo name from URL)
        ssh_key:
          type: string
          description: Path to SSH private key to use for cloning

    SSHKeyInfo:
      type: object
      required: [name, path, type]
      properties:
        name:
          type: string
          description: Key filename (e.g., "id_ed25519")
        path:
          type: string
          description: Full path to private key
        type:
          type: string
          description: Key type (e.g., "ed25519", "rsa")
        comment:
          type: string
          description: Key comment from public key file

    Project:
      type: object
      required: [slug, repo_name, active]
      properties:
        slug:
          type: string
        repo_name:
          type: string
        origin_remote:
          type: string
        active:
          type: boolean

    Track:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [complete, in-progress, pending]
        project:
          type: string

    TrackDetail:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        type:
          type: string
          description: Track type (feature, bug, chore, refactor)
        spec:
          type: string
          description: Raw markdown content of spec.md
        plan:
          type: string
          description: Raw markdown content of plan.md
        phases_total:
          type: integer
        phases_completed:
          type: integer
        tasks_total:
          type: integer
        tasks_completed:
          type: integer
        created_at:
          type: string
          description: ISO 8601 timestamp
        updated_at:
          type: string
          description: ISO 8601 timestamp

    StatusInfo:
      type: object
      required: [gitea_url, agent_counts, total_agents, active_agents, sse_clients]
      properties:
        gitea_url:
          type: string
        agent_counts:
          type: object
          additionalProperties:
            type: integer
          description: Counts by status (active statuses only)
        total_agents:
          type: integer
          description: Total number of agents in history
        active_agents:
          type: integer
          description: Number of currently active agents (running, waiting)
        sse_clients:
          type: integer
        rate_limited:
          type: boolean
        estimated_cost_usd:
          type: number
          format: double
          description: Informational — API-equivalent cost estimate

    LockInfo:
      type: object
      required: [scope, holder, acquired_at, expires_at, ttl_remaining_seconds]
      properties:
        scope:
          type: string
        holder:
          type: string
        acquired_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        ttl_remaining_seconds:
          type: number
          format: double

    LockAcquireRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string
        ttl_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 0
          description: "0 = non-blocking. >0 = server-side long-poll wait."

    LockHeartbeatRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string
        ttl_seconds:
          type: integer
          default: 60

    LockReleaseRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string

    LockConflictResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        current_holder:
          type: string

    TraceSummary:
      type: object
      required: [trace_id, root_name, span_count, start_time, end_time]
      properties:
        trace_id:
          type: string
        root_name:
          type: string
        span_count:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time

    TraceDetail:
      type: object
      required: [trace_id, spans]
      properties:
        trace_id:
          type: string
        spans:
          type: array
          items:
            $ref: "#/components/schemas/SpanInfo"

    SpanInfo:
      type: object
      required: [trace_id, span_id, name, start_time, end_time, duration_ms, status]
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64
        status:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/SpanEvent"

    SpanEvent:
      type: object
      required: [name, timestamp]
      properties:
        name:
          type: string
        timestamp:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties:
            type: string

    BoardState:
      type: object
      required: [columns, cards]
      properties:
        columns:
          type: array
          items:
            type: string
        cards:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BoardCard"

    BoardCard:
      type: object
      required: [track_id, title, column, position, moved_at, created_at]
      properties:
        track_id:
          type: string
        title:
          type: string
        type:
          type: string
        column:
          type: string
          enum: [backlog, approved, in_progress, in_review, done]
        position:
          type: integer
        agent_id:
          type: string
        agent_status:
          type: string
        assigned_worker:
          type: string
        pr_number:
          type: integer
        moved_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    MoveCardRequest:
      type: object
      required: [track_id, to_column]
      properties:
        track_id:
          type: string
        to_column:
          type: string
          enum: [backlog, approved, in_progress, in_review, done]

    MoveCardResult:
      type: object
      required: [track_id, from_column, to_column]
      properties:
        track_id:
          type: string
        from_column:
          type: string
        to_column:
          type: string

    SyncBoardResult:
      type: object
      required: [created, updated, unchanged]
      properties:
        created:
          type: integer
        updated:
          type: integer
        unchanged:
          type: integer

    LockReleasedResponse:
      type: object
      required: [released]
      properties:
        released:
          type: boolean

    SkillsStatus:
      type: object
      required: [installed_version, update_available, skills]
      properties:
        installed_version:
          type: string
        available_version:
          type: string
        update_available:
          type: boolean
        repo:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillDetail"

    SkillDetail:
      type: object
      required: [name, modified]
      properties:
        name:
          type: string
        modified:
          type: boolean
        changed_files:
          type: array
          items:
            type: string

    SkillUpdateRequest:
      type: object
      properties:
        force:
          type: boolean
          default: false

    SkillUpdateResponse:
      type: object
      required: [version, installed_count]
      properties:
        version:
          type: string
        installed_count:
          type: integer
        skills:
          type: array
          items:
            type: string

    SkillUpdateConflict:
      type: object
      required: [error, modified]
      properties:
        error:
          type: string
        modified:
          type: array
          items:
            $ref: "#/components/schemas/SkillDetail"

    ConsentState:
      type: object
      required: [consented]
      properties:
        consented:
          type: boolean
        consented_at:
          type: string
          description: RFC3339 timestamp of when consent was given

    AdminOperationRequest:
      type: object
      required: [operation]
      properties:
        operation:
          type: string
          enum: [bulk-archive, compact-archive, report]
          description: Admin operation to run
        project:
          type: string
          description: Project slug (determines working directory)

    AdminOperationResult:
      type: object
      required: [agent_id, ws_url]
      properties:
        agent_id:
          type: string
        ws_url:
          type: string
          description: WebSocket URL for agent conversation

    GenerateTracksRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Feature description for track generation
        project:
          type: string
          description: Project slug (optional — determines working directory)

    GenerateTracksResult:
      type: object
      required: [agent_id, ws_url]
      properties:
        agent_id:
          type: string
        ws_url:
          type: string
          description: WebSocket URL for agent conversation

    SpawnInteractiveRequest:
      type: object
      properties:
        work_dir:
          type: string
          description: Working directory for the agent (defaults to cwd)
        model:
          type: string
          description: Claude model alias (e.g., "opus", "sonnet")
        project:
          type: string
          description: Project slug (optional — used for setup prerequisite check)

    PushProjectRequest:
      type: object
      required: [remote_branch]
      properties:
        remote_branch:
          type: string
          description: Target branch name on the remote (e.g., "kf/main")
        force:
          type: boolean
          default: false
          description: Force push (not recommended)

    PushResult:
      type: object
      required: [success, local_branch, remote_branch]
      properties:
        success:
          type: boolean
        local_branch:
          type: string
        remote_branch:
          type: string

    PullProjectRequest:
      type: object
      properties:
        remote_branch:
          type: string
          default: "main"
          description: Remote branch to pull from (defaults to "main")

    PullResult:
      type: object
      required: [success, new_head]
      properties:
        success:
          type: boolean
        new_head:
          type: string
          description: New HEAD commit hash after pull

    SyncStatusResponse:
      type: object
      required: [local_branch, ahead, behind, status]
      properties:
        local_branch:
          type: string
        remote_url:
          type: string
        ahead:
          type: integer
        behind:
          type: integer
        status:
          type: string
          enum: [synced, ahead, behind, diverged, unknown]

    DiffResponse:
      type: object
      required: [branch, base, stats, files]
      properties:
        branch:
          type: string
        base:
          type: string
        stats:
          $ref: "#/components/schemas/DiffStats"
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileDiff"
        truncated:
          type: boolean

    DiffStats:
      type: object
      required: [files_changed, insertions, deletions]
      properties:
        files_changed:
          type: integer
        insertions:
          type: integer
        deletions:
          type: integer

    FileDiff:
      type: object
      required: [path, status, insertions, deletions, is_binary, hunks]
      properties:
        path:
          type: string
        old_path:
          type: string
        status:
          type: string
          enum: [added, modified, deleted, renamed]
        insertions:
          type: integer
        deletions:
          type: integer
        is_binary:
          type: boolean
        hunks:
          type: array
          items:
            $ref: "#/components/schemas/DiffHunk"

    DiffHunk:
      type: object
      required: [old_start, old_lines, new_start, new_lines, header, lines]
      properties:
        old_start:
          type: integer
        old_lines:
          type: integer
        new_start:
          type: integer
        new_lines:
          type: integer
        header:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/DiffLine"

    DiffLine:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [context, add, delete]
        content:
          type: string
        old_no:
          type: integer
          nullable: true
        new_no:
          type: integer
          nullable: true

    BranchInfo:
      type: object
      required: [branch, status]
      properties:
        branch:
          type: string
        agent_id:
          type: string
        track_id:
          type: string
        status:
          type: string
