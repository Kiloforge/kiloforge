openapi: "3.0.3"
info:
  title: Kiloforge API
  description: Kiloforge orchestrator API for agent management, quota tracking, lock coordination, and system status.
  version: 0.1.0

servers:
  - url: http://localhost:3001
    description: Local development server

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /-/api/agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [Agents]
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent by ID or ID prefix
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID or ID prefix
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Missing agent ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/agents/{id}/log:
    get:
      operationId: getAgentLog
      summary: Get recent log lines for an agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID or ID prefix
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Number of tail lines to return
      responses:
        "200":
          description: Agent log output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLog"
        "400":
          description: Missing agent ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent or log file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/quota:
    get:
      operationId: getQuota
      summary: Get quota and cost usage
      tags: [Quota]
      responses:
        "200":
          description: Quota usage information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaInfo"

  /-/api/projects:
    get:
      operationId: listProjects
      summary: List registered projects
      tags: [Projects]
      responses:
        "200":
          description: List of registered projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: addProject
      summary: Register a new project from a remote URL
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request (bad URL format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Project already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/projects/{slug}:
    delete:
      operationId: removeProject
      summary: Remove a registered project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
        - name: cleanup
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: If true, also delete Gitea repo and filesystem data
      responses:
        "204":
          description: Project removed
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/tracks:
    get:
      operationId: listTracks
      summary: List conductor tracks
      tags: [Tracks]
      parameters:
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Filter tracks by project slug
      responses:
        "200":
          description: List of tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/status:
    get:
      operationId: getStatus
      summary: Get system status overview
      tags: [System]
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusInfo"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/skills:
    get:
      operationId: getSkillsStatus
      summary: Get installed skills status
      tags: [Skills]
      responses:
        "200":
          description: Skills status information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsStatus"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/skills/update:
    post:
      operationId: updateSkills
      summary: Trigger skill update
      tags: [Skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillUpdateRequest"
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUpdateResponse"
        "400":
          description: Bad request (e.g. no repo configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Local modifications prevent update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUpdateConflict"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/traces:
    get:
      operationId: listTraces
      summary: List trace summaries
      tags: [Traces]
      parameters:
        - name: track_id
          in: query
          required: false
          schema:
            type: string
          description: Filter traces by track ID attribute
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: Filter traces by session ID attribute
      responses:
        "200":
          description: List of trace summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TraceSummary"

  /-/api/traces/{traceId}:
    get:
      operationId: getTrace
      summary: Get trace detail with all spans
      tags: [Traces]
      parameters:
        - name: traceId
          in: path
          required: true
          schema:
            type: string
          description: Trace ID
      responses:
        "200":
          description: Trace with span tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceDetail"
        "404":
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/board/{project}:
    get:
      operationId: getBoard
      summary: Get board state for a project
      tags: [Board]
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Board state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardState"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/board/{project}/move:
    post:
      operationId: moveCard
      summary: Move a board card to a different column
      tags: [Board]
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveCardRequest"
      responses:
        "200":
          description: Card moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveCardResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/board/{project}/sync:
    post:
      operationId: syncBoard
      summary: Sync board from conductor tracks
      tags: [Board]
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncBoardResult"
        "400":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/locks:
    get:
      operationId: listLocks
      summary: List all active locks
      tags: [Locks]
      responses:
        "200":
          description: List of active locks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LockInfo"

  /-/api/locks/{scope}/acquire:
    post:
      operationId: acquireLock
      summary: Acquire a scoped lock
      tags: [Locks]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: Lock scope name (e.g. "merge")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockAcquireRequest"
      responses:
        "200":
          description: Lock acquired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockInfo"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Lock held by another holder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockConflictResponse"

  /-/api/locks/{scope}/heartbeat:
    post:
      operationId: heartbeatLock
      summary: Extend lock TTL
      tags: [Locks]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: Lock scope name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockHeartbeatRequest"
      responses:
        "200":
          description: Lock TTL extended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockInfo"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lock not found or not owned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /-/api/locks/{scope}:
    delete:
      operationId: releaseLock
      summary: Release a scoped lock
      tags: [Locks]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: Lock scope name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockReleaseRequest"
      responses:
        "200":
          description: Lock released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockReleasedResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lock not found or not owned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, projects]
      properties:
        status:
          type: string
          example: ok
        projects:
          type: integer

    Agent:
      type: object
      required: [id, role, ref, status, pid, started_at, updated_at]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [developer, reviewer]
        ref:
          type: string
        status:
          type: string
          enum: [running, waiting, halted, stopped, completed, failed, suspended, suspending, force-killed, resume-failed, waiting-review]
        session_id:
          type: string
        pid:
          type: integer
        worktree_dir:
          type: string
        log_file:
          type: string
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        suspended_at:
          type: string
          format: date-time
        shutdown_reason:
          type: string
        uptime_seconds:
          type: integer
        cost_usd:
          type: number
          format: double
        input_tokens:
          type: integer
        output_tokens:
          type: integer

    AgentLog:
      type: object
      required: [agent_id, lines, total]
      properties:
        agent_id:
          type: string
        lines:
          type: array
          items:
            type: string
        total:
          type: integer

    QuotaInfo:
      type: object
      required: [total_cost_usd, rate_limited]
      properties:
        total_cost_usd:
          type: number
          format: double
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        agent_count:
          type: integer
        rate_limited:
          type: boolean
        retry_after_seconds:
          type: integer
        agents:
          type: array
          items:
            $ref: "#/components/schemas/QuotaAgentUsage"

    QuotaAgentUsage:
      type: object
      required: [agent_id, cost_usd, input_tokens, output_tokens]
      properties:
        agent_id:
          type: string
        cost_usd:
          type: number
          format: double
        input_tokens:
          type: integer
        output_tokens:
          type: integer

    AddProjectRequest:
      type: object
      required: [remote_url]
      properties:
        remote_url:
          type: string
          description: Git remote URL (SSH or HTTPS)
        name:
          type: string
          description: Override project slug (defaults to repo name from URL)

    Project:
      type: object
      required: [slug, repo_name, active]
      properties:
        slug:
          type: string
        repo_name:
          type: string
        origin_remote:
          type: string
        active:
          type: boolean

    Track:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [complete, in-progress, pending]
        project:
          type: string

    StatusInfo:
      type: object
      required: [gitea_url, agent_counts, total_agents, sse_clients]
      properties:
        gitea_url:
          type: string
        agent_counts:
          type: object
          additionalProperties:
            type: integer
        total_agents:
          type: integer
        sse_clients:
          type: integer
        rate_limited:
          type: boolean
        total_cost_usd:
          type: number
          format: double

    LockInfo:
      type: object
      required: [scope, holder, acquired_at, expires_at, ttl_remaining_seconds]
      properties:
        scope:
          type: string
        holder:
          type: string
        acquired_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        ttl_remaining_seconds:
          type: number
          format: double

    LockAcquireRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string
        ttl_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 0
          description: "0 = non-blocking. >0 = server-side long-poll wait."

    LockHeartbeatRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string
        ttl_seconds:
          type: integer
          default: 60

    LockReleaseRequest:
      type: object
      required: [holder]
      properties:
        holder:
          type: string

    LockConflictResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        current_holder:
          type: string

    TraceSummary:
      type: object
      required: [trace_id, root_name, span_count, start_time, end_time]
      properties:
        trace_id:
          type: string
        root_name:
          type: string
        span_count:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time

    TraceDetail:
      type: object
      required: [trace_id, spans]
      properties:
        trace_id:
          type: string
        spans:
          type: array
          items:
            $ref: "#/components/schemas/SpanInfo"

    SpanInfo:
      type: object
      required: [trace_id, span_id, name, start_time, end_time, duration_ms, status]
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64
        status:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/SpanEvent"

    SpanEvent:
      type: object
      required: [name, timestamp]
      properties:
        name:
          type: string
        timestamp:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties:
            type: string

    BoardState:
      type: object
      required: [columns, cards]
      properties:
        columns:
          type: array
          items:
            type: string
        cards:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BoardCard"

    BoardCard:
      type: object
      required: [track_id, title, column, position, moved_at, created_at]
      properties:
        track_id:
          type: string
        title:
          type: string
        type:
          type: string
        column:
          type: string
          enum: [backlog, approved, in_progress, in_review, done]
        position:
          type: integer
        agent_id:
          type: string
        agent_status:
          type: string
        assigned_worker:
          type: string
        pr_number:
          type: integer
        moved_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    MoveCardRequest:
      type: object
      required: [track_id, to_column]
      properties:
        track_id:
          type: string
        to_column:
          type: string
          enum: [backlog, approved, in_progress, in_review, done]

    MoveCardResult:
      type: object
      required: [track_id, from_column, to_column]
      properties:
        track_id:
          type: string
        from_column:
          type: string
        to_column:
          type: string

    SyncBoardResult:
      type: object
      required: [created, updated, unchanged]
      properties:
        created:
          type: integer
        updated:
          type: integer
        unchanged:
          type: integer

    LockReleasedResponse:
      type: object
      required: [released]
      properties:
        released:
          type: boolean

    SkillsStatus:
      type: object
      required: [installed_version, update_available, skills]
      properties:
        installed_version:
          type: string
        available_version:
          type: string
        update_available:
          type: boolean
        repo:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillDetail"

    SkillDetail:
      type: object
      required: [name, modified]
      properties:
        name:
          type: string
        modified:
          type: boolean
        changed_files:
          type: array
          items:
            type: string

    SkillUpdateRequest:
      type: object
      properties:
        force:
          type: boolean
          default: false

    SkillUpdateResponse:
      type: object
      required: [version, installed_count]
      properties:
        version:
          type: string
        installed_count:
          type: integer
        skills:
          type: array
          items:
            type: string

    SkillUpdateConflict:
      type: object
      required: [error, modified]
      properties:
        error:
          type: string
        modified:
          type: array
          items:
            $ref: "#/components/schemas/SkillDetail"
