          in: query
          required: false
          schema:
            type: string
          description: Filter by event type. Comma-separated for multiple (e.g. "lock_contention,agent_timeout").
        - name: severity
          in: query
          required: false
          schema:
            type: string
          description: Filter by severity. Comma-separated for multiple (e.g. "error,critical").
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only return events created after this timestamp (RFC3339).
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only return events created before this timestamp (RFC3339).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of items to return per page.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor for pagination. Omit for first page.
      responses:
        "200":
          description: Paginated list of reliability events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReliabilityEvents"
        "500":
          description: Internal server error
