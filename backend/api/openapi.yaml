openapi: "3.0.3"
info:
  title: Kiloforge API
  description: Kiloforge Cortex API for agent management, quota tracking, lock coordination, and system status.
  version: 0.1.0

servers:
  - url: http://localhost:4001
    description: Local development server

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [Agents]
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: boolean
          description: If true (default), return only active agents + recently finished (30 min). If false, return all agents.
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter agents by status (e.g. running, completed, failed). Comma-separated for multiple.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of items to return per page.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor for pagination. Omit for first page.
      responses:
        "200":
          description: Paginated list of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAgents"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/interactive:
    post:
      operationId: spawnInteractiveAgent
      summary: Spawn an interactive agent with WebSocket IO
      tags: [Agents]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnInteractiveRequest"
      responses:
        "201":
          description: Interactive agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Project already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "428":
          description: Kiloforge setup required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRequiredResponse"
        "429":
          description: At capacity or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwarmCapacityResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent by ID or ID prefix
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID or ID prefix
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Missing agent ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAgent
      summary: Delete an agent record
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID
      responses:
        "204":
          description: Agent deleted
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent still running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/log:
    get:
      operationId: getAgentLog
      summary: Get recent log lines for an agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID or ID prefix
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Number of tail lines to return
      responses:
        "200":
          description: Agent log output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLog"
        "400":
          description: Missing agent ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent or log file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/stop:
    post:
      operationId: stopAgent
      summary: Stop a running agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID
      responses:
        "200":
          description: Agent stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/resume:
    post:
      operationId: resumeAgent
      summary: Resume a stopped agent session
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID
      responses:
        "200":
          description: Agent resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/{id}/replace:
    post:
      operationId: replaceAgent
      summary: Replace a terminal agent with a fresh one using the same ref and role
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ID of the terminal agent to replace
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceAgentRequest"
      responses:
        "201":
          description: Replacement agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Agent not in terminal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/quota:
    get:
      operationId: getQuota
      summary: Get quota and cost usage
      tags: [Quota]
      responses:
        "200":
          description: Quota usage information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaInfo"

  /api/projects:
    get:
      operationId: listProjects
      summary: List registered projects
      tags: [Projects]
      responses:
        "200":
          description: List of registered projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: addProject
      summary: Register a new project from a remote URL or create one from scratch
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request (bad URL format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Project already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}:
    delete:
      operationId: removeProject
      summary: Remove a registered project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
        - name: cleanup
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: If true, also delete Gitea repo and filesystem data
      responses:
        "204":
          description: Project removed
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/push:
    post:
      operationId: pushProject
      summary: Push local main to a remote branch
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushProjectRequest"
      responses:
        "200":
          description: Push succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Branches have diverged (non-fast-forward)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncConflictResponse"
        "500":
          description: Push failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/resolve-conflict:
    post:
      operationId: resolveConflict
      summary: Spawn a conflict resolver agent to resolve diverged branches
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveConflictRequest"
      responses:
        "201":
          description: Conflict resolver agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "429":
          description: At capacity or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Spawn failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/pull:
    post:
      operationId: pullProject
      summary: Pull latest from upstream and fast-forward merge
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullProjectRequest"
      responses:
        "200":
          description: Pull succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullResult"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Branches have diverged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Pull failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/mirror-sync:
    post:
      operationId: syncProjectMirror
      summary: Force-push main to the project's mirror directory
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Mirror synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MirrorSyncResult"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Mirror sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/sync-status:
    get:
      operationId: getSyncStatus
      summary: Get ahead/behind sync status vs upstream
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/diff:
    get:
      operationId: getProjectDiff
      summary: Get structured diff between a branch and main
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
        - name: branch
          in: query
          required: true
          schema:
            type: string
          description: Branch name to diff against main
        - name: max_files
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Maximum number of files to return (0 for unlimited)
      responses:
        "200":
          description: Structured diff result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiffResponse"
        "400":
          description: Missing branch parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or branch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/branches:
    get:
      operationId: getProjectBranches
      summary: List active worktree branches for a project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: List of active branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BranchInfo"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/metadata:
    get:
      operationId: getProjectMetadata
      summary: Get project metadata including product info, guidelines, tech stack, and track summary
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Project metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMetadataResponse"
        "404":
          description: Project not found or kiloforge not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/setup-status:
    get:
      operationId: getProjectSetupStatus
      summary: Check if kiloforge setup is complete for a project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/setup:
    post:
      operationId: startProjectSetup
      summary: Spawn an interactive setup agent for a project
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "201":
          description: Setup agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTracksResult"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{slug}/settings:
    get:
      operationId: getProjectSettings
      summary: Get project settings from kf config.yaml
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      responses:
        "200":
          description: Current project settings with defaults applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSettingsResponse"
        "404":
          description: Project not found or kiloforge not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProjectSettings
      summary: Update project settings in kf config.yaml
      tags: [Projects]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectSettingsRequest"
      responses:
        "200":
          description: Updated project settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSettingsResponse"
        "404":
          description: Project not found or kiloforge not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ssh-keys:
    get:
      operationId: listSSHKeys
      summary: List available SSH keys
      tags: [System]
      responses:
        "200":
          description: List of SSH keys found on the server
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/SSHKeyInfo"

  /api/tracks:
    get:
      operationId: listTracks
      summary: List conductor tracks
      tags: [Tracks]
      parameters:
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Filter tracks by project slug
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter tracks by status (pending, in-progress, complete). Comma-separated for multiple.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of items to return per page.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor for pagination. Omit for first page.
      responses:
        "200":
          description: Paginated list of tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTracks"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tracks/generate:
    post:
      operationId: generateTracks
      summary: Spawn an interactive track-generator agent with a prompt
      tags: [Tracks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTracksRequest"
      responses:
        "201":
          description: Track-generator agent spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTracksResult"
        "401":
          description: Claude CLI not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent permissions not consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Required skills not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsMissingResponse"
        "428":
          description: Kiloforge setup required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRequiredResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tracks/{trackId}:
    get:
      operationId: getTrackDetail
      summary: Get full detail for a track including spec, plan, and metadata
      tags: [Tracks]
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
          description: Track ID
        - name: project
          in: query
          required: true
          schema:
            type: string
          description: Project slug to locate track artifacts
      responses:
        "200":
          description: Track detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackDetail"
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTrack
      summary: Delete a track's artifacts and board card
      tags: [Tracks]
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
          description: Track ID to delete
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Project slug for board card removal
      responses:
        "204":
          description: Track deleted
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

