version: 2
project_name: kf

builds:
  - id: kf
    dir: backend
    main: ./cmd/kf
    binary: kf
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

release:
  github:
    owner: Kiloforge
    name: kiloforge
  prerelease: true
  name_template: "v{{.Version}}"
