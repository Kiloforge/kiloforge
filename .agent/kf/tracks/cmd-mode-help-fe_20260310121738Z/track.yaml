id: cmd-mode-help-fe_20260310121738Z
title: "Command Mode help panel, clear button & platform-aware shortcuts"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Add an inline help panel to full-screen command mode showing all keyboard
    shortcuts with platform-aware key labels (⌘ on Mac, Ctrl on Win/Linux),
    a clear-messages button per pane, and a Cmd+K shortcut to clear the active pane.
  context: |
    Full-screen command mode currently has split/close/navigate shortcuts but no
    in-mode help and no way to clear messages. The existing ShortcutHelp component
    and SHORTCUT_LIST use hardcoded Mac symbols (⌘⇧) with a text hint for Ctrl —
    this should be replaced with runtime platform detection.
  codebase_analysis: |
    Key files:
    - frontend/src/hooks/useKeyboardShortcuts.ts — SHORTCUT_LIST with hardcoded ⌘ symbols
    - frontend/src/components/ShortcutHelp.tsx — existing help modal (overlay pattern)
    - frontend/src/components/fullscreen/FullScreenCommand.tsx — overlay with keyboard handler
    - frontend/src/components/fullscreen/CommandPane.tsx — per-pane component with messages state
    - frontend/src/hooks/useAgentWebSocket.ts — provides messages array, needs clearMessages()
    - frontend/src/components/fullscreen/FullScreenCommand.module.css — existing styles

    Patterns to follow:
    - ShortcutHelp uses overlay+modal with Escape to close
    - CommandPane already has paneHeader with close button — clear button goes there
    - FullScreenCommand.tsx handleKeyDown already handles mod+key combos
    - CSS module tokens: --bg-surface, --border, --text-dim, --accent, --font-mono
  acceptance_criteria:
    - Platform detection utility returns correct modifier symbols (⌘ on Mac, Ctrl on Win/Linux)
    - SHORTCUT_LIST and ShortcutHelp use platform-aware key labels
    - Command mode header has a "?" help button that toggles inline help panel
    - Cmd+? (or Ctrl+?) within command mode toggles the help panel
    - Each pane header has a "Clear" button that resets the messages array
    - Cmd+K (or Ctrl+K) clears messages in the active pane
    - All button titles use platform-aware shortcut labels
    - Unit tests for platform detection and clear functionality
    - E2E test for help panel toggle and clear button
  out_of_scope: |
    - Resizable pane dividers (drag-to-resize)
    - Persistent clear state across reconnections
    - Custom shortcut rebinding
  technical_notes: |
    - Create usePlatform() hook: detect Mac via navigator.platform/userAgent,
      return { isMac, mod: "⌘"|"Ctrl", shift: "⇧"|"Shift" }
    - Refactor SHORTCUT_LIST to getShortcutList(isMac) returning platform-specific keys
    - Add CommandModeHelp sub-component inside fullscreen overlay (inline panel, not modal)
    - Add clearMessages() to useAgentWebSocket hook (resets messages state)
    - Wire clear button and Cmd+K shortcut in FullScreenCommand.tsx
    - Add command-mode-specific shortcuts list for the inline help
