id: sse-event-bus_20260309091500Z
title: SSE Event Bus Infrastructure
type: refactor
status: complete
created: 2026-03-09T09:15:00Z
updated: 2026-03-09T09:15:00Z
spec:
  summary: Refactor the SSEHub from a dashboard-internal broadcast mechanism into a shared, injectable event bus that any service or handler can emit events to, with typed event definitions and comprehensive tests.
  context: |
    The current SSE infrastructure (`dashboard/sse.go`) is tightly coupled to the dashboard package. Only the background watcher (`dashboard/watcher.go`) can emit events, and it does so by polling agent/quota state every 2 seconds. This polling approach cannot scale to additional entity types ‚Äî each new entity would add more disk reads and comparison logic to the monolithic `checkAndBroadcast` function.
    
    To support real-time updates for all entity types (tracks, board, traces, projects, locks), the event bus must be:
    1. **Shared** ‚Äî accessible from REST handlers, services, and the dashboard
    2. **Injectable** ‚Äî passed as a port/interface, not a concrete dependency
    3. **Typed** ‚Äî events use well-defined types, not `any`
    4. **Testable** ‚Äî event emission can be verified in unit tests
  codebase_analysis: |
    - **Current SSEHub**: `backend/internal/adapter/dashboard/sse.go` ‚Äî manages client channels, broadcasts `SSEEvent{Type string, Data any}`
    - **Current Watcher**: `backend/internal/adapter/dashboard/watcher.go` ‚Äî 2s ticker, polls `AgentLister.Load()` + `QuotaReader`, delta-detects changes, broadcasts via hub
    - **Frontend Consumer**: `frontend/src/hooks/useSSE.ts` ‚Äî EventSource with exponential backoff, registers handlers by event type name
    - **App.tsx wiring**: `App.tsx:31-38` ‚Äî only 3 handlers registered: `agent_update`, `agent_removed`, `quota_update`
    - **AsyncAPI spec**: `backend/api/asyncapi.yaml` ‚Äî documents 3 SSE event types
    - **Dashboard Server**: `dashboard/server.go` ‚Äî owns the hub, watcher launched from `Run()`
    - **REST APIHandler**: `rest/api_handler.go` ‚Äî has no access to SSEHub, cannot emit events on mutations
  acceptance_criteria:
    - Event bus interface defined as a core port (`core/port/event_bus.go`)
    - Typed event definitions for all current and planned event types
    - SSEHub implements the event bus port interface
    - REST APIHandler receives the event bus via dependency injection
    - Dashboard watcher uses the event bus interface (not direct hub access)
    - Existing agent_update, agent_removed, quota_update events continue to work unchanged
    - AsyncAPI spec updated with new event type definitions (track, board, trace, project, lock)
    - Unit tests for event bus: subscribe, unsubscribe, broadcast, slow-client drop
    - Integration test: emit event ‚Üí SSE client receives it
    - Frontend `useSSE` hook remains compatible (no changes needed ‚Äî it already handles arbitrary event types)
  technical_notes: |
    ### Architecture
    
    1. **Port interface** (`core/port/event_bus.go`):
       ```go
       type Event struct {
           Type string
           Data any
       }
    
       type EventBus interface {
           Publish(event Event)
           Subscribe() <-chan Event
           Unsubscribe(ch <-chan Event)
           ClientCount() int
       }
       ```
    
    2. **SSEHub adapter** ‚Äî the existing `dashboard.SSEHub` gets refactored to implement `port.EventBus`. It moves conceptually from being dashboard-internal to being a shared adapter.
    
    3. **Typed event constructors** ‚Äî helper functions like `NewTrackUpdateEvent(track)`, `NewBoardUpdateEvent(card)` ensure consistent event type strings and payload shapes.
    
    4. **Watcher stays** ‚Äî the background watcher remains for file-based state (agents are stored as JSON files on disk with no mutation hooks). It simply uses the event bus interface instead of direct hub access.
    
    5. **DI wiring** ‚Äî the event bus is created once at startup and injected into both the dashboard server and the REST API handler via their option structs.
    
    ### What stays the same
    - SSE HTTP endpoint (`/-/events`) and its handler
    - Frontend `useSSE` hook (already handles dynamic event types)
    - Non-blocking broadcast with slow-client drop semantics
    
    ---
