id: fix-tour-scroll-fe_20260311230100Z
title: Fix tour overlay misalignment on scroll
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: ">"
  context: |
    The guided tour uses a custom overlay system (no third-party library) with a fixed backdrop,
    an absolute-positioned spotlight cutout, and an absolute-positioned tooltip. When the user
    scrolls during an active tour step, the spotlight and tooltip lose alignment with their
    target elements.
    
    User report: "the overlay stays in place and then the scrolled page moves away."
  codebase_analysis: |
    Root cause is a coordinate system mismatch in TourOverlay.tsx:
    
    1. `.backdrop` uses `position: fixed` (viewport-relative, does not scroll)
    2. `.spotlight` uses `position: absolute` inside the fixed backdrop — effectively
       also viewport-relative, but the code adds `window.scrollY` to `getBoundingClientRect()`
       values (lines 123, 193, 199, 205, 212), double-compensating for scroll
    3. `.tooltip` uses `position: absolute` but is a sibling of the backdrop (rendered in a
       React fragment), so it positions relative to the nearest positioned ancestor or document
       root — yet also adds `window.scrollY`
    
    The scroll listener at line 35 re-fires `getBoundingClientRect()` on every scroll event,
    which returns fresh viewport-relative coordinates. Adding `window.scrollY` on top of these
    viewport-relative values creates the offset drift.
    
    Key files:
    - frontend/src/components/tour/TourOverlay.tsx (lines 120-134, 184-217)
    - frontend/src/components/tour/TourOverlay.module.css (lines 13-32, 96-107)
  acceptance_criteria:
    - Spotlight cutout stays aligned with the target element when the user scrolls
    - Tooltip stays correctly positioned relative to the target element when scrolling
    - No visual glitches during scroll (no flickering or jumping)
    - All 14 tour steps still render correctly with proper spotlight and tooltip placement
    - Welcome and finish steps (centered dialogs without spotlight) are unaffected
  out_of_scope: |
    - Preventing scroll during tour (scroll should be allowed, overlay must track correctly)
    - Refactoring tour step definitions or tour state management
    - Adding new tour steps or changing tour content
    - Scroll-into-view behavior for off-screen targets (separate concern)
  technical_notes: |
    Fix strategy: Switch spotlight and tooltip to `position: fixed` and remove all
    `window.scrollY` additions. Since `getBoundingClientRect()` already returns
    viewport-relative coordinates, and fixed positioning is also viewport-relative,
    the coordinates will stay consistent without manual scroll compensation.
    
    Changes:
    1. TourOverlay.module.css: Change `.spotlight` from `position: absolute` to `position: fixed`
    2. TourOverlay.module.css: Change `.tooltip` from `position: absolute` to `position: fixed`
    3. TourOverlay.tsx: Remove `+ window.scrollY` from spotlight top calculation (line 123)
    4. TourOverlay.tsx: Remove `+ window.scrollY` from all 4 cases in computeTooltipPosition
       (lines 193, 199, 205, 212)
    5. Keep the scroll event listener — it correctly re-fires getBoundingClientRect() to get
       updated viewport-relative positions as elements scroll
