id: kf-repair-skill_20260311060000Z
title: System repair agent skill — KF health auditing, diagnostics, and auto-repair
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Create an interactive kf-repair skill that audits Kiloforge system integrity
    (track registry, dependency graph, conflict pairs, worktree state, merge lock,
    cross-references) and performs repairs directly or generates tracks for larger issues.
  context: |
    The Kiloforge system manages project work through several interlinked data files:
    tracks.yaml (registry), deps.yaml (dependency graph), conflicts.yaml (conflict pairs),
    per-track track.yaml files, config.yaml, and worktree/branch state. These files are
    modified by multiple concurrent agents (architects, developers) across worktrees, and
    can drift out of sync due to merge conflicts, interrupted operations, or bugs in CLI tools.

    Currently kf-validate is outdated (references legacy conductor paths) and only checks
    basic file existence. kf-reliability audits codebase quality, not KF system health.
    There is no skill dedicated to diagnosing and repairing KF system integrity.
  codebase_analysis: |
    Existing KF infrastructure:
    - CLI tools: kf-track (bash, 2284 lines), kf-track-content (Python3, 1094 lines),
      kf-merge-lock (bash, 384 lines), kf-worktree-env (bash, 122 lines)
    - Data files: tracks.yaml, tracks/deps.yaml, tracks/conflicts.yaml, config.yaml,
      tracks/{id}/track.yaml per track
    - Skills live at ~/.claude/skills/{name}/SKILL.md with YAML frontmatter
    - Existing kf-validate skill is stale (references .agent/conductor/ paths, uses
      legacy spec.md/plan.md/tracks.md patterns)

    Key invariants the repair skill must verify:
    1. tracks.yaml entries parse as valid JSON with required fields
    2. Every pending/in-progress track has a directory with track.yaml
    3. deps.yaml only references existing pending/in-progress tracks
    4. deps.yaml has no cycles
    5. conflicts.yaml pairs are strictly ordered and reference active tracks
    6. Implementation branches (feature/*, bug/*, etc.) match track IDs in registry
    7. Merge lock is not stale
    8. config.yaml primary_branch exists as a git branch
  acceptance_criteria:
    - Skill file created at ~/.claude/skills/kf-repair/SKILL.md with proper frontmatter
    - Skill introduces itself and explains its purpose when invoked without arguments
    - Full audit mode covers all 8 dimensions (registry, directories, deps, conflicts, worktree, lock, config, cross-refs)
    - Each finding reported with severity (CRITICAL/HIGH/MEDIUM/LOW) and status (PASS/WARN/FAIL)
    - Direct repair capability for safe fixes (prune stale deps/conflicts, fix status mismatches, re-sort files, release stale locks)
    - Escalation path to /kf-architect for structural issues requiring tracks
    - Compaction anchor line included for long sessions
    - Skill registered in settings so it appears in the skill list
  out_of_scope: |
    - Codebase reliability auditing (covered by kf-reliability)
    - Track content quality review (covered by kf-reviewer)
    - Modifying CLI tool source code (kf-track, kf-track-content, etc.)
    - Remote/upstream repository health
  technical_notes: |
    The skill should:
    1. Use kf-track CLI commands where possible for reads (kf-track list, kf-track get, etc.)
    2. Fall back to raw file reads for validation the CLI can't perform (JSON parsing, cross-refs)
    3. Use git commands for worktree/branch state inspection
    4. Use kf-merge-lock status for lock inspection
    5. Follow the same SKILL.md structure as kf-reliability (phases, dimensions, severity ratings)
    6. Support flags: --full (default), --registry, --deps, --conflicts, --worktrees, --fix
    7. Interactive mode: prompt user before applying repairs (unless --fix passed)
    8. Output a summary report to terminal (no file output needed — repairs are immediate)
