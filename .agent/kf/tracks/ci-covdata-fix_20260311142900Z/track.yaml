id: ci-covdata-fix_20260311142900Z
title: Fix CI test failure — missing covdata tool in coverage step
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    The Go test coverage step in CI fails with "go: no such tool covdata" because
    the testutil package has no test files. Fix by adjusting the CI coverage command.
  context: |
    CI runs `go test -race -coverprofile=coverage.out ./...` which instruments all
    packages for coverage, including packages without test files. For such packages,
    Go needs the `covdata` tool to merge coverage data, but this tool is missing
    from the CI Go 1.24 installation on ubuntu-latest.

    The failing line in CI logs:
      # kiloforge/internal/core/testutil
      go: no such tool "covdata"

    This causes the entire test job to fail with exit code 1, which also skips
    the frontend tests and build binary steps.
  codebase_analysis: |
    Files involved:
    - .github/workflows/ci.yml:77-79 — the failing step:
        cd backend && go test -race -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out | grep '^total:'
    - backend/internal/core/testutil/mocks.go — package with no test files

    The testutil package is a shared mock library imported by other test packages.
    It has no *_test.go files of its own, which triggers the covdata issue.

    Two viable fixes:
    1. Change CI command to exclude testutil: use `-coverpkg` to be explicit,
       or filter packages via `go list` to only test packages that have tests
    2. Add a trivial test file to testutil (e.g., package_test.go with a single
       TestPlaceholder) — this is the simplest and most robust fix
  acceptance_criteria:
    - CI test job passes on main (no covdata error)
    - Coverage report still generated correctly
    - No regression in test results
  out_of_scope: |
    - Changing Go version in CI
    - Adding real tests to testutil (that's test-coverage-be track's job)
    - Frontend test fixes (AgentLauncher role name mismatch is a separate issue)
  technical_notes: |
    Simplest fix: add a placeholder test file to testutil so Go doesn't need
    covdata. Alternative: change CI command to filter packages.
plan:
  - phase: Fix
    tasks:
      - text: Add backend/internal/core/testutil/package_test.go with a placeholder test
        done: false
      - text: Alternatively or additionally, update .github/workflows/ci.yml to handle no-test packages gracefully
        done: false
  - phase: Verification
    tasks:
      - text: Run go test -race -coverprofile=coverage.out ./... locally to confirm no covdata error
        done: false
      - text: Run make build to confirm clean compilation
        done: false
