id: impl-native-track-board_20260308235001Z
title: Native Track Board with Dashboard Kanban and Agent Lifecycle
type: feature
status: complete
created: 2026-03-08T23:50:01Z
updated: 2026-03-09T00:30:00Z
spec:
  summary: Replace Gitea's project board as the source of truth for track lifecycle with a kiloforge-native board service. Dashboard provides a kanban UI with drag-and-drop column transitions that directly drive agent lifecycle. Gitea continues to handle git hosting, PRs, and code review.
  acceptance_criteria:
    - kiloforge-native board service manages track column state (no Gitea board dependency)
    - Board state persisted locally (survives relay restarts)
    - Dashboard shows kanban board per project with drag-and-drop
    - Column transitions trigger agent lifecycle (spawn, halt, resume, terminate)
    - Board API endpoints defined in OpenAPI spec (schema-first)
    - SSE broadcasts board_update events for real-time sync
    - Gitea board code removed (boardSyncer, label-webhook handling, board setup)
    - Gitea PR/review webhook handling preserved
    - Tracks auto-populate on board from tracks.md discovery
    - Board shows agent status alongside each track card
  out_of_scope: |
    - Removing Gitea entirely
    - Changing PR-based review workflow
    - Multi-user access control
    - Mobile-optimized kanban
    
