id: reliability-advisor-skill_20260310001315Z
title: Reliability advisor skill — automated testing, linting, and static analysis guidance agent
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    The kiloforge workflow uses multiple agent roles (architect, developer, reviewer) operating
    in parallel worktrees. As the codebase grows, reliability of these agents depends heavily on
    the quality of automated guardrails — tests that catch regressions, linters that enforce
    conventions, and type systems that prevent runtime errors at compile time.
    
    Currently the project has strong foundations (Playwright E2E, Go build tags for test tiers,
    strict TypeScript config) but lacks a systematic process for identifying and closing
    reliability gaps. A dedicated advisor skill would provide this capability on demand.
  codebase_analysis: |
    Existing skill structure: Skills live at ~/.claude/skills/{name}/SKILL.md with YAML
    frontmatter (name, description, metadata) followed by markdown workflow documentation.
    Skills are registered in .claude/settings.json and triggered via /skill-name.
    
    Existing testing infrastructure:
    - Go: unit (go test), integration (-tags=integration), E2E (-tags=e2e), race detector
    - Frontend: Vitest + jsdom for unit, Playwright for E2E
    - CI: GitHub Actions runs tests on push/PR (ubuntu + macOS)
    - Mock agent binary for E2E agent flows
    - 80+ Go test files, 17 frontend test files, 19 Playwright spec files
    
    Existing linting:
    - golangci-lint (no custom config — uses defaults)
    - ESLint with typescript-eslint and react-hooks plugins
    - TypeScript strict mode enabled
    
    Existing build checks:
    - make verify-codegen (OpenAPI schema drift detection)
    - VCS stamping with worktree-aware git dir resolution
    - Frontend embed with ensure-dist placeholder
    
    Key gaps identified:
    - No .golangci.yaml with strict linter set (gosec, gocritic, errorlint, goimports)
    - No test coverage thresholds in CI
    - No npm audit or go mod verify in CI
    - No API contract validation (responses vs OpenAPI spec)
    - No accessibility or visual regression testing
    - No cyclomatic complexity limits
  acceptance_criteria:
    - Skill file created at ~/.claude/skills/kf-reliability/SKILL.md with proper frontmatter
    - Skill registered in ~/.claude/settings.json (or user instructions for manual registration)
    - Skill defines a clear multi-phase workflow — audit, analyze, recommend, generate tracks
    - Audit phase covers all reliability dimensions — testing (unit, integration, E2E, contract), linting (Go, TS/JS), static typing, build-time checks, CI gates
    - Skill produces actionable output — either direct fixes or kiloforge tracks for larger work
    - Skill emphasizes automated, repeatable outcomes — manual exploration leads to automated tests
    - Skill integrates with kiloforge workflow (can generate tracks via kf-architect or directly)
    - Documentation includes examples of when to invoke and expected outputs
  out_of_scope: |
    - Implementing the actual reliability improvements (that's separate tracks)
    - Modifying CI/CD pipelines (separate track)
    - Adding new testing frameworks or tools (separate track)
    - The skill advises and generates tracks — it does not implement fixes directly
  technical_notes: |
    The skill should follow the established kf-* skill pattern:
    1. YAML frontmatter with name, description, argument-hint
    2. Compaction anchor line for context recovery
    3. Multi-phase workflow with clear steps
    4. Integration with kf-track CLI for generating improvement tracks
    5. Checklist-based audit covering all reliability dimensions
    
    The skill should be designed to be invoked periodically (e.g., after major features land)
    or on-demand when reliability concerns arise. It should read the codebase, identify gaps,
    prioritize by impact, and either fix small issues directly or generate tracks for larger work.
    
    Key design decisions:
    - Skill outputs a structured reliability report with severity ratings
    - Small fixes (adding a missing test, tightening a lint rule) can be applied directly
    - Larger improvements generate kf tracks via the standard architect workflow
    - The skill should track historical audits to measure improvement over time
