id: tracing-default-on-be_20260309133000Z
title: Enable Tracing by Default with Config API (Backend)
type: feature
status: complete
created: 2026-03-09T13:30:00Z
updated: 2026-03-09T14:30:00Z
spec:
  summary: "Change the default for `TracingEnabled` from `false` to `true`, add environment variable support (`KF_TRACING_ENABLED`), and expose a REST endpoint to toggle tracing at runtime."
  context: "Tracing is currently disabled by default and can only be enabled by editing `~/.kiloforge/config.json`. This makes it invisible to most users. Since tracing is lightweight (in-memory store + optional OTLP export) and provides valuable debugging insight, it should be on by default. A runtime toggle via the API allows the dashboard to control it without restarting."
  codebase_analysis: |
    ### Current config
    - `backend/internal/adapter/config/config.go` — `TracingEnabled *bool`, `IsTracingEnabled()` returns `false` when nil
    - `backend/internal/adapter/config/defaults.go` — no explicit default set (nil → false)
    - No `KF_TRACING_ENABLED` env var in `env_adapter.go`
    - No CLI flag in `flags_adapter.go`
    
    ### Current initialization
    - `backend/internal/adapter/cli/serve.go:80` — checks `cfg.IsTracingEnabled()` before calling `tracing.Init()`
    - `backend/internal/adapter/cli/implement.go:240` — `initTracing()` helper, returns NoopTracer when disabled
    
    ### API
    - `backend/api/openapi.yaml` — has `GET /-/api/traces` and `GET /-/api/traces/{traceId}` but no config endpoint
    - `backend/internal/adapter/rest/api_handler.go` — trace handlers return empty when store is nil
    
    ### Config persistence
    - `backend/internal/adapter/config/json_adapter.go` — reads/writes `~/.kiloforge/config.json`
  acceptance_criteria:
    - `TracingEnabled` defaults to `true`
    - `KF_TRACING_ENABLED` environment variable supported
    - `PUT /api/config` endpoint accepts `{"tracing_enabled": bool}` and persists to config
    - `GET /api/config` endpoint returns current config (at minimum `tracing_enabled` and `dashboard_enabled`)
    - Config changes via API are persisted to `config.json`
    - `go test ./...` passes
    - `make build` succeeds
  out_of_scope: |
    - Frontend UI toggle (separate FE track)
    - Runtime hot-reload of tracing (restart still required for OTLP exporter changes)
    - OTLP endpoint configuration via UI
  technical_notes: |
    ### Default change
    In `defaults.go`, set `TracingEnabled` to `boolPtr(true)`.
    
    ### Env var
    Add `KF_TRACING_ENABLED` to `env_adapter.go` following the existing pattern for `KF_DASHBOARD_ENABLED`.
    
    ### Config API endpoints
    ```yaml
    GET /api/config
      → Returns: { tracing_enabled: bool, dashboard_enabled: bool }
    
    PUT /api/config
      → Body: { tracing_enabled?: bool, dashboard_enabled?: bool }
      → Persists to config.json
      → Returns: updated config
    ```
    
    This is a general-purpose config endpoint that can be extended later for other settings.
    
    ---
