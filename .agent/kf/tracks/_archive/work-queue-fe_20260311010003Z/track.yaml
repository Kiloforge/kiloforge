id: work-queue-fe_20260311010003Z
title: Work queue — frontend settings and status UI
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: Dashboard UI for configuring max workers, viewing queue status, and monitoring active/queued tracks with real-time SSE updates. Includes queue control panel, worker count setting, and queue item list.
  context: |
    The work-queue-be track adds a backend queue service with REST API and SSE events. This track builds the frontend UI to control and monitor that queue.
    
    The dashboard currently shows tracks on a Kanban board and agents in an agent list. The queue UI adds a control panel where users can:
    1. Set max concurrent workers (semaphore count)
    2. Start/stop the queue
    3. See queued tracks in dependency order
    4. Monitor which workers are active and what they're working on
  codebase_analysis: |
    ### Dashboard layout
    - `frontend/src/pages/OverviewPage.tsx` — main dashboard with agent grid and stats
    - `frontend/src/pages/ProjectPage.tsx` — project view with Kanban board and track list
    - `frontend/src/components/StatCards.tsx` — summary stat cards at top of pages
    
    ### Existing patterns
    - TanStack Query hooks in `frontend/src/hooks/` for data fetching
    - SSE via `useEventSource()` hook for real-time updates
    - CSS Modules for component-scoped styles
    - Glass panel design (var(--surface), var(--border), backdrop-blur)
    
    ### API to consume (from work-queue-be)
    - `POST /api/queue/start` — start queue
    - `POST /api/queue/stop` — stop queue
    - `GET /api/queue` — queue status (items, active count, max workers, running state)
    - `PATCH /api/queue/settings` — update max workers
    - SSE events: queue-started, queue-stopped, track-assigned, track-completed, worker-freed
    
    ### Component patterns
    - Buttons: styled with glass treatment, accent gradient for primary actions
    - Number inputs: minimal styling, small
    - Lists: vertical with status indicators (colored dots/badges)
  acceptance_criteria:
    - Queue control panel on OverviewPage or ProjectPage with Start/Stop button
    - Max workers input (number) with save — updates via PATCH /api/queue/settings
    - Queue status display: running/stopped state, active workers count, queued tracks count
    - Queued track list showing tracks in dependency order with status (queued/assigned/completed)
    - Active worker indicators showing which agent is working on which track
    - Real-time updates via SSE — queue state changes reflect immediately without page refresh
    - Start button disabled when queue is already running; Stop button disabled when stopped
    - Glass panel styling consistent with existing dashboard theme
  out_of_scope: |
    - Backend queue service implementation (handled by work-queue-be)
    - Manual track selection for queueing (enqueue all ready tracks for now)
    - Drag-to-reorder queue items
    - Worker log streaming in queue UI (use existing agent detail page for logs)
  technical_notes: |
    ### Queue control panel layout
    
    ```
    ┌─────────────────────────────────────────────┐
    │  Work Queue                    [Start/Stop] │
    │                                             │
    │  Workers: [3] / 3 active    Queue: 5 tracks │
    │                                             │
    │  ┌─ Active ─────────────────────────────┐   │
    │  │ developer-1  track-abc...  ●running  │   │
    │  │ developer-2  track-def...  ●running  │   │
    │  │ developer-3  track-ghi...  ●running  │   │
    │  └──────────────────────────────────────┘   │
    │                                             │
    │  ┌─ Queued ─────────────────────────────┐   │
    │  │ 1. track-jkl...  (deps: 2/2 met)    │   │
    │  │ 2. track-mno...  (deps: 1/2 met)    │   │
    │  │ 3. track-pqr...  (no deps)          │   │
    │  └──────────────────────────────────────┘   │
    └─────────────────────────────────────────────┘
    ```
    
    ### Hooks
    
    ```typescript
    // useQueue() — fetch queue state + SSE subscription
    function useQueue() {
      const { data } = useQuery({ queryKey: ['queue'], queryFn: fetchQueue });
      // SSE listeners for queue events update cache
      return { queue: data, start, stop, updateSettings };
    }
    ```
    
    ### SSE integration
    
    Listen for queue-specific events alongside existing agent/track events:
    - `queue-started` → refetch queue state
    - `queue-stopped` → refetch queue state
    - `track-assigned` → update specific queue item
    - `worker-freed` → update active workers display
