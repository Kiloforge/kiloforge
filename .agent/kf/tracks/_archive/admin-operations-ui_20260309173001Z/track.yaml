spec:
  summary: "Add a dashboard admin panel with buttons for conductor management operations (bulk archive, compact archive, report generation). Each operation spawns an interactive agent with the appropriate `kf-*` skill, showing real-time output in an embedded terminal."
  context: Management operations like bulk-archive, compact-archive, and report generation currently require a human to manually invoke skills via Claude Code CLI. The dashboard already has the interactive agent infrastructure (WebSocket, terminal component) used by track generation. Admin operations should follow the same pattern — spawn an agent, show output, auto-refresh board state on completion.
  codebase_analysis: |
    ### Existing infrastructure to leverage
    
    - **`POST /api/agents/interactive`** — Spawns interactive agent with optional prompt and work_dir
    - **`/ws/agent/{agentId}`** — WebSocket for bidirectional agent I/O
    - **`POST /api/tracks/generate`** — Already spawns agent with `/kf-track-generator` prompt prefix and auto-syncs board on completion — this is the pattern to follow
    - **Frontend `AgentTerminal` component** — Already renders agent output in real-time via WebSocket
    
    ### Skills available for admin operations
    
    | Operation | Skill | Description |
    |-----------|-------|-------------|
    | Bulk Archive | `/kf-bulk-archive` | Move all completed tracks to `_archive/`, update tracks.md |
    | Compact Archive | `/kf-compact-archive` | Remove archived directories, record metadata in archive-compactions.md |
    | Generate Report | `/kf-report` | Generate timeline, velocity, SLOC, cost estimate reports |
    | Manage Tracks | `/kf-manage` | Archive, restore, delete, rename individual tracks |
    
    ### Frontend entry points
    
    - **`ProjectPage.tsx`** — Already has track generation button; admin panel could be added as a collapsible section or toolbar
    - **`OverviewPage.tsx`** — System-wide view; admin operations could also live here for cross-project actions
  acceptance_criteria:
    - Dashboard has an admin/operations section (accessible from project page or overview)
    - "Bulk Archive" button spawns agent with `/kf-bulk-archive` prompt, shows terminal output
    - "Compact Archive" button spawns agent with `/kf-compact-archive` prompt, shows terminal output
    - "Generate Report" button spawns agent with `/kf-report` prompt, shows terminal output
    - Board auto-refreshes after bulk-archive or compact-archive completes (tracks moved/removed)
    - Operations are disabled while an admin agent is already running (prevent concurrent mutations)
    - Backend endpoint validates that no other admin operation is in progress
    - `go test ./...` passes
    - Frontend builds without errors
  out_of_scope: |
    - Making admin operations work without skills installed (covered by `skill-preflight-check` track)
    - Adding new management operations beyond bulk-archive, compact-archive, and report
    - Modifying the skills themselves
  technical_notes: |
    ### Backend: New REST endpoint
    
    Add `POST /api/admin/run` endpoint:
    
    ```json
    {
      "operation": "bulk-archive" | "compact-archive" | "report",
      "project": "optional-project-slug"
    }
    ```
    
    Response: `{ "agent_id": "...", "ws_url": "/ws/agent/..." }`
    
    The handler follows the same pattern as `GenerateTracks`:
    1. Map operation to skill prompt (e.g., `"bulk-archive"` → `/kf-bulk-archive`)
    2. Spawn interactive agent with the skill prompt
    3. Register WebSocket bridge
    4. On completion, trigger board sync if operation was archive-related
    5. Return agent ID and WS URL
    
    ### Frontend: Admin panel component
    
    New `AdminPanel` component with:
    - Row of operation buttons (Bulk Archive, Compact Archive, Report)
    - Each button triggers `POST /api/admin/run`, then opens agent terminal
    - Disabled state while operation is running
    - Success/failure indication after completion
    
    Place in `ProjectPage.tsx` as a collapsible "Admin Operations" section below the board.
    
    ---
