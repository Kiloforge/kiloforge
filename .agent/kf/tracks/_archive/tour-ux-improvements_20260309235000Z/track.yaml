spec:
  summary: Improve the guided tour so it actually walks the user through different pages and states, showing what a configured project looks like. Fix the example repo URL and ensure the tour doesn't feel stuck at any step.
  context: |
    The current tour has 7 steps but users report it "stays on the first page." Several issues:
    
    1. The example repo URL is `https://github.com/example/demo-app.git` ŌĆö should be `https://github.com/kiloforge/example-project`
    2. After adding a project, the tour jumps to the project page but doesn't show what a fully set up project looks like (populated board, agents, etc.) ŌĆö just an empty state
    3. The last step (`move-card`) hides the Next button entirely (`action: "wait-for-drag"`), so if the user doesn't realize they must drag a card, they're stuck with no way to advance or skip
  codebase_analysis: |
    ### Tour steps definition
    
    - **`frontend/src/components/tour/tourSteps.ts`** ŌĆö 7 steps defined with targets, actions, and page routing
    - Step 1 (`add-project`): prefills URL `https://github.com/example/demo-app.git` ŌĆö **wrong URL**
    - Step 6 (`move-card`): `action: "wait-for-drag"` ŌĆö hides Next button
    
    ### Prefill behavior
    
    - **`frontend/src/components/AddProjectForm.tsx:29-36`** ŌĆö sets `remoteUrl` to the hardcoded example URL during tour
    - **Fix**: Change to `https://github.com/kiloforge/example-project`
    
    ### State transitions
    
    - **`frontend/src/components/tour/TourProvider.tsx:52-64`** ŌĆö `nextStep()` navigates to project page but doesn't inject demo state
    - **`backend/internal/adapter/rest/tour_handler.go:90-128`** ŌĆö `GET /api/tour/demo-board` returns 3 demo cards all in "backlog"
    - **`frontend/src/hooks/useTour.ts:73-79`** ŌĆö `useDemoBoard()` query exists but is `enabled: false` and may not be loaded at the right time
    
    ### Missing state simulation
    
    The tour should show:
    - After adding project: what the project page looks like with tracks populated
    - Board with cards in different columns (not all in backlog)
    - Simulated agent status showing what active agents look like
    
    ### wait-for-drag escape hatch
    
    - **`frontend/src/components/tour/TourOverlay.tsx:110,137-143`** ŌĆö `isWaitStep` completely hides actions
    - Should show a "Skip" or "Finish Tour" link even on wait steps
  acceptance_criteria:
    - Example repo URL changed to `https://github.com/kiloforge/example-project` in both `tourSteps.ts` and `AddProjectForm.tsx`
    - Tour navigates between pages as steps advance ŌĆö user sees overview, then project page
    - Demo board data shows cards in multiple columns (backlog, approved, in-progress, done) ŌĆö not all in backlog
    - After adding project step, the project page shows populated demo state (board with cards, simulated tracks)
    - `wait-for-drag` step has a "Skip" or "Finish" fallback link so users aren't stuck
    - Tour step content clearly instructs what the user should do at each step
    - `npm run build` succeeds
  out_of_scope: |
    - Real agent spawning during tour (tour is simulation only)
    - Backend changes to tour state machine
    - New tour steps beyond the existing 7
  technical_notes: |
    ### Example URL fix
    
    Simple string replacement in two files:
    - `tourSteps.ts` step 1 content text
    - `AddProjectForm.tsx` prefill value
    
    ### Demo board improvements
    
    Update `tour_handler.go` demo board endpoint to return cards across multiple columns:
    ```go
    // Backlog
    {TrackID: "demo-auth-flow", Title: "Add User Authentication", Column: "backlog"}
    // Approved
    {TrackID: "demo-fix-login", Title: "Fix Login Race Condition", Column: "approved"}
    // In Progress
    {TrackID: "demo-refactor-api", Title: "Refactor API Layer", Column: "in-progress"}
    // Done
    {TrackID: "demo-add-tests", Title: "Add Integration Tests", Column: "done"}
    ```
    
    ### wait-for-drag escape hatch
    
    Add a small "Skip ŌåÆ" or "Finish tour" text link below the instruction text on wait steps:
    ```tsx
    {isWaitStep && (
      <button className={styles.skipLink} onClick={completeTour}>
        Skip and finish tour
      </button>
    )}
    ```
    
    ### Page transitions
    
    Ensure `TourProvider.nextStep()` navigates correctly:
    - Steps 0-2: overview page (`/`)
    - Steps 3-6: project page (`/projects/{slug}`)
    - The `demoProjectSlug` must be set before navigating (it's set on successful project add)
    
    ---
