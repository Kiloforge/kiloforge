id: fix-serve-interactive-agent_20260309232000Z
title: Fix Interactive Agent Wiring in Serve Command (kf up)
type: bug
status: complete
created: 2026-03-09T23:20:00Z
updated: 2026-03-09T23:20:00Z
spec:
  summary: "The `kf up` path (`serve.go`) never calls `rest.WithInteractiveSpawner()`, so interactive agent endpoints return 500 "interactive agents not configured" when running via `kf up`. The previous fix (`fix-dashboard-interactive-agent`) only fixed the standalone `kf dashboard` command."
  context: "`serve.go` builds server options (lines 97-119) but never adds `WithInteractiveSpawner`. The `agent.Spawner` is never created in `serve.go` at all. Since `kf up` is the primary way to run Kiloforge, this means interactive agents, track generation from the dashboard, and admin operations are all broken in normal operation."
  codebase_analysis: |
    ### Root Cause
    
    **`backend/internal/adapter/cli/serve.go:97-119`** — builds `opts []rest.ServerOption` but never includes:
    ```go
    spawner := agent.NewSpawner(cfg, agentStore, quotaStore)
    opts = append(opts, rest.WithInteractiveSpawner(spawner))
    ```
    
    ### Working reference
    
    **`backend/internal/adapter/cli/dashboard.go:72-73`** — correctly creates spawner and wires it:
    ```go
    spawner := agent.NewSpawner(cfg, store, tracker)
    wsSessions := wsAdapter.NewSessionManager()
    ```
    
    ### The fix
    
    Add two lines to `serve.go` after the existing options:
    1. Import `agent` package
    2. Create `agent.NewSpawner(cfg, agentStore, quotaStore)`
    3. Append `rest.WithInteractiveSpawner(spawner)` to opts
    
    `WithInteractiveSpawner` already creates the `wsAdapter.SessionManager` internally (see `server.go:78-81`), so no additional wiring is needed.
  acceptance_criteria:
    - `serve.go` creates an `agent.Spawner` and passes it via `rest.WithInteractiveSpawner()`
    - Interactive agent spawn works via `kf up` (no 500 error)
    - Track generation from dashboard works via `kf up`
    - `make test` passes
  out_of_scope: - Refactoring serve.go and dashboard.go to share wiring logic
  technical_notes: |
    This is a 3-line fix:
    1. Add `"kiloforge/internal/adapter/agent"` to imports
    2. Create spawner: `spawner := agent.NewSpawner(cfg, agentStore, quotaStore)`
    3. Append option: `opts = append(opts, rest.WithInteractiveSpawner(spawner))`
    
    Place after the existing options block (around line 119).
    
    ---
