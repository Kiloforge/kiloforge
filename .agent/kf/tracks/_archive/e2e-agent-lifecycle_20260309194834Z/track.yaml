        done: true
  - phase: Lifecycle Action Tests
    tasks:
      - text: Stop agent — spawn a long-running agent, click stop button, verify status transitions to "stopped" and stop button is replaced by appropriate controls
        done: true
      - text: Resume agent — suspend an agent, click resume, verify status returns to "running" and output resumes in log viewer
        done: true
      - text: Delete agent — stop an agent, click delete, confirm deletion dialog, verify agent removed from list entirely
        done: true
      - text: Lifecycle edge cases — stop an already-stopped agent (expect no-op or error toast), resume a non-suspended agent (expect error), rapid spawn then immediate stop
        done: true
  - phase: History and Filtering Tests
    tasks:
      - text: Agent history page — navigate to history page, verify all agents (including completed/failed) are listed in reverse chronological order
        done: true
      - text: Filter by status — use status filter dropdown, verify only agents with selected status appear (test with "completed", "failed", "running")
        done: true
      - text: Filter by role — use role filter, verify only agents with selected role appear (test with "developer", "reviewer")
        done: true
