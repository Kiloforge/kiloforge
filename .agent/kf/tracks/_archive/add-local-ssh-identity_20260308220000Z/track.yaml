id: add-local-ssh-identity_20260308220000Z
title: Add Command SSH Identity and Repo Name Improvements
type: feature
status: complete
created: 2026-03-08T22:00:00Z
updated: 2026-03-08T22:00:00Z
spec:
  summary: "Add `--ssh-key` flag to `kf add` for multi-identity SSH support. Store the SSH command per-project and use it for all git operations. Fix Gitea repo naming to match the remote repo name."
  context: |
    Users may have multiple SSH identities configured via git's `includeIf "gitdir:"` conditional includes. When kiloforge clones a repo into `~/.kiloforge/repos/<slug>/`, the clone directory doesn't match the user's conditional include paths, so the wrong SSH identity gets used. The user needs a way to specify which SSH key to use per-project.
    
    Additionally, the Gitea repo name currently uses the derived slug, but it should match the actual remote repo name for clarity.
  codebase_analysis: |
    - **`cli/add.go:93`** ã clones into `~/.kiloforge/repos/<slug>/` using bare `git clone` (no SSH identity control)
    - **`cli/add.go:104`** ã creates Gitea repo with slug name, should use remote repo name
    - **`domain/project.go`** ã `Project` struct has `Slug`, `RepoName`, `OriginRemote` fields but no SSH config
    - **`cli/add.go:181-186`** ã `cloneRepo()` uses bare `exec.CommandContext("git", "clone", ...)` ã no env vars
    - **User's SSH setup** ã `~/.gitconfig` has `includeIf "gitdir:/Users/benbaldivia/dev-2/"` which sets `core.sshCommand = "ssh -F /dev/null -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519_goblinlordx"`
    - **`cli/add.go:113-118`** ã adds `gitea` remote; subsequent pushes to Gitea use Gitea's SSH, but pushes back to origin need the user's SSH key
    - **`gitea/manager.go`** ã `Configure()` registers SSH key via `client.AddSSHKey()` ã currently auto-detects from `~/.ssh/`
  acceptance_criteria:
    - `kf add <remote> --ssh-key ~/.ssh/id_ed25519_goblinlordx` clones using that SSH key
    - The SSH command is stored in the project record (`projects.json`)
    - All subsequent git operations for the project (fetch, push to origin) use the stored SSH command
    - Without `--ssh-key`, the system default SSH is used (current behavior preserved)
    - Gitea repo name matches the remote repo name (not the slug, unless overridden with `--name`)
    - The specified SSH public key (`.pub` counterpart) is registered with Gitea if not already present
    - `kf projects` displays the SSH key path if one is configured
    - Existing projects without SSH config continue to work
  out_of_scope: |
    - Auto-detecting SSH identity from `includeIf` rules (complex, fragile)
    - SSH agent forwarding or GPG signing
    - Multiple remotes per project
    - `--ssh-command` for fully custom SSH commands (can be added later; `--ssh-key` covers 95% of cases)
  technical_notes: |
    **Implementation approach:**
    
    1. Add `SSHKeyPath string` field to `domain.Project` (`json:"ssh_key_path,omitempty"`)
    2. Add `--ssh-key` flag to `addCmd`
    3. Build `GIT_SSH_COMMAND` env var: `ssh -i <key> -o IdentitiesOnly=yes`
    4. Pass env to `cloneRepo()` and store on project for future git operations
    5. Add helper `project.GitSSHEnv() []string` that returns the env vars needed for git commands
    6. Fix repo naming: use `repoNameFromURL()` result for Gitea repo name (currently slug and repo name are the same, but ensure `--name` only overrides the slug, not the Gitea repo name, or overrides both ã decide based on simplicity)
    7. Register the `.pub` counterpart with Gitea during `add`
    
    **SSH key path resolution:**
    - Accept absolute or `~/` relative paths
    - Validate the private key file exists at add time
    - Look for `.pub` counterpart for Gitea registration
    
    ---
