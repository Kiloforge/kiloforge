spec:
  summary: Move business entity types from the service layer to the domain layer where they belong, split the overloaded ProjectPage into sub-containers, and fix AgentCard's data fetching violation.
  context: "Several business entities (`TrackEntry`, `TrackDetail`, `ProgressCount`, `EscalatedItem`) are defined in the service layer instead of the domain layer. On the frontend, `ProjectPage.tsx` at 361 lines orchestrates 10+ hooks and is overloaded, and `AgentCard` calls `useTracks()` internally (a presentational component shouldn't fetch data)."
  codebase_analysis: |
    - **C7 (Medium):** `service/track_service.go:22-83` — `TrackEntry`, `TrackDetail`, `ProgressCount` are business entities in service
    - **C8 (Low):** `service/agent_service.go:77-83` — `EscalatedItem` is a business concept in service
    - **F1 (Medium):** `pages/ProjectPage.tsx` (361 lines) — overloaded container
    - **F2 (Low):** `components/AgentCard.tsx:17` — presentational component calls `useTracks()`
  acceptance_criteria:
    - `TrackEntry`, `TrackDetail`, `ProgressCount` moved to `domain/`
    - `EscalatedItem` moved to `domain/`
    - Service layer imports these types from domain instead of defining them
    - All references updated (REST handler, CLI, dashboard watcher)
    - ProjectPage split into sub-containers (BoardContainer, SyncContainer, etc.)
    - AgentCard receives track/project data via props instead of fetching internally
    - All tests pass
  out_of_scope: |
    - Moving other types that are genuinely service-specific
    - Full frontend architecture overhaul
  technical_notes: |
    ### Domain type migration
    Move types to `domain/track.go` and `domain/escalation.go`. Update imports across:
    - `service/track_service.go`
    - `service/agent_service.go`
    - `adapter/rest/api_handler.go`
    - `adapter/cli/implement.go`
    - `adapter/dashboard/watcher.go`
    
    ### ProjectPage split
    Extract `BoardContainer`, `SyncContainer`, `AdminContainer` as sub-components that each manage their own hooks. ProjectPage becomes a layout component routing between tabs.
    
    ### AgentCard fix
    Remove `useTracks()` call. Accept track title and project slug as optional props. Parent component (AgentGrid or page) provides the data.
    
    ---
