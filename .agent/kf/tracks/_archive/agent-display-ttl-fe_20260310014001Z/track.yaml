spec:
  summary: "The dashboard shows all agents forever, cluttering the view with completed/failed agents and inflating status counts. Limit the dashboard to active + recently finished agents, update the status bar to only count active agents, and add a dedicated `/agents` history page showing all agents in a list/table format."
  context: |
    The backend (track `agent-display-ttl-be_20260310014000Z`) adds `?active=true` filtering to `GET /api/agents` (default behavior) and includes `finished_at` in the response. The frontend needs to:
    1. Use the filtered API for the dashboard (only show active + recently finished)
    2. Update status bar histogram to only count active agents
    3. Add a new history page at `/agents` showing the full agent list in a table
  codebase_analysis: |
    ### Current agent display
    
    **OverviewPage.tsx** — shows all agents in `AgentGrid` with role/status filters. Currently fetches all agents via `useAgents()`.
    
    **AgentHistogram.tsx** — status bar component showing agent count chips grouped by status. Counts ALL agents.
    
    **AgentGrid.tsx** — sorts agents by status priority (running first), then by `updated_at`. Renders `AgentCard` for each.
    
    **useAgents.ts** — fetches `GET /api/agents`, no query params. SSE handlers for `agent_update` and `agent_removed`.
    
    ### Routes (`App.tsx`)
    
    Current routes include `/agents/:id` for detail view but no `/agents` list page.
  acceptance_criteria:
    - Dashboard agent grid fetches `GET /api/agents?active=true` (default) — only active + recently finished agents
    - Status bar histogram only counts active agents (running, waiting) — not completed/failed
    - New `/agents` route with `AgentHistoryPage` component showing ALL agents
    - History page displays agents in a table/list format with columns: Name, Role, Status, Started, Finished, Duration, Cost
    - History page fetches `GET /api/agents?active=false` to get all agents
    - History page supports status filtering (show all, or filter by completed/failed/etc.)
    - Navigation link to history page from dashboard ("View all agents" or similar)
    - Recently finished agents on dashboard show a visual indicator (e.g., fading opacity or timestamp showing "finished 5m ago")
    - Frontend builds without errors (`npm run build`)
  out_of_scope: |
    - Cursor-based pagination (future track)
    - Agent log viewing from history page (existing detail page handles this)
    - Automatic database cleanup of old agents
  technical_notes: |
    ### useAgents hook update
    
    Add `active` parameter:
    ```typescript
    export function useAgents(active = true) {
      return useQuery({
        queryKey: queryKeys.agents(active),
        queryFn: () => fetcher<Agent[]>(`/api/agents${active ? '' : '?active=false'}`),
      });
    }
    ```
    
    Dashboard calls `useAgents(true)`, history page calls `useAgents(false)`.
    
    ### AgentHistogram update
    
    Filter to only active statuses before counting:
    ```typescript
    const activeCounts = agents
      .filter(a => a.status === 'running' || a.status === 'waiting')
      .reduce((acc, a) => { acc[a.status] = (acc[a.status] || 0) + 1; return acc; }, {});
    ```
    
    ### AgentHistoryPage
    
    Table-based layout (not card grid) for efficient scanning of many agents:
    
    ```tsx
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Role</th><th>Status</th>
          <th>Started</th><th>Finished</th><th>Duration</th><th>Cost</th>
        </tr>
      </thead>
      <tbody>
        {agents.map(a => (
          <tr key={a.id} onClick={() => navigate(`/agents/${a.id}`)}>
            <td>{a.name}</td>
            <td><RoleBadge role={a.role} /></td>
            <td><StatusBadge status={a.status} /></td>
            <td>{formatTime(a.started_at)}</td>
            <td>{a.finished_at ? formatTime(a.finished_at) : '—'}</td>
            <td>{formatDuration(a.started_at, a.finished_at)}</td>
            <td>{a.estimated_cost_usd ? `$${a.estimated_cost_usd.toFixed(4)}` : '—'}</td>
          </tr>
        ))}
      </tbody>
    </table>
    ```
    
    ### Dashboard "View all" link
    
    Add next to the "Agents" section header:
    ```tsx
    <div className={styles.sectionHeader}>
      <h3>Agents</h3>
      <Link to="/agents">View all</Link>
    </div>
    ```
    
