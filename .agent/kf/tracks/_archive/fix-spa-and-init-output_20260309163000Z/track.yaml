id: fix-spa-and-init-output_20260309163000Z
title: Fix SPA Asset MIME Type, Init Output URLs, and Password Display
type: bug
status: complete
created: 2026-03-09T16:30:00Z
updated: 2026-03-09T16:38:00Z
spec:
  summary: "Fix three related post-routing-migration issues: (1) SPA JS/CSS assets return text/html MIME type because frontend dist still references `/-/` paths, (2) init output shows stale `/-/` dashboard URL and raw Gitea port, (3) init still displays admin password which is unnecessary now that reverse proxy auth handles Gitea login."
  context: "The dashboard-root-routing tracks moved the dashboard from `/-/` to `/` and Gitea from `/` to `/gitea/`. However, the frontend build artifacts and CLI init output weren't fully updated."
  codebase_analysis: |
    ### Bug 1: MIME type error
    - `backend/internal/adapter/dashboard/dist/index.html` — still references `/-/favicon.png`, `/-/assets/index-B8s0hlQ5.js`, `/-/assets/index-Dye9Wuav.css`
    - `backend/internal/adapter/dashboard/embed.go` — SPA handler at `/` tries to open `strings.TrimPrefix(path, "/")`, so `/-/assets/...` becomes `-/assets/...` which doesn't exist, falls back to index.html
    - **Fix**: The root cause is likely the `base` or `basename` in the frontend build. Check `frontend/vite.config.ts` or `frontend/index.html` — the `<base>` or Vite `base` config may still be `/-/`. After fixing, rebuild the frontend and re-embed.
    
    ### Bug 2: Init output URLs
    - `backend/internal/adapter/cli/init.go:147` — shows `http://localhost:<giteaPort>` (raw Gitea, should be `http://localhost:<orchPort>/gitea/`)
    - `backend/internal/adapter/cli/init.go:171` — shows `http://localhost:<orchPort>/-/` (stale prefix, should be `http://localhost:<orchPort>/`)
    - **Fix**: Update URL format strings
    
    ### Bug 3: Password display
    - `backend/internal/adapter/cli/init.go:148` — shows `Admin: <user> / <password>`
    - With reverse proxy auth enabled, users access Gitea through the orchestrator at `/gitea/` and are auto-authenticated. The password is only needed for direct Gitea access at port 4000, which is an internal implementation detail.
    - **Fix**: Remove password from init output. Keep it in a log or note that it's available via config if needed for debugging.
  acceptance_criteria:
    - Dashboard loads at `http://localhost:4001/` without MIME type errors
    - All JS/CSS assets load correctly with proper MIME types
    - Init output shows `Dashboard: http://localhost:<port>/` (no `/-/` prefix)
    - Init output shows `Gitea: http://localhost:<port>/gitea/` (through orchestrator, not raw port)
    - Init output does NOT display admin password
    - Init output mentions that Gitea is auto-authenticated through the dashboard
    - `go test ./...` passes
    - `make build` succeeds (includes frontend rebuild)
  out_of_scope: |
    - Removing the password from config entirely (still needed for API token creation during init)
    - Changing the Gitea port binding
  technical_notes: |
    ### Frontend base path fix
    Check `frontend/vite.config.ts` for `base` setting. It should be `"/"` (not `"/-/"`). After changing, `npm run build` will produce assets with `/assets/...` paths in index.html.
    
    If no Vite config base, check `frontend/index.html` for `<base href="/-/">` tag.
    
    ### Init output (new format)
    ```
    Kiloforge is ready!
      Dashboard:  http://localhost:4001/
      Gitea:      http://localhost:4001/gitea/ (auto-authenticated)
      Data:       ~/.kiloforge
    
    Register a project with 'kf add <path>'.
    ```
    
    No password, no raw Gitea port. Clean and simple.
    
    ---
