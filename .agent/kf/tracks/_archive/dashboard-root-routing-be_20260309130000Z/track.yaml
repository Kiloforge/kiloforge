id: dashboard-root-routing-be_20260309130000Z
title: Dashboard Root Routing and Kiloforge Rebrand Defaults (Backend)
type: feature
status: complete
created: 2026-03-09T13:00:00Z
updated: 2026-03-09T13:00:00Z
spec:
  summary: "Move the dashboard to `/` (root), Gitea to `/gitea/` subpath, API to `/api/`, rename the default admin user from "conductor" to "kiloforger", rename the Gitea container from "conductor-gitea" to "kf-gitea", and embed the Kiloforge favicon for the dashboard."
  context: |
    Currently the dashboard lives at `/-/*` (a workaround to avoid clashing with Gitea's catch-all at `/`). This makes the Gitea UI the default landing page, which is confusing for users. The dashboard should be the primary entry point. Gitea is a backing service that users rarely access directly — especially once reverse proxy auth is enabled (see `gitea-proxy-authn_20260309123000Z`).
    
    Additionally, the default admin username is still "conductor" (pre-rebrand), the Gitea container is named "conductor-gitea", and the dashboard has no favicon.
  codebase_analysis: |
    ### Current routing (`backend/internal/adapter/rest/server.go`)
    - OpenAPI routes at `/-/api/*` (generated by `oapi-codegen`)
    - Dashboard non-API routes at `/-/events`, `/-/tracks/{id}`, `/-/pr/{slug}/{num}`, `/-/*` (SPA)
    - Gitea proxy at `/` (catch-all)
    - Badge routes at manual paths
    
    ### Gitea compose config (`backend/internal/adapter/compose/template.go`)
    - `GITEA__server__ROOT_URL=http://localhost:{{ .OrchestratorPort }}/` — must change to `/gitea/`
    - Container name: `conductor-gitea` — rename to `kf-gitea`
    
    ### Admin username defaults (`backend/internal/adapter/config/defaults.go`)
    - `GiteaAdminUser: "conductor"` → `"kiloforger"`
    - `GiteaAdminEmail: "conductor@local.dev"` → `"kiloforger@local.dev"`
    
    ### Proxy (`backend/internal/adapter/proxy/gitea.go`)
    - Currently a simple `NewSingleHostReverseProxy` at `/`
    - Needs to strip `/gitea/` prefix before forwarding to Gitea
    
    ### OpenAPI spec (`backend/api/openapi.yaml`)
    - All paths prefixed with `/-/api/` — change to `/api/`
    
    ### Dashboard server (`backend/internal/adapter/dashboard/server.go`)
    - Routes prefixed with `/-/` — change to `/`
    - `StripPrefix("/-", ...)` logic changes
    
    ### Favicon
    - Copy `icon.png` from `kiloforge_site` repo (`/Users/benbaldivia/dev-2/kiloforge_site/src/app/icon.png`) into `frontend/public/favicon.png`
    - The embedded SPA filesystem will serve it
  acceptance_criteria:
    - Dashboard serves at `/` (root URL)
    - Gitea proxied at `/gitea/*` with proper path stripping
    - Gitea `ROOT_URL` set to `http://localhost:PORT/gitea/`
    - API endpoints at `/api/*` (not `/-/api/*`)
    - SSE endpoint at `/events` (not `/-/events`)
    - Default admin username is "kiloforger"
    - Default admin email is "kiloforger@local.dev"
    - Container name is "kf-gitea"
    - Favicon (icon.png from kiloforge_site) embedded and served
    - Badge routes still work
    - `go test ./...` passes
    - `make build` succeeds
  out_of_scope: |
    - Frontend path updates (separate FE track)
    - Multi-user authentication
    - HTTPS/TLS
    - Gitea theme customization
  technical_notes: |
    ### Route mounting order (new)
    ```go
    // 1. API routes at /api/* (OpenAPI generated)
    // 2. /gitea/* → Gitea reverse proxy (with path strip)
    // 3. /* → Dashboard SPA (catch-all)
    ```
    
    ### Gitea proxy with subpath stripping
    ```go
    func NewGiteaProxy(targetURL, authUser string) http.Handler {
        target, _ := url.Parse(targetURL)
        proxy := httputil.NewSingleHostReverseProxy(target)
        return http.StripPrefix("/gitea", http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
            r.Header.Set("X-WEBAUTH-USER", authUser)
            proxy.ServeHTTP(w, r)
        }))
    }
    ```
    
    ### OpenAPI path prefix change
    All paths in `openapi.yaml` change from `/-/api/` to `/api/`.
    
    ### Favicon embedding
    Copy `icon.png` to `frontend/public/favicon.png`. Add `<link rel="icon" href="/favicon.png">` to `index.html`. The Vite build will include it in the embedded static filesystem.
    
    ---
