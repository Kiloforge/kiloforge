id: refactor-port-interfaces_20260310041002Z
title: Move Service-Local Interfaces to Port Layer
type: refactor
status: complete
created: 2026-03-10T04:10:02Z
updated: 2026-03-10T07:53:00Z
spec:
  summary: "Move 3 interfaces defined locally in service files to the `port/` package where they belong per clean architecture. Create port interfaces for services used by REST handlers so adapters depend on abstractions, not concrete service types."
  context: "The style guide mandates that interfaces live in `port/` and adapters depend only on port interfaces. Currently, `service/project_service.go` defines `ProjectGiteaClient` and `ProjectStoreWriter` locally, `service/board_service.go` defines `NativeBoardStore` locally, and `adapter/rest/api_handler.go` imports concrete `service.*` types directly."
  codebase_analysis: |
    - **C1:** `service/project_service.go:17-23` — `ProjectGiteaClient` defined in service
    - **C2:** `service/project_service.go:26-32` — `ProjectStoreWriter` defined in service
    - **C3:** `service/board_service.go:10-14` — `NativeBoardStore` defined in service
    - **C9:** `adapter/rest/api_handler.go:26` — imports `service` package, uses `service.NativeBoardService`, `service.AddProjectOpts`, `service.DiscoverTracks`, `service.GetTrackDetail`
    - **C10:** `adapter/rest/server.go:29` — imports `service` package
    - **C18:** `adapter/dashboard/watcher.go:8` — imports `service` for `DiscoverTracks`
  acceptance_criteria:
    - `ProjectGiteaClient`, `ProjectStoreWriter`, `NativeBoardStore` moved to `port/`
    - Port interfaces created for board service, track service, and project service operations used by REST handlers
    - `api_handler.go` depends on port interfaces, not `service.*` types
    - `dashboard/watcher.go` depends on port interface, not `service.DiscoverTracks`
    - `server.go` constructs handlers with port-typed dependencies
    - All existing tests pass
    - No `import "service"` in adapter/rest/ or adapter/dashboard/
  out_of_scope: |
    - CLI layer imports of `service` — CLI acts as composition root, this is pragmatically acceptable
    - Creating port interfaces for every service method — only those needed by adapters
  technical_notes: |
    ### New port interfaces needed
    
    ```go
    // port/board_service.go
    type BoardService interface {
        GetBoard(ctx context.Context, project string) (domain.BoardState, error)
        SyncBoard(ctx context.Context, project string) error
        MoveCard(ctx context.Context, project, trackID, column string) error
    }
    
    // port/track_reader.go
    type TrackReader interface {
        DiscoverTracks(projectDir string) ([]domain.TrackEntry, error)
        GetTrackDetail(projectDir, trackID string) (domain.TrackDetail, error)
    }
    
    // port/project_service.go (operations used by REST)
    type ProjectManager interface {
        AddProject(ctx context.Context, opts AddProjectOpts) error
        RemoveProject(ctx context.Context, slug string) error
        // ... other methods used by REST handler
    }
    ```
    
    Move `AddProjectOpts` to domain or port (it's a value object, not service-specific).
    
    ---
