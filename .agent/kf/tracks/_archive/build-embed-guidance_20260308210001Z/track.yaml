spec:
  summary: "Document the lmf-wt-aligned build and embed patterns as project guidance: `ensure-dist` for `//go:embed`, Makefile-only builds, and no `-buildvcs=false`."
  context: The project recently aligned its frontend embed and build patterns with the lmf-wt project. These patterns (ensure-dist placeholder for embed, Makefile as the single build entry point, native VCS support) should be documented as project guidance so developers and agents follow them consistently.
  codebase_analysis: |
    - **`Makefile`** — `ensure-dist` target creates placeholder `index.html` when `dist/` is empty; all build/test/dev targets depend on it
    - **`backend/internal/adapter/dashboard/embed.go`** — `//go:embed dist/*` with no build tags; SPA file server with fallback
    - **`.gitignore`** — `backend/internal/adapter/dashboard/dist/` is fully ignored
    - **`product-guidelines.md`** — Existing guidelines cover voice, tone, design principles, schema-first APIs
    - No existing build guidance document
  acceptance_criteria:
    - New guidance document covers the `ensure-dist` + `//go:embed dist/*` pattern
    - Guidance states that all builds must go through the Makefile (no direct `go build`)
    - Guidance explains why `-buildvcs=false` must not be used
    - Guidance explains the `.build/` output directory convention
    - Guidance explains that `dist/` is gitignored and populated by build process only
    - Guidance is linked from `product-guidelines.md` or stored in an appropriate location
  out_of_scope: |
    - Changing any code — this is documentation only
    - CI/CD pipeline setup
    - Build caching or optimization
  technical_notes: |
    **Patterns to document:**
    
    1. **Frontend embed pattern:**
       - `//go:embed dist/*` in `embed.go` — no build tags, no `.gitkeep`
       - `ensure-dist` Makefile target creates placeholder `index.html` when dist is empty
       - `dist/` is in `.gitignore` — never committed
       - Real assets come from `make build-frontend` (npm ci + npm run build)
    
    2. **Build entry point:**
       - All builds go through `Makefile` — `make build`, `make dev`, `make test`
       - No direct `go build` or `go test` from the repo root
       - `make build-backend` depends on `ensure-dist` automatically
       - Build output goes to `.build/` (gitignored), never `bin/`
    
    3. **VCS support:**
       - Never use `-buildvcs=false` — Go's built-in VCS stamping is valuable
       - Use `GOFLAGS=-buildvcs=false` env var only in CI where git info is unavailable
       - Local builds always have full VCS metadata
    
    ---
