spec:
  summary: "Replace the hand-rolled migration system in `sqlite/migrate.go` with [pressly/goose](https://github.com/pressly/goose) for proper up/down SQL migrations with file-based migration scripts. Convert the existing V1 schema into a goose migration and set up the infrastructure for future migrations."
  context: "The current migration system uses a custom `schema_version` table and versioned Go string constants. It works for forward-only migrations but lacks rollback support, SQL file-based migrations, and a CLI for management. As the schema grows (agent names, new features), a proper migration tool becomes important."
  codebase_analysis: |
    ### Current migration system
    
    - **`backend/internal/adapter/persistence/sqlite/migrate.go`** — Custom `Migrate()` function with `schema_version` table, `migration` struct with `version int` and `sql string`, ordered migration list
    - **`backend/internal/adapter/persistence/sqlite/db.go:35`** — Calls `Migrate(db)` on `Open()`
    - **`backend/internal/adapter/persistence/sqlite/db_test.go`** — Tests migration and idempotency
    - Current state: 1 migration (V1) containing all 10 tables + indexes in a single SQL string
    
    ### Goose integration approach
    
    Use `pressly/goose/v3` with **embedded SQL files** (no CLI dependency at runtime). Goose supports `database/sql` directly and works with `modernc.org/sqlite`.
    
    Key: use `goose.SetDialect("sqlite3")` and `goose.Up(db, migrationsDir)` — or embed migrations via `embed.FS`.
    
    ### Files to change
    
    - **`backend/internal/adapter/persistence/sqlite/migrate.go`** — Replace custom logic with goose
    - **New directory**: `backend/internal/adapter/persistence/sqlite/migrations/` — SQL files
    - **`backend/internal/adapter/persistence/sqlite/db.go`** — Update `Open()` to use goose
    - **`backend/go.mod`** — Add `github.com/pressly/goose/v3`
  acceptance_criteria:
    - `pressly/goose/v3` added as dependency
    - Migrations stored as SQL files in `backend/internal/adapter/persistence/sqlite/migrations/`
    - First migration (`001_initial_schema.sql`) contains the full V1 schema (up and down)
    - `Open()` runs `goose.Up()` with embedded migration files on startup
    - Existing databases with `schema_version` table are handled gracefully (goose uses its own `goose_db_version` table — need a bridge migration or one-time conversion)
    - Down migrations work for all tables (for development rollback)
    - `go test ./...` passes
    - Existing data is preserved on upgrade (no destructive migration)
  out_of_scope: |
    - Adding a `kf migrate` CLI command (goose is used as a library, not a CLI tool)
    - Migrating away from `modernc.org/sqlite` driver
    - Schema changes beyond converting existing V1
  technical_notes: |
    ### Migration file format
    
    ```sql
    -- +goose Up
    CREATE TABLE config (
        key   TEXT PRIMARY KEY,
        value TEXT NOT NULL
    );
    -- ... rest of V1 schema ...
    
    -- +goose Down
    DROP TABLE IF EXISTS spans;
    DROP TABLE IF EXISTS traces;
    -- ... drop in reverse order ...
    ```
    
    ### Embedding migrations
    
    ```go
    import "embed"
    
    //go:embed migrations/*.sql
    var migrations embed.FS
    ```
    
    Then in `Open()`:
    ```go
    goose.SetBaseFS(migrations)
    goose.SetDialect("sqlite3")
    if err := goose.Up(db, "migrations"); err != nil {
        return nil, fmt.Errorf("migrate: %w", err)
    }
    ```
    
    ### Handling existing schema_version table
    
    Existing databases already have the V1 schema applied via the custom system. Options:
    1. **Seed goose version** — On first goose run, if `schema_version` table exists with version >= 1, insert a corresponding row into `goose_db_version` so goose knows V1 is already applied. Then drop `schema_version`.
    2. This ensures existing installs don't re-run the initial migration.
    
    ---
