id: track-relations-fe_20260311010001Z
title: Track relationship visualization — animated SVG connectors for deps and conflicts on Kanban board
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: Render curved, semi-transparent, animated SVG bezier paths between Kanban cards to visualize dependency chains and conflict risk pairs. Dependency lines use emerald/green tones; conflict lines use orange/red by severity. Lines update reactively as cards move between columns.
  context: |
    The Kanban board (KanbanBoard.tsx) renders track cards in columns (backlog, approved, in_progress, in_review, done). Currently there is no visual indication of which tracks depend on each other or which have conflict risk. Users must mentally correlate track names with deps.yaml data.
    
    Curved SVG connector lines overlaid on the board make relationships instantly visible — like a node-graph editor. Dependencies flow left-to-right (prerequisite → dependent), conflict lines connect cards that share risk. Semi-transparency and subtle animation (pulse/flow) draw attention without being distracting.
  codebase_analysis: |
    ### KanbanBoard component
    - File: `frontend/src/components/KanbanBoard.tsx`
    - `CardItem` component (lines 144-204) renders each card in a column
    - Cards have `track_id` which maps to dependency/conflict data
    - Board layout uses CSS grid with columns; card positions determined by DOM
    
    ### Existing popover pattern
    - `AgentStatusPopover.tsx` uses absolute positioning with refs
    - Same ref-based approach needed for tracking card DOM positions
    
    ### Track data hooks
    - `useTracks()` fetches basic track data
    - `useBoard()` manages card state with column positions
    - Will need deps/conflicts data from the extended API (track-tooltip-be track)
    
    ### CSS theme
    - `--green: #3dd68c` — use for satisfied dependency lines
    - `--accent: #34d399` — emerald, for dependency lines
    - `--text-dim: #a3a3a3` — for pending/unknown dependency lines
    - `--orange: #e8944a` — medium conflict risk
    - `--red: #f06c6c` — high conflict risk
    - `--yellow: #f0c541` — low conflict risk
    
    ### SVG overlay approach
    - Render an `<svg>` element absolutely positioned over the board container
    - Use `getBoundingClientRect()` on card elements to compute endpoints
    - Draw cubic bezier paths (`<path d="M... C...">`) between card centers/edges
    - Use `ResizeObserver` and mutation observation to update on layout changes
    - CSS animations via `stroke-dasharray` + `stroke-dashoffset` for flow effect
  acceptance_criteria:
    - Dependency lines render as curved SVG bezier paths between cards on the Kanban board
    - Dependency lines are colored emerald/green when the prerequisite is completed, dimmed gray when pending
    - Conflict risk lines render as distinct curved paths (dashed style) between conflicting cards
    - Conflict lines colored by risk: red for high, orange for medium, yellow for low
    - All lines are semi-transparent (opacity 0.4-0.6) to avoid obscuring card content
    - Lines have a subtle pulse/flow animation using CSS stroke-dasharray animation
    - Lines update position when cards move between columns (drag, status change, SSE update)
    - Lines are hidden or fade out when either connected card is not visible on the board
    - Performance: no perceptible lag with up to 20 cards and 30+ connector lines
    - Toggle control to show/hide relationship lines (default: visible)
  out_of_scope: |
    - Backend API changes (handled by track-tooltip-be track)
    - TrackList (non-board) visualization
    - Interactive line editing (adding/removing deps via UI)
    - Drag-to-connect for creating new dependencies
    - Minimap or zooming
  technical_notes: |
    ### SVG overlay architecture
    
    ```
    <div className="board-container" style="position: relative">
      <div className="columns">...</div>
      <svg className="relationship-overlay"
           style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                  pointer-events: none; z-index: 10">
        {depLines.map(line => <path ... />)}
        {conflictLines.map(line => <path ... />)}
      </svg>
    </div>
    ```
    
    ### Bezier path computation
    
    For two cards at (x1, y1) and (x2, y2):
    ```
    const dx = x2 - x1;
    const cpOffset = Math.min(Math.abs(dx) * 0.4, 120);
    const d = `M ${x1} ${y1} C ${x1 + cpOffset} ${y1}, ${x2 - cpOffset} ${y2}, ${x2} ${y2}`;
    ```
    
    ### Animation CSS
    
    ```css
    .dep-line {
      stroke-dasharray: 8 4;
      animation: flowDash 1.5s linear infinite;
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -12; }
    }
    .conflict-line {
      stroke-dasharray: 4 6;
      animation: pulseLine 2s ease-in-out infinite;
    }
    @keyframes pulseLine {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    ```
    
    ### Position tracking
    
    Use `useRef` on each CardItem, store refs in a Map keyed by track_id.
    Use `ResizeObserver` on the board container to recompute positions on layout changes.
    Debounce recomputation to 16ms (one frame) for smooth updates.
    
    ### Data flow
    
    1. `useBoard()` provides card positions (which column, which cards)
    2. New `useTrackRelations()` hook fetches deps/conflicts from extended API
    3. `RelationshipOverlay` component computes SVG paths from card refs + relation data
    4. Re-renders on: card move, column resize, window resize, SSE track update
