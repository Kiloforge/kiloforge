    ```
    
    ### BoardConfig persistence
    
    ```json
    // ~/.kiloforge/projects/<slug>/board.json
    {
      "project_id": 1,
      "columns": {
        "suggested": 1,
        "approved": 2,
        "in_progress": 3,
        "in_review": 4,
        "completed": 5
      },
      "labels": {
        "type:feature": 1,
        "type:bug": 2,
        "status:suggested": 3
      },
      "track_issues": {
        "impl-foo_20260308Z": {
          "issue_number": 42,
          "card_id": 15,
          "column": "suggested",
          "last_synced": "2026-03-08T17:00:00Z"
        }
      }
    }
    ```
    
