title: Restructure as Monorepo with Backend/Frontend Split
type: refactor
status: complete
created: 2026-03-08T18:00:01Z
updated: 2026-03-08T18:35:00Z
spec:
  summary: "Restructure the project into a monorepo with `backend/` (Go) and `frontend/` (React/Vite/TypeScript) directories. Configure the build so the Go binary embeds the compiled frontend assets for single-binary deployment. Set up Vite dev proxy so the frontend dev server forwards API calls to the backend."
  context: "The current dashboard is a vanilla JS/CSS/HTML app embedded via `//go:embed static/*` in `internal/adapter/dashboard/embed.go`. To build a full-featured React frontend, we need proper project structure, build tooling, and a dev workflow that supports hot-reload on the frontend while hitting the real backend API."
  codebase_analysis: |
    - **Current structure:** Go module at root (`go.mod` with `module kiloforge`), all code under `cmd/`, `internal/`, `docs/`
    - **Current embed:** `internal/adapter/dashboard/embed.go` embeds `static/*` (3 files: index.html, app.js, style.css)
    - **Go module:** `module kiloforge`, Go 1.24.4, deps: cobra, uuid only
    - **No existing build pipeline:** Makefile exists but is minimal
    - **Import paths:** ~40+ files use `kiloforge/internal/...` imports ‚Äî all must be updated if module path changes
    - **Dashboard routes:** `RegisterRoutes(mux)` mounts `/api/*`, `/events`, `/` on the relay server mux
    - **Unified server:** Single port (3001) serves webhooks, dashboard, lock service, and Gitea proxy
  acceptance_criteria:
    - Go code lives under `backend/` with `backend/go.mod` (module path: `kiloforge`)
    - React/Vite/TypeScript app lives under `frontend/`
    - `make build` builds frontend first, copies dist to backend embed dir, then builds Go binary
    - Single binary serves the React app at `/` via `go:embed`
    - `make dev` starts both Vite dev server and Go backend, with Vite proxying API calls
    - `frontend/vite.config.ts` proxies `/api/*`, `/events`, `/webhook`, `/health`, `/gitea/*` to Go backend
    - All existing tests pass after restructure (`go test -race ./...` from `backend/`)
    - `go.work` file at root for IDE support (optional but recommended)
  out_of_scope: |
    - Building any React components (that's the react-dashboard track)
    - Changing the backend API contracts
    - Adding new backend routes or features
    - Docker/container changes
  technical_notes: |
    ### Directory Layout
    
    ```
    kiloforge/
    ‚îú‚îÄ‚îÄ backend/
    ‚îÇ   ‚îú‚îÄ‚îÄ cmd/kiloforge/
    ‚îÇ   ‚îú‚îÄ‚îÄ internal/
    ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ adapter/
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ dashboard/
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ embed.go          # //go:embed dist/*
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ dist/             # .gitignored, populated by FE build
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îî‚îÄ‚îÄ .gitkeep
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ server.go
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ handlers.go
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ sse.go
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îÇ   ‚îî‚îÄ‚îÄ watcher.go
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ rest/
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ gitea/
    ‚îÇ   ‚îÇ   ‚îÇ   ‚îî‚îÄ‚îÄ ...
    ‚îÇ   ‚îÇ   ‚îî‚îÄ‚îÄ core/
    ‚îÇ   ‚îú‚îÄ‚îÄ go.mod
    ‚îÇ   ‚îî‚îÄ‚îÄ go.sum
    ‚îú‚îÄ‚îÄ frontend/
    ‚îÇ   ‚îú‚îÄ‚îÄ src/
    ‚îÇ   ‚îú‚îÄ‚îÄ public/
    ‚îÇ   ‚îú‚îÄ‚îÄ package.json
    ‚îÇ   ‚îú‚îÄ‚îÄ vite.config.ts
    ‚îÇ   ‚îú‚îÄ‚îÄ tsconfig.json
    ‚îÇ   ‚îî‚îÄ‚îÄ index.html
    ‚îú‚îÄ‚îÄ go.work              # optional, for IDE
    ‚îú‚îÄ‚îÄ Makefile
    ‚îî‚îÄ‚îÄ README.md
    ```
    
    ### Embed Strategy
    
    Replace the current `static/*` embed with `dist/*`:
    
    ```go
    //go:embed dist/*
    var embeddedFiles embed.FS
    ```
    
    The `dist/` directory is populated by `cd frontend && npm run build` which outputs to `backend/internal/adapter/dashboard/dist/`.
    
    ### Vite Dev Proxy
    
    ```typescript
    // frontend/vite.config.ts
    export default defineConfig({
      server: {
        proxy: {
          '/api': 'http://localhost:3001',
          '/events': 'http://localhost:3001',
          '/webhook': 'http://localhost:3001',
          '/health': 'http://localhost:3001',
          '/gitea': 'http://localhost:3001',
        }
      }
    })
    ```
    
    ### Import Path Handling
    
    The Go module path stays `kiloforge` ‚Äî only the `go.mod` file location changes to `backend/go.mod`. All internal imports remain `kiloforge/internal/...` unchanged. The `go.work` at root references `./backend`.
    
    ---
