id: gitignore-frontend-dist_20260310000000Z
title: Stop Committing Frontend Dist — Build Before Backend Instead
type: chore
status: complete
created: 2026-03-10T00:00:00Z
updated: 2026-03-10T00:00:00Z
spec:
  summary: "Remove the frontend `dist/` directory from git tracking and add it to `.gitignore`. The Makefile already builds frontend before backend (`make build` → `build-frontend` → `build-backend`), and `ensure-dist` creates a placeholder if dist is missing. There's no need to commit built assets."
  context: |
    The dist directory was originally committed "so `//go:embed` always has correct assets." But this causes constant churn — every frontend rebuild changes the hashed JS/CSS filenames, creating noisy diffs and merge conflicts. The `ensure-dist` Makefile target already handles the case where dist is missing by creating a placeholder `index.html`.
    
    Also, `backend/internal/adapter/rest/state.json` is a runtime artifact appearing as untracked.
  acceptance_criteria:
    - `backend/internal/adapter/dashboard/dist/` added to `.gitignore`
    - `backend/internal/adapter/rest/state.json` added to `.gitignore`
    - Dist files removed from git tracking (`git rm --cached -r`)
    - `.gitignore` comment updated to reflect new approach
    - `make build` still works (builds frontend, then backend with embedded dist)
    - `make test` still works (`ensure-dist` creates placeholder)
  technical_notes: |
    Three commands:
    ```bash
    git rm --cached -r backend/internal/adapter/dashboard/dist/
    
    echo 'backend/internal/adapter/dashboard/dist/' >> .gitignore
    echo 'backend/internal/adapter/rest/state.json' >> .gitignore
    
    ```
    
    ---
plan:
