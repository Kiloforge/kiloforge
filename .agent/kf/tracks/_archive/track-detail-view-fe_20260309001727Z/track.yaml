spec:
  summary: Add a track detail page accessible from both the kanban board and track list. Display the track's specification, implementation plan (rendered as markdown), phase/task progress, metadata, and agent/trace links.
  context: "The dashboard currently shows tracks as cards on a kanban board and as items in a track list, but neither is clickable for viewing details. Rich track data (spec, plan, progress) exists on the backend via the new `GET /api/tracks/{trackId}` endpoint but the frontend has no way to display it. Users need to see what a track entails before approving it or understanding its progress."
  codebase_analysis: |
    - **KanbanBoard** (`frontend/src/components/KanbanBoard.tsx`): Cards show track_id, title, type badge, agent status, trace link. Cards are draggable but NOT clickable for navigation. Need to add click-to-navigate.
    - **TrackList** (`frontend/src/components/TrackList.tsx`): Read-only list with status icon + ID + title. No click handlers. Need to add Link or click navigation.
    - **Routes** (`frontend/src/App.tsx`): Has `/projects/:slug`, `/agents/:id`, `/traces/:traceId` — no `/tracks/:trackId` route. Need to add track detail route.
    - **Types** (`frontend/src/types/api.ts`): `Track` interface has only id/title/status/project. Need `TrackDetail` with spec, plan, metadata.
    - **API client** (`frontend/src/api/client.ts`): Has `fetchTracks()` — need `fetchTrackDetail(trackId, project)`.
    - **Query keys** (`frontend/src/api/queryKeys.ts`): No track detail query key.
    - **Existing detail page pattern**: `AgentDetailPage` fetches agent data and renders structured content — good pattern to follow.
    - **Markdown rendering**: Check if a markdown library exists; if not, render as preformatted text or add `react-markdown`.
  acceptance_criteria:
    - Clicking a kanban board card navigates to a track detail view
    - Clicking a track list item navigates to the same track detail view
    - Track detail page displays: title, status badge, type, created/updated dates
    - Track detail page renders spec.md content as formatted markdown
    - Track detail page renders plan.md content as formatted markdown with task checkboxes
    - Track detail page shows phase and task progress (e.g., "3/5 phases, 12/18 tasks")
    - Track detail page includes link back to the project board
    - If track has an active agent, show agent status with link to agent detail
    - `npm run build` succeeds with no errors
  out_of_scope: |
    - Track editing from the detail page
    - Inline plan task toggling (tasks are managed by developer agents, not the UI)
    - Track comparison or diff views
  technical_notes: |
    - Route: `/projects/:slug/tracks/:trackId` (keeps project context for back-navigation and API calls)
    - Use the project slug from the route to pass as query param to `GET /api/tracks/{trackId}?project={slug}`
    - For markdown rendering: check if `react-markdown` or similar is already a dependency. If not, use `<pre>` blocks for simplicity — a markdown library can be added in a follow-up track if needed.
    - Kanban card click: wrap the card content (not the drag handle) in a `<Link>` or add an `onClick` with `navigate()`
    - TrackList item: wrap each row in a `<Link to={...}>` component
    - Follow the existing `AgentDetailPage` pattern for layout and data fetching
    
    ---
