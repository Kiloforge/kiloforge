id: fix-add-empty-repo-cleanup_20260309213000Z
title: Fix kf add for Empty Repos and Add Rollback on Failure
type: bug
status: complete
created: 2026-03-09T21:30:00Z
updated: 2026-03-09T21:30:00Z
spec:
  summary: "Fix `kf add` to handle empty repositories (no commits) gracefully, and add rollback logic so that partial failures (e.g., push fails) clean up the Gitea repo and local clone instead of leaving orphaned state that blocks retries."
  context: |
    When adding a project via `kf add` or the dashboard, three bugs surface:
    
    1. **Empty repo push crash** — If the cloned repo has no commits, `git push gitea main` fails with "src refspec main does not match any" because there's no `main` branch. The error message is confusing.
    
    2. **No rollback on failure** — The `AddProject` flow creates the Gitea repo (step 8 in the flow) before pushing (step 10). If the push fails, the Gitea repo is left orphaned. The local clone directory also remains.
    
    3. **Retry blocked by orphaned state** — After a failed add, retrying `kf add` with the same URL may fail because:
       - The local clone directory already exists (clone fails)
       - The Gitea repo already exists (though 409 is handled)
       - If the project was registered in the store before the failure, the duplicate check blocks retry
  codebase_analysis: |
    ### Current flow (CLI: `add.go`, Service: `project_service.go`)
    
    ```
    1. Validate URL
    2. Extract repo name / slug
    3. Check slug not already registered
    4. Clone remote → $DataDir/repos/$slug/
    5. Create Gitea repo (ignores 409)
    6. Add gitea remote
    7. Push main to Gitea          ← FAILS HERE for empty repos
    8. Register SSH key (non-blocking)
    9. Create webhook (non-blocking)
    10. Create project data dir
    11. Register in projects.json
    12. Save projects.json
    ```
    
    ### Bug 1: Empty repo detection
    
    After clone (step 4), check if the repo has any commits:
    
    ```bash
    git -C $cloneDir rev-parse HEAD  # fails if no commits
    ```
    
    If empty, either:
    - **Option A**: Skip the push step entirely — Gitea repo will be empty too, user can push later
    - **Option B**: Create an initial empty commit and push that
    - **Option C**: Fail with a clear error: "Repository has no commits. Push at least one commit and retry."
    
    **Recommendation**: Option A — skip push for empty repos, warn the user. The repo is still usable; commits will be pushed on the next `origin sync` or manual push.
    
    ### Bug 2: Rollback on failure
    
    Wrap steps 4-12 in a transaction-like pattern. If any step after clone fails:
    
    1. Delete the Gitea repo (if it was created by us, not pre-existing)
    2. Remove the local clone directory
    3. Remove the project data directory (if created)
    4. Do NOT remove from projects.json (it's only written at the end, so it's safe)
    
    ### Bug 3: Retry support
    
    Before cloning, check if the clone directory already exists:
    - If it exists AND the project is NOT in the registry → it's an orphan from a previous failed attempt → remove it and proceed
    - If it exists AND the project IS in the registry → duplicate, fail as before
    
    Similarly, if the Gitea repo returns 409, that's fine — we'll push to the existing one.
    
    ### Files to modify
    
    - **`backend/internal/adapter/cli/add.go`** — CLI flow with rollback
    - **`backend/internal/core/service/project_service.go`** — Service flow with rollback (used by REST API)
    - **`backend/internal/adapter/gitea/client.go`** — May need `RepoExists()` check or `DeleteRepo()` usage
  acceptance_criteria:
    - `kf add` with an empty repo (no commits) does not crash — skips push with a warning
    - If push fails for any reason, the Gitea repo created in this attempt is deleted (rollback)
    - If push fails, the local clone directory is removed (rollback)
    - Retrying `kf add` after a previous failure succeeds (orphaned clone dir cleaned up)
    - Dashboard `POST /api/projects` has the same rollback behavior
    - Non-blocking failures (SSH key, webhook) still don't cause rollback
    - Existing behavior unchanged for repos with commits (happy path)
    - `go test ./...` passes
  out_of_scope: |
    - Automatic retry logic
    - Transaction support across all project operations
    - Fixing the origin-sync flow for empty repos
  technical_notes: |
    ### Empty repo detection
    
    ```go
    // After clone, check if repo has commits
    checkCmd := exec.Command("git", "-C", cloneDir, "rev-parse", "HEAD")
    if err := checkCmd.Run(); err != nil {
        // Empty repo — no commits
        fmt.Println("Warning: Repository has no commits. Skipping push to Gitea.")
        fmt.Println("Push commits to the repository and run 'kf sync' to update Gitea.")
        // Continue with registration (skip push step)
    }
    ```
    
    ### Rollback pattern
    
    ```go
    var giteaRepoCreated bool
    
    // Step: Create Gitea repo
    if err := giteaClient.CreateRepo(ctx, repoName); err != nil {
        if !strings.Contains(err.Error(), "409") {
            cleanup(cloneDir)
            return fmt.Errorf("create gitea repo: %w", err)
        }
        // 409 = already existed, don't delete on rollback
    } else {
        giteaRepoCreated = true
    }
    
    // Step: Push
    if err := pushToGitea(cloneDir); err != nil {
        if giteaRepoCreated {
            giteaClient.DeleteRepo(ctx, repoName) // rollback
        }
        os.RemoveAll(cloneDir) // rollback
        return fmt.Errorf("push to gitea: %w", err)
    }
    ```
    
    ### Orphan detection on retry
    
    ```go
    // Before clone, check for orphaned directory
    if _, err := os.Stat(cloneDir); err == nil {
        // Directory exists but project not in registry → orphan
        if _, ok := store.Get(slug); !ok {
            os.RemoveAll(cloneDir) // clean up orphan
        }
    }
    ```
    
    ---
