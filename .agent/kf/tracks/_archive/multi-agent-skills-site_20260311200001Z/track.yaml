    done: true
  - text: Create getInstallCommand(agent, platform) function that generates the full install command with kf-* cleanup step,
      using the agent's skill directory path
    done: true
- phase: UI components
  tasks:
  - text: 'Add agentTool state (default: ''claude'') and agent tool selector row above the platform selector in the install
      section'
    done: true
  - text: Update the install command display to use getInstallCommand(agentTool, platform)
    done: true
  - text: Add info note below agent selector indicating OpenCode and Amp also read ~/.claude/skills/
    done: true
  - text: Update 'Requires Claude Code' text to dynamically reference the selected agent tool with a link to its documentation
    done: true
- phase: Content updates and verification
  tasks:
  - text: Update description text from '22 Claude Code skills' to agent-agnostic phrasing
    done: true
  - text: Remove kf-reviewer from skillCategories array in the 'Review & Quality' category
    done: true
