title: Schema-First API Development Guidance and Standards
type: chore
status: complete
created: 2026-03-08T20:00:02Z
updated: 2026-03-08T20:00:02Z
spec:
  summary: Update project guidance documents (product-guidelines, tech-stack, code style guides) to mandate schema-first API development — OpenAPI for REST/HTTP APIs and AsyncAPI for event-driven interfaces (SSE, webhooks, future WebSocket). All API code is generated from schemas, never hand-written.
  context: "The project is adopting OpenAPI code generation (see `openapi-codegen_20260308200001Z`). Beyond just adding the tooling, we need to establish schema-first as an absolute project requirement in all guidance documents. This ensures every future track that adds or modifies API endpoints starts with the schema, not the code. AsyncAPI should be included for event-driven communication (SSE streams, webhook payloads, future WebSocket)."
  codebase_analysis: |
    - **product-guidelines.md**: Currently 4 design principles, none mention API design approach.
    - **tech-stack.md**: Lists "OpenAPI — API-first design with code generation (strict types mode)" under API section but lacks detail on AsyncAPI or enforcement.
    - **code_styleguides/go.md**: Comprehensive Go style guide but no section on schema-first patterns or code generation workflows.
    - **Current SSE endpoints**: `/-/events` uses `EventSource` with `agent_update` events — candidate for AsyncAPI schema.
    - **Current webhook handling**: Gitea webhook payloads at `/webhook` — could document with AsyncAPI as consumed events.
    - **No AsyncAPI tooling yet** — will need to evaluate `asyncapi/generator` or similar for Go.
  acceptance_criteria:
    - `product-guidelines.md` updated with "Schema-First APIs" design principle
    - `tech-stack.md` updated with OpenAPI and AsyncAPI tooling details, version pins, and generation workflow
    - `code_styleguides/go.md` updated with new "API Design" section covering: schema-first workflow, code generation commands, when to use OpenAPI vs AsyncAPI, how to handle non-standard endpoints
    - New file `api/README.md` documenting the schema-first workflow for contributors
    - AsyncAPI spec skeleton at `api/asyncapi.yaml` for SSE events and webhook payloads
    - Guidelines explicitly state: "No new HTTP endpoint may be added without first updating the OpenAPI schema"
    - Guidelines explicitly state: "No new event/message type may be added without first updating the AsyncAPI schema"
  out_of_scope: |
    - Implementing AsyncAPI code generation tooling (future track)
    - Implementing the OpenAPI migration itself (covered by openapi-codegen track)
    - Writing the full AsyncAPI spec (just the skeleton + patterns)
  technical_notes: |
    ### OpenAPI scope
    - All REST endpoints under `/-/api/` (agents, quota, tracks, status, locks)
    - Badge endpoints (`/-/api/badges/*`) documented but marked as returning `image/svg+xml`
    - Health endpoint (`/health`)
    
    ### AsyncAPI scope
    - **Server-sent events**: `/-/events` channel with `agent_update`, `status_change` message types
    - **Consumed webhooks**: Gitea webhook payloads (issue, PR, push, review events) — document as "consumed" events
    - **Future**: WebSocket for bidirectional agent communication
    
    ### Guidance updates
    Product guidelines should add a 5th design principle:
    > **Schema-first APIs** — All inter-process and client-server communication is defined by machine-readable schemas (OpenAPI, AsyncAPI) before implementation. Server stubs, client code, and models are generated from schemas, never hand-written.
    
    Tech stack should detail:
    - `oapi-codegen` v2.5.1 for OpenAPI → Go server/client generation
    - AsyncAPI specification for event documentation (code generation TBD)
    - `make gen-api` / `make verify-codegen` workflow
    
    ---
