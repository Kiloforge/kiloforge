spec:
  summary: Add a chat-style terminal component to the dashboard for interactive agent sessions. Users can start interactive agents (for track creation, setup, etc.) and have real-time conversations via WebSocket.
  context: "The BE track (`interactive-agent-be_20260309150000Z`) provides WebSocket infrastructure for bidirectional agent communication. The frontend needs a terminal/chat UI that connects to the WebSocket, displays agent output, and accepts user input."
  codebase_analysis: |
    ### Existing UI patterns
    - `LogViewer.tsx` — displays agent log output (read-only, fetches via API)
    - `App.tsx` — tab-based navigation with agents, tracks, traces tabs
    - SSE hook (`useSSE.ts`) — real-time event streaming pattern (one-way)
    
    ### Placement
    - New "Interactive" tab or modal accessible from agent cards
    - Could also be triggered from track board ("Create Track" action → opens interactive agent)
    - Agent cards for interactive agents show "Attach" button that opens the terminal
  acceptance_criteria:
    - Chat-style terminal component that connects to `ws://host/ws/agent/{id}`
    - Displays agent output as formatted messages (markdown support)
    - Text input area for sending messages to the agent
    - Auto-scrolls to latest output
    - Shows connection status (connecting/connected/disconnected/reconnecting)
    - Reconnection with output replay (buffered lines from server)
    - "Start Interactive Agent" action (calls `POST /api/agents/interactive`)
    - Loading state while agent is starting
    - Clean exit display when agent completes
    - `npm run build` succeeds
  out_of_scope: |
    - Backend WebSocket infrastructure (covered by BE track)
    - Full xterm.js terminal emulation (chat-style is sufficient for Claude conversations)
    - Interactive `kf init` workflow (separate track using this infrastructure)
  technical_notes: |
    ### useAgentWebSocket hook
    ```typescript
    const { messages, sendMessage, status, connect } = useAgentWebSocket(agentId);
    // status: "connecting" | "connected" | "disconnected" | "reconnecting"
    // messages: Array<{ type: "output" | "input" | "status" | "error", text: string, timestamp: Date }>
    // sendMessage(text: string): void
    ```
    
    ### Chat component layout
    ```
    ┌─────────────────────────────────┐
    │ Agent: track-gen-abc123   [●]   │  ← header with status indicator
    ├─────────────────────────────────┤
    │                                 │
    │ 🤖 Setting up track generator  │  ← agent output (scrollable)
    │    for your request...          │
    │                                 │
    │ What feature would you like     │
    │ to create a track for?          │
    │                                 │
    │ 👤 I want to add a new auth    │  ← user input (highlighted differently)
    │    system with OAuth2           │
    │                                 │
    │ 🤖 Let me research the current │
    │    codebase for auth patterns...│
    │                                 │
    ├─────────────────────────────────┤
    │ Type a message...        [Send] │  ← input area
    └─────────────────────────────────┘
    ```
    
    ### Markdown rendering
    Agent output often includes code blocks, lists, and formatting. Use a lightweight markdown renderer (e.g., `react-markdown` or similar) for agent messages. User messages render as plain text.
    
    ### WebSocket message handling
    ```typescript
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      switch (msg.type) {
        case "output": // agent text → append to messages
        case "status": // agent lifecycle → update status indicator
        case "error":  // error → show error banner
      }
    };
    
    // Send user input
    ws.send(JSON.stringify({ type: "input", text: userText }));
    ```
    
    ---
