title: Project settings UI — settings panel in dashboard with live sync
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Dashboard UI for viewing and editing project settings from config.yaml. A settings
    panel accessible from the project page with toggle/input controls and real-time sync
    via SSE events.
  context: |
    The project-settings-be track adds REST endpoints (GET/PUT /api/projects/{slug}/settings)
    that expose kf config.yaml fields. This track builds the frontend to consume those endpoints.
    
    Settings should be easily accessible from the project page — either as a tab, a
    collapsible panel, or a dedicated settings page. The existing project metadata page
    pattern (tabbed content viewer) provides a natural integration point.
    
    Settings changes should be reflected immediately across all open dashboard tabs via
    the existing SSE event infrastructure (project-settings-updated event).
  codebase_analysis: |
    ### Existing patterns
    
    **Project metadata display:** ProjectMetadataView component
    - Tab-based content viewer with stat cards
    - Uses useProjectMetadata hook with TanStack Query
    
    **Config mutation:** useConfig hook
    - useMutation with queryClient.setQueryData for optimistic update
    - PUT /api/config with partial body
    
    **SSE integration:** useSSE hook
    - Subscribes to event types, invalidates relevant query keys
    - Existing event types: track-updated, agent-updated, board-updated, etc.
    
    **UI components:**
    - Design system in frontend/src/components/ui/
    - Toggle, Input, Button components available
    - Panel/Card layout components used throughout
    
    **Query keys:** frontend/src/api/queryKeys.ts
    - Pattern: projectSettings: (slug) => ["projectSettings", slug]
    
    ### File touch list
    - frontend/src/hooks/useProjectSettings.ts (new)
    - frontend/src/components/ProjectSettingsPanel.tsx (new)
    - frontend/src/pages/ProjectPage.tsx (add settings panel/tab)
    - frontend/src/types/api.ts (add types)
    - frontend/src/api/queryKeys.ts (add key)
    - frontend/src/hooks/useSSE.ts (add event handler for settings-updated)
  acceptance_criteria:
    - useProjectSettings hook: useQuery for GET, useMutation for PUT with optimistic cache update
    - ProjectSettingsPanel component displays all settings with appropriate controls (toggle for booleans, input for strings)
    - Settings panel accessible from project page (tab, collapsible section, or inline)
    - Changing a setting triggers PUT and updates the UI immediately (optimistic update)
    - SSE event project-settings-updated invalidates the settings query for cross-tab sync
    - Loading, error, and empty states handled gracefully
    - Settings display human-readable labels and descriptions (not raw YAML keys)
  out_of_scope: |
    - Settings that don't exist in config.yaml yet (only primary_branch and enforce_dep_ordering)
    - Settings validation beyond what the API enforces
    - Role-based access control for settings
    - Settings history or audit log
  technical_notes: |
    ### TypeScript types
    
    ```typescript
    interface ProjectSettings {
      primary_branch: string;
      enforce_dep_ordering: boolean;
    }
    
    interface UpdateProjectSettingsRequest {
      primary_branch?: string;
      enforce_dep_ordering?: boolean;
    }
    ```
    
    ### Hook design
    
    ```typescript
    export function useProjectSettings(slug: string | undefined) {
      const query = useQuery({
        queryKey: queryKeys.projectSettings(slug ?? ""),
        queryFn: () => fetcher<ProjectSettings>(`/api/projects/${slug}/settings`),
        enabled: !!slug,
      });
    
      const mutation = useMutation({
        mutationFn: (req: UpdateProjectSettingsRequest) =>
          fetcher<ProjectSettings>(`/api/projects/${slug}/settings`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(req),
          }),
        onSuccess: (data) => {
          queryClient.setQueryData(queryKeys.projectSettings(slug!), data);
        },
      });
    
      return { ...query, update: mutation.mutateAsync };
    }
    ```
    
    ### Settings panel layout
    
    ```
    ┌─ Project Settings ──────────────────────────────┐
    │                                                  │
    │  Primary Branch                                  │
    │  The branch agents read track state from         │
    │  [main________________] [Save]                   │
    │                                                  │
    │  Enforce Dependency Ordering          [●━━━ On]  │
    │  Work queue skips tracks with unmet              │
    │  dependencies and tries the next one             │
    │                                                  │
    └──────────────────────────────────────────────────┘
    ```
    
    Toggle controls for booleans, text input + save button for strings.
    Each setting shows a label and a brief description.
    
    ### SSE integration
    
    Add to useSSE event handler:
    ```typescript
    case "project-settings-updated":
      queryClient.invalidateQueries({ queryKey: queryKeys.projectSettings(slug) });
      break;
    ```
