title: Fix Init Password Display (Root Cause)
type: bug
status: complete
created: 2026-03-09T08:38:26Z
updated: 2026-03-09T08:38:26Z
spec:
  summary: "Fix the recurring bug where `kf init` displays a blank password after first-time setup. The root cause is in `manager.go` line 85 which clears `cfg.GiteaAdminPass` on the shared config pointer before `init.go` gets to display it. Previous fixes addressed the wrong layers."
  context: |
    This bug has been "fixed" twice:
    1. **remove-password-persistence_20260308210000Z** — Fixed `json_adapter.Save()` to strip password using a copy (correct, still in place)
    2. **fix-init-password-display_20260308235500Z** — Fixed the early-exit path to conditionally display password (correct, still in place)
    
    Neither fix addressed the **actual root cause**: `manager.Configure()` mutates the shared config pointer by clearing `GiteaAdminPass` at line 85 of `manager.go`, which runs BEFORE `init.go` line 146 tries to display it.
  acceptance_criteria:
    - `kf init` (fresh, no Gitea running) generates and displays the random password
    - Password is NOT stored in `~/.kiloforge/config.json`
    - `kf init` (re-init, Gitea already running) shows helpful message about password not being stored
    - `kf init --admin-pass mypass` displays `mypass` after setup
    - Test: unit test verifying Configure() does not clear password on config
  out_of_scope: |
    - Password storage/recovery mechanisms
    - Re-init password reset (changing an existing password)
  technical_notes: |
    - **Why it kept recurring:** Each fix addressed a different symptom (json persistence, early-exit display) without finding the shared-pointer mutation in manager.go. The comment on line 83 made it look intentional, so reviewers didn't question it.
    - **Test strategy:** Add a test for `manager.Configure()` that asserts `cfg.GiteaAdminPass` is NOT cleared after the call returns. This prevents future regressions.
    
    ---
  root_cause_analysis: |
    **File: `backend/internal/adapter/gitea/manager.go`, line 85:**
    ```go
    m.cfg.GiteaAdminPass = ""
    ```
    
    **Timeline on first `kf init`:**
    
    | Step | File:Line | What happens | `cfg.GiteaAdminPass` |
    |------|-----------|-------------|---------------------|
    | 1 | init.go:72 | Generate random password | `"xK9m2pQ..."` |
    | 2 | init.go:129 | Call `manager.Configure(ctx)` | `"xK9m2pQ..."` |
    | 3 | manager.go:67 | Pass password to `gitea admin user create` | `"xK9m2pQ..."` |
    | 4 | manager.go:72 | Create client with password | `"xK9m2pQ..."` |
    | 5 | **manager.go:85** | **`m.cfg.GiteaAdminPass = ""`** | **`""`** |
    | 6 | init.go:139 | `cfg.Save()` — json_adapter strips password (correct) | `""` |
    | 7 | **init.go:146** | **Display: `Admin: admin / `** | **`""` — BLANK!** |
    
    The comment on line 83 says "Clear password so it is not persisted to config.json" — but `json_adapter.Save()` already handles this by making a copy and clearing the copy. The mutation in manager.go is both **redundant** and **destructive**.
  the_fix: |
    **Remove lines 83-85 from `manager.go`:**
    ```go
    // DELETE THESE LINES:
    // Clear password so it is not persisted to config.json (omitempty removes it).
    // The password was only needed for admin user creation and token generation above.
    m.cfg.GiteaAdminPass = ""
    ```
    
    **Why this is safe:**
    - `json_adapter.Save()` (lines 40-48) already creates a copy of the config, clears the password on the copy, and marshals the copy. The original config is never mutated during save.
    - The `omitempty` tag on `GiteaAdminPass` was the original safety mechanism, but `json_adapter.Save()` now explicitly strips it regardless.
    - After init.go displays the password at line 146, the config object goes out of scope — the password is never stored.
    
    **Alternative fix (defensive):** Keep manager.go's clear but save the password to a local variable in init.go before calling Configure:
    ```go
    generatedPassword := cfg.GiteaAdminPass
    client, err = manager.Configure(ctx)
    // ... later ...
    fmt.Printf("  Admin: %s / %s\n", cfg.GiteaAdminUser, generatedPassword)
    ```
    
    **Recommendation:** Remove lines 83-85 from manager.go. It's the cleaner fix — the manager shouldn't mutate caller state for a concern (persistence) that's already handled by the config layer.
