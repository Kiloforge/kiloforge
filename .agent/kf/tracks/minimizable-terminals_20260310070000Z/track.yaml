id: minimizable-terminals_20260310070000Z
title: "Minimizable agent terminals with activity notifications"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Add minimize/restore functionality to floating agent terminal windows with
    a dock bar for minimized terminals and unread activity badges that notify
    users when a minimized terminal has new output.
  context: |
    Interactive agents often require time to process after a user sends a prompt.
    Currently the floating terminal window occupies screen space while the user
    waits. Users want to minimize the terminal, navigate the dashboard, and be
    notified when the agent responds — similar to minimizing a chat window.

    This builds on the multi-window infrastructure (multi-window-agents track)
    which provides a window manager with open/close/focus operations. This track
    adds minimize/restore state, a dock UI for minimized windows, and unread
    activity tracking.
  codebase_analysis: |
    **Window lifecycle (after multi-window track):**
    - useWindowManager manages a Map of open windows (agentId → WindowState)
    - Each AgentTerminal has independent useAgentWebSocket connection
    - useAgentWebSocket closes WS on component unmount (cleanup in useEffect)

    **Key constraint — WS must stay alive while minimized:**
    - useAgentWebSocket (hooks/useAgentWebSocket.ts) closes the WebSocket when
      the component unmounts (line 184: `wsRef.current?.close()`)
    - To keep WS alive during minimize, the AgentTerminal must stay MOUNTED
      but visually hidden. Use CSS visibility/display to hide the expanded
      panel while showing only the dock pill. Do NOT unmount the component.

    **Files to modify:**
    - frontend/src/hooks/useWindowManager.ts (from multi-window track) —
      add minimized flag, unreadCount, minimize/restore/resetUnread methods
    - frontend/src/components/AgentTerminal.tsx — accept minimized prop,
      conditionally render full panel vs nothing (dock renders separately)
    - frontend/src/components/TerminalDock.tsx — NEW: dock bar component
      showing minimized terminal pills
    - frontend/src/components/TerminalDock.module.css — NEW: dock styling
    - frontend/src/App.tsx — render TerminalDock, wire to window manager

    **Existing notification infrastructure:**
    - Toast system exists (components/toast/) but is transient (5s auto-dismiss)
    - Toasts are wrong for this — we need persistent visual indicators
    - Better pattern: badge count on dock pills + optional pulse animation

    **Navigation persistence already works:**
    - AgentTerminal renders outside <Routes> in App.tsx (line 199)
    - React state in App survives route changes — no extra work needed

    **Design system (CSS Modules, no Tailwind):**
    - Variables: --bg-surface-elevated, --border, --accent, --radius-lg
    - Font: --font-mono
    - Colors: --green, --orange, --red, --yellow for status
    - Existing badge pattern: .roleBadge in AgentTerminal.module.css
  acceptance_criteria:
    - Each floating terminal window has a minimize button in the header
    - Minimized terminals collapse to a dock bar at the bottom of the viewport
    - Dock pills show agent name, role badge, and connection status dot
    - When a minimized terminal receives new WebSocket messages, an unread
      badge (count) appears on its dock pill with a pulse animation
    - Clicking a dock pill restores the terminal to its previous position/size
    - Close button on dock pill closes the terminal entirely (disconnects WS)
    - Unread count resets to zero when the terminal is restored
    - Terminal WebSocket stays connected while minimized (component stays mounted)
    - Multiple terminals can be minimized simultaneously
    - Dock bar does not interfere with page content or other floating windows
    - Minimize/restore transition is smooth (not jarring)
  out_of_scope: |
    - Maximize/fullscreen toggle (separate feature)
    - Keyboard shortcuts for minimize/restore (keyboard-tiling track)
    - Sound or browser notifications (push notifications)
    - Persisting minimized state across page refresh (localStorage)
    - Grouping or collapsing dock pills when too many
  technical_notes: |
    **Window manager state extension (per window):**
    ```
    interface WindowState {
      agentId: string;
      zIndex: number;
      x: number; y: number; width: number; height: number;
      minimized: boolean;     // NEW
      unreadCount: number;    // NEW
    }
    ```

    **Minimize flow:**
    1. User clicks minimize button in terminal header
    2. windowManager.minimize(agentId) sets minimized=true
    3. AgentTerminal renders with display:none (stays mounted, WS alive)
    4. TerminalDock renders a pill for this window
    5. On new WS messages while minimized: increment unreadCount
       — This requires AgentTerminal to call a callback when messages arrive
         while minimized. The simplest approach: pass an onActivity callback
         that the terminal calls in a useEffect watching messages.length

    **Restore flow:**
    1. User clicks dock pill
    2. windowManager.restore(agentId) sets minimized=false, unreadCount=0
    3. Terminal panel reappears at previous position
    4. bringToFront(agentId) called automatically

    **Unread tracking approach:**
    AgentTerminal gets a new prop: `onActivity?: () => void`
    Inside the component, a useEffect watches messages.length:
    ```
    useEffect(() => {
      if (minimized && messages.length > 0) onActivity?.();
    }, [messages.length]);
    ```
    The window manager increments unreadCount when onActivity fires.

    **Dock UI design:**
    Fixed bar at bottom of viewport, horizontal flex, z-index above page
    content but below floating windows. Each pill is a compact card showing:
    - Agent name (truncated) + role color dot
    - Unread badge (red circle with count) if unreadCount > 0
    - Close (×) button
    - Hover shows full agent name tooltip
