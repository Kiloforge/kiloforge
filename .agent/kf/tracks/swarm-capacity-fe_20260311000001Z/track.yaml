id: swarm-capacity-fe_20260311000001Z
title: Agent swarm UI — rename queue panel, capacity gating, and waiting state
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Rename QueuePanel → SwarmPanel and useQueue → useSwarm throughout the
    frontend. Add capacity-gated waiting state in the AgentLauncher with
    user-friendly messaging: "Kiloforge at max capacity — increase Max Swarm
    Size to prevent waiting." Auto-retry via SSE when a slot opens.
  context: |
    The backend now enforces a global agent capacity limit and returns 429 when
    at capacity. The frontend needs to handle this gracefully — instead of
    showing an error, it should show a waiting overlay with a clear explanation
    and a link to increase the swarm size setting. The "Work Queue" terminology
    is being rebranded to "AI Agent Swarm" across the entire UI.
  codebase_analysis: |
    QueuePanel.tsx:
    - Current labels: "Workers: X / max_workers", "Max workers:", "queued"
    - File rename: QueuePanel.tsx → SwarmPanel.tsx, QueuePanel.module.css → SwarmPanel.module.css
    - Props interface rename: QueuePanelProps → SwarmPanelProps
    - API type refs: QueueStatus → SwarmStatus, QueueSettings → SwarmSettings
    
    useQueue.ts:
    - File rename: useQueue.ts → useSwarm.ts
    - Hook rename: useQueue → useSwarm
    - Query key: ["queue"] → ["swarm"]
    - Endpoints: /api/queue/* → /api/swarm/*
    - Return type rename: UseQueueResult → UseSwarmResult
    
    AgentLauncher.tsx:
    - Currently no capacity awareness — just shows "Starting..." during mutation
    - Needs: check capacity before spawn, show waiting overlay on 429
    - Waiting state: animated indicator, "Kiloforge at max capacity", usage display
    - Auto-dismiss when capacity_changed SSE arrives and slots are available
    
    App.tsx:
    - spawnMutation error handler (lines 112-118): handles 403, 412 — needs 429 case
    - useQueue() call → useSwarm()
    - All queue* variables renamed to swarm*
    
    OverviewPage.tsx:
    - Renders QueuePanel → SwarmPanel
    - Props rename: queue* → swarm*
    
    types/api.ts:
    - QueueItem, QueueStatus, QueueSettings types — all need rename
    - Add SwarmCapacity type: { max: number, active: number, available: number }
  acceptance_criteria:
    - All user-visible 'Work Queue' text replaced with 'AI Agent Swarm'
    - All user-visible 'Max Workers' text replaced with 'Max Swarm Size'
    - QueuePanel component renamed to SwarmPanel (file, component, CSS module)
    - useQueue hook renamed to useSwarm (file, function, query keys)
    - When agent spawn returns 429, AgentLauncher shows waiting overlay instead of error
    - Waiting overlay displays: animated indicator, 'Kiloforge at max capacity', current usage (e.g. 3/3 agents active), and link/button to increase Max Swarm Size
    - When capacity_changed SSE event arrives with available > 0, waiting overlay auto-retries the spawn
    - User can cancel waiting at any time
    - SwarmPanel shows 'Max Swarm Size' input (1-10) instead of 'Max Workers'
  out_of_scope: |
    - Internal Go type renames (backend)
    - Per-project swarm limits
    - Queue service wiring in serve.go
    - Worktree pool UI
  technical_notes: |
    The rename is mostly mechanical (find-replace across files). The capacity
    gating UX is the interesting part:
    
    1. User clicks "Start" in AgentLauncher
    2. POST /api/agents/interactive returns 429 with capacity JSON
    3. AgentLauncher transitions to "waiting" state with overlay
    4. SSE listener watches for capacity_changed events
    5. When available > 0, auto-retry the spawn request
    6. On success, dismiss overlay and open agent terminal
    
    The waiting overlay message should be:
      "Kiloforge at max capacity"
      "3/3 agents active — increase Max Swarm Size to prevent waiting"
    with a subtle pulsing animation and a "Cancel" button.
