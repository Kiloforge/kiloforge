spec:
  summary: Comprehensive E2E tests for the distributed tracing UI: listing traces, viewing trace detail with span hierarchy, timeline visualization, and trace filtering, covering happy path, edge cases, and expected failures.
  context: |
    Kiloforge includes a distributed tracing system that captures spans across agent operations, webhook events, and internal processing. The tracing endpoints are:
    
    - `GET /api/traces` — list traces with IDs, durations, and span counts
    - `GET /api/traces/{traceId}` — trace detail with full span hierarchy
    
    The frontend renders a trace list page and a trace detail page with a timeline visualization showing parent-child span relationships. Real-time updates arrive via `trace_update` SSE events.
    
    These E2E tests verify the full stack — API responses, span hierarchy rendering, timeline visualization, and SSE-driven updates — using seeded trace data and the mock agent infrastructure.
  codebase_analysis: |
    ### Relevant endpoints
    
    - Trace list: `GET /api/traces` — returns array of traces with `trace_id`, `duration_ms`, `span_count`, `root_span_name`, `started_at`
    - Trace detail: `GET /api/traces/{traceId}` — returns trace with nested spans, each having `span_id`, `parent_span_id`, `name`, `start_time`, `end_time`, `attributes`
    
    ### SSE events
    
    - `trace_update` — emitted when new spans are recorded, includes trace ID
    
    ### UI components
    
    - Trace list page: table/list of traces with clickable rows
    - Trace detail page: span hierarchy tree and timeline visualization
    - Span attributes display: project, track, agent, webhook event metadata
  acceptance_criteria:
    - Trace list displays traces with IDs, durations, and span counts
    - Trace detail page shows span hierarchy (parent-child relationships)
    - Timeline visualization renders spans with correct relative timing
    - Span attributes (project, track, agent, webhook event) displayed correctly
    - Click on trace in list navigates to detail page
    - Trace list refreshes on trace_update SSE event
    - Edge cases: trace with single span, trace with deep nesting (5+ levels), very long span names
    - Failure cases: view nonexistent trace (404), trace with missing spans, API error during load
  out_of_scope: |
    - Creating real traces from agent operations — use seeded trace data
    - Trace export (Jaeger, Zipkin format)
    - Trace sampling configuration
    - Performance testing with large trace volumes
  technical_notes: |
    ### Test data seeding
    
    Seed traces with known span hierarchies before each test. Create traces with varying depth (1 span, 3 spans in a chain, 5+ level deep nesting) and varying span counts. Include spans with all relevant attribute types (project slug, track ID, agent ID, webhook event type).
    
    ### Timeline verification
    
    Playwright assertions should verify:
    - Spans are rendered as horizontal bars
    - Parent spans visually contain child spans
    - Relative start times are reflected in horizontal positioning
    - Duration is reflected in bar width
    
    Use `data-testid` attributes or accessible roles to locate timeline elements.
    
    ### Deep nesting test
    
    Create a trace with 6+ levels of nested spans. Verify the UI renders all levels without truncation or layout overflow. Check that indentation or tree lines are visible.
    
    ### Developer agent instructions
    
    When building this track, use the Playwright MCP skill to verify E2E tests work in the browser. Run tests in headed mode during development for visual verification. Seed trace data via direct service calls or REST API before each test.
    
    ---
plan:
  - phase: Trace List Tests
    tasks:
      - text: List with seeded traces — seed 3-5 traces with known IDs and durations, navigate to trace list page, verify all traces appear with correct trace ID, duration, and span count
        done: true
      - text: Empty list — start with no traces seeded, navigate to trace list page, verify empty state message is displayed (e.g., "No traces recorded")
        done: true
      - text: Trace metadata display — seed a trace with known root span name and started_at timestamp, verify the list row shows root span name, formatted timestamp, and duration in human-readable format
        done: true
  - phase: Trace Detail Tests
    tasks:
      - text: Span hierarchy — seed a trace with 3-level span hierarchy (root -> child -> grandchild), navigate to trace detail, verify all three spans are displayed with correct parent-child indentation or tree structure
        done: true
      - text: Span attributes — seed a trace with spans containing attributes (project slug, track ID, agent ID, webhook event type), navigate to detail, verify attributes are displayed for each span (in a detail panel or inline)
        done: true
      - text: Navigation from list — seed traces, navigate to trace list, click on a trace row, verify URL changes to `/traces/{traceId}` and the detail page loads with the correct trace
        done: true
  - phase: Timeline Tests
    tasks:
      - text: Timeline rendering — seed a trace with 3 spans of known durations, navigate to trace detail, verify spans are rendered as visual bars in a timeline view
        done: true
      - text: Relative timing — seed a trace where child span starts 100ms after root span, verify the child span bar is offset from the root span bar in the timeline
        done: true
      - text: Span duration display — seed spans with varying durations (10ms, 500ms, 2000ms), verify the timeline bar widths are proportional to duration, and duration text labels are shown
        done: true
  - phase: Real-Time Tests
    tasks:
      - text: trace_update SSE event — open trace list page in Playwright, seed a new trace via API, verify the trace list updates to show the new trace without manual page refresh
        done: true
      - text: New trace appears in list — subscribe to SSE, create a trace, verify `trace_update` event is received AND the UI reflects the new trace in the list
        done: true
      - text: Auto-refresh on update — open trace detail page for an existing trace, add new spans to that trace via API, verify the detail page updates to show the new spans
        done: true
  - phase: Edge and Failure Cases
    tasks:
      - text: Deep nesting — seed a trace with 6-level deep span hierarchy, navigate to detail, verify all levels render without layout overflow or truncation, verify tree/indentation is visible for all levels
        done: true
      - text: Nonexistent trace — navigate directly to `/traces/nonexistent-id`, verify a 404 or "Trace not found" error page is displayed, verify no crash or blank page
        done: true
      - text: Missing spans and API errors — seed a trace with a span referencing a nonexistent parent_span_id, verify the UI handles orphaned spans gracefully (renders them at root level or shows warning); simulate API error during trace list load, verify error state is shown
        done: true
