spec:
  summary: Add tests for the 3 most critical untested pages (ProjectPage, AgentDetailPage, OverviewPage) and 2 complex untested components (KanbanBoard, AgentCard). These are the main user-facing surfaces with complex orchestration logic.
  context: Zero pages are tested (0/6). ProjectPage alone orchestrates 10+ hooks and multiple modals. KanbanBoard has drag-and-drop and a state machine for confirmations. These are high-risk areas for regressions.
  codebase_analysis: |
    - **F-T2 (Critical):** `pages/ProjectPage.tsx` (361 lines) — 10+ hooks, cascading failure risk
    - **F-T3 (Critical):** `components/KanbanBoard.tsx` (204 lines) — drag-and-drop, state machine
    - **F-T6 (High):** `pages/AgentDetailPage.tsx` (316 lines) — log streaming, WebSocket
    - **F-T8 (High):** `pages/OverviewPage.tsx` (251 lines) — dashboard rendering
    - **F2 (Low):** `components/AgentCard.tsx` — calls `useTracks()` internally
  acceptance_criteria:
    - ProjectPage tested: renders with data, handles modal flows, handles errors
    - AgentDetailPage tested: renders agent info, handles log streaming
    - OverviewPage tested: renders stats, agent grid, quota info
    - KanbanBoard tested: renders columns, handles card move, confirmation dialog
    - AgentCard tested: renders agent info, links correctly
    - All tests use consistent patterns with existing test infrastructure
  out_of_scope: |
    - Hook-level tests (covered by frontend-test-hooks)
    - E2E tests
    - Visual regression tests
  technical_notes: |
    Page tests should mock hooks (or use MSW for API mocking) and verify rendering + user interactions. Use `@testing-library/react` `render()`, `screen`, `userEvent` for interaction testing.
    
