id: fix-build-outside-worktree_20260310040000Z
title: "Fix Go Build VCS Detection Outside Worktrees"
type: bug
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Fix `make build-backend` failing with "error obtaining VCS status: exit status 128"
    when run outside a worktree (e.g., bare repo root) by detecting VCS availability and
    falling back to -buildvcs=false gracefully.
  context: |
    The project uses git worktrees for parallel agent development. The Makefile sets
    GIT_DIR and GIT_WORK_TREE env vars to make Go's VCS stamping work inside worktrees.
    However, when `make build` is run from the bare repo root (which is not a proper
    worktree), Go's internal `git status` call fails with exit code 128, breaking the build.

    The build already stamps version/commit/date via ldflags, so -buildvcs only adds the
    `vcs.modified` dirty flag. When VCS detection is unavailable, falling back to
    -buildvcs=false loses only the dirty flag — an acceptable tradeoff.

    The build style guide says "Never use -buildvcs=false in local builds" but this
    policy doesn't account for the bare repo root case where VCS detection is genuinely
    impossible. The guide should be updated to reflect the fallback behavior.
  codebase_analysis: |
    Affected file: Makefile (root)

    The build-backend target (line 27-29):
      cd backend && GIT_DIR=$$(git rev-parse --git-common-dir) GIT_WORK_TREE=$$(cd .. && pwd) \
          go build -ldflags "..." -o ../$(BINARY) ./cmd/kf

    Same GIT_DIR/GIT_WORK_TREE pattern used in: test, test-smoke, test-integration,
    test-e2e, test-all, test-coverage targets (lines 38-67).

    Build style guide: .agent/kf/code_styleguides/build.md (VCS Stamping section)
    Build smoke test: backend/cmd/kf/main_test.go (uses gitCommonDir/gitWorkTree helpers)

    The GIT_DIR/GIT_WORK_TREE approach works in worktrees but fails at the bare repo root
    where git status returns exit 128 despite the env vars being set.
  acceptance_criteria:
    - "make build" succeeds when run from a worktree (existing behavior preserved)
    - "make build" succeeds when run from the bare repo root (currently broken)
    - VCS stamping (-buildvcs) is used when available (worktree/normal repo)
    - Graceful fallback to -buildvcs=false when VCS detection fails
    - All test targets (test, test-smoke, test-integration, test-e2e, test-all, test-coverage) also handle the fallback
    - Build style guide updated to document the fallback behavior
    - Smoke test (TestBinaryBuilds) continues to pass in both contexts
  out_of_scope: |
    - Changing the worktree topology or bare repo setup
    - CI/CD workflow changes (CI runs in a normal git clone, not affected)
    - goreleaser configuration (has its own VCS handling)
  technical_notes: |
    Approach: Add a Makefile variable that probes VCS availability and conditionally
    sets -buildvcs=false.

    Implementation: Define a helper variable or inline check:
      BUILDVCS := $(shell cd backend && GIT_DIR=$$(git rev-parse --git-common-dir) \
          GIT_WORK_TREE=$$(cd .. && pwd) git status --porcelain >/dev/null 2>&1 \
          && echo "" || echo "-buildvcs=false")

    Then use $(BUILDVCS) in the go build command. Same check applied to all go test
    targets.

    Alternative (simpler): Use a shell conditional inline in the recipe:
      BUILDVCS=""; if ! GIT_DIR=... GIT_WORK_TREE=... git status >/dev/null 2>&1; then
        BUILDVCS="-buildvcs=false"; fi; go build $$BUILDVCS ...

    Update build.md to document: "If VCS detection is unavailable (e.g., bare repo root),
    the build falls back to -buildvcs=false automatically. Version info is still stamped
    via ldflags."
