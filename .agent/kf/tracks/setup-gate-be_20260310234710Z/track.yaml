id: setup-gate-be_20260310234710Z
title: Gate All Agent Endpoints Behind Setup Check (Backend)
type: feature
status: complete
created: 2026-03-10T23:47:10Z
updated: 2026-03-10T23:47:10Z
spec:
  summary: "Add 428 "kiloforge setup required" check to `RunAdminOperation` endpoint, matching the existing pattern from `GenerateTracks` and `SpawnInteractiveAgent`. Currently admin operations (bulk archive, compact archive, report) can be triggered on projects that haven't completed setup, which will fail confusingly."
  context: "The setup prerequisite system (`setup-prereq-be` track) added 428 checks to `GenerateTracks` and `SpawnInteractiveAgent`, but `RunAdminOperation` was missed. All three endpoints spawn agents that run kf-* skills requiring conductor artifacts — if setup hasn't been done, they fail with cryptic errors instead of a clear "setup required" response."
  codebase_analysis: |
    ### Existing 428 pattern (`api_handler.go`)
    
    - `GenerateTracks` (line ~1362): `if slug := h.checkSetup(projectSlug); slug != "" { return gen.GenerateTracks428JSONResponse{...} }`
    - `SpawnInteractiveAgent` (line ~344): Same pattern, conditional on project being specified
    - `checkSetup()` helper (line ~250): Returns empty string if setup complete, project slug if not
    - `isSetupRequired()` (line ~268): Checks `.agent/conductor/product.md` existence
    
    ### Missing check
    
    - `RunAdminOperation` (line ~1436): Has 401 (auth), 403 (consent), 412 (skills) checks but NO 428 (setup) check. Admin operations like bulk-archive, compact-archive, and report all require conductor artifacts.
    
    ### OpenAPI schema (`api/openapi.yaml`)
    
    - `RunAdminOperation` response definitions include 401, 403, 412, 429, 500 — missing 428
    - `SetupRequiredResponse` schema already exists (lines 1167-1176)
  acceptance_criteria:
    - `POST /api/admin/run` returns 428 with `SetupRequiredResponse` when project is specified and setup is incomplete
    - 428 check runs after auth/consent/skills checks but before concurrency guard
    - OpenAPI spec updated with 428 response for `RunAdminOperation`
    - `make generate` produces no diff
    - `make test` passes
  out_of_scope: |
    - Frontend 428 handling (separate track: `setup-gate-fe_20260310234711Z`)
    - Additional endpoint gating beyond admin operations
  technical_notes: |
    ### RunAdminOperation 428 check
    
    Add after skills check (line ~1463), before concurrency guard:
    
    ```go
    // Check kiloforge setup if a project is specified.
    if req.Body.Project != nil && *req.Body.Project != "" {
        if slug := h.checkSetup(*req.Body.Project); slug != "" {
            return gen.RunAdminOperation428JSONResponse{
                Error:   "kiloforge setup required",
                Project: slug,
            }, nil
        }
    }
    ```
    
    ### OpenAPI update
    
    Add 428 response to `POST /api/admin/run`:
    
    ```yaml
    '428':
      description: Kiloforge setup required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetupRequiredResponse'
    ```
    
    ---
