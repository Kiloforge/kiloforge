id: update-skills-submodule-py_20260312120000Z
title: "Update kiloforge-skills submodule to Python CLI tools era"
type: chore
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Bump kiloforge-skills submodule from fb1c3a8 to bba1b1c (16 commits). Major
    change: all CLI tools migrated from shell to Python with shared lib/ modules,
    project-local venv, kf-dispatch folded into kf-status, and new kf-update skill.
  context: |
    The kiloforge-skills submodule has 16 new commits since the last update. Key changes:
    - All CLI scripts converted from bash to Python 3 with .py extensions
    - New shared library at kf-bin/scripts/lib/ (claims, config, conflicts, deps, git, tracks, worktree_lock)
    - kf-bin/bin/ renamed to kf-bin/scripts/
    - kf-dispatch skill removed (folded into kf-status.py script)
    - New kf-update skill added
    - New kf-install.py, kf-status.py, kf-claim.py, kf-dispatch.py scripts
    - Project-local venv at .agent/kf/.venv/ with PyYAML dependency
    - Per-worktree claim locks for instant track claim detection
    - Branch lock acquire unified with automatic HTTP→mkdir fallback
  codebase_analysis: |
    Backend Go code: No changes needed — //go:embed embedded/kf-* auto-picks up
    new kf-update/ dir and drops removed kf-dispatch/ dir. No hardcoded references
    to kf-dispatch in Go code.

    .agent/kf/bin/ (TRACKED in git): Contains old shell scripts that must be replaced
    with Python equivalents. Files tracked: kf-merge-lock, kf-track, kf-track-content,
    kf-worktree-env, migrate-conductor-to-kf, tests/run_tests.sh.

    CLAUDE.md: References `. .agent/kf/bin/kf-worktree-env` — the Python replacement
    outputs the same shell-eval format, but the invocation changes to
    `eval "$(.agent/kf/bin/kf-worktree-env.py)"`.

    Docs: 3 files reference kf-dispatch (docs/architecture.md, docs/agents-and-swarms.md,
    docs/skills.md) — need updating to reflect kf-status integration.

    Frontend: No changes needed — skills are auto-discovered via API.
  acceptance_criteria:
    - Submodule pointer updated to bba1b1c (latest kiloforge-skills main)
    - Old shell scripts removed from .agent/kf/bin/ (kf-merge-lock, kf-track, kf-worktree-env)
    - New Python scripts installed in .agent/kf/bin/ via kf-install.py --update
    - .agent/kf/.venv/ created with PyYAML (added to .gitignore)
    - CLAUDE.md updated for new kf-worktree-env.py invocation
    - Documentation updated (kf-dispatch references → kf-status)
    - migrate-conductor-to-kf script removed (migration complete, no longer needed)
    - make build succeeds (Go embed picks up new submodule structure)
    - make test passes
  out_of_scope: |
    - Frontend changes (none needed — auto-discovery)
    - New role additions to checker.go (none required)
    - Venv committed to git (it's in .gitignore, created at runtime)
  technical_notes: |
    The kf-install.py script handles the heavy lifting: it detects legacy shell
    scripts, removes them, copies .py replacements, creates the venv, installs
    PyYAML, and rewrites shebangs to use the project-local venv python.

    The .agent/kf/.venv/ directory should be added to .gitignore — it's a runtime
    artifact, not committed code. However the .agent/kf/bin/*.py scripts ARE committed
    so that all worktrees share the same tool versions.

    The old tests/run_tests.sh can be removed — tests now live in the Python scripts
    or are validated via make test.
