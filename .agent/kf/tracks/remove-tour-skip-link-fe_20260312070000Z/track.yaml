spec:
  summary: |
    Tour step 9 ("Try It: Move a Card") shows both a "Next" button and a
    "Skip step" link that both call nextStep. Remove the redundant skip link.
  context: |
    The guided tour at step 9/14 (move-card, index 8) renders two actions
    for the wait-for-drag step: a "Next" button and a "Skip step" link.
    Both invoke the same nextStep handler, making the skip link redundant
    and potentially confusing.
  codebase_analysis: |
    Key file:
    - frontend/src/components/tour/TourOverlay.tsx:163-178 — The isWaitStep
      branch renders both a nextBtn and a skipLink button, both calling
      nextStep. The skipLink CSS class is defined in TourOverlay.module.css:172.
    - frontend/src/components/tour/tourSteps.ts:94-103 — The move-card step
      has action: "wait-for-drag" which triggers the isWaitStep branch.
  acceptance_criteria:
    - The "Skip step" link no longer appears on tour step 9 (move-card)
    - The "Next" button remains and advances the tour
    - No other tour steps are affected
    - Tour tests pass
  out_of_scope: |
    - Changing the drag-to-advance behavior
    - Modifying other tour steps
  technical_notes: |
    Remove the isWaitStep conditional branch in TourOverlay.tsx so all steps
    render the same single "Next" button. The skipLink CSS class and styles
    can also be removed from TourOverlay.module.css since they become unused.
