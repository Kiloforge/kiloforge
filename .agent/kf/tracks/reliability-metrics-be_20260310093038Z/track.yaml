id: reliability-metrics-be_20260310093038Z
title: Agent reliability metrics — backend collection, storage, and API
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    Kiloforge orchestrates multiple Claude Code agents across worktrees.
    While agents are generally reliable, failures do occur: merge lock
    contention (two workers racing for the lock), agent timeouts (force-killed
    by the timeout reaper), resume failures (session corruption, missing
    worktrees), spawn failures, and merge rebase conflicts.
    
    Today these events are logged to per-agent log files and partially
    tracked in agent status fields (shutdown_reason, resume_error), but
    there is no unified, queryable record of reliability events over time.
    Users cannot answer questions like:
    - How often do merge lock contentions happen?
    - What percentage of agents complete successfully vs fail?
    - Are failures increasing over time?
    - Which failure modes are most common?
    
    The goal is a lightweight event capture system that records reliability
    events as they happen, stores them in SQLite, and exposes them via
    REST API for the frontend dashboard to visualize.
  codebase_analysis: |
    Key integration points:
    
    1. Agent spawner (backend/internal/adapter/agent/spawner.go):
       - Already emits analytics events (agent_spawned, agent_completed)
       - Completion callback tracks status, duration
       - Capacity tracking via publishCapacityChanged()
       - Rate limit detection via checkQuota()
    
    2. Lock manager (backend/internal/adapter/lock/manager.go):
       - Acquire returns conflict info (current holder)
       - No event emission on contention — only 409 HTTP response
       - TTL-based expiration with background reaper
    
    3. Recovery manager (backend/internal/adapter/agent/recovery.go):
       - Tracks RecoveryFailure{AgentID, Reason}
       - Reasons: "no session ID", "worktree missing", "resume failed"
       - Currently only logged, not persisted as events
    
    4. Timeout reaper (backend/internal/adapter/agent/timeout_reaper.go):
       - Sets status=force-killed, shutdown_reason with duration
       - Publishes capacity_changed event
    
    5. Existing analytics (backend/internal/adapter/analytics/):
       - PostHog-based tracker with Track(event, props) interface
       - Could be extended, but analytics is for product telemetry
       - Reliability events need local persistence, not remote
    
    6. SQLite migrations (backend/internal/adapter/persistence/sqlite/):
       - 4 existing migrations (001-004)
       - Goose-based migration system
       - Standard pattern: CREATE TABLE with indices
    
    7. OpenAPI spec (backend/api/openapi.yaml):
       - Schema-first API design — endpoints defined before code
       - oapi-codegen generates server interfaces and types
       - Must add new paths + schemas for reliability metrics
    
    8. Event bus (domain/events.go):
       - Existing event types for SSE streaming
       - Can add EventReliabilityEvent for real-time dashboard updates
    
    9. REST handler pattern (backend/internal/adapter/rest/):
       - api_handler.go implements generated interfaces
       - Pagination via PageOpts/Page[T]
       - Standard JSON responses
  acceptance_criteria:
    - New SQLite migration creates reliability_events table with fields for event_type, severity, agent_id, scope, detail (JSON), and timestamp
    - ReliabilityEvent domain type with well-defined event categories (lock_contention, lock_timeout, agent_timeout, agent_spawn_failure, agent_resume_failure, merge_conflict, quota_exceeded)
    - ReliabilityStore port and SQLite adapter for insert + paginated query with filters (event_type, severity, time range)
    - ReliabilityService in core/service with RecordEvent() and query methods
    - Lock manager emits lock_contention events on 409 conflict responses
    - Agent spawner emits spawn_failure and completion events with failure detail
    - Recovery manager emits resume_failure events
    - Timeout reaper emits agent_timeout events
    - OpenAPI spec updated with GET /api/reliability/events (paginated, filterable) and GET /api/reliability/summary (aggregated counts by type and time bucket)
    - SSE event type added for real-time reliability event streaming
    - All new code has unit tests
  out_of_scope: |
    - Frontend dashboard UI (separate FE track)
    - Historical trend analysis or anomaly detection algorithms
    - External alerting (email, Slack, webhooks)
    - Changing agent behavior based on reliability data
    - Modifying existing agent status fields or analytics events
  technical_notes: |
    Implementation approach:
    
    1. Schema-first: Add OpenAPI paths/schemas for reliability endpoints
       before writing any Go code. Run make gen-api to generate interfaces.
    
    2. Migration 005: CREATE TABLE reliability_events with:
       - id (TEXT PK, UUID)
       - event_type (TEXT NOT NULL) — enum: lock_contention, lock_timeout,
         agent_timeout, agent_spawn_failure, agent_resume_failure,
         merge_conflict, quota_exceeded
       - severity (TEXT NOT NULL) — warn, error, critical
       - agent_id (TEXT) — nullable, FK to agents
       - scope (TEXT) — e.g., "merge" for lock events, track ID for agent events
       - detail (TEXT) — JSON blob with event-specific data
       - created_at (DATETIME DEFAULT CURRENT_TIMESTAMP)
       - INDEX on (event_type, created_at), (agent_id), (created_at)
    
    3. Domain: core/domain/reliability.go — ReliabilityEvent struct,
       EventType constants, Severity constants
    
    4. Port: core/port/reliability_store.go — ReliabilityStore interface
       with Insert(), List(filters, pagination), Summary(timeRange)
    
    5. Service: core/service/reliability.go — ReliabilityService wraps
       store, validates events, provides RecordEvent() for adapters
    
    6. SQLite adapter: persistence/sqlite/reliability_store.go
    
    7. Wire into existing subsystems via service injection:
       - Lock handler: on 409 conflict → svc.RecordEvent(lock_contention)
       - Agent spawner: on spawn error → svc.RecordEvent(agent_spawn_failure)
       - Recovery manager: on resume failure → svc.RecordEvent(agent_resume_failure)
       - Timeout reaper: on force-kill → svc.RecordEvent(agent_timeout)
       - Quota tracker: on rate limit → svc.RecordEvent(quota_exceeded)
    
    8. REST handler: api_handler.go implements generated GetReliabilityEvents
       and GetReliabilitySummary methods
    
    9. SSE: Add EventReliabilityEvent to domain/events.go, publish from
       service on RecordEvent()
