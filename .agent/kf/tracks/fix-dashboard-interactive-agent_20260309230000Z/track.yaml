id: fix-dashboard-interactive-agent_20260309230000Z
title: Fix Interactive Agent Wiring in Dashboard Command
type: bug
status: complete
created: 2026-03-09T23:00:00Z
updated: 2026-03-09T23:00:00Z
spec:
  summary: "The standalone `kf dashboard` command does not wire `InterSpawner` or `WSSessions` into the API handler, causing all interactive agent endpoints (spawn interactive, generate tracks, admin operations) to return 500 "interactive agents not configured"."
  context: "The `kf up` flow correctly wires interactive agents via `server.go` (lines 79-80, 237-238), but the standalone `kf dashboard` command in `dashboard.go` omits these fields from `APIHandlerOpts`. Since the dashboard track generator and admin operations both depend on interactive agents, these features are completely broken when using `kf dashboard`."
  codebase_analysis: |
    ### Root Cause
    
    **`backend/internal/adapter/cli/dashboard.go:56-64`** — `APIHandlerOpts` is missing:
    - `InterSpawner` — needs an `InteractiveSpawner` (from `agent.NewSpawner(...)`)
    - `WSSessions` — needs a `*wsAdapter.SessionManager`
    
    ### Working reference
    
    **`backend/internal/adapter/rest/server.go:79-80`** — the orchestrator server correctly creates these:
    ```go
    s.interSpawner = spawner
    s.wsSessions = wsAdapter.NewSessionManager()
    ```
    
    And wires them at line 237-238:
    ```go
    InterSpawner: s.interSpawner,
    WSSessions:   s.wsSessions,
    ```
    
    ### Affected endpoints (all return 500)
    
    - `POST /api/agents/interactive` — `api_handler.go:278`
    - `POST /api/tracks/generate` — `api_handler.go:1203`
    - `POST /api/admin/operation` — `api_handler.go:1312`
    
    ### Additional missing fields
    
    The dashboard command is also missing several other `APIHandlerOpts` fields that the server wires:
    - `ProjectMgr` — project management service (add/remove)
    - `GitSync` — git sync adapter
    - `TraceStore` — trace storage
    - `BoardSvc` — board service
    - `EventBus` — SSE event bus
    - `Consent` — consent manager
    
    These should also be wired to avoid further 500 errors on other endpoints.
  acceptance_criteria:
    - `kf dashboard` wires `InterSpawner` and `WSSessions` in `APIHandlerOpts`
    - `kf dashboard` wires remaining missing fields: `ProjectMgr`, `GitSync`, `TraceStore`, `BoardSvc`, `EventBus`, `Consent`
    - Dashboard WebSocket handler is registered on the mux for interactive sessions
    - Track generation from dashboard UI works without 500 error
    - Interactive agent spawn from dashboard works without 500 error
    - Admin operations from dashboard work without 500 error
    - `make test` passes
  out_of_scope: |
    - Refactoring server.go and dashboard.go to share wiring logic (future track)
    - Adding new interactive agent features
  technical_notes: |
    The fix requires:
    
    1. Import `wsAdapter` and `agent` packages (already imported partially)
    2. Create an `agent.Spawner` with the config needed for interactive agents
    3. Create a `wsAdapter.SessionManager`
    4. Wire both into `APIHandlerOpts`
    5. Register the WebSocket handler on the dashboard mux for `/ws` endpoint
    6. Wire the remaining missing service dependencies
    
    Reference `server.go` Run() method (lines 60-250) for the complete wiring pattern.
    
    ---
