id: agent-random-names_20260309183000Z
title: Random Human-Friendly Agent Names
type: feature
status: complete
created: 2026-03-09T18:30:00Z
updated: 2026-03-09T17:38:00Z
spec:
  summary: "Generate a random, memorable, slightly silly human-friendly name for each agent on spawn. Format: `"{adverb} {adjective} {name}"` — e.g., "curiously dangerous dave", "remarkably cheerful grace", "suspiciously quiet oscar". The ID remains the system identifier for uniqueness; the name is for human readability in the UI and logs."
  context: "Agents currently display as short UUID hashes (e.g., `dev-abc123f`) in the dashboard. When multiple agents are running, it's hard to distinguish them at a glance. A memorable random name makes it easy to say "check on 'suspiciously quiet oscar'" instead of "check on dev-abc123f"."
  codebase_analysis: |
    ### Agent model
    
    - **`backend/internal/core/domain/agent.go:30-45`** — `AgentInfo` struct. Add `Name string \`json:"name"\`` field.
    - Agent ID is generated in `spawner.go` as `fmt.Sprintf("%s-agent-%s", role, shortUUID)`.
    - Name generation should happen at the same point as ID generation.
    
    ### Display points
    
    - **`frontend/src/components/AgentCard.tsx`** — Shows agent ID; should show name prominently with ID as secondary
    - **`frontend/src/pages/OverviewPage.tsx`** — Agent grid
    - **`backend/internal/adapter/agent/spawner.go`** — All three `Spawn*` methods create `AgentInfo`; name should be set here
    
    ### Persistence
    
    - **`backend/internal/adapter/persistence/sqlite/migrate.go`** — Agent table schema needs `name TEXT` column
    - **`backend/api/openapi.yaml`** — Agent schema needs `name` field
  acceptance_criteria:
    - Every spawned agent gets a random name in `"{adverb} {adjective} {name}"` format
    - Names are generated from curated word pools (at least 30 adverbs, 50 adjectives, 50 first names)
    - Name pool produces ~75,000+ unique combinations (30 × 50 × 50)
    - Name is stored on `AgentInfo.Name` and persisted to SQLite
    - API returns name in agent JSON responses
    - Dashboard shows name prominently on agent cards (ID shown smaller/secondary)
    - Agent detail page (if exists) shows name as the heading
    - Trace timeline shows agent name on spans where an agent was active
    - `go test ./...` passes
  out_of_scope: |
    - Ensuring global uniqueness of names (combinations are large enough; ID handles uniqueness)
    - User-provided or configurable names
    - Persisting used names to avoid repeats
  technical_notes: |
    ### Name generator
    
    New file: `backend/internal/adapter/agent/namegen.go`
    
    ```go
    package agent
    
    import "math/rand"
    
    var adverbs = []string{
        "curiously", "remarkably", "suspiciously", "absurdly", "delightfully",
        "genuinely", "mildly", "secretly", "oddly", "fiercely",
        "quietly", "boldly", "cheerfully", "cautiously", "wildly",
        "strangely", "perfectly", "barely", "incredibly", "slightly",
        "terribly", "wonderfully", "mysteriously", "ridiculously", "pleasantly",
        "dangerously", "enthusiastically", "unusually", "hilariously", "profoundly",
    }
    
    var adjectives = []string{
        "dangerous", "cheerful", "quiet", "brave", "clever",
        "sleepy", "hungry", "swift", "gentle", "fierce",
        "witty", "bold", "calm", "eager", "grumpy",
        "jolly", "keen", "lazy", "noble", "proud",
        "shy", "tall", "wise", "zany", "crafty",
        "daring", "elegant", "fearless", "graceful", "hasty",
        "inventive", "jubilant", "kind", "lively", "mighty",
        "nimble", "optimistic", "patient", "quirky", "resilient",
        "sneaky", "tenacious", "upbeat", "valiant", "whimsical",
        "adventurous", "brilliant", "cosmic", "determined", "electric",
    }
    
    var names = []string{
        "ada", "blake", "cleo", "dave", "eve",
        "finn", "grace", "hank", "iris", "jules",
        "kai", "luna", "max", "nova", "oscar",
        "piper", "quinn", "ruby", "sage", "tara",
        "uma", "vex", "wren", "xena", "yuri",
        "zara", "arrow", "blaze", "cedar", "drift",
        "echo", "fern", "glow", "haze", "ink",
        "jade", "kite", "lark", "moss", "nyx",
        "onyx", "pixel", "rain", "spark", "tide",
        "volt", "wave", "zen", "atlas", "byte",
    }
    
    func GenerateName() string {
        a := adverbs[rand.Intn(len(adverbs))]
        b := adjectives[rand.Intn(len(adjectives))]
        c := names[rand.Intn(len(names))]
        return a + " " + b + " " + c
    }
    ```
    
    ### SQLite migration
    
    Add `name TEXT NOT NULL DEFAULT ''` to agents table (or handle via ALTER TABLE migration step).
    
    ### UI display
    
    Agent card should show:
    ```
    ┌──────────────────────────────┐
    │ remarkably cheerful grace    │
    │ dev-abc123f · developer      │
    │ Track: my-track · running    │
    │ ...                          │
    └──────────────────────────────┘
    ```
    
    Name is the primary identifier for humans; ID is secondary.
    
    ---
