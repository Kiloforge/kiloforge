id: ci-windows-submodule-be_20260311070001Z
title: Add submodules checkout to Windows CI job
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    The build-windows CI job doesn't checkout git submodules, causing the
    go:embed directive for kiloforge-skills to fail with "no matching files found".
  context: |
    CI run 22942008887 fails on the build-windows job with:
      pattern embedded/kf-*: no matching files found
    
    The kiloforge-skills submodule at backend/internal/adapter/skills/embedded/
    provides embedded skill files referenced by checker.go's go:embed directive.
    The lint, test, and deps jobs all use `submodules: recursive` in their
    actions/checkout step, but build-windows does not.
  codebase_analysis: |
    .github/workflows/ci.yml defines 5 jobs. Three of them (lint, test, deps)
    include `submodules: recursive` in their checkout step. Two do not:
    - kf-tools (doesn't need submodules — only runs shell script tests)
    - build-windows (NEEDS submodules — builds Go backend with embedded skills)
    
    The fix is adding `submodules: recursive` to the build-windows checkout step.
    
    File: .github/workflows/ci.yml, line ~117 (build-windows checkout)
    Current:
      - uses: actions/checkout@v4
    Needs:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
  acceptance_criteria:
    - build-windows CI job checkout includes submodules: recursive
    - Windows build succeeds in CI (go:embed finds embedded/kf-* files)
  out_of_scope: |
    - Modifying the kf-tools job (it doesn't need submodules)
    - Changing the submodule itself
    - Other CI workflow changes
  technical_notes: One-line addition to the checkout step in the build-windows job.
plan:
  - phase: Fix CI config
    tasks:
      - text: Add submodules: recursive to build-windows checkout in ci.yml
        done: true
      - text: Verify lint and test jobs still have submodules: recursive
        done: true
extra: {}