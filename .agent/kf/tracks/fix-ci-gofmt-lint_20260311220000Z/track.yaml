id: fix-ci-gofmt-lint_20260311220000Z
title: Fix CI lint failure — gofmt formatting in pkg/kf/types.go
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Fix gofmt formatting misalignment in backend/pkg/kf/types.go Track struct
    that causes `make lint` to fail in CI.
  context: |
    CI runs `make lint` which includes a gofmt check. The check currently fails
    because backend/pkg/kf/types.go has misaligned struct tag columns in the
    Track struct.
  codebase_analysis: |
    The `Track` struct in `backend/pkg/kf/types.go` has the `Extra` field typed
    as `map[string]interface{}` which is longer than the other field type names
    (string, Spec, []Phase). This causes gofmt to want different tab alignment
    for the YAML struct tags across all fields. The diff is purely whitespace —
    no logic changes.
    
    The misalignment was introduced when the `Extra` field was added to the
    Track struct. Running `gofmt -w` on the file fixes the alignment.
  acceptance_criteria:
    - make lint passes (gofmt check succeeds for pkg/kf/types.go)
    - No other changes beyond formatting
  out_of_scope: |
    - Any logic changes to types.go
    - Other lint issues (none currently exist)
  technical_notes: |
    Run `gofmt -w backend/pkg/kf/types.go`. The diff is purely whitespace
    alignment in struct tags — the Extra field's longer type name requires
    different tab stops.
plan:
