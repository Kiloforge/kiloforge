spec:
  summary: Build a read-only project metadata page in the dashboard that displays the product definition, guidelines, tech stack, workflow, and code style guides fetched from the new metadata API, with markdown rendering and tabbed navigation.
  context: |
    The backend will serve all project metadata via `GET /api/projects/{slug}/metadata` (from the BE track). The frontend needs a new page/section where users can browse this content. The content is read-only — users who want to modify it discuss changes with an agent.
    
    The existing ProjectPage already shows project-level info (board, tracks, sync). The metadata view should integrate naturally — either as a new tab/section on ProjectPage or as a linked sub-page.
  codebase_analysis: |
    ### Existing patterns
    
    - **Pages**: `src/pages/ProjectPage.tsx` is the project detail page with board, sync panel, admin ops
    - **Routing**: React Router v7 in `App.tsx`, project routes at `/projects/:slug`
    - **Data fetching**: TanStack Query hooks in `src/hooks/`, query keys in `src/api/queryKeys.ts`
    - **Styling**: CSS Modules, CSS variables in `index.css`, no component library
    - **Markdown**: `src/components/terminal/MarkdownContent.tsx` already renders markdown (uses it for agent terminal output)
    - **Types**: `src/types/api.ts` defines all API response interfaces
    
    ### TrackDetailPage as reference
    
    `TrackDetailPage.tsx` shows a pattern for rendering structured content:
    - Metadata header (ID, type, dates)
    - Collapsible sections for spec fields
    - Progress visualization
    
    The metadata page should follow similar patterns but with tabbed navigation across the different metadata files.
    
    ### No existing metadata hook
    
    A new `useProjectMetadata` hook is needed to fetch from the new endpoint. Follow the same pattern as `useTracks`, `useProjects`, etc.
  acceptance_criteria:
    - New metadata section accessible from ProjectPage (tab or prominent link)
    - Displays product definition with markdown rendering
    - Displays product guidelines with markdown rendering
    - Displays tech stack with markdown rendering
    - Displays workflow document with markdown rendering (if present)
    - Displays code style guides with tabbed navigation by language name
    - Shows track summary stats (pending, in-progress, completed, archived, total)
    - Shows quick links as clickable navigation
    - Gracefully handles missing optional fields (guidelines, workflow may be empty)
    - Shows appropriate message when kf is not initialized for the project
    - Loading and error states handled consistently with existing pages
  out_of_scope: |
    - Editing metadata content from the UI (read-only — users discuss changes with agents)
    - Search within metadata content
    - Versioning or diff view of metadata changes
    - Backend API (handled by project-metadata-be track)
  technical_notes: |
    ### Route
    
    Add as a sub-route or tab on the project page. Suggested approach: tabbed navigation on ProjectPage with existing content as "Board" tab and new metadata as "Project Info" tab.
    
    Alternatively, a linked sub-page at `/projects/:slug/info`.
    
    ### Data fetching
    
    New hook `useProjectMetadata.ts`:
    ```typescript
    export function useProjectMetadata(slug: string) {
      return useQuery({
        queryKey: queryKeys.projectMetadata(slug),
        queryFn: () => fetcher<ProjectMetadata>(`/api/projects/${slug}/metadata`),
      });
    }
    ```
    
    ### TypeScript types
    
    ```typescript
    interface QuickLink {
      label: string;
      path: string;
    }
    
    interface StyleGuide {
      name: string;
      content: string;
    }
    
    interface TrackSummary {
      total: number;
      pending: number;
      in_progress: number;
      completed: number;
      archived: number;
    }
    
    interface ProjectMetadata {
      product: string;
      product_guidelines?: string;
      tech_stack: string;
      workflow?: string;
      quick_links: QuickLink[];
      style_guides: StyleGuide[];
      track_summary: TrackSummary;
    }
    ```
    
    ### Markdown rendering
    
    Reuse the existing `MarkdownContent` component from `src/components/terminal/MarkdownContent.tsx`. If it's tightly coupled to terminal styling, extract the markdown rendering logic into a shared utility.
    
    ### UI layout
    
    Suggested layout for the metadata view:
    1. **Header**: Project name + track summary stats (like StatCards)
    2. **Quick links**: Horizontal pill/chip list
    3. **Content tabs**: Product | Guidelines | Tech Stack | Workflow | Style Guides
    4. **Tab content**: Rendered markdown in a clean reading panel
    5. **Style guides sub-tabs**: If multiple guides, show language tabs (Go, Python, etc.)
    
    ### Styling
    
    Follow existing CSS Module patterns. Use same CSS variables for consistency. The content area should have comfortable reading width and typography for long-form markdown.
