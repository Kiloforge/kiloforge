id: interactive-only-launcher-fe_20260313000001Z
title: Show only interactive agent role in dashboard launcher
type: feature
status: pending
created: 2026-03-13
updated: 2026-03-13
spec:
  summary: |
    Simplify the dashboard AgentLauncher to show only the "Interactive"
    agent role. Remove the architect role card from the non-project
    launcher. Keep advisor roles in the project-scoped launcher.
  context: |
    Currently, the AgentLauncher shows "Architect" as the only role when
    launched from the main dashboard (non-project context). With the new
    kf-interactive skill (BE track), the "interactive" role becomes a
    proper kf-aware general-purpose agent. The launcher should now show
    this as the sole option from the dashboard, making it the default
    agent type users can start.

    In project context, the launcher should show Interactive plus the
    advisor roles. The architect role is removed from the launcher entirely
    — users invoke /kf-architect from within an interactive session.
  codebase_analysis: |
    **AgentLauncher** (`frontend/src/components/AgentLauncher.tsx`):
    - ROLES array defines: architect, advisor-product, advisor-reliability
    - `availableRoles` filters: project context shows all, non-project filters
      out advisor roles → only "architect" remains
    - Default selected role: "architect" (line 48)
    - Role type: `"interactive" | "architect" | "advisor-product" | "advisor-reliability"`
    - Each role has: value, label, description, placeholder

    **App.tsx** (dashboard launcher, lines 321-330):
    - Renders `<AgentLauncher>` without projectSlug when on dashboard
    - `handleLaunch` passes role to `spawnMutation`

    **ProjectPage.tsx** (project launcher, lines 429-436):
    - Renders `<AgentLauncher projectSlug={slug}>` with project context

    **Backend** (`checker.go`):
    - "interactive" role already exists in the API enum
    - With BE track complete, it will have its own skill and command prefix
  acceptance_criteria:
    - Dashboard launcher (no project context) shows only "Interactive" role — no role selector needed
    - Interactive role label is "Interactive" with description "General-purpose kf-aware assistant"
    - Project launcher shows "Interactive" plus advisor roles (no architect)
    - AgentRole type updated to remove "architect" from launcher options
    - Default selected role is "interactive" instead of "architect"
    - Prompt placeholder for interactive role is general-purpose (e.g., "Ask anything about the project...")
    - Existing tests updated to reflect new role options
    - make build-frontend succeeds
  out_of_scope: |
    - Backend skill creation (separate BE track)
    - Removing architect role from the backend entirely (it's still used by
      the swarm/developer pipeline, just not exposed in the UI launcher)
    - Changes to agent terminal or window management
  technical_notes: |
    **ROLES array update:**
    Replace the "architect" entry with "interactive":
    ```typescript
    const ROLES: RoleOption[] = [
      {
        value: "interactive",
        label: "Interactive",
        description: "General-purpose kf-aware assistant",
        placeholder: "Ask anything about the project...",
      },
      {
        value: "advisor-product",
        label: "Product Advisor",
        description: "Product design, branding, and competitive analysis",
        placeholder: "Describe what you need product guidance on...",
      },
      {
        value: "advisor-reliability",
        label: "Reliability Advisor",
        description: "Testing coverage, linting, type safety, and CI gate audits",
        placeholder: "Describe what you want audited...",
      },
    ];
    ```

    **Simplify dashboard launcher:**
    When `!projectSlug`, filter out advisor roles. This leaves only
    "interactive" — with a single role, the role selector cards can be
    hidden and the UI simplifies to just the prompt textarea + start button.

    **Default role:**
    Change `useState<AgentRole>("architect")` to `useState<AgentRole>("interactive")`.

    **AgentRole type:**
    Keep "architect" in the type for backwards compatibility (backend still
    uses it for swarm-spawned architects), but remove it from the ROLES UI
    array so users can't select it from the launcher.
