id: frontend-stability-fe_20260311120002Z
title: Frontend stability — error boundary, hook fixes, fetch timeouts
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: Add React Error Boundary, fix ref-during-render in useSSE, fix setState-in-effect patterns, add AbortController timeouts to fetcher.
  context: |
    Production audit found several stability issues in the frontend that could cause
    crashes or degraded behavior in production: no Error Boundary means any render error
    crashes the entire app, ref mutation during render violates React rules, and fetch
    calls have no timeout mechanism.
  codebase_analysis: |
    Critical issues found:
    1. No Error Boundary — any component render error crashes entire app with blank page
    2. frontend/src/hooks/useSSE.ts:11 — handlersRef.current = handlers outside useEffect
       (ref access during render violates React concurrent mode rules)
    3. frontend/src/App.tsx:171 — setWaitingForCapacity in useEffect (setState in effect)
    4. frontend/src/pages/AgentDetailPage.tsx:60 — setLogLoading in useEffect
    5. frontend/src/api/fetcher.ts — no AbortController, no timeout handling
    6. frontend/src/hooks/useAgentWebSocket.ts:167 — forward reference to connect before declaration
    7. Silent catch blocks in SSE/WebSocket handlers drop errors without logging
  acceptance_criteria:
    - Error Boundary wraps the app with a user-friendly fallback UI
    - useSSE ref mutation moved inside useEffect
    - setState-in-effect patterns fixed in App.tsx and AgentDetailPage.tsx
    - fetcher.ts uses AbortController with configurable timeout (default 30s)
    - useAgentWebSocket forward reference issue resolved
    - Silent catch blocks log errors to console.warn for debugging
    - All existing tests pass, new tests cover Error Boundary
  out_of_scope: |
    - Comprehensive error logging/monitoring infrastructure
    - Retry logic overhaul (current TanStack Query retry:1 is acceptable)
    - React Compiler integration fixes (separate concern)
  technical_notes: |
    Error Boundary must be a class component (React requirement). Place it in
    src/components/ErrorBoundary.tsx wrapping the main App content in main.tsx.
    The fallback should show a "Something went wrong" message with a reload button.
    
    For the useSSE ref fix: move `handlersRef.current = handlers` into a useEffect
    with [handlers] dependency. This is the standard React pattern for syncing refs.
