id: merge-lock-skill-consolidation_20260310220001Z
title: "Consolidate merge lock protocol into shared kf-merge-lock helper"
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Replace ~120 lines of inline lock bash in kf-developer and kf-architect skills
    with calls to the shared kf-merge-lock helper script. Ensures consistent lock
    behavior across all agent roles and eliminates protocol drift.
  context: |
    The merge lock protocol is currently duplicated as inline bash in both the
    kf-developer SKILL.md (lines 471-549) and kf-architect SKILL.md (Step 12).
    Each copy implements HTTP mode detection, acquire, heartbeat, release, and
    mkdir fallback independently. This duplication means bug fixes or improvements
    must be applied in multiple places, and any drift creates subtle lock safety
    issues.
  codebase_analysis: |
    kf-developer skill (embedded at backend/internal/adapter/skills/embedded/kf-developer/SKILL.md):
    - Lock section: lines 471-549 (~80 lines)
    - Defines: is_orch_running(), release_lock(), start_heartbeat()
    - Acquire with timeout_seconds: 300 (auto-merge) or 0 (manual)
    - Heartbeat every 30s in background loop

    kf-architect skill (~/.claude/skills/kf-architect/SKILL.md):
    - Lock section in Step 12 (~80 lines)
    - Nearly identical to developer skill
    - Uses timeout_seconds: 0 (always non-blocking for architect)

    Both skills will be updated to call:
      kf-merge-lock acquire --holder "$HOLDER" [--timeout 300]
      kf-merge-lock heartbeat --holder "$HOLDER" &
      kf-merge-lock release --holder "$HOLDER"
      kf-merge-lock status
  acceptance_criteria:
    - "kf-developer SKILL.md lock section replaced with kf-merge-lock calls (acquire, heartbeat, release)"
    - "kf-architect SKILL.md Step 12 replaced with kf-merge-lock calls"
    - "Embedded skill copy at backend/internal/adapter/skills/embedded/ updated to match"
    - "Skills still document the lock protocol conceptually but delegate execution to the helper"
    - "Lock behavior is identical before and after: same TTL, heartbeat interval, timeout semantics"
    - "NEVER force-remove rule preserved in skill text"
  out_of_scope: |
    - Backend lock manager changes (covered by merge-lock-hardening-be track)
    - Creating new lock modes or features
    - Dashboard lock UI
  technical_notes: |
    This is primarily a text editing task on skill markdown files. The inline
    bash blocks (~80 lines each) are replaced with 5-10 line sections that call
    kf-merge-lock subcommands. The conceptual documentation about lock modes,
    TTL, and safety rules remains in the skill text — only the implementation
    bash is extracted.
