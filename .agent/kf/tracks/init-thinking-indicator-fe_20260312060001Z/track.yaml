        done: true
      - text: Add CSS module styles for the animation (keyframes, opacity pulse or sequential dots)
        done: true
      - text: Add aria-live='polite' and role='status' for screen reader accessibility
        done: true
  - phase: Integration
    tasks:
      - text: In AgentTerminal.tsx, replace static 'Waiting for agent output...' with ThinkingIndicator when connected with no visible content
        done: true
      - text: In TerminalBubbles.tsx SystemBubble, keep returning null for init (the ThinkingIndicator in AgentTerminal handles this state)
        done: true
      - text: Ensure the indicator disappears once the first text/tool_use/thinking message arrives
        done: true
  - phase: Testing
    tasks:
      - text: Update AgentTerminal.test.tsx and TerminalBubbles.test.tsx to verify the thinking indicator renders and hides correctly
        done: true
