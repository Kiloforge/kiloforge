spec:
  summary: Create high-level project documentation for Kiloforge, including an author's foreword section captured through an interactive interview with the project creator. The foreword tells the story of how and why Kiloforge was designed — the motivations, trade-offs, and philosophy behind the project.
  context: Kiloforge has grown significantly but lacks public-facing documentation beyond the README. The project creator wants to document the "why" behind the design decisions through a conversational interview process, resulting in a foreword that gives readers context and motivation before diving into technical details. This is common in open source projects as a "Philosophy", "Vision", or "Author's Note" section.
  acceptance_criteria:
    - Documentation site or structure created (e.g., `docs/` directory with markdown files)
    - Foreword/Author's Note section written based on interactive interview with project creator
    - Foreword covers: origin story, problem being solved, design philosophy, why certain trade-offs were made, vision for the project
    - High-level architecture overview (how the pieces fit together — CLI, orchestrator, agents, dashboard, Gitea)
    - Getting started section (install, init, first agent)
    - Documentation is readable as standalone markdown (no static site generator required initially)
  out_of_scope: |
    - API reference documentation (auto-generated from OpenAPI spec separately)
    - Detailed per-feature documentation
    - Static site generator setup (Hugo, Docusaurus, etc.) — can be a future track
    - Tutorial/walkthrough content beyond basic getting started
  technical_notes: |
    ### Interview Process
    
    The developer implementing this track should operate as an **interviewer** — asking the project creator open-ended questions to elicit the story behind Kiloforge. The interview should cover:
    
    1. **Origin** — What problem were you solving? What was the "aha moment"?
    2. **Design philosophy** — Why local-first? Why Gitea? Why agent orchestration?
    3. **Architecture decisions** — Why clean architecture? Why the conductor/track system? Why worktrees?
    4. **Trade-offs** — What did you consider and reject? What would you do differently?
    5. **Vision** — Where is this going? What's the long-term goal?
    
    The agent should ask questions one or two at a time, listen to responses, and synthesize the answers into a polished foreword. The creator's voice should be preserved — first person, conversational, authentic.
    
    ### Documentation Structure
    
    ```
    docs/
      README.md           — Documentation index
      foreword.md         — Author's foreword (interview-derived)
      architecture.md     — High-level architecture overview
      getting-started.md  — Quick start guide
    ```
    
    ### Foreword Format
    
    The foreword should read like a personal essay or letter to the reader. Common patterns in open source:
    - **"Why I Built This"** — personal narrative style
    - **"A Note from the Author"** — more formal but still personal
    - **"Philosophy"** — design principles and motivations
    
    The exact framing should emerge from the interview — the author's natural way of telling the story should guide the format.
    
    ---
