id: interactive-roles-be_20260310100000Z
title: "Add role-based interactive agent spawning API"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Extend the interactive agent API to accept a role and optional prompt,
    with per-role skill validation and role-to-skill dispatch.
  context: |
    Currently POST /api/agents/interactive spawns a generic agent with no role
    or prompt. POST /api/tracks/generate hard-wires the /kf-architect skill.
    We need a unified way to spawn conversational agents by role (architect,
    product-advisor, future advisors) with an optional user prompt. Each role
    maps to a specific skill that the agent invokes.
  codebase_analysis: |
    Key files to modify:

    1. backend/api/openapi.yaml — SpawnInteractiveAgent operation
       Current request body: { work_dir, model, project }
       Needs: role (string enum), prompt (optional string)

    2. backend/internal/adapter/rest/api_handler.go
       - SpawnInteractiveAgent handler (line ~354): needs to accept role + prompt,
         dispatch to correct skill based on role
       - GenerateTracks handler (line ~1548): can be refactored to use the same
         role-based dispatch (role="architect", prompt=user input)
       - checkSkillsForRole helper (line ~1940): already supports role lookup

    3. backend/internal/adapter/skills/checker.go
       - RequiredSkillsForRole() (line 62): currently maps "interactive" → kf-architect
       - Needs new mappings: "architect" → kf-architect, "product-advisor" → kf-product-advisor
       - The generic "interactive" role can remain as fallback (requires kf-architect)

    4. backend/internal/core/domain/agent.go
       - Only has AgentRoleDeveloper and AgentRoleReviewer constants
       - Needs: AgentRoleArchitect, AgentRoleAdvisor (or per-advisor constants)

    5. backend/internal/adapter/agent/spawner.go
       - SpawnInteractiveOpts already has Prompt and Ref fields
       - Ref should be set to the role name for tracking
       - The skill invocation prefix (e.g., "/kf-architect") should be prepended
         to the prompt based on the role, similar to how GenerateTracks does it

    6. backend/internal/adapter/skills/checker_test.go
       - TestRequiredSkillsForRole needs new test cases

    Role-to-skill mapping:
      "architect"        → kf-architect (skill: /kf-architect)
      "product-advisor"  → kf-product-advisor (skill: /kf-product-advisor)
      "interactive"      → kf-architect (backwards compat, no skill prefix)
  acceptance_criteria:
    - POST /api/agents/interactive accepts optional "role" and "prompt" fields
    - Role "architect" validates kf-architect skill and prepends /kf-architect to prompt
    - Role "product-advisor" validates kf-product-advisor skill and prepends /kf-product-advisor
    - Omitting role defaults to "interactive" (backwards compatible, no skill prefix)
    - POST /api/tracks/generate still works (can internally use role="architect")
    - RequiredSkillsForRole returns correct skills for new roles
    - Domain has role constants for architect and advisor roles
    - OpenAPI schema updated and code regenerated (make gen-api)
    - Existing tests pass, new tests added for role mapping
    - make verify-codegen passes
  out_of_scope: |
    - Frontend UI changes (separate track)
    - Creating the kf-product-advisor SKILL.md content (separate track)
    - WebSocket protocol changes (existing protocol sufficient)
    - Changes to developer/reviewer spawning
  technical_notes: |
    The role-to-skill dispatch pattern:
    1. API receives role + optional prompt
    2. Look up required skill for role via RequiredSkillsForRole()
    3. Validate skill is installed
    4. Build full prompt: "/{skill-name} {user prompt}" (if prompt provided)
    5. Spawn interactive agent with Ref=role, Prompt=fullPrompt
    6. Return agent info + ws_url as before

    The GenerateTracks endpoint can be refactored to internally call the same
    dispatch with role="architect" and the track generation prompt wrapper.
    This avoids duplicating the spawn logic.
