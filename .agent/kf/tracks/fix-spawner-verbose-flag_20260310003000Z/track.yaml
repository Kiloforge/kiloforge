id: fix-spawner-verbose-flag_20260310003000Z
title: Fix Agent Spawner — Add --verbose Flag for stream-json
type: bug
status: complete
created: 2026-03-10T00:30:00Z
updated: 2026-03-10T00:30:00Z
spec:
  summary: "All agent spawning exits silently with code 0 because Claude CLI now requires `--verbose` when combining `-p` (print mode) with `--output-format stream-json`. Without it, Claude prints an error to stderr and exits immediately — producing 0 bytes of stdout, which the spawner interprets as a clean exit."
  context: |
    This is the **actual root cause** of the persistent "Agent exited (code 0)" issue. The previous fix (track `fix-nested-claude-env`) correctly addressed the `CLAUDECODE` env var, but the problem persisted because of a separate Claude CLI requirement change: `--output-format=stream-json` now requires `--verbose` when used with `--print` (`-p`).
    
    Verified by running:
    ```
    $ claude -p "say hello" --output-format stream-json 2>&1
    Error: When using --print, --output-format=stream-json requires --verbose
    ```
    
    Adding `--verbose` resolves it:
    ```
    $ claude -p "say hello" --output-format stream-json --verbose 2>&1 | head -1
    {"type":"system","subtype":"hook_started",...}
    ```
  codebase_analysis: |
    ### Affected spawn methods
    
    All methods that use `-p` with `--output-format stream-json`:
    
    1. **`backend/internal/adapter/agent/spawner.go:172`** — `SpawnReviewer`: `args := []string{"-p", prompt, "--session-id", sessionID, "--output-format", "stream-json", "--dangerously-skip-permissions"}`
    2. **`backend/internal/adapter/agent/spawner.go:275`** — `SpawnDeveloper`: same pattern
    3. **`backend/internal/adapter/agent/spawner.go:392`** — `SpawnInteractive`: conditionally adds `-p` via `args = append(args, "-p", opts.Prompt)` when `opts.Prompt != ""`
    4. **`backend/internal/adapter/rest/server.go:172`** — `defaultSpawner.SpawnReviewer`: `args := []string{"-p", ..., "--output-format", "stream-json"}`
    
    ### Secondary issue: CLAUDE_CODE_ENTRYPOINT
    
    `CleanClaudeEnv()` only strips `CLAUDECODE=` but the parent also sets `CLAUDE_CODE_ENTRYPOINT=cli`. While this doesn't currently cause the nested session error, it should be stripped for safety to prevent future Claude CLI changes from breaking spawning again.
  acceptance_criteria:
    - All spawner `args` that use `-p` with `--output-format stream-json` include `--verbose`
    - `CleanClaudeEnv()` also strips `CLAUDE_CODE_ENTRYPOINT` env var
    - Agent spawning produces stream-json output when running inside a Claude Code session
    - `make test` passes
  out_of_scope: |
    - Changing the output format (stream-json is required for the parsing pipeline)
    - Interactive mode without `-p` (works fine without `--verbose`)
  technical_notes: |
    ### The fix
    
    1. Add `"--verbose"` to every `args` slice that includes `"--output-format", "stream-json"` alongside `-p`:
    
    ```go
    // spawner.go — SpawnReviewer, SpawnDeveloper
    args := []string{"-p", prompt, "--session-id", sessionID, "--output-format", "stream-json", "--verbose", "--dangerously-skip-permissions"}
    
    // spawner.go — SpawnInteractive (when prompt is set, --verbose is needed)
    // Add --verbose unconditionally since stream-json benefits from it in both modes
    args := []string{"--session-id", sessionID, "--output-format", "stream-json", "--verbose", "--dangerously-skip-permissions"}
    
    // server.go — defaultSpawner.SpawnReviewer
    args := []string{"-p", ..., "--output-format", "stream-json", "--verbose"}
    ```
    
    2. Update `CleanClaudeEnv()`:
    
    ```go
    func CleanClaudeEnv() []string {
        var env []string
        for _, e := range os.Environ() {
            if strings.HasPrefix(e, "CLAUDECODE=") ||
                strings.HasPrefix(e, "CLAUDE_CODE_ENTRYPOINT=") {
                continue
            }
            env = append(env, e)
        }
        return env
    }
    ```
    
    ---
