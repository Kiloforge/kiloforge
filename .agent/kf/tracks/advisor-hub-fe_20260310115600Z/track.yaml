id: advisor-hub-fe_20260310115600Z
title: Advisor Hub — dedicated UI section for launching and viewing advisor agents
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    The backend now supports multiple advisor roles (advisor-product,
    advisor-reliability) via the SpawnInteractiveRequest API. The frontend
    AgentLauncher currently supports "architect" and "product-advisor" as role
    options in a generic "New Agent" modal, but advisors aren't surfaced as a
    distinct concept in the UI.
    
    Users want a dedicated place to "speak to an advisor agent" — a section that
    makes the advisor roles discoverable and launchable without hunting through
    a generic agent dialog.
  codebase_analysis: |
    Current frontend architecture:
    - OverviewPage.tsx: Panel-based layout with sections for Agents, Projects,
      Swarm, Tracks, Traces
    - AgentLauncher.tsx: Modal dialog with role cards (architect, product-advisor).
      Uses AgentRole type = "interactive" | "architect" | "product-advisor"
    - AgentGrid + AgentCard: Display agent cards with status, role, cost
    - Role filter chips on overview: ["developer", "reviewer", "interactive"]
    - API types: SpawnInteractiveRequest.role enum, Agent.role field
    - SSE events: agent_update, agent_removed for real-time updates
    
    Key files:
    - frontend/src/pages/OverviewPage.tsx (dashboard panels)
    - frontend/src/components/AgentLauncher.tsx (role selection + prompt)
    - frontend/src/components/AgentLauncher.module.css (modal styles)
    - frontend/src/types/api.ts (SpawnInteractiveRequest, Agent types)
    - frontend/src/App.tsx (routing, header nav, SSE handlers)
    - frontend/src/hooks/useAgents.ts (agent fetching)
  acceptance_criteria:
    - New "Advisor Hub" panel visible on OverviewPage between Agents and Projects sections
    - Panel shows advisor type cards (Product Advisor, Reliability Advisor) with descriptions
    - Each card has a "Launch" button that opens a prompt dialog and spawns the advisor
    - Recent advisor agents displayed below the type cards (filtered from agent list by advisor-* role)
    - AgentLauncher role types updated to use new advisor-product / advisor-reliability role names
    - Role filter chips on Agents section include advisor roles or a grouped "advisor" chip
    - TypeScript types updated for new role enum values
    - Advisor agents display with a distinct visual indicator (badge/icon) on AgentCard
    - Responsive layout — advisor cards stack on narrow viewports
  out_of_scope: |
    - New routes/pages for advisors (keep on overview page for now)
    - Advisor agent conversation UI changes (uses existing agent detail/WS)
    - Backend role changes (handled by advisor-skills-be track)
  technical_notes: |
    Approach:
    1. Update TypeScript types for new role enum (advisor-product, advisor-reliability)
    2. Create AdvisorHub component with advisor type cards
    3. Each card renders description + launch button
    4. Launch opens a prompt textarea modal (reuse AgentLauncher pattern but simplified)
    5. On submit, POST /api/agents/interactive with role="advisor-product" or "advisor-reliability"
    6. Below cards, show recent advisor agents filtered from useAgents hook
    7. Add advisor role to AgentCard with a visual badge/tag
    
    The panel follows existing OverviewPage section patterns:
    - <section className={appStyles.panel}>
    - panelTitle header with HelpTooltip
    - Content below
