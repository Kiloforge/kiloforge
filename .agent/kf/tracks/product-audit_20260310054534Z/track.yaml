title: Comprehensive product audit — feature inventory, gap analysis, and roadmap recommendations
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    kiloforge is a local collaboration platform that orchestrates Claude Code agents for
    automated development and review workflows. It bridges Gitea (local git forge) with
    Claude Code to enable multi-agent parallel development with full PR lifecycle automation.
    
    The product is currently at ~200 completed tracks with a mature feature set spanning:
    - CLI (20+ commands for lifecycle, agents, projects, skills, sync)
    - REST API (48 endpoints across 11 categories)
    - Real-time events (SSE with 11 event types + WebSocket for agent interaction)
    - React dashboard (6 pages, Kanban board, agent terminal, diff viewer, tracing)
    - 15 embedded skills (architect, developer, reviewer, product-advisor, etc.)
    - Work queue with dependency-aware scheduling
    - OpenTelemetry tracing across agents
    - Multi-project support with per-project settings
    
    The user believes there is no comparable product on the market, making this a
    bleeding-edge tool. This audit should identify what's working well, what needs
    polish, and what transformative features could differentiate further.
  codebase_analysis: |
    Current system inventory (key dimensions):
    
    CLI COMMANDS:
    - Lifecycle: init, up, down, destroy, status, version
    - Projects: add, projects, push, sync
    - Agents: agents, logs, stop, attach, escalated, cost
    - Orchestration: implement, pool, dashboard, serve
    - Skills: skills (update, list)
    
    REST API CATEGORIES:
    - System (health, preflight, config, status, ssh-keys)
    - Agents (list, spawn interactive, get, delete, log, stop, resume)
    - Projects (list, add, remove, push, pull, sync-status, diff, branches, metadata, setup, settings)
    - Tracks (list, generate, get detail, delete)
    - Board (get, move card, sync)
    - Queue (status, start, stop, settings)
    - Locks (list, acquire, heartbeat, release)
    - Traces (list, get detail)
    - Skills, Consent, Admin, Quota
    
    FRONTEND PAGES:
    - Overview (stats, agent grid, projects, queue panel, tracks, traces)
    - AgentHistory (filterable table of all agents)
    - AgentDetail (metadata, diff, logs, terminal)
    - ProjectPage (board tab with Kanban, project info tab, settings tab)
    - TrackDetail (spec/plan display)
    - TracePage (span timeline visualization)
    
    SERVICES (BUSINESS LOGIC):
    - AgentService, ProjectService, NativeBoardService, PRService
    - QueueService (dependency-aware scheduling), LifecycleService
    - GitSyncService, ImplementService, SkillsService, TrackService
    - CleanupService, TrackReaderImpl
    
    EMBEDDED SKILLS: kf-architect, kf-developer, kf-reviewer, kf-implement,
    kf-new-track, kf-manage, kf-setup, kf-status, kf-report, kf-product-advisor,
    kf-validate, kf-revert, kf-bulk-archive, kf-compact-archive, kf-parallel (deprecated)
  acceptance_criteria:
    - Report produced at .agent/kf/_reports/product-audit/ with structured sections
    - Feature inventory covers all 5 dimensions (CLI, API, dashboard, skills, orchestration)
    - Gap analysis identifies at least 3 categories of missing capabilities
    - Each improvement recommendation includes effort estimate (S/M/L) and impact rating (1-5)
    - New feature proposals include user story, value proposition, and rough scope
    - Recommendations are prioritized into tiers (immediate, near-term, strategic)
    - Report is self-contained and actionable — can be directly fed to /kf-architect for track generation
  out_of_scope: |
    - Implementing any of the recommendations (this track produces the report only)
    - Modifying source code, tests, or configuration
    - External competitive analysis (there are no direct competitors per user)
    - Pricing, marketing, or go-to-market strategy
  technical_notes: |
    Implementation approach:
    
    This is a research track best implemented by a product-advisor agent or an
    architect. The implementer should:
    
    1. Walk through every CLI command and assess completeness, UX, error handling
    2. Audit every API endpoint for consistency, missing CRUD operations, pagination
    3. Evaluate the dashboard for workflow completeness, missing pages/features
    4. Assess the skills system for coverage gaps and improvement areas
    5. Evaluate the orchestration pipeline (spawn → implement → review → merge)
    
    Report structure (suggested):
    - EXECUTIVE SUMMARY — Key findings and top 5 recommendations
    - FEATURE INVENTORY — Complete matrix of capabilities with maturity rating
    - GAP ANALYSIS — Missing features organized by category
    - IMPROVEMENT RECOMMENDATIONS — Enhancements to existing features
    - NEW FEATURE PROPOSALS — Net-new capabilities with user stories
    - PRIORITIZED ROADMAP — Tiered recommendations with effort/impact
    
    Areas to specifically investigate:
    - Multi-user/team support (currently single-user local)
    - Notification system (no alerts when agents complete/fail/escalate)
    - Agent observability (log search, filtering, aggregation)
    - Dashboard UX gaps (mobile responsiveness, keyboard shortcuts, bulk operations)
    - API completeness (missing pagination, filtering, sorting on list endpoints)
    - Webhook extensibility (custom webhook targets beyond Gitea)
    - Configuration management (per-project overrides, environment profiles)
    - Testing infrastructure (E2E coverage gaps, load testing)
    - Documentation (user guide, API reference, architecture docs)
    - Plugin/extension system (third-party skill loading, custom adapters)
