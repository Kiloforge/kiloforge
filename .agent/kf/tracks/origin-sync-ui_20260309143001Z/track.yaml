spec:
  summary: Add push/pull buttons and sync status display to the dashboard project views. Users can push local main to a configurable remote branch and pull upstream changes — all from the UI.
  context: "The BE track (`origin-sync-api_20260309143000Z`) exposes `POST /api/projects/{slug}/push`, `POST /api/projects/{slug}/pull`, and `GET /api/projects/{slug}/sync-status` endpoints. The frontend needs controls to trigger these operations and display sync state."
  codebase_analysis: |
    ### Existing project UI
    - `OverviewPage.tsx` — project list with slug, origin remote, track counts
    - `ProjectPage.tsx` — project detail with board and tracks
    - `useProjects.ts` — project CRUD hook
    
    ### Placement
    - **OverviewPage** — add sync status badge and push/pull action buttons per project row
    - **ProjectPage** — add sync status panel with detailed info (ahead/behind, last fetch, remote branch input)
  acceptance_criteria:
    - Each project row in OverviewPage shows sync status indicator (synced/ahead/behind/diverged)
    - ProjectPage has push/pull controls with remote branch input
    - Push button accepts target remote branch name (default: `kf/main`)
    - Pull button fetches and merges upstream (default branch: `main`)
    - Operations show loading state and success/error feedback
    - Sync status auto-refreshes after push/pull operations
    - `npm run build` succeeds
  out_of_scope: |
    - Backend API implementation (covered by BE track)
    - Conflict resolution UI (future enhancement)
    - Automatic background polling
  technical_notes: |
    ### useOriginSync hook
    ```typescript
    const { syncStatus, push, pull, loading, error } = useOriginSync(slug);
    // syncStatus = { ahead: 3, behind: 0, status: "ahead", last_fetch: "..." }
    // push({ remote_branch: "kf/main" })
    // pull({ remote_branch: "main" })
    ```
    
    ### Push UX flow
    1. User clicks "Push to Upstream"
    2. Modal/inline input for remote branch name (pre-filled with `kf/main`)
    3. Confirm → loading state → success/error toast
    4. Sync status refreshes
    
    ### Pull UX flow
    1. User clicks "Pull from Upstream"
    2. Confirm dialog (shows ahead/behind if known)
    3. Loading → success (shows commits pulled) or error (diverged — shows instructions)
    
    ### Sync status indicators
    - Green: synced (ahead=0, behind=0)
    - Yellow arrow up: ahead (local has unpushed commits)
    - Yellow arrow down: behind (upstream has new commits)
    - Red: diverged (both ahead and behind)
    - Gray: unknown (no fetch performed yet)
    
    ---
