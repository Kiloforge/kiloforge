id: agent-interrupt-be_20260312220001Z
title: "Agent turn interrupt via WebSocket and input queueing in Bridge"
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Add the ability to interrupt an agent mid-turn via a WebSocket "interrupt"
    message. Implement per-query cancellable contexts in SDKSession so interrupts
    cleanly abort the current turn. Add input queueing in Bridge so messages sent
    during an agent's turn are held and delivered when the turn completes.
  context: |
    In the Claude CLI, users can press Escape to interrupt the agent mid-thinking.
    The kiloforge dashboard has no equivalent — if the agent is mid-turn, the user
    must wait. Additionally, sending input while the agent is thinking returns
    "turn already in progress" error with no queueing.

    The user wants:
    1. An interrupt mechanism (like Ctrl+C/Escape in CLI) to stop the agent mid-turn
    2. Input queueing so messages sent during the agent's turn are delivered after
       the turn completes, rather than being rejected
  codebase_analysis: |
    **SDKSession.Query()** (`backend/internal/adapter/agent/sdk_client.go:138-164`):
    - Takes `ctx context.Context` and passes it to `relayResponse()`
    - `relayResponse()` has `case <-ctx.Done()` exit path (line 226)
    - Sets `s.querying = true` on entry, defers `s.querying = false` on exit
    - For interactive agents, ctx is `session.ctx` (session-level) — cancelling
      it would terminate the entire session

    **relayResponse()** (`sdk_client.go:171-229`):
    - Reads from `s.client.ReceiveResponse(ctx)` channel
    - On context cancel: exits immediately (no turn_end emitted)
    - Defers `s.querying = false` — so after interrupt, new queries can proceed

    **WS readLoop** (`backend/internal/adapter/ws/handler.go:144-173`):
    - Only handles `MsgInput` type currently
    - Calls `bridge.WriteInput(text)` which routes to InputHandler or Stdin

    **Bridge.WriteInput()** (`ws/session.go:210-221`):
    - Routes to InputHandler (SDK) or Stdin (legacy)
    - No queueing — if SDK returns "turn already in progress", error is sent to client

    **Message types** (`ws/message.go`):
    - No `MsgInterrupt` type exists
    - No input queue mechanism
  acceptance_criteria:
    - New WS message type "interrupt" (client → server) accepted by readLoop
    - SDKSession.Interrupt() method cancels the current turn's relay context
    - After interrupt, turn_end message is emitted with interrupted=true marker
    - After interrupt, session remains active — new queries can be sent
    - Bridge accepts input during agent's turn and queues it
    - Queued input is automatically sent when the current turn completes
    - Bridge exposes queue depth for frontend visibility
    - Only primary WS session can send interrupt (read-only observers cannot)
    - Interrupt on idle agent (no active turn) is a no-op, not an error
    - All new logic has unit tests
  out_of_scope: |
    - Frontend interrupt button UI (separate FE track)
    - Frontend input queueing UI (handled by FE track)
    - Changing the SDK client library itself
    - Multi-turn interrupt (only current turn is interrupted)
  technical_notes: |
    **Implementation approach:**

    1. **Per-query cancel context in SDKSession**
       In `Query()`, create `queryCtx, queryCancel := context.WithCancel(s.ctx)`.
       Store `queryCancel` as `s.queryCancel`. Pass `queryCtx` (not `s.ctx`) to
       `relayResponse()`. On interrupt, call `s.queryCancel()`.

    2. **SDKSession.Interrupt() method**
       ```go
       func (s *SDKSession) Interrupt() {
           s.mu.Lock()
           defer s.mu.Unlock()
           if s.querying && s.queryCancel != nil {
               s.queryCancel()
           }
       }
       ```
       This cancels `queryCtx`, which causes `relayResponse` to exit via
       `ctx.Done()`. The defer in `relayResponse` sets `querying = false`.

    3. **Emit turn_end on interrupt**
       In `relayResponse`, when exiting via `ctx.Done()`, emit a
       `turn_end` message with an `interrupted: true` field so the frontend
       knows the turn was interrupted (not completed naturally).

    4. **WS message type "interrupt"**
       Add `MsgInterrupt = "interrupt"` to message.go constants.
       In readLoop, handle "interrupt" type by calling `bridge.Interrupt()`.

    5. **Bridge.Interrupt()**
       Add `InterruptHandler func()` field to Bridge (set to SDKSession.Interrupt).
       ```go
       func (b *Bridge) Interrupt() {
           if b.InterruptHandler != nil {
               b.InterruptHandler()
           }
       }
       ```

    6. **Input queue in Bridge**
       Add `inputQueue []string` and `mu sync.Mutex` to Bridge. When
       `WriteInput()` is called and InputHandler returns "turn already in
       progress", queue the input. Add `DrainQueue()` method called from
       `relayResponse` after `s.querying = false` to send queued input.
       Expose `QueueDepth() int` for frontend visibility.
