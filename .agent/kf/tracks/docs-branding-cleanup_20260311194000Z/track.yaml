        done: false
      - text: Update docs/getting-started.md — replace "Orchestrator" with "Cortex" and "Dashboard" with "Command Deck" in section headers and prose
        done: false
      - text: Update docs/README.md — update component descriptions to use "Cortex" and "Command Deck"
        done: false
  - phase: Verification
    tasks:
