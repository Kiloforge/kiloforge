id: docs-branding-cleanup_20260311194000Z
title: Docs overhaul — remove Docker/Gitea references, apply Cortex/Command Deck branding, delete SECURITY.md
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Overhaul docs/ to reflect the current architecture (no Docker, no Gitea),
    apply Cortex/Command Deck branding, and remove SECURITY.md.
  context: |
    Docker and Gitea were completely removed from the codebase (March 11 2026,
    commits ea55e68..1bba244) but docs/ still describes them as core components.
    The product uses branded names — "Cortex" for the backend control plane and
    "Command Deck" for the web dashboard — but docs use generic terms.
    SECURITY.md references security@kiloforge.dev which isn't configured.
  codebase_analysis: |
    Current architecture (what docs should describe):
    - kf up: creates data dir, analytics prompt, saves config, starts Cortex daemon,
      installs embedded skills, opens Command Deck
    - Cortex: pure Go daemon with SQLite, REST API, SSE, WebSocket, agent spawner,
      quota tracker, scoped lock service
    - Command Deck: React dashboard served at /-/ by the Cortex
    - No Docker, no Gitea, no containers
    - Prerequisites: git + claude CLI only
    - Projects registered via `kf add <local-path>`
    
    Files needing updates:
    - docs/architecture.md — SEVERELY outdated. References "Gitea (Docker)" in
      diagram, "A self-hosted git forge running in Docker" section, Docker volumes,
      Gitea webhooks. Uses "orchestrator server" and "web dashboard" instead of
      Cortex/Command Deck.
    - docs/getting-started.md — Lists Docker + Docker Compose as prerequisites,
      has Colima section, references Gitea instance. Uses generic terms.
    - docs/README.md — Uses generic component names in descriptions.
    - SECURITY.md (root) — Delete entirely (email not configured).
    
    Files that are fine:
    - docs/why-i-built-this.md — Personal story, no component references
    - docs/kiloforge-data-formats.md — Technical spec, no component references
    - README.md (root) — Already uses Cortex/Command Deck, no Gitea references
    
    Related dead code (OUT OF SCOPE for this track — docs only):
    - backend/internal/adapter/compose/ — orphaned package
    - backend/internal/adapter/prereq/check.go — still checks for docker
    - backend/internal/adapter/config/ — stale ComposeFile/ContainerName fields
    - backend/internal/adapter/cli/errhelp.go — unused giteaNotRunningError()
  acceptance_criteria:
    - SECURITY.md is deleted from the repository root
    - docs/architecture.md reflects current architecture (Cortex daemon, SQLite, no Docker/Gitea)
    - docs/architecture.md uses "Cortex" and "Command Deck" branding
    - docs/architecture.md system diagram updated (no Gitea box, Cortex label, Command Deck label)
    - docs/getting-started.md prerequisites list git + claude only (no Docker)
    - docs/getting-started.md describes current kf up flow (no Gitea, no Docker Compose)
    - docs/getting-started.md uses Cortex/Command Deck branding
    - docs/README.md uses branded component names
    - No docs/ file references Docker, Gitea, or docker-compose as current components
  out_of_scope: |
    - Backend dead code cleanup (compose package, prereq checks, config fields) — separate track
    - Updating CLI command references (kf init → kf up) — covered by merge-init-into-up track
    - Creating a new SECURITY.md with a working email
    - Changes to root README.md (already correct)
    - Changes to source code
  technical_notes: |
    docs/architecture.md needs substantial rewrite:
    - System diagram: remove Gitea box, rename Orchestrator → Cortex, Dashboard → Command Deck
    - Components section: remove Gitea section, update Orchestrator → Cortex description,
      update Dashboard → Command Deck
    - Communication protocols table: remove Gitea rows
    - Data storage: remove Docker volumes, add SQLite as primary
    - Codebase structure: remove gitea/ adapter reference
    
    docs/getting-started.md needs moderate rewrite:
    - Prerequisites: just git + claude
    - Remove Colima section entirely
    - Initialize section: describe kf init/up flow without Docker
    - Remove Gitea references (port 4000, admin user, etc.)
    
    Use root README.md as the source of truth for current terminology.
