id: skills-submodule-be_20260312080000Z
title: "Extract embedded skills to git submodule"
type: refactor
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Replace the in-tree backend/internal/adapter/skills/embedded/ directory
    with a git submodule pointing to a dedicated kiloforge-skills repository,
    establishing a single source of truth for skill definitions.
  context: |
    Skills are currently embedded directly in the Go binary via go:embed from
    backend/internal/adapter/skills/embedded/. This means every skill edit
    requires a commit to the main kiloforge repo and a full binary rebuild.
    Moving skills to a dedicated repo as a git submodule keeps the go:embed
    mechanism intact (submodule checkout populates the same path) while
    enabling independent versioning, contribution, and reuse of skills.
  codebase_analysis: |
    Key files affected:
    - backend/internal/adapter/skills/checker.go — //go:embed embedded/* directive (line 12-13)
      and InstallAllEmbedded, ListEmbedded, hashMatches functions
    - backend/internal/adapter/skills/embedded/ — 21 skill directories, each with SKILL.md
    - Makefile — needs `git submodule update --init` before build targets
    - .github/workflows/ — CI needs checkout with submodules
    - backend/internal/adapter/cli/skills.go — CLI update command and GitHub fetcher
    - backend/internal/adapter/skills/installer.go — GitHub tarball installer
    - backend/internal/adapter/skills/github.go — GitHub release API client

    The go:embed directive reads from the local filesystem at compile time.
    A git submodule at the same path (embedded/) will populate the directory
    identically, so no Go code changes are needed for the embed itself.

    The existing GitHub release updater (kf skills update) can be pointed at
    the new skills repo by default, unifying the source.
  acceptance_criteria:
    - A .gitmodules file exists pointing backend/internal/adapter/skills/embedded/ to the kiloforge-skills repo
    - "make build" succeeds after fresh clone with submodule init
    - CI workflow checks out submodules before build/test
    - "go:embed embedded/*" continues to work unchanged
    - Default SkillsRepo config points to the new skills repo for kf skills update
    - All 21 existing skills are present in the submodule repo
    - README documents the submodule workflow for contributors
  out_of_scope: |
    - Changing the go:embed mechanism or skill format
    - Adding new skills or modifying existing skill content
    - Changing the InstallAllEmbedded runtime behavior
    - Frontend changes (none needed)
  technical_notes: |
    Approach:
    1. Create the kiloforge-skills repo (or the user provides one)
    2. Move embedded/ contents to the new repo
    3. Remove embedded/ from git tracking in main repo
    4. git submodule add <url> backend/internal/adapter/skills/embedded/
    5. Add "git submodule update --init --recursive" to Makefile before build
    6. Update CI to use actions/checkout with submodules: true
    7. Set default SkillsRepo in config to the new repo
    8. Update developer docs

    Risk: Developers who forget to init submodules will get empty embedded/
    and a build that installs zero skills. Mitigate with Makefile auto-init
    and clear error messages.
