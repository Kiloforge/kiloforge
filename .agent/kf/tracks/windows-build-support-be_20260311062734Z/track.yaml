id: windows-build-support-be_20260311062734Z
title: Add Windows build support and CI verification
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Add Windows to the build matrix (GoReleaser + CI), fix Unix-only signal
    handling with build-tagged files, and verify compilation via CI.
  context: |
    Kiloforge currently builds for darwin and linux only. The Go codebase uses
    CGO_ENABLED=0 and modernc.org/sqlite (pure Go), so cross-compilation to
    Windows is feasible. However, several files use Unix-only syscall constants
    (SIGKILL, Signal(0)) that won't compile on Windows. The CI pipeline has no
    Windows runner, so compilation issues would go undetected until release time.
    
    The user cannot test Windows builds locally (macOS dev machine). The strategy
    is to fix known issues, push a branch to trigger CI on windows-latest, and
    iterate until green.
  codebase_analysis: |
    Signal handling (blocking — won't compile on Windows):
    - backend/internal/adapter/agent/shutdown.go — ProcessAlive() uses
      Signal(0) (line 104), killProcess() uses SIGKILL (line 121),
      signalProcess() uses raw syscall.Signal. None of these work on Windows.
    - backend/internal/adapter/cli/daemon.go — stopDaemon uses SIGTERM (104)
      and SIGKILL (118) directly.
    - "backend/internal/adapter/persistence/sqlite/agent_store.go:148 — uses"
      SIGINT which IS available on Windows (os.Interrupt maps to it).
    - "backend/internal/adapter/cli/serve.go:66 — signal.NotifyContext with"
      SIGTERM+SIGINT — these work on Windows via Go's os/signal abstraction.
    
    GoReleaser (.goreleaser.yaml):
    - "goos: [darwin, linux] — missing windows"
    - "archives format: tar.gz for all — Windows conventionally uses .zip"
    
    CI (.github/workflows/ci.yml):
    - "kf-tools matrix: [ubuntu-latest, macos-latest] — no windows-latest"
    - "test/lint/deps jobs: ubuntu-only. Need at minimum a build check on Windows."
    
    Prereq hints (prereq/check.go):
    - gitHint() has "darwin" case and default (Linux). No "windows" case —
      falls through to "sudo apt install git" which is wrong for Windows.
  acceptance_criteria:
    - GOOS=windows GOARCH=amd64 go build ./cmd/kf compiles without errors
    - CI includes a windows-latest job that builds successfully
    - GoReleaser config produces Windows .zip archives for amd64 and arm64
    - Signal-dependent code uses build tags (not runtime GOOS checks)
    - No behavior change on darwin/linux — existing tests still pass
    - prereq gitHint returns a Windows-appropriate install command
  out_of_scope: |
    - Windows-specific end-to-end testing or smoke tests
    - Windows installer (MSI/NSIS) or Scoop/Chocolatey manifests
    - "Docker-related Windows support (Docker Desktop, WSL)"
    - Modifying the release workflow (release.yml) — GoReleaser picks up
      the new goos automatically
  technical_notes: |
    Approach for signal handling:
    - "Extract ProcessAlive, signalProcess, killProcess from shutdown.go into"
      process_unix.go (//go:build !windows) and process_windows.go
      (//go:build windows).
    - "Unix implementation: keep current syscall.Signal(0), SIGINT, SIGKILL."
    - "Windows implementation: ProcessAlive uses os.FindProcess + a brief"
      check (Windows FindProcess always succeeds, so use
      golang.org/x/sys/windows or tasklist/OpenProcess). signalProcess with
      SIGINT can use os.Process.Signal(os.Interrupt). killProcess uses
      os.Process.Kill() (calls TerminateProcess on Windows).
    - "daemon.go stop logic: extract into platform-specific helpers or reuse"
      the shared process helpers from shutdown.go.
    
    For CI, add a lightweight "build-windows" job that only does:
      GOOS=windows go build ./cmd/kf
    Full test suite on Windows is out of scope (some tests depend on Unix).
    
    For local verification before pushing: run
      cd backend && GOOS=windows GOARCH=amd64 go build ./cmd/kf
    to catch compilation errors.
plan:
  - phase: Platform-specific signal handling
    tasks:
      - text: "Extract ProcessAlive, signalProcess, killProcess from shutdown.go into process_unix.go (//go:build !windows) with current Unix implementation"
        done: true
      - text: "Create process_windows.go (//go:build windows) with Windows-compatible implementations: ProcessAlive via FindProcess+Signal, killProcess via Process.Kill(), signalProcess via Process.Signal(os.Interrupt) for SIGINT"
        done: true
      - text: Extract daemon.go stop/kill logic into platform helpers or reuse the shared process functions from the agent package
        done: true
      - text: Add windows case to gitHint() in prereq/check.go returning 'winget install --id Git.Git' (or equivalent)
        done: true
  - phase: Build and release config
    tasks:
      - text: Add windows to .goreleaser.yaml goos list and add format_overrides entry for windows .zip archives
        done: true
      - text: Add windows-latest to CI kf-tools matrix and add a build-windows job to ci.yml that runs GOOS=windows go build ./cmd/kf
        done: true
  - phase: Verification
    tasks:
      - text: Run GOOS=windows GOARCH=amd64 go build ./cmd/kf locally to verify cross-compilation succeeds
        done: true
      - text: Push the implementation branch to origin to trigger CI and verify the windows-latest job passes
        done: true
extra: {}