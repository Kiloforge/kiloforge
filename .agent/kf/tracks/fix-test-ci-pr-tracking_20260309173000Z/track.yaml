spec:
  summary: "Fix CI test failures related to pr-tracking.json file references. The SQLite migration (`sqlite-storage-core`) replaced all JSON flat-file stores with SQLite, but some test code still instantiates jsonfile adapters (e.g., `jsonfile.NewPRTrackingStoreAdapter`) and the `integration_test.go` has a stale `NewServer` call signature missing required parameters."
  context: "The `sqlite-storage-core` track migrated all persistence to SQLite. However, some test files still use the old jsonfile adapters. While `go test ./...` passes locally (likely due to caching or the integration test being behind a build tag), CI reports failures related to pr-tracking.json not being found."
  codebase_analysis: |
    ### Stale test references
    
    - **`backend/internal/adapter/rest/server_test.go:47`** — Creates `jsonfile.NewPRTrackingStoreAdapter(dataDir)` instead of using SQLite
    - **`backend/internal/adapter/rest/routes_test.go:68,112,142`** — Creates `jsonfile.NewPRTrackingStoreAdapter(dir)` in multiple test helpers
    - **`backend/internal/adapter/rest/integration_test.go:73`** — Calls `NewServer(cfg, reg, port)` with wrong argument count (missing `AgentStore` and `PRTrackingStore` params)
    
    ### Production code (correct)
    
    - **`backend/internal/adapter/cli/serve.go:81`** — Correctly uses `sqlite.NewPRTrackingStore(db)`
    - **`backend/internal/adapter/persistence/sqlite/pr_tracking_store.go`** — Full SQLite implementation
    - **`backend/internal/core/port/pr_tracking_store.go`** — Interface definition
    
    ### jsonfile adapter still exists
    
    The `backend/internal/adapter/persistence/jsonfile/pr_tracking_store.go` still exists with its own tests. This is fine as a fallback adapter, but REST tests should use SQLite (or an in-memory SQLite) to match production behavior.
  acceptance_criteria:
    - All REST tests use SQLite-backed stores instead of jsonfile adapters
    - `integration_test.go` has correct `NewServer` call signature
    - `go test ./...` passes locally with no cached results (`-count=1`)
    - CI tests pass (no pr-tracking.json file not found errors)
    - jsonfile adapter and its own unit tests remain intact (they test the adapter itself)
  out_of_scope: |
    - Removing the jsonfile adapter package entirely (it may serve as a fallback)
    - Modifying production code paths
  technical_notes: |
    The fix is straightforward: in REST test helpers, replace `jsonfile.NewPRTrackingStoreAdapter(dir)` with an in-memory SQLite database:
    
    ```go
    db, _ := sqlite.Open(":memory:")
    prTracker := sqlite.NewPRTrackingStore(db)
    ```
    
    For `integration_test.go`, update the `NewServer` call to include all required parameters.
    
    ---
