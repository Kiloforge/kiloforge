id: project-settings-be_20260311030001Z
title: "Project settings REST API — read and update kf config.yaml via HTTP"
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    REST API endpoints to read and update project-level settings from .agent/kf/config.yaml.
    GET returns current settings with defaults; PUT updates individual fields. Follows the
    existing project metadata API pattern.
  context: |
    The kf-project-settings track adds config.yaml schema, CLI commands, and a Go SDK reader
    (pkg/kf/config.go with Client.GetConfig()). This track exposes those settings via REST
    so the dashboard can display and modify them.

    Currently, project metadata (product.md, tech-stack.md, etc.) is served read-only via
    GET /api/projects/{slug}/metadata. Settings are different — they need both read and write.

    The existing GET/PUT /api/config pattern (for dashboard_enabled) provides the write model.
    This track combines both patterns: project-scoped path + read/write capability.
  codebase_analysis: |
    ### Existing patterns

    **Read-only project data:** GET /api/projects/{slug}/metadata
    - Handler in api_handler.go: GetProjectMetadata
    - Uses kf.NewClientFromProject(proj.ProjectDir) to read kf files
    - Returns 404 if kf not initialized

    **Read/write system config:** GET/PUT /api/config
    - Handler: GetConfig / UpdateConfig
    - ConfigResponse schema in openapi.yaml
    - PUT accepts partial updates, returns full config

    **Code generation:** openapi.yaml → make gen-api → gen.StrictServerInterface

    ### New work

    **OpenAPI schema additions:**
    - ProjectSettingsResponse: { primary_branch: string, enforce_dep_ordering: bool }
    - UpdateProjectSettingsRequest: { primary_branch?: string, enforce_dep_ordering?: bool }
    - GET /api/projects/{slug}/settings → ProjectSettingsResponse
    - PUT /api/projects/{slug}/settings → UpdateProjectSettingsRequest → ProjectSettingsResponse

    **Handler:** Uses Client.GetConfig() (from kf-project-settings track) to read,
    writes back via Client.SaveConfig() (new method, or direct YAML write).

    **pkg/kf addition needed:** Client.SaveConfig(*ProjectConfig) to write config.yaml.
    This could be added in either this track or kf-project-settings — placing it here
    since the CLI uses simple bash YAML editing while the Go SDK needs proper marshaling.
  acceptance_criteria:
    - "OpenAPI schema updated with ProjectSettingsResponse and UpdateProjectSettingsRequest schemas"
    - "GET /api/projects/{slug}/settings returns current settings with defaults for missing fields"
    - "PUT /api/projects/{slug}/settings accepts partial updates and returns full updated settings"
    - "Returns 404 if project not found or kf not initialized"
    - "pkg/kf Client.SaveConfig(*ProjectConfig) writes config.yaml preserving header comments"
    - "SSE event emitted on settings change (project-settings-updated) for real-time UI sync"
    - "make gen-api succeeds and generated code is committed"
    - "Unit tests for handler: get defaults, get with overrides, partial update, 404 cases"
  out_of_scope: |
    - CLI config commands (handled by kf-project-settings track)
    - Frontend UI (handled by project-settings-fe track)
    - Authentication/authorization for settings changes
    - Validation beyond type checking (e.g., primary_branch must be a valid git branch)
  technical_notes: |
    ### OpenAPI additions

    ```yaml
    /api/projects/{slug}/settings:
      get:
        operationId: getProjectSettings
        parameters:
          - $ref: '#/components/parameters/ProjectSlug'
        responses:
          '200':
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ProjectSettingsResponse'
          '404':
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      put:
        operationId: updateProjectSettings
        parameters:
          - $ref: '#/components/parameters/ProjectSlug'
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProjectSettingsRequest'
        responses:
          '200':
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ProjectSettingsResponse'
          '404':
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'

    ProjectSettingsResponse:
      type: object
      required: [primary_branch, enforce_dep_ordering]
      properties:
        primary_branch:
          type: string
        enforce_dep_ordering:
          type: boolean

    UpdateProjectSettingsRequest:
      type: object
      properties:
        primary_branch:
          type: string
        enforce_dep_ordering:
          type: boolean
    ```

    ### Handler implementation

    ```go
    func (h *APIHandler) GetProjectSettings(_ context.Context, req gen.GetProjectSettingsRequestObject) (gen.GetProjectSettingsResponseObject, error) {
        proj, ok := h.findProject(req.Slug)
        if !ok {
            return gen.GetProjectSettings404JSONResponse{Error: "project not found"}, nil
        }
        kfClient := kf.NewClientFromProject(proj.ProjectDir)
        cfg, err := kfClient.GetConfig()
        if err != nil {
            return gen.GetProjectSettings404JSONResponse{Error: "settings not available"}, nil
        }
        return gen.GetProjectSettings200JSONResponse{
            PrimaryBranch:      cfg.PrimaryBranch,
            EnforceDepOrdering: cfg.EnforceDepOrdering,
        }, nil
    }
    ```

    ### SaveConfig

    ```go
    func (c *Client) SaveConfig(cfg *ProjectConfig) error {
        data, err := yaml.Marshal(cfg)
        if err != nil {
            return fmt.Errorf("marshal config: %w", err)
        }
        header := "# Kiloforge Project Configuration\n# ...\n\n"
        return os.WriteFile(c.configFile(), append([]byte(header), data...), 0644)
    }
    ```
