  acceptance_criteria:
    - A "Become a Kiloforger" section appears between the install section and the skills catalog CTA
    - Three pill-toggle mode selectors are displayed — "Single-Threaded", "Multi-Threaded", "Multi-Processor"
    - Selecting a mode swaps the displayed content inline (no overlay/modal)
    - "Single-Threaded" mode shows a visual flow diagram (Setup → Architect → Status (optional, dashed/dimmed) → Develop) with a visual shortcut path from Architect directly to Develop, followed by philosophical guidance content covering confidence building, bottleneck avoidance, implementation drift acceptance, and decision-layer focus
    - The flow makes clear that Status is optional — users can take the architect's track output and go straight to /kf-developer
    - "Multi-Threaded" and "Multi-Processor" modes show placeholder content
    - Content transitions are animated (fade or slide via framer-motion)
    - Mode selector follows existing pill-toggle styling pattern
    - Responsive on mobile and desktop
    - Follows existing site design system (glass-panel, emerald/cyan accents, Framer Motion animations)
    - Content is well-structured with clear section headings and readable prose
