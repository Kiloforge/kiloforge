  technical_notes: |
    Target repo: /Users/benbaldivia/dev-2/kiloforge_site/
    Target file: src/app/skills/page.tsx

    Implementation approach:
    - Add a mode state: useState<"single" | "multi" | "processor">("single")
    - Place the "Become a Kiloforger" section after the install block
    - Mode selector row uses the same pill-toggle pattern as platform tabs
    - Content area uses AnimatePresence with key={mode} for animated transitions
    - Replace the existing vertical step cards with a horizontal flow diagram
      showing: Setup → Architect → [Status (optional)] → Develop
    - The flow should be visual — connected nodes/boxes with arrows
    - Status node is styled differently (dashed border, dimmed, "(optional)" label)
    - A bypass arrow/path goes from Architect directly to Develop, skipping Status
    - This communicates: once the architect produces a track, you can hand it
      straight to /kf-developer without checking /kf-status first
    - On mobile, the flow can stack vertically but should still show the
      optional bypass
    - Remove the standalone "How it Works" section — it's now inside
      single-threaded mode

    Single-threaded content structure (below the flow diagram):
    1. "Building Confidence" — why you start here, what you're learning
    2. "Don't Become the Bottleneck" — cost analysis, implementation drift reality
    3. "Work at the Decision Layer" — where your time creates the most value
    4. "When Things Drift" — structural responses, audits, track planning

    Each content section should be a glass-panel card with a heading and
    1-2 paragraphs of well-crafted prose. Keep the writing direct and
    practical — this is guidance, not marketing copy.
