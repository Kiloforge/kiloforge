  acceptance_criteria:
    - A "Guidance" button appears above or near the "How it Works" section header
    - Clicking the button opens a full-screen overlay with backdrop blur
    - Overlay has three tabbed modes — "Single-Threaded", "Multithreaded", "Core"
    - "Single-Threaded" tab displays the full mindset philosophy content covering confidence building, bottleneck avoidance, implementation drift acceptance, and decision-layer focus
    - "Multithreaded" and "Core" tabs show placeholder content indicating these are coming
    - Overlay closes via X button, Escape key, or backdrop click
    - Responsive layout — full-screen on mobile, centered max-width panel on desktop
    - Follows existing site design system (glass-panel, emerald/cyan accents, Framer Motion animations, pill-toggle tab pattern)
    - Content is well-structured with clear section headings and readable prose
  out_of_scope: |
    - Multithreaded mode content (separate conversation)
    - Core mode content (separate conversation)
    - Changes to the kiloforge main repo
    - Backend changes
    - Changes to the install section or skill catalog (handled by multi-agent-skills-site track)
  technical_notes: |
    Target repo: /Users/benbaldivia/dev-2/kiloforge_site/
    Target file: src/app/skills/page.tsx

    Implementation approach:
    - Create a GuidanceOverlay client component (can be inline in the page file
      or extracted — follow existing pattern of inline components)
    - Use AnimatePresence + motion.div with backdrop-blur-xl for the overlay
    - Tab system: useState for activeTab, pill-toggle styled tabs matching the
      platform selector pattern
    - Content organized as React elements within the component, not fetched
    - Close handlers: onClick backdrop, X button, onKeyDown Escape
    - Focus management: auto-focus close button on open, trap focus within overlay
    - Scroll: overlay content scrolls independently (overflow-y-auto)
    - Z-index: z-[60] to sit above the fixed nav (z-50)

    The "Guidance" button should feel natural near the workflow section —
    consider a subtle button with a BookOpen or Lightbulb icon that says
    "Guidance" or "How to think about this".

    Single-threaded content structure:
    1. "Building Confidence" — why you start here, what you're learning
    2. "Don't Become the Bottleneck" — cost analysis, implementation drift reality
    3. "Work at the Decision Layer" — where your time creates the most value
    4. "When Things Drift" — structural responses, audits, track planning
