spec:
  summary: >
    Add a "Guidance" button above the "How it Works" workflow steps on the
    kiloforge.dev skills page. Clicking it opens a full-screen overlay with
    three tabbed "modes" — Single-Threaded (fully written), Multithreaded
    (placeholder), and Core (placeholder). The single-threaded content presents
    the philosophy of building agent confidence, avoiding bottleneck behavior,
    accepting implementation drift, and focusing time at the decision-making
    layer rather than micromanaging every commit.
  context: |
    The skills page currently shows a 4-step workflow (Setup -> Architect ->
    Status -> Develop) but provides no guidance on the *mindset* users should
    adopt when working with AI agents at scale. Users need coaching on how to
    effectively utilize the skills — starting single-threaded to build
    confidence, then scaling up.

    The user wants three "levels" of guidance presented as overlay tabs:
    1. Single-Threaded — acclimate to the process, build confidence in agent
       output reliability, understand that the cost of remediation is lower than
       the cost of becoming a bottleneck
    2. Multithreaded — content to be written in a separate conversation
    3. Core — content to be written in a separate conversation

    Key philosophical points for single-threaded mode:
    - Goal is acclimation and building confidence that architect specs produce
      reliable implementations
    - Free yourself from being the bottleneck — don't double-check every agent's
      work or demand absolute perfection
    - Implementation drift happens even on human teams (policy changes,
      architectural shifts, mistakes) — we call it "legacy" code
    - The belief: mistakes are sufficiently low that remediation cost < bottleneck
      cost
    - At the rate you can instantiate new implementations, ensuring perfect
      alignment for a fraction of the lifecycle is counterproductive
    - You should NOT ship every commit to trunk — the rate is potentially far
      higher than trunk-based review can handle
    - Your time is too valuable for the large end of the funnel — focus on
      deciding meaningful changes that deliver customer value
    - If things drift: make structural changes to reduce interdependency, plan
      tracks with the architect, add project guidelines, run large-scale audits
      that produce actionable items for new tracks
    - Kiloforge is not designed to be the best single-agent chat — use the CLI
      for that. It is designed to let you set agent work aside and focus on
      high-level decisions that presumably only you know about
