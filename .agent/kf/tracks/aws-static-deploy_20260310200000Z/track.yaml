id: aws-static-deploy_20260310200000Z
title: "Migrate kiloforge.dev from Vercel to AWS S3 + CloudFront"
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Convert the kiloforge_site Next.js app to static export, deploy to S3,
    update CloudFront origin from Vercel to S3, and add GitHub Actions CI/CD.
    Eliminates Vercel dependency entirely.
  context: |
    The kiloforge.dev marketing site is currently deployed via Vercel with AWS
    CloudFront as a CDN proxy in front (Route 53 → CloudFront → Vercel). This
    was set up to bypass Vercel's custom domain restrictions on free/team plans.

    The site is a simple 2-page Next.js 16 app (landing page + license page)
    with no dynamic/server-side features — pure static content with client-side
    interactivity (Framer Motion animations, mobile menu). It's an ideal
    candidate for static export.

    Moving to S3 + CloudFront directly removes the Vercel middleman, giving
    full control over hosting and eliminating any risk of Vercel policy changes
    affecting availability.

    **Target repo:** `../../kiloforge_site` (GitHub: Goblinlordx/kiloforge_site)
  codebase_analysis: |
    Key findings from the kiloforge_site repo:

    - **Framework:** Next.js 16.1.6, React 19, TypeScript 5, Tailwind CSS 4
    - **Pages:** 2 routes — `/` (client component) and `/license` (server component, static content)
    - **Config:** `next.config.ts` is minimal (empty config object) — easy to add `output: 'export'`
    - **Fonts:** Uses `next/font/google` (Geist, Geist_Mono) — downloads at build time, works with static export
    - **Analytics:** GoatCounter via `next/script` with `NEXT_PUBLIC_` env vars — replaced at build time, compatible
    - **Assets:** Static images in `public/` (logo, OG image, SVGs)
    - **No API routes, no server actions, no middleware** — pure presentational site
    - **Existing AWS infra:** CloudFront distribution, Route 53 hosted zone, ACM cert in us-east-1
    - **No CI/CD:** Currently relies on Vercel's GitHub auto-deploy

    Static export compatibility: CONFIRMED — no SSR dependencies, no dynamic routes,
    no server-only features. `output: 'export'` should work without code changes.
  acceptance_criteria:
    - "Site builds successfully with `next build` using `output: 'export'`"
    - "Static files deploy to S3 bucket with correct content types"
    - "CloudFront serves the site from S3 origin (not Vercel)"
    - "https://kiloforge.dev loads correctly with all assets, fonts, and styles"
    - "GitHub Actions pipeline: push to main triggers build → S3 upload → CloudFront invalidation"
    - "Vercel project disconnected and deleted"
    - "docs/deployment.md updated to reflect new S3-based architecture"
  out_of_scope: |
    - Changing the site content or design
    - Adding new pages or features
    - Modifying Route 53 DNS records (they already point to CloudFront)
    - Setting up staging/preview environments
    - WAF or advanced CloudFront features
  technical_notes: |
    **Architecture (before):**
    User → Route 53 → CloudFront → Vercel (.vercel.app)

    **Architecture (after):**
    User → Route 53 → CloudFront → S3 (static website hosting)

    **Approach:**

    1. Add `output: 'export'` to `next.config.ts` and verify the build produces
       a static `out/` directory with all pages and assets.

    2. Create an S3 bucket (e.g., `kiloforge-site-prod`) with:
       - Static website hosting DISABLED (CloudFront uses OAC, not public S3)
       - Block all public access ON
       - CloudFront Origin Access Control (OAC) for secure S3 access

    3. Update the existing CloudFront distribution:
       - Change origin from Vercel URL to the S3 bucket
       - Add OAC policy for the S3 origin
       - Update cache behaviors:
         - Default (`*`): CachingOptimized (static site, all content is hashed/immutable)
         - Remove the separate `/_next/*` behavior (no longer needed — everything is static)
       - Remove the custom `VercelProxyPolicy` origin request policy (no longer needed)

    4. Create an IAM user (`kiloforge-site-deploy`) with:
       - `s3:PutObject`, `s3:DeleteObject`, `s3:ListBucket` on the S3 bucket
       - `cloudfront:CreateInvalidation` on the distribution
       - Store credentials as GitHub repository secrets

    5. Add GitHub Actions workflow (`.github/workflows/deploy.yml`):
       - Trigger: push to `main`
       - Steps: checkout → install → build → sync to S3 → invalidate CloudFront

    6. Update `docs/deployment.md` with the new architecture.

    **IMPORTANT: Manual AWS steps required.** Several tasks involve AWS console
    actions (S3 bucket creation, CloudFront configuration, IAM setup). The
    developer agent should present clear step-by-step instructions and wait for
    the user to confirm completion of each manual step before proceeding.

    **Rollback plan:** If something goes wrong, the CloudFront origin can be
    switched back to the Vercel URL immediately — Vercel deployment stays live
    until explicitly deleted in the final step.
