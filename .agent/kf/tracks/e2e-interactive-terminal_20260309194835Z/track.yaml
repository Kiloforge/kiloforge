spec:
  summary: Comprehensive E2E tests for the interactive agent terminal: spawning interactive agents, WebSocket connection, sending input, receiving output, buffer replay on reconnect, and multi-client behavior, covering happy path, edge cases, and expected failures.
  context: |
    Kiloforge supports interactive agents that communicate via WebSocket. When a user spawns an interactive agent, the dashboard opens a terminal UI that connects over WebSocket to the backend. The WebSocket protocol uses typed messages: `input` (client to server — stdin), `output` (server to client — stdout), `status` (agent status changes), and `error` (error messages). The mock agent in interactive mode reads stdin and echoes content_block_delta events to stdout.
    
    The terminal UI must handle reconnection gracefully: on reconnect, the server replays the output buffer (up to 500 lines) so the user sees previous output. Multiple browser tabs can observe the same terminal, but only the primary client can send input.
  codebase_analysis: |
    ### WebSocket handler (`backend/internal/adapter/rest/`)
    
    The WebSocket endpoint at `/api/agents/{agentId}/ws` upgrades to WebSocket and:
    - Streams agent stdout as `output` messages
    - Forwards `input` messages to agent stdin
    - Sends `status` messages on agent state changes
    - Sends `error` messages for agent errors
    - Maintains a circular buffer of recent output (500 lines) for replay on reconnect
    
    ### Frontend terminal component
    
    The React terminal component connects to the WebSocket endpoint, renders output in a terminal-like UI, and captures keyboard input to send as `input` messages.
    
    ### Mock agent interactive mode
    
    When `MOCK_AGENT_INTERACTIVE=true`, the mock agent:
    1. Emits an `init` event
    2. Reads lines from stdin
    3. For each line, emits a `content_block_delta` echoing the input
    4. On EOF or empty line, emits `result` and exits
  acceptance_criteria:
    - Spawn interactive agent — terminal UI appears
    - Send text input via terminal — mock agent receives stdin
    - Mock agent output appears in terminal in real-time
    - Terminal shows agent status changes (running -> completed)
    - Reconnect to terminal — output buffer replayed (up to 500 lines)
    - Multiple browser tabs can observe same terminal
    - Only primary client can send input
    - Terminal displays error messages from mock agent
    - Edge cases: rapid input, very long output lines, Unicode/special characters
    - Failure cases: WebSocket disconnect during output, agent crash mid-session, connect to nonexistent agent
  out_of_scope: |
    - Non-interactive agent spawning and lifecycle (covered in `e2e-agent-lifecycle_20260309194834Z`)
    - SSE event transport testing (covered in `e2e-sse-realtime_20260309194837Z`)
    - Agent history and filtering (covered in `e2e-agent-lifecycle_20260309194834Z`)
  technical_notes: |
    ### Test file organization
    
    ```
    e2e/
      interactive-terminal/
        basic_test.go          — spawn interactive, terminal renders, basic I/O
        stream_test.go         — stream-JSON parsing, multi-line output, non-text events
        reconnect_test.go      — disconnect/reconnect, buffer replay, status sync
        multiclient_test.go    — second tab observes, primary stdin control
        edge_cases_test.go     — rapid input, long output, Unicode, agent crash
    ```
    
    ### WebSocket message types
    
    ```json
    // Client -> Server (input)
    {"type": "input", "data": "user typed text\n"}
    
    // Server -> Client (output)
    {"type": "output", "data": "Hello from mock agent"}
    
    // Server -> Client (status)
    {"type": "status", "status": "running"}
    
    // Server -> Client (error)
    {"type": "error", "message": "agent process exited with code 1"}
    ```
    
    ### Multi-client testing with Playwright
    
    Use Playwright's `browser.newContext()` to create separate browser contexts simulating multiple clients. The first connection is the primary client (can send input), subsequent connections are observers (receive output only).
    
    ### Buffer replay testing
    
    1. Spawn interactive agent
    2. Send several inputs, accumulate output
    3. Close WebSocket connection
    4. Reconnect — verify all previous output lines are replayed in order
    5. Verify new output continues streaming after replay
    
    ### Developer agent instructions
    
    When building this track, use the Playwright MCP skill to verify E2E tests work in the browser. Run tests in headed mode during development for visual verification.
    
    ---
plan:
  - phase: Basic Terminal Tests
    tasks:
      - text: Spawn interactive agent — click spawn with interactive role, verify terminal UI component appears with a connected indicator
        done: true
      - text: Terminal renders output — verify mock agent's init event and initial output text appear in the terminal display area
        done: true
      - text: Basic input/output — type text in terminal input, press enter, verify mock agent echoes it back as output in the terminal
        done: true
  - phase: Stream-JSON Parsing Tests
    tasks:
      - text: Text extraction from events — verify that `content_block_delta` text_delta content is correctly extracted and displayed as plain text in the terminal
        done: true
      - text: Multi-line output — send input that triggers multi-line mock agent response, verify all lines render in correct order with line breaks
        done: true
      - text: Non-text events ignored — verify that `init` and `result` events do not produce spurious text in the terminal output area (status shown separately)
        done: true
  - phase: Reconnection Tests
    tasks:
      - text: Disconnect and reconnect — close the WebSocket connection (navigate away and back, or programmatic close), verify terminal reconnects and shows connected indicator
        done: true
      - text: Buffer replay on reconnect — accumulate output from several inputs, disconnect, reconnect, verify all previous output lines (up to 500) are replayed in order
        done: true
      - text: Status sync on reconnect — disconnect while agent is running, reconnect, verify current agent status is correctly displayed (running/completed/failed)
        done: true
  - phase: Multi-Client Tests
    tasks:
      - text: Second tab observes output — open a second browser context connected to the same agent, verify it receives the same output stream
        done: true
      - text: Primary client stdin control — verify the first-connected client can type and send input successfully
        done: true
      - text: Second tab cannot send input — verify that the second browser context's input is rejected or input field is disabled/read-only
        done: true
  - phase: Edge and Failure Cases
    tasks:
      - text: Rapid input — send many input lines in quick succession, verify all are processed and echoed back without loss or duplication
        done: true
      - text: Long output lines — trigger mock agent to emit very long lines (>1000 chars), verify terminal handles them without breaking layout
        done: true
      - text: Unicode and special characters — send Unicode text (emoji, CJK, RTL), verify terminal displays them correctly without corruption
        done: true
      - text: Agent crash mid-session — configure mock to crash after N events (`MOCK_AGENT_FAIL_AFTER`), verify terminal shows error/status change and handles gracefully
        done: true
      - text: Connect to nonexistent agent — attempt WebSocket connection to a fake agent ID, verify appropriate error message is displayed
        done: true
