id: tour-spotlight-cutout_20260310090000Z
title: "Add true spotlight cutout to tour overlay"
type: bug
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Fix the tour overlay so the spotlight creates a true transparent cutout
    over the highlighted element instead of darkening everything including
    the spotlight area.
  context: |
    The tour overlay uses a backdrop div with background rgba(0,0,0,0.75) AND
    a spotlight div with box-shadow 0 0 0 9999px rgba(0,0,0,0.75). This causes
    double-darkening outside the spotlight and the spotlight area itself still
    shows through the backdrop's background — it's not a true cutout.

    Users expect the highlighted element to be fully visible (no tint) with
    the rest of the page dimmed, which is the standard spotlight tour pattern.
  codebase_analysis: |
    Key files:
    - frontend/src/components/tour/TourOverlay.tsx — Tour component
    - frontend/src/components/tour/TourOverlay.module.css — Tour styles

    Current CSS structure:
    - .backdrop: position fixed, inset 0, background rgba(0,0,0,0.75), z-index 9998
    - .spotlight: position absolute, box-shadow 0 0 0 9999px rgba(0,0,0,0.75)
      plus a green glow border, z-index 9999

    The spotlight box-shadow technique is correct for creating a cutout — the
    9999px spread creates a dark overlay everywhere except the element itself.
    The problem is the backdrop ALSO has its own background, so:
    1. Outside spotlight: backdrop bg + spotlight shadow = double dark (~94% opacity)
    2. Inside spotlight: backdrop bg still visible = not transparent

    Fix: Remove background from .backdrop (or make it transparent). The spotlight's
    box-shadow already covers the entire viewport. When no spotlight target exists
    (targetRect is null), the spotlight div is not rendered — need to ensure the
    backdrop still darkens in that fallback case (add a conditional class or
    keep background only when no spotlight is present).

    The .overlay class (used for welcome/centered dialogs) is separate and
    correctly uses its own background — no changes needed there.
  acceptance_criteria:
    - Spotlight area is fully transparent (no dark tint) — highlighted element clearly visible
    - Rest of page is dimmed with consistent opacity (no double-darkening)
    - Welcome dialog overlay still works correctly (centered, dark background)
    - Green glow border around spotlight is preserved
    - Tour tooltip positioning unchanged
    - E2E tests pass
  out_of_scope: |
    - Tour step content or ordering changes
    - Tour tooltip styling changes
    - Backend changes
    - Welcome/pending dialog styling
  technical_notes: |
    Simplest approach: remove `background` from .backdrop CSS class. The
    spotlight's `box-shadow: 0 0 0 9999px rgba(0,0,0,0.75)` already creates
    the full dark overlay with a transparent hole.

    Edge case: when targetRect is null (target not found), no spotlight div
    renders, so backdrop would be invisible. Options:
    1. Add backdrop background conditionally in TSX when no spotlight exists
    2. Always render spotlight — when no target, position it offscreen
    3. Add a .backdrop.noTarget variant with background

    Option 1 is cleanest — pass a className or inline style on the backdrop
    div conditionally based on whether spotlightStyle exists.
