id: server-host-port-config_20260312230100Z
title: Add --host/--port flags to kf up and detect port conflicts
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Add OrchestratorHost config field with --host/--port CLI flags on `kf up`,
    bind to host:port instead of :port, and detect EADDRINUSE with an
    actionable error message suggesting an alternative port.
  context: |
    The orchestrator currently binds to 0.0.0.0:{port} (no host component in
    the Addr field). Port 4001 is hardcoded as the default. If the port is
    already in use, the daemon fails silently — the error goes to
    orchestrator.log and the user sees a generic "start Cortex" warning.
    There is no --port or --host CLI flag; the only way to change the port
    is via KF_ORCH_PORT env var or editing config.json manually.
  codebase_analysis: |
    **Config layer** (adapter/config/):
    - Config struct (config.go:14-34) has OrchestratorPort but no host field
    - DefaultsAdapter (defaults.go:18) sets port 4001
    - EnvAdapter (env_adapter.go:18-22) reads KF_ORCH_PORT
    - FlagsAdapter (flags_adapter.go:6) has WithOrchestratorPort() but no host
    - Validate() (config.go:110-119) checks port range 1-65535
    - Merger (merger.go) overlays non-zero fields — 0 means "not set"
    
    **CLI layer** (adapter/cli/):
    - root.go:52-54 registers --no-browser and --data-dir, NO --port/--host
    - up.go:37-143 — runUp builds config with FlagsAdapter, checks firstRun,
      spawns daemon via startDaemon(). Prints hardcoded "http://localhost:{port}/"
    - daemon.go:47 — spawns `kf serve` with no args; config resolved inside serve
    - serve.go:166 — NewServer receives cfg.OrchestratorPort as the port arg
    
    **Server layer** (adapter/rest/server.go):
    - Line 328: `Addr: fmt.Sprintf(":%d", s.port)` — binds 0.0.0.0, no host
    - Line 339: ListenAndServe() — no pre-check, no retry, no friendly error
    - Server struct has `port int` field but no host field
    - NewServer() signature takes port as a positional int arg
    
    **Dashboard URL** (up.go:96,123,136):
    - All use `fmt.Sprintf("http://localhost:%d/", cfg.OrchestratorPort)`
    - Should use configured host instead of hardcoded "localhost"
  acceptance_criteria:
    - Config struct has OrchestratorHost string field (default "127.0.0.1")
    - KF_ORCH_HOST env var sets the host
    - config.json orchestrator_host field is read/written
    - kf up --port PORT sets OrchestratorPort via FlagsAdapter
    - kf up --host HOST sets OrchestratorHost via FlagsAdapter
    - Server binds to host:port, not just :port
    - Default binding is 127.0.0.1:4001 (localhost-only, secure default)
    - Port conflict detected before daemon spawn with actionable error message
    - Error message suggests next available port or --port flag
    - Dashboard URLs use configured host
    - Existing KF_ORCH_PORT env var continues to work
    - Config validation rejects empty host
  out_of_scope: |
    - Auto-finding an available port (just suggest --port)
    - TLS/HTTPS support
    - Frontend changes
    - Changing the WebSocket listener (shares the same HTTP server)
  technical_notes: |
    **Config changes:**
    - Add `OrchestratorHost string json:"orchestrator_host,omitempty"` to Config
    - Add `WithOrchestratorHost(v string) FlagOption` to flags_adapter.go
    - Add `KF_ORCH_HOST` to EnvAdapter
    - Default host in DefaultsAdapter: "127.0.0.1"
    - Validate: reject empty host (but allow "0.0.0.0" for explicit wildcard)
    
    **CLI changes (up.go + root.go):**
    - Register `--port` and `--host` as persistent flags on rootCmd (or on upCmd)
    - Wire into FlagsAdapter in runUp()
    - Update dashboard URL formatting to use cfg.OrchestratorHost
    
    **Port conflict detection (up.go, before startDaemon):**
    ```go
    addr := fmt.Sprintf("%s:%d", cfg.OrchestratorHost, cfg.OrchestratorPort)
    ln, err := net.Listen("tcp", addr)
    if err != nil {
        return fmt.Errorf("port %d is already in use on %s\n\n"+
            "  Try: kf up --port %d\n"+
            "  Or:  KF_ORCH_PORT=%d kf up",
            cfg.OrchestratorPort, cfg.OrchestratorHost,
            cfg.OrchestratorPort+1, cfg.OrchestratorPort+1)
    }
    ln.Close()
    ```
    
    **Server changes (rest/server.go):**
    - Add `host string` to Server struct
    - Update NewServer to accept host (or take full config)
    - Change Addr to `fmt.Sprintf("%s:%d", s.host, s.port)`
    
    **Note on 0.0.0.0 vs 127.0.0.1:**
    The current server binds to 0.0.0.0 (`:4001` with no host). Changing the
    default to 127.0.0.1 is a behavioral change — it restricts access to
    localhost only. This is more secure and correct for a local dev tool.
    Users who need remote access can use `--host 0.0.0.0`.
