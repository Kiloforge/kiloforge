      - text: "Update startup log message to include dashboard enabled/disabled state"
        done: false
  - phase: "Shutdown and observability"
    tasks:
      - text: "Log graceful shutdown progress to stderr in addition to log file"
        done: false
      - text: "Add updated_at timestamp to SSE agent_update events"
        done: false
