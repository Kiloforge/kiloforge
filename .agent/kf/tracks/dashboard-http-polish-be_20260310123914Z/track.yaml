        done: false
  - phase: "Security headers and logging"
    tasks:
      - text: "Add security headers middleware (X-Content-Type-Options, X-Frame-Options) to all responses"
        done: false
      - text: "Add debug logging to SPA fallback when serving index.html for non-asset paths"
