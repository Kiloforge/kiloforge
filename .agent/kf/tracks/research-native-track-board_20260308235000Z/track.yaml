spec:
  summary: Design a kiloforge-native track board that replaces Gitea's project board as the source of truth for track lifecycle. The dashboard provides a kanban UI where column transitions directly drive agent lifecycle — same board-driven model, but owned by kiloforge instead of Gitea.
  acceptance_criteria:
    - Define the track board state machine (states, transitions, actions)
    - Recommend board state storage approach
    - Design API endpoints (schema-first)
    - Recommend kanban UI library
    - Identify what Gitea board code to remove vs keep
    - Define migration path
    - Produce decision document
  out_of_scope: |
    - Actual implementation (separate track)
    - Removing Gitea entirely
    - Changing PR/review workflow
    
    ---
  research_questions: |
    1. Board state machine — states, valid transitions, agent lifecycle actions per transition
    2. Board state storage — JSON per project vs SQLite vs tracks.md augmentation
    3. API design — endpoints for board operations (schema-first)
    4. Dashboard kanban UI — drag-and-drop library selection
    5. Gitea integration simplification — what board code to remove vs keep
    6. Migration path — from Gitea board to native board
    7. Multi-project boards — per-project vs global view
    8. Real-time updates — SSE event types for board state changes
