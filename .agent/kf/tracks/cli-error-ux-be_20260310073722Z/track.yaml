id: cli-error-ux-be_20260310073722Z
title: CLI error UX — actionable messages and prerequisite guidance
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    Research identified that 15+ CLI commands return the same terse error
    "not initialized — run 'kf init' first" without additional context about
    what initialization means or what prerequisites are needed. Other pain
    points include:
    - No distinction between "Gitea not running" (run kf up) vs "never
      initialized" (run kf init)
    - Missing prerequisite checks give confusing downstream errors
    - Empty state outputs are minimal ("No agents tracked.")
    - Error messages don't explain WHY something failed or WHAT to do next
    
    The goal: every error message should answer three questions:
    1. What happened?
    2. Why did it happen?
    3. What should I do next?
  codebase_analysis: |
    Current error patterns in CLI commands:
    - config.Resolve() failure → "not initialized — run 'kf init' first"
      Used by: up, down, status, add, create, projects, implement, agents,
      cost, logs, stop, attach, pool, escalated, push, sync, dashboard
    - Gitea connectivity → "Gitea is not running" with kf up suggestion
    - Track validation → helpful with --list suggestion
    - Remote URL validation → helpful with example
    - Project already registered → helpful with path/URL info
    
    Key files:
    - backend/internal/adapter/cli/*.go (all command files)
    - backend/internal/adapter/prereq/ (prerequisite checking system)
    - backend/internal/adapter/config/resolve.go (config resolution)
    
    The prereq package already has Docker, Git, and Claude CLI checks.
    These run during init but aren't surfaced by other commands when
    relevant (e.g., "docker not found" when running kf up).
  acceptance_criteria:
    - "Not initialized" error includes brief explanation of what kf init does
    - "Gitea not running" vs "never initialized" are distinct error messages
    - Empty state CLI outputs include next-step suggestions
    - All error messages follow the What/Why/Next pattern
    - Prerequisite failures (Docker, Git) surface actionable resolution steps
    - Error formatting is consistent (indented details, highlighted commands)
    - No functional behavior changes — only message text improvements
  out_of_scope: |
    - Adding new CLI commands or flags
    - Changing exit codes or error types
    - Dashboard/frontend changes (that's the onboarding-ux-fe track)
    - Adding interactive prompts to existing commands
    - Changing the config resolution logic itself
  technical_notes: |
    Implementation approach:
    1. Create a shared errfmt package or helpers in the cli package for
       consistent error formatting with What/Why/Next sections
    2. Update config.Resolve() callers to provide richer context
    3. Distinguish "config missing" (never init'd) from "Gitea down" (need kf up)
    4. Update empty-state outputs in agents, projects, cost, escalated commands
    5. Add prerequisite context to kf up errors (e.g., "Docker not found")
    6. Keep messages concise but helpful — 2-3 lines max per error
plan:
  - phase: Error Formatting Foundation
    tasks:
      - text: Create cli/errhelp.go with helper functions for consistent What/Why/Next error formatting
        done: true
      - text: Add distinct error messages for 'never initialized' vs 'Gitea not running' states
        done: true
  - phase: Command Error Improvements
    tasks:
      - text: Update up.go, down.go, status.go with enriched initialization error messages
        done: true
      - text: Update add.go, create.go, projects.go with actionable error context
        done: true
      - text: Update agents.go, cost.go, logs.go, stop.go, attach.go with improved empty states and errors
        done: true
      - text: Update implement.go, pool.go, escalated.go, push.go, sync.go with enriched errors
        done: true
  - phase: Prerequisite Checks
    tasks:
      - text: Surface Docker/Git/Claude CLI availability in kf up when relevant prerequisites fail
        done: true
  - phase: Verification
    tasks:
      - text: Run make test to verify no regressions
        done: true
      - text: Manually verify error output for kf status (without init) and kf agents (with no agents)
        done: true
