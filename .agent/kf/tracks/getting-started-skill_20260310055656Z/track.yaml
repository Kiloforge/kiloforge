id: getting-started-skill_20260310055656Z
title: "Getting Started skill — interactive project bootstrapper with platform-aware defaults"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Create a new `kf-getting-started` skill that guides users through project
    creation decisions via interactive Q&A, generates a project blueprint with
    platform-aware tech stack recommendations and strong defaults, scaffolds the
    project structure, then invokes `kf-setup` with pre-populated answers.
  context: |
    Users starting new projects face decision paralysis: platform choice (web,
    mobile, desktop, CLI, server), OS targets (Windows, Linux, Mac, Android, iOS),
    language/framework selection, testing strategy, and project structure. The
    existing `kf-setup` skill initializes Kiloforge artifacts but assumes the user
    already knows their tech stack and has a project directory ready.

    This skill sits **before** kf-setup in the workflow. It asks high-level
    questions a non-technical founder or early-stage developer can answer, then
    translates those answers into concrete technical decisions with strong opinionated
    defaults. The output is a project blueprint artifact plus a scaffolded project
    directory, after which kf-setup runs automatically with pre-populated context.
  codebase_analysis: |
    **Skill infrastructure:**
    - Skills are `SKILL.md` files with YAML frontmatter in `backend/internal/adapter/skills/embedded/`
    - Installed to `~/.claude/skills/{skill-name}/` via `skill install` CLI command
    - Auto-updated from GitHub releases via version comparison
    - Frontmatter fields: name, description, metadata (argument-hint)

    **Existing kf-setup skill:**
    - Located at `backend/internal/adapter/skills/embedded/kf-setup/SKILL.md`
    - 5 sections (~20 questions): product, guidelines, tech stack, workflow, style guides
    - State managed via `setup_state.json` (current section, completed sections, answers)
    - Generates artifacts to `.agent/kf/` (product.md, tech-stack.md, workflow.md, etc.)
    - References `.agent/conductor/` paths (legacy naming) — new skill should use `.agent/kf/`

    **Template resources:**
    - kf-setup references `$CLAUDE_PLUGIN_ROOT/templates/code_styleguides/` for style guide templates
    - Go style guide exists at `.agent/kf/code_styleguides/go.md` (comprehensive, production-quality)
    - Build conventions at `.agent/kf/code_styleguides/build.md`

    **No overlap with active tracks:**
    - `create-project-be/fe` tracks are about the REST API endpoint for creating projects
      in the dashboard UI, not about the CLI skill for bootstrapping new projects
    - `product-advisor-skill` is about advising on existing products, not project creation
  acceptance_criteria:
    - Skill file at `backend/internal/adapter/skills/embedded/kf-getting-started/SKILL.md`
    - Interactive Q&A flow with one question per turn, suggested answers, platform discovery
    - Platform/target discovery — web, mobile (Android/iOS), desktop (Win/Linux/Mac), server, CLI
    - Language and framework recommendations based on platform choice with strong defaults
    - Testing strategy defaults (TDD strict, layered tests, table-driven) matching this project's standards
    - Code style guide defaults matching this project's quality level
    - Project blueprint artifact generation (JSON or YAML) capturing all decisions
    - Project directory scaffolding (go.mod/package.json/Makefile/etc.) based on blueprint
    - Automatic invocation of kf-setup with pre-populated answers from blueprint
    - Resume support via state file (same pattern as kf-setup)
    - Greenfield-only scope (brownfield projects should use kf-setup directly)
  out_of_scope: |
    - Brownfield project analysis (existing kf-setup handles this)
    - Actual code generation beyond scaffolding (no business logic generated)
    - CI/CD pipeline generation (future track)
    - Remote repository creation (future track)
    - Docker/container setup (future track)
    - IDE configuration generation
  technical_notes: |
    The skill follows the same pattern as kf-setup:
    1. SKILL.md with YAML frontmatter and full Q&A flow
    2. State management via `.agent/kf/getting-started-state.json`
    3. Blueprint output to `.agent/kf/project-blueprint.yaml`

    Decision tree structure:
    - Section 1: Project identity (name, description, problem, users) — 4 questions
    - Section 2: Platform & targets — 3-4 questions (platform type → OS targets → form factor)
    - Section 3: Tech stack (smart defaults based on platform) — 3-5 questions
    - Section 4: Architecture preferences — 2-3 questions (monolith vs microservices, API style)
    - Section 5: Quality & workflow defaults — 2-3 questions (testing, CI, code review)
    - Section 6: Review & confirm blueprint — 1 question (show summary, approve/edit)
    - Section 7: Scaffold & handoff to kf-setup

    Platform → default stack mappings (examples):
    - Web app → TypeScript, React, Node.js/Go backend, PostgreSQL
    - Mobile (React Native) → TypeScript, React Native, Expo
    - Mobile (native Android) → Kotlin, Jetpack Compose
    - Mobile (native iOS) → Swift, SwiftUI
    - Desktop (cross-platform) → Rust + Tauri or Electron
    - CLI tool → Go or Rust
    - Server/API only → Go or Python (FastAPI)

    The skill should be opinionated but allow overrides at every step.
