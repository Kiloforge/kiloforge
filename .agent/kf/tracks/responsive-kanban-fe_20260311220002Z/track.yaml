id: responsive-kanban-fe_20260311220002Z
title: "Mobile-friendly kanban board with column tabs"
type: feature
status: completed
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Below 768px, show one kanban column at a time with a tab bar to switch
    between columns. Replace drag-drop with a "Move to..." dropdown.
    Keep desktop 5-column layout unchanged.
  context: |
    KanbanBoard renders 5 fixed columns (~948px min width) with HTML5 drag-drop
    that doesn't work on touch. Hardest piece of mobile support.
  codebase_analysis: |
    KanbanBoard.tsx — 5 columns with onDragOver/onDrop, cards use draggable.
    KanbanBoard.module.css — .board display:flex, .column min-width:180px.
    RelationshipOverlay — SVG overlay, must hide on mobile.
    AgentTerminal already uses pointer events (mobile precedent).
  acceptance_criteria:
    - Below 768px, one column at a time with horizontal tab bar
    - Tab bar shows column names with card count badges
    - Cards have "Move to..." dropdown instead of drag-drop on mobile
    - Desktop 5-column drag-drop unchanged above 768px
    - RelationshipOverlay hidden on mobile
    - Cards fully readable on 375px
  out_of_scope: |
    - Touch drag-and-drop within a column
    - Swipe gestures between tabs
    - Backend API changes
  technical_notes: |
    activeColumn useState, matchMedia(768px) hook, tab bar with count badges,
    single column render on mobile, "Move to..." dropdown per card,
    hide RelationshipOverlay when isMobile.
plan:
