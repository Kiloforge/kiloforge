id: project-mirror-egress-be_20260312192305Z
title: Project mirror — create user-facing clone and auto-sync on main updates
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-10
spec:
  summary: |
    Add a MirrorDir field to the Project domain, create a local clone at
    registration time (both AddProject and CreateProject), add ForcePushToMirror
    to GitSync, hook the merge completion path to push main to the mirror, and
    clean up the mirror on project removal. Egress only — the mirror is read-only
    from the orchestrator's perspective.
  context: |
    Users need access to the project output on their host machine. Currently,
    kiloforge clones repos into ~/.kiloforge/repos/{slug}/ which is an internal
    working directory used by agents and worktree pools. A separate "mirror" clone
    at ~/.kiloforge/output/{slug}/ gives users a clean, read-only view of the
    latest main branch without interfering with agent operations.
  codebase_analysis: |
    - ProjectService.AddProject() clones to DataDir/repos/{slug} (project_service.go:61-80)
    - ProjectService.CreateProject() git-inits at DataDir/repos/{slug} (project_service.go:128-146)
    - Project domain struct has Slug, RepoName, ProjectDir, OriginRemote, SSHKeyPath,
      RegisteredAt, Active — no mirror field (domain/project.go:19-27)
    - GitSync has PushToRemote() but no force-push capability (git/sync.go:85-110)
    - GitSync.gitCmd() already strips GIT_DIR/GIT_WORK_TREE for clean execution
    - RemoveProject() cleans repos/ and projects/ dirs (project_service.go:194-215)
    - The kf-developer merge protocol does git merge --ff-only into main — that is
      the hook point for egress sync
    - The orchestrator merge-lock API (POST /-/api/locks/merge) is the coordination
      point; the actual merge happens in the worktree via git CLI
    - cleanGitEnv() helper exists in project_service.go for stripping env vars
  acceptance_criteria:
    - AddProject creates a mirror clone at DataDir/output/{slug}
    - CreateProject creates a mirror clone at DataDir/output/{slug}
    - Project.MirrorDir is persisted in the project store
    - GitSync.ForcePushToMirror() force-pushes main from ProjectDir to MirrorDir
    - After every successful merge to main in the orchestrator, main is force-pushed to the mirror
    - RemoveProject cleans up the mirror directory
    - All new code has unit tests
  out_of_scope: |
    - Frontend UI for mirror path display or configuration
    - Pull from mirror (egress only)
    - User-configurable mirror path (use convention DataDir/output/{slug})
    - Branch mirroring beyond main (only main is synced)
  technical_notes: |
    The mirror is a regular git clone with the internal repo as its origin remote.
    Force push via: git push --force <mirror-path> main:main
    For initial clone: git clone <source-dir> <mirror-dir> using file:// protocol.
    The merge completion hook lives in the orchestrator — after the merge-lock
    release confirms success, call SyncMirror for the affected project.
    Use file:// protocol for local clone/push to avoid path-as-remote ambiguity.
plan:
  - phase: Domain & Infrastructure
    tasks:
      - text: Add MirrorDir string field to domain.Project struct and update JSON tags
        done: true
      - text: Add ForcePushToMirror(ctx, projectDir, mirrorDir string) method to GitSync — uses git push --force
        done: true
      - text: Write unit tests for ForcePushToMirror (success, mirror not exist, empty repo edge case)
        done: true
      - text: Add CreateMirrorClone(ctx, sourceDir, mirrorDir string) helper to GitSync — git clone file://<source> <mirror>
        done: true
  - phase: Project Registration
    tasks:
      - text: Update AddProject to create mirror clone at DataDir/output/{slug} and set Project.MirrorDir
        done: true
      - text: Update CreateProject to create mirror clone at DataDir/output/{slug} and set Project.MirrorDir
        done: true
      - text: Update RemoveProject to also remove MirrorDir when cleanup=true
        done: true
      - text: Write tests for AddProject/CreateProject/RemoveProject mirror behavior
        done: true
  - phase: Auto-sync on Main Update
    tasks:
      - text: Add SyncMirror(ctx, slug string) method to ProjectService that resolves project and calls ForcePushToMirror
        done: true
      - text: Add POST /api/projects/{slug}/mirror-sync REST endpoint that calls SyncMirror
        done: true
      - text: Hook merge completion in orchestrator merge-lock release to trigger mirror sync for the affected project
        done: true
  - phase: Verification
    tasks:
      - text: Integration test: add project, commit, merge to main, verify mirror reflects latest main
        done: true
      - text: Integration test: RemoveProject with cleanup=true removes mirror directory
        done: true
      - text: Manual smoke test: verify output/{slug} directory is browsable and has correct content
        done: true
