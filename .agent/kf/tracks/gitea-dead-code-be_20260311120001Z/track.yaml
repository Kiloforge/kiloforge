spec:
  summary: "Remove giteaURL field from APIHandler, dashboard.Server, OpenAPI schema, and CLI doc strings left over from Gitea removal."
  context: |
    The gitea-removal-be track deleted all Gitea adapter code but left behind the giteaURL
    plumbing — the field is still threaded through server options, API handler, dashboard,
    and the OpenAPI schema. It always passes empty string now, making it pure dead code.
  codebase_analysis: |
    Files with remaining giteaURL references:
    - backend/internal/adapter/rest/api_handler.go:104,156,889 — giteaURL field in APIHandlerOpts and struct
    - backend/internal/adapter/rest/server.go:36-39 — WithDashboard passes giteaURL param
    - backend/internal/adapter/dashboard/server.go:40,53,69 — giteaURL field stored and used
    - backend/api/openapi.yaml — gitea_url in StatusInfo response schema
    - backend/internal/adapter/cli/root.go:20,23 — doc string mentions "Gitea"
    - Generated files (gen/server.gen.go, gen/client.gen.go) will need regeneration after schema change
  acceptance_criteria:
    - No references to giteaURL or gitea_url remain in non-generated backend source
    - OpenAPI schema no longer includes gitea_url field
    - Generated code regenerated from updated schema (make gen-api)
    - make verify-codegen passes
    - All tests pass
    - CLI help text no longer mentions Gitea
  out_of_scope: |
    - Frontend changes (frontend references will be caught by cortex-rebrand or command-deck tracks)
    - Removing docker compose infrastructure (already emptied by gitea-removal-be)
  technical_notes: |
    This is a surgical cleanup — remove the field from structs, update constructors, regenerate
    OpenAPI code. The WithDashboard option signature changes (drops giteaURL param), so all
    callers (cli/serve.go, cli/dashboard.go) must be updated.

    IMPORTANT: After modifying openapi.yaml, run `make gen-api` to regenerate server.gen.go
    and client.gen.go, then `make verify-codegen` to confirm sync.
