id: track-detail-register-traces-be_20260312231001Z
title: Add agent register and traces to TrackDetail API response
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Extend the TrackDetail API response with two new fields: an agent register
    (from track.yaml extra.claim and extra.created_by) and associated traces
    (queried from the trace store by track ID). This provides a single API
    call to see who created a track, who's working on it, and all execution
    traces — sufficient for session restoration.
  context: |
    The TrackDetail endpoint currently returns spec, plan, phases, tasks,
    dependencies, and conflicts. It does not include:
    - Who created the track (architect agent identity)
    - Who claimed it (developer agent identity, session ID for resume)
    - Execution traces (currently only accessible via separate /api/traces?track_id=X)

    The user wants the track detail view to be a one-stop-shop for track
    context, including agent history and traces.
  codebase_analysis: |
    **TrackDetail schema (openapi.yaml:2326-2366)** — currently has id, title,
    status, type, spec, plan, phases_*, tasks_*, created_at, updated_at,
    dependencies[], conflicts[]. No extra or traces fields.

    **Track handler (api_handler.go getTrackDetail)** — reads track.yaml,
    parses spec/plan, counts phases/tasks, reads deps and conflicts. Does not
    read the extra field.

    **Trace store** — has FindByTrackID(trackID) returning []TraceSummary.
    Already indexed. The API handler has access to h.traceStore.

    **extra field in track.yaml** — free-form dict, already in schema. The
    track-claim-register track defines extra.claim (developer claim) and
    we'll add extra.created_by (architect identity).

    **BoardCard already has agent_id, trace_id** — the board card links to
    the active agent and trace. TrackDetail should provide the full history.

    **Key files:**
    - backend/api/openapi.yaml (TrackDetail schema)
    - backend/internal/adapter/rest/api_handler.go (getTrackDetail handler)
    - backend/internal/adapter/tracing/store.go (trace store interface)
    - backend/internal/adapter/persistence/sqlite/trace_store.go
  acceptance_criteria:
    - TrackDetail response includes agent_register object with created_by and claimed_by sub-objects
    - created_by contains agent_id, role, session_id, timestamp (from extra.created_by)
    - claimed_by contains agent_id, role, session_id, worktree, branch, timestamp (from extra.claim)
    - TrackDetail response includes traces array with recent TraceSummary objects for this track
    - Traces are capped (e.g., last 20) to keep the response fast
    - Missing register or traces fields return null/empty, not errors
    - OpenAPI spec is updated and codegen is regenerated
  out_of_scope: |
    - Writing the register data (that's the tooling + env-var tracks)
    - Frontend rendering (separate FE track)
    - Full trace pagination from TrackDetail (use /api/traces for that)
  technical_notes: |
    Add to TrackDetail response:
    ```json
    {
      "agent_register": {
        "created_by": {
          "agent_id": "uuid",
          "role": "architect",
          "session_id": "uuid",
          "timestamp": "2026-03-12T14:00:00Z"
        },
        "claimed_by": {
          "agent_id": "uuid",
          "role": "developer",
          "session_id": "uuid",
          "worktree": "worker-3",
          "branch": "feature/my-track_20260312Z",
          "timestamp": "2026-03-12T15:00:00Z"
        }
      },
      "traces": [
        {"trace_id": "...", "root_name": "...", "span_count": 5, ...}
      ]
    }
    ```

    The handler reads extra.created_by and extra.claim from the parsed
    track.yaml, then queries traceStore.FindByTrackID(trackID) for recent
    traces. All data is optional — null if not present.
