title: Rebrand orchestrator to Cortex — CLI, API docs, config, and backend strings
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Rename all user-facing references to "orchestrator" in the backend to "Cortex".
    Update CLI help text, OpenAPI spec, config descriptions, log messages, and
    any user-facing strings to use the new branding.
  context: |
    The orchestrator is being rebranded to "Cortex" — a sci-fi-inspired name for
    the local control plane. This track handles the backend (Go CLI + REST API).
    The frontend rename is handled separately in command-deck-fe.
    This track should run AFTER gitea-removal-be to avoid merge conflicts on the
    same files (both touch CLI commands and REST handlers).
  codebase_analysis: |
    User-facing "orchestrator" references found in:
    - backend/internal/adapter/cli/root.go — CLI long description
    - backend/api/openapi.yaml — API title and description
    - backend/internal/adapter/cli/serve.go — help text
    - .agent/kf/product.md — product description
    - .agent/kf/product-guidelines.md — design principles
    - README.md — project documentation
    Internal references (variable names, package names) should NOT be renamed
    unless they appear in user-facing output. This is a branding change, not a
    code refactor.
  acceptance_criteria:
    - CLI help text references "Cortex" instead of "orchestrator" in all user-facing strings
    - OpenAPI spec title and description reference "Cortex"
    - Product docs (.agent/kf/product.md, product-guidelines.md) updated
    - README.md updated with Cortex branding
    - No changes to internal variable/function/package names (branding only)
    - All tests pass after changes
  out_of_scope: |
    - Frontend changes (separate command-deck-fe track)
    - Internal code refactoring (package/function renames)
    - Kiloforge_site changes (separate site-rebrand track)
    - API endpoint paths (no URL changes)
  technical_notes: |
    This is a string replacement task, not a structural refactor. Only change
    user-facing output: CLI help text, API documentation, product docs, README.
    Do NOT rename Go packages, functions, variables, or file paths.
    Naming convention: "Cortex" (capitalized) or "the Cortex" in prose.
    Example: "Kiloforge Cortex — the local control plane for your AI agent swarm"
