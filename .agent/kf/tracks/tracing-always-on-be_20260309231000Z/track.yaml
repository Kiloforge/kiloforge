spec:
  summary: "Remove the `TracingEnabled` config field and always initialize OpenTelemetry tracing. Tracing is already default-on but currently toggleable via config API and env var ŌĆö this removes the toggle entirely."
  context: "Tracing was added as opt-in with a toggle to let users disable it if it caused issues. In practice it's always on (defaults to `true` when nil) and there's no reason to disable it. The toggle adds unnecessary config complexity and conditional initialization logic."
  codebase_analysis: |
    ### Config field
    
    - **`backend/internal/adapter/config/config.go:32`** ŌĆö `TracingEnabled *bool` (pointer for nil-means-default)
    - **`config.go:54-61`** ŌĆö `IsTracingEnabled()` method returns true if nil
    - **`env_adapter.go:43-48`** ŌĆö `KF_TRACING_ENABLED` env var parsing
    - **`merger.go:68-70`** ŌĆö overlay logic for TracingEnabled
    
    ### Conditional initialization
    
    - **`backend/internal/adapter/cli/serve.go:87-104`** ŌĆö `if cfg.IsTracingEnabled()` guards OTel init and tracer wiring
    
    ### Config API
    
    - **`backend/internal/adapter/rest/api_handler.go:185-221`** ŌĆö `GetConfig`/`UpdateConfig` endpoints expose `tracing_enabled`
    - **`backend/api/openapi.yaml:618-649,1016-1031`** ŌĆö OpenAPI schema for config endpoints
    - The config API also serves `dashboard_enabled` ŌĆö keep the endpoint but remove `tracing_enabled` field
    
    ### Tests
    
    - **`backend/internal/adapter/config/config_test.go:78-98`** ŌĆö tests for `IsTracingEnabled()`
    - **`backend/internal/adapter/config/env_adapter_test.go:119-131`** ŌĆö tests for `KF_TRACING_ENABLED`
  acceptance_criteria:
    - `TracingEnabled` field removed from config struct
    - `IsTracingEnabled()` method removed
    - `KF_TRACING_ENABLED` env var parsing removed
    - Tracing always initializes in `serve.go` (no conditional)
    - `tracing_enabled` removed from `ConfigResponse` and `UpdateConfigRequest` in OpenAPI spec
    - `GetConfig`/`UpdateConfig` handlers updated to not reference tracing
    - Generated API code regenerated (`oapi-codegen`)
    - Config merger no longer overlays `TracingEnabled`
    - Related tests updated/removed
    - `make test` passes
  out_of_scope: |
    - Frontend toggle removal (separate track: `tracing-always-on-fe_20260309231001Z`)
    - Removing trace storage or changing trace collection behavior
    - Removing `dashboard_enabled` from config (still useful)
  technical_notes: |
    The config API endpoint (`/api/config`) stays but only serves `dashboard_enabled`. If that's the only field left, consider whether the endpoint is still useful ŌĆö but keep it for now to avoid breaking the FE config hook.
    
    ---
