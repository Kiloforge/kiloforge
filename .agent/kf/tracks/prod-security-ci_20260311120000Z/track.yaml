id: prod-security-ci_20260311120000Z
title: "Harden CI pipeline — add security scanning, block vulnerable deps"
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: "Add gosec linter, enable SAST in CI, make npm audit blocking, harden .gitignore, create SECURITY.md."
  context: |
    Production readiness audit identified that the CI pipeline lacks security scanning entirely.
    No SAST tool (gosec) runs in CI, npm audit is non-blocking (continue-on-error: true),
    .gitignore is missing patterns for secrets files (.env, *.key, *.pem), and there is no
    SECURITY.md for vulnerability reporting. These are standard production requirements.
  codebase_analysis: |
    - .github/workflows/ci.yml: 4 jobs (kf-tools, lint, test, deps). No security scanning job.
    - .github/workflows/ci.yml line ~114: npm audit has continue-on-error: true
    - backend/.golangci.yaml: 6 linters enabled (errcheck, errorlint, govet, ineffassign,
      staticcheck, unused). Missing: gosec, bodyclose, revive, misspell, nilerr.
    - .gitignore: 40 lines. Missing .env*, *.key, *.pem, *.p12 patterns.
    - No SECURITY.md exists anywhere in the repo.
  acceptance_criteria:
    - gosec linter added to .golangci.yaml and passes on current codebase
    - bodyclose and misspell linters added to .golangci.yaml
    - CI workflow includes a security scanning step (gosec via golangci-lint)
    - npm audit step in CI is blocking (remove continue-on-error or set to false)
    - .gitignore includes .env*, *.key, *.pem, *.p12, *.cert patterns
    - SECURITY.md created with vulnerability reporting instructions
    - All existing tests and lints still pass
  out_of_scope: |
    - SBOM generation (post-launch)
    - GPG-signed releases (post-launch)
    - Dependency vulnerability database scanning (Nancy/Snyk — separate track)
  technical_notes: |
    gosec may flag existing code. If so, fix the flagged issues or add targeted nolint
    directives with justification comments. Do not blanket-disable gosec findings.
plan:
  - phase: "Linter additions"
    tasks:
      - text: "Add gosec, bodyclose, and misspell to .golangci.yaml linter list"
        done: false
      - text: "Run golangci-lint and fix any new findings from added linters"
        done: false
      - text: "Verify make lint passes cleanly"
        done: false
  - phase: "CI hardening"
    tasks:
      - text: "Remove continue-on-error: true from npm audit step in ci.yml"
        done: false
      - text: "Add .env*, *.key, *.pem, *.p12, *.cert patterns to .gitignore"
        done: false
      - text: "Create SECURITY.md with vulnerability reporting process"
        done: false
  - phase: "Verification"
    tasks:
      - text: "Run make lint — verify all new linters pass"
        done: false
      - text: "Run make test — verify no regressions"
        done: false
      - text: "Run make build — verify clean compilation"
        done: false
      - text: "Verify CI workflow YAML is valid (act --list or manual review)"
        done: false
