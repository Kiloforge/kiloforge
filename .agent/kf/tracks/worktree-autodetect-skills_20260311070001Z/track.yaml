id: worktree-autodetect-skills_20260311070001Z
title: Add worktree auto-detection to all embedded skills
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Add worktree auto-detection boilerplate to the 13 embedded skills that
    currently lack it, so all skills work both inside and outside worktrees.
  context: |
    Kiloforge supports parallel worktrees (worker-1, worker-2, architect-1, etc.)
    but 13 of the 22 embedded skills don't detect or handle worktree context.
    When these skills run inside a worktree, they may fail to find .agent/kf/
    files, resolve the primary branch incorrectly, or break Go builds due to
    VCS stamping issues. The kf-worktree-env helper script already exists at
    .agent/kf/bin/kf-worktree-env and handles all detection automatically.
  codebase_analysis: |
    Skills WITHOUT worktree support (13):
    - kf-advisor-product, kf-bulk-archive, kf-compact-archive,
      kf-conflict-resolver, kf-data-guardian, kf-getting-started,
      kf-implement, kf-interactive, kf-manage, kf-new-track,
      kf-revert, kf-setup, kf-validate

    Skills WITH worktree support (9) — use as reference:
    - kf-architect, kf-developer, kf-dispatch, kf-repair, kf-report,
      kf-reviewer, kf-status, kf-advisor-reliability, kf-parallel

    Pattern used by worktree-aware skills:
    - Step 0: run git branch --show-current, git worktree list
    - Record main worktree path for cross-worktree operations
    - Use git show main:<path> for reading track state from primary branch

    The kf-worktree-env helper exports GIT_DIR, GIT_WORK_TREE, KF_IS_WORKTREE,
    KF_WORKTREE_NAME, KF_MAIN_WORKTREE. Skills that run Go commands should
    source this helper. Skills that only read files need the worktree list
    and primary branch resolution pattern.
  acceptance_criteria:
    - All 13 skills without worktree support have a worktree detection section
    - Skills that run go build/test source kf-worktree-env
    - Skills that read track state use git show main:<path> pattern
    - All skills work correctly both inside worktrees and in a normal repo
    - No changes to the 9 skills that already have worktree support
  out_of_scope: |
    - Modifying skills that already have worktree support
    - Changes to the kf-worktree-env helper itself
    - Modernizing old file format references (tracks.md → tracks.yaml, etc.)
  technical_notes: |
    Each skill needs a worktree detection preamble added near the top of its
    instructions. The exact content varies by skill type:

    For skills that run builds (kf-implement, kf-getting-started):
      Add: `. .agent/kf/bin/kf-worktree-env` before any go commands

    For skills that read track state (kf-manage, kf-validate, etc.):
      Add: `git worktree list` to identify main worktree path
      Add: Use `git show main:<path>` for state reads

    For advisory/read-only skills (kf-data-guardian, kf-interactive):
      Add: Basic worktree detection (git worktree list) and note about
      resolving paths relative to the worktree root

    For merge-lock behavior:
      When NOT in a worktree (KF_IS_WORKTREE=0), skip merge lock acquire/release
      entirely — there's only one agent, so no coordination is needed. Only
      acquire/release the merge lock when KF_IS_WORKTREE=1.
