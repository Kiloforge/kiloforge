id: agent-name-display_20260310120000Z
title: "Show agent name instead of ID in AgentTerminal header"
type: bug
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    AgentTerminal displays raw UUID instead of the generated agent name.
    Pass name to the component and display it with a role badge; show ID
    as secondary info.
  context: |
    Agent names are generated server-side via GenerateName() in namegen.go
    (format: "adverb adjective name"). All spawn paths set this correctly.
    Most frontend components (AgentCard, AgentDetailPage, AgentStatusPopover)
    already show agent.name. However, AgentTerminal only receives agentId
    (a UUID string) and displays "Agent: {agentId}" in its header.
  codebase_analysis: |
    Backend: Names are generated correctly — no changes needed.
    - backend/internal/adapter/agent/namegen.go: GenerateName() → "adverb adjective name"
    - backend/internal/adapter/agent/spawner.go: All 3 spawn methods set Name: GenerateName()
    - API returns name in Agent response (json:"name,omitempty")

    Frontend components that already show names correctly:
    - AgentCard.tsx (line 30): agent.name || agent.id — with role badge ✓
    - AgentDetailPage.tsx (line 128): agent.name || agent.id ✓
    - AgentStatusPopover.tsx (line 50): agent.name ?? agent.id.slice(0,8) ✓
    - AgentHistoryPage.tsx (line 99): agent.name || agent.id ✓

    The bug — AgentTerminal.tsx (line 89):
      <h3>Agent: <span className={styles.agentId}>{agentId}</span>
      {role && <span className={styles.roleBadge}>{role}</span>}
      </h3>
    - Props: agentId (string), role (optional string), onClose
    - Only receives UUID, not the agent name
    - role prop exists but is optional and not always passed

    Where AgentTerminal is rendered:
    - App.tsx (~line 181): <AgentTerminal agentId={terminalAgentId} onClose={...} />
      - No role or name prop passed
      - The agents array is available in App.tsx scope — can look up name/role
    - ProjectPage.tsx: Similar usage pattern

    Fix approach: Either add a name prop to AgentTerminal, or have it look
    up the agent from the agents list via agentId. Adding a name prop is
    simpler and avoids coupling to the agents data source.
  acceptance_criteria:
    - AgentTerminal header shows agent name (not UUID) as primary label
    - Role badge displayed next to the name
    - Agent ID shown as secondary/smaller text below or beside the name
    - Fallback to truncated ID if name is not available
    - All call sites (App.tsx, ProjectPage.tsx) pass name and role props
    - Existing role badge styling preserved
    - E2E tests pass
  out_of_scope: |
    - Backend name generation changes
    - Changing name format or adding name persistence
    - Other components (already show names correctly)
  technical_notes: |
    Option A (recommended): Add optional name prop to AgentTerminal.
    - Props: agentId, name?, role?, onClose
    - Header: "{name || agentId.slice(0,8)} [role badge]"
    - Secondary line: small monospace ID text
    - Call sites look up agent from agents array by ID and pass name/role

    Option B: Have AgentTerminal accept full Agent object.
    - Larger refactor, may not always have full agent info at render time

    Option A is simpler and matches the existing prop pattern.
    The agents array is already in scope at both App.tsx and ProjectPage.tsx,
    so looking up name/role by ID is trivial.
plan:
