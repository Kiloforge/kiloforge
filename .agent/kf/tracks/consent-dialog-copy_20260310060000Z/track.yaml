    - frontend/src/components/ConsentDialog.module.css — Dialog styles
    - backend/internal/adapter/rest/api_handler.go:checkConsent() — API error message

    Current ConsentDialog copy:
      Title: "Agent Permissions Required"
      Body: "Kiloforge agents run with --dangerously-skip-permissions. This grants
      agents unrestricted access to tools (file read/write, shell commands, etc.)
      within their worktree directory."

    The backend checkConsent() error message is internal (used for 403 response code
    detection, not shown to users), so it does not need updating.
  acceptance_criteria:
    - ConsentDialog explicitly states Claude Code runs in "Dangerously bypass permissions" mode
    - The --dangerously-skip-permissions flag is still mentioned for technical context
    - Dialog copy clearly communicates the security implications
    - Existing consent flow behavior is unchanged (accept/deny, retry pattern)
    - E2E tests pass without modification (or are updated if dialog text assertions exist)
  out_of_scope: |
