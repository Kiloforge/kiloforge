  technical_notes: |
    Frontend-only change to ConsentDialog.tsx component copy. No API, schema,
    or backend changes needed. The dialog text should read something like:

    "Claude Code will run in Dangerously bypass permissions mode
    (--dangerously-skip-permissions). This grants agents unrestricted access
    to tools (file read/write, shell commands, network access, etc.) within
    their worktree directory."
