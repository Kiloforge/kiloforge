id: list-pagination-be_20260310200000Z
title: "Cursor pagination and filtering for all list API endpoints"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Add cursor-based pagination with total_count to all list endpoints. Includes
    status filtering for agents and tracks. Default limits keep initial payloads
    small; total_count enables "+N" overflow indicators on the frontend.
  context: |
    The product audit identified unbounded list endpoints as the top critical gap.
    With 172+ completed tracks and growing agent/trace history, all list endpoints
    will cause performance degradation. Every list endpoint needs cursor-based
    pagination with filtering to support both the dashboard's "+N completed"
    indicator and efficient data loading.

    Affected endpoints (7 total):
    - GET /api/agents (has ?active filter, no pagination)
    - GET /api/projects (no params at all)
    - GET /api/tracks (project filter only)
    - GET /api/queue (project filter only)
    - GET /api/traces (track_id/session_id filters only)
    - GET /api/locks (no pagination)
    - GET /api/ssh-keys (no pagination)
  codebase_analysis: |
    Current state — zero pagination anywhere:

    OpenAPI spec (backend/api/openapi.yaml):
    - 7 list endpoints, none support pagination params (no limit, cursor, offset)
    - agents has ?active filter, tracks has ?project filter, traces has ?track_id/?session_id

    Handler layer (backend/internal/adapter/rest/api_handler.go):
    - All handlers fetch entire dataset and return as-is
    - ListAgents (line 321): loads all, filters active in memory
    - ListProjects (line 631): gets all via h.projects.List()
    - ListTracks (line 739): iterates all projects, discovers from filesystem
    - ListTraces (line 1158): returns all from store

    Store interfaces (backend/internal/core/port/):
    - ProjectStore.List() returns []domain.Project (no pagination)
    - AgentStore.Agents() returns []domain.AgentInfo (no pagination)
    - TraceStore.ListTraces() returns all traces
    - QueueStore.List() returns all items

    SQLite stores: all queries use SELECT without LIMIT

    Schema-first workflow:
    - OpenAPI 3.1 with oapi-codegen v2.5.1 for Go code generation
    - make gen-api regenerates, make verify-codegen verifies in CI

    Pagination strategy: cursor-based using opaque token (base64-encoded sort
    key + ID). Cursor tokens are stable across inserts (unlike offset). Each
    response includes next_cursor (empty = no more pages) and total_count
    for the frontend "+N" indicator.
  acceptance_criteria:
    - All 7 list endpoints accept optional ?limit (default 50, max 200) and ?cursor query params
    - Responses include next_cursor field (empty string when no more results) and total_count
    - Agents endpoint: add ?status filter (running, completed, failed, etc.) alongside existing ?active
    - Tracks endpoint: add ?status filter (pending, in-progress, complete) alongside existing ?project
    - Queue endpoint: preserve existing ?project filter, add ?status filter
    - Traces endpoint: preserve existing ?track_id, ?session_id filters
    - Cursor is opaque to client (base64-encoded sort key)
    - OpenAPI spec updated with shared pagination schemas and code regenerated
    - Port interfaces extended with pagination options
    - SQLite stores implement keyset pagination (WHERE sort_key < cursor ORDER BY sort_key LIMIT N)
    - All existing tests pass with pagination
    - New tests for pagination edge cases (empty results, last page, invalid cursor, total_count accuracy)
  out_of_scope: |
    - Frontend changes (separate FE track)
    - SSE event pagination (events remain real-time push)
    - Board endpoint pagination (kanban columns are bounded by design)
    - Full-text search
    - Complex multi-column sorting
    - Aggregation endpoints
  technical_notes: |
    Schema-first approach:
    1. Define PaginationParams and PaginatedResponse schemas in OpenAPI
    2. Add query params to each list operation
    3. Regenerate Go code (make gen-api)
    4. Update port interfaces to accept pagination options
    5. Implement in SQLite stores using keyset pagination

    Reusable pagination types in domain:
      type PageOpts struct {
        Limit  int
        Cursor string
      }
      type Page[T any] struct {
        Items      []T
        NextCursor string
        TotalCount int
      }

    Cursor encoding: base64(json({sort_field: value, id: value}))
    - Agents: sort by started_at DESC
    - Queue items: sort by enqueued_at ASC
    - Tracks: sort by status priority then name
    - Traces: sort by created_at DESC
    - Projects: sort by slug ASC

    Default limit 50, max 200. Empty cursor = first page.
