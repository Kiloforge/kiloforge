spec:
  summary: Fix incorrect port references (4001→39517), stale /-/ path prefix, wrong dev mode port, outdated data directory structure, and stale log filename across README.md and docs/.
  context: |
    The documentation was written when the Cortex ran on port 4001 and the Command Deck
    was mounted at /-/. The actual defaults have since changed: port 39517, dashboard at /.
    The data directory docs still show JSON files as primary storage when SQLite is now used.
    The log file was renamed from orchestrator.log to cortex.log.
  codebase_analysis: |
    ### Port
    - backend/internal/adapter/config/defaults.go:18 — OrchestratorPort: 39517
    - backend/internal/adapter/cli/up.go:34 — flag help says "default 39517"
    - frontend/vite.config.ts:33 — dev proxy targets localhost:39517
    
    ### Dashboard path
    - backend/internal/adapter/dashboard/server.go:121-128 — RegisterNonAPIRoutes mounts at /
    - backend/api/openapi.yaml — all routes are /api/..., not /-/api/...
    - backend/internal/adapter/dashboard/detail.go:41,44 — stale /-/ hrefs in HTML templates
    
    ### Log file
    - backend/internal/adapter/cli/daemon.go:40-46 — migrates orchestrator.log → cortex.log
    - backend/internal/adapter/cli/serve.go:41-46 — same migration
    
    ### Data storage
    - backend/internal/adapter/persistence/sqlite/db.go:14 — creates kiloforge.db
    - backend/internal/adapter/persistence/sqlite/migrate_json.go — JSON files are legacy migration only
    
    ### Files needing changes
    - README.md — 6 port refs, 5 /-/ refs, dev mode port, data dir structure, log filename
    - docs/getting-started.md — port refs, /-/ paths
    - docs/architecture.md — port refs, /-/ paths
    - backend/internal/adapter/dashboard/detail.go — stale /-/ hrefs
  acceptance_criteria:
    - No references to port 4001 in README.md or docs/
    - No /-/ path prefix in README.md or docs/ (except where genuinely used in code)
    - README data directory structure shows kiloforge.db and cortex.log
    - Dev mode description uses correct port 39517
    - detail.go HTML templates use / not /-/
    - make build succeeds
    - make test passes
  out_of_scope: |
    - docs/skills.md skill catalog updates (kf-parallel, kf-data-guardian) — separate track
    - goimports crelay prefix rename — noted as separate cleanup
    - Rewriting documentation prose or restructuring docs
  technical_notes: |
    Straightforward find-and-replace across documentation files plus a small
    code fix in detail.go. No behavioral changes — documentation-only plus
    one HTML template correction.
