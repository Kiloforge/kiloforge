title: "Add `kf analytics` CLI command to enable, disable, and show state"
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Add a `kf analytics` command with `enable`, `disable`, and `status`
    subcommands that persist to config.json and report the current analytics
    state. Update docs with analytics management instructions.
  context: |
    Kiloforge has a PostHog-based anonymous analytics system. Users are prompted
    during `kf up` first run, and can override via `KF_ANALYTICS_ENABLED` env
    var. However, there is no dedicated CLI command to toggle analytics after
    initial setup — users must manually edit config.json or set env vars.
  codebase_analysis: |
    **Analytics system (complete):**
    - Port interface: `backend/internal/core/port/analytics.go` (AnalyticsTracker)
    - PostHog adapter: `backend/internal/adapter/analytics/posthog.go`
    - Noop adapter: `backend/internal/adapter/analytics/noop.go`
    - Identity: `backend/internal/adapter/analytics/identity.go` (SHA256 anonymous ID)
    - Config field: `AnalyticsEnabled *bool` in config.Config
    - Helper: `cfg.IsAnalyticsEnabled()` — defaults true when nil
    - Env var: `KF_ANALYTICS_ENABLED`
    - First-run prompt in `up.go` (lines 84-98)
    
    **CLI pattern to follow (skills.go):**
    - Parent command with subcommands (skills list, skills update)
    - Uses `config.Resolve()` to load, modifies fields, calls `cfg.Save()`
    - Registered in root.go init() via `rootCmd.AddCommand()`
    - One file per command: `backend/internal/adapter/cli/analytics.go`
    
    **Config persistence:**
    - JSON file at `~/.kiloforge/config.json`
    - `cfg.Save()` writes via JSONAdapter
    - Resolution priority: defaults → JSON → env → flags
    
    **Docs to update:**
    - `docs/getting-started.md` — mentions analytics at first-run (line 46),
      has CLI reference section at bottom. Needs analytics management section.
  acceptance_criteria:
    - `kf analytics` with no args prints current analytics state (enabled/disabled)
    - `kf analytics enable` sets AnalyticsEnabled=true in config.json and confirms
    - `kf analytics disable` sets AnalyticsEnabled=false in config.json and confirms
    - `kf analytics status` prints enabled/disabled plus source (config/env/default)
    - Status output indicates when env var KF_ANALYTICS_ENABLED overrides config
    - docs/getting-started.md updated with analytics management section
    - All commands work before kf is initialized (graceful error)
    - make test, make build, make lint all pass
  out_of_scope: |
    - Changes to the PostHog adapter or analytics event structure
    - Frontend analytics settings UI
    - Changes to the first-run prompt flow in up.go
  technical_notes: |
    **Command structure:**
    - `kf analytics` (no args) → alias for `kf analytics status`
    - `kf analytics enable` → sets *bool to true, saves, prints confirmation
    - `kf analytics disable` → sets *bool to false, saves, prints confirmation
    - `kf analytics status` → resolves config, checks env var, prints state + source
    
    **Source detection for status:**
    - Check `os.Getenv("KF_ANALYTICS_ENABLED")` — if set, note "overridden by env"
    - Check if config file has explicit value vs nil (default)
    - Display: "Analytics: enabled (set in config)" / "Analytics: disabled (env override)"
    
    **Error handling:**
    - If config can't be resolved (not initialized): print helpful error
    - Enable/disable should create config dir if needed (match up.go pattern)
