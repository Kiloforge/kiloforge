id: product-advisor-skill_20260310080000Z
title: Add kf-product-advisor embedded skill
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    Kiloforge currently has architect, developer, reviewer, and report skills but
    no advisory role for product strategy. Users need a way to get product design,
    branding, and competitive analysis advice that produces actionable reports
    which can be fed to the architect for track generation.
    
    The skill should:
    - Accept an optional prompt from the user; if no prompt, ask what they want
      advice on and suggest capabilities (benchmarking, competitive analysis, etc.)
    - Research the codebase and product context (product.md, product-guidelines.md)
    - Use WebSearch/WebFetch to research competitors and similar products
    - Output structured markdown reports to .agent/kf/_reports/product-advisor/
    - Reports should be actionable — designed to hand off to /kf-architect
  codebase_analysis: |
    Skill system structure:
    - Embedded skills live in: backend/internal/adapter/skills/embedded/{name}/SKILL.md
    - SKILL.md uses YAML frontmatter (name, description, metadata with argument-hint
      and optional allowed-tools) followed by markdown instructions
    - Skills are compiled into the Go binary via //go:embed embedded/*
    - Auto-discovered by ListEmbedded() which walks embedded/ directory
    - Installed to ~/.claude/skills/ via InstallAllEmbedded()
    
    Role registration:
    - RequiredSkillsForRole() in checker.go maps roles to required skills
    - The product-advisor does NOT need a new role — it will be invoked as a slash
      command (/kf-product-advisor) through the existing interactive agent session
    - No changes to checker.go or spawner.go needed
    
    Report output pattern (from kf-report):
    - Reports go to .agent/kf/_reports/ with date-prefixed filenames
    - Product advisor will use .agent/kf/_reports/product-advisor/ subdirectory
    - Markdown format, designed for dashboard rendering
    
    Key reference files:
    - backend/internal/adapter/skills/embedded/kf-architect/SKILL.md (similar structure)
    - backend/internal/adapter/skills/embedded/kf-report/SKILL.md (report output pattern)
    - backend/internal/adapter/skills/checker.go (skill discovery, no changes needed)
  acceptance_criteria:
    - SKILL.md exists at backend/internal/adapter/skills/embedded/kf-product-advisor/SKILL.md
    - Skill has valid YAML frontmatter (name, description, metadata with argument-hint)
    - When invoked without a prompt, skill asks user what they want advice on and lists capabilities
    - Capabilities include product design, branding, feature development, competitive analysis, benchmarking
    - Skill loads project context (product.md, product-guidelines.md, tech-stack.md)
    - Skill can use WebSearch/WebFetch for competitor research
    - Output is a structured markdown report written to .agent/kf/_reports/product-advisor/
    - Report filenames follow date convention (YYYY-MM-DD-{topic}.md)
    - Reports are actionable and explicitly designed for handoff to /kf-architect
    - Skill installs correctly via InstallAllEmbedded (verified by make test on skills package)
    - Existing skill tests continue to pass
  out_of_scope: |
    - New agent role or spawner changes (uses existing interactive agent)
    - Frontend UI changes (invoked via slash command in existing terminal)
    - Dashboard rendering of product-advisor reports
    - API endpoint changes or OpenAPI schema updates
  technical_notes: |
    The SKILL.md should follow the kf-architect pattern:
    1. Frontmatter: name, description, metadata.argument-hint
    2. Role description and capabilities
    3. Pre-flight: load product.md, product-guidelines.md, tech-stack.md
    4. If no user prompt: present capabilities menu and ask for direction
    5. Research phase: codebase analysis + web research (competitors)
    6. Analysis phase: synthesize findings
    7. Report generation: write to .agent/kf/_reports/product-advisor/
    8. Handoff: summarize findings and suggest /kf-architect follow-up
    
    The allowed-tools should include WebSearch and WebFetch for competitive
    research, plus Read, Glob, Grep, Bash, Write for codebase analysis and
    report output.
