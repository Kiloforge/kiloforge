id: harden-windows-ci_20260312012835Z
title: Harden Windows CI build to match Linux parity
type: chore
status: pending
created: 2026-03-12
updated: '2026-03-12'
spec:
  summary: 'Bring the build-windows CI job to parity with the Linux test job by adding race detection, ldflags version stamping,
    and frontend test execution.

    '
  context: 'The Windows build was fixed in ci-windows-submodule-be_20260311070001Z

    (commit 927a6655) by adding submodules checkout. The job now builds and

    runs tests successfully. However, it uses a bare `go build ./cmd/kf`

    without ldflags, skips race detection, and doesn''t run frontend tests.


    The Linux `test` job uses:

    - `go test -race -coverprofile=coverage.out ./...`

    - `make build-backend` (with ldflags for version/commit/date)

    - Frontend test execution


    The Windows job should match this level of rigor to catch platform-specific

    regressions early.

    '
  codebase_analysis: "- .github/workflows/ci.yml build-windows job (lines 79-100):\n  - Checks out with submodules: recursive\
    \ ✓\n  - Sets up Go 1.25 and Node 20 ✓\n  - Builds frontend ✓\n  - `go build ./cmd/kf` — no ldflags, no version stamping\n\
    \  - `go test ./...` — no -race flag\n  - No frontend tests\n- Linux test job uses `make build-backend` which includes\
    \ ldflags\n- Makefile GO_CMD macro handles worktree detection — may need adjustment\n  for Windows paths but CI runs in\
    \ a normal checkout (not a worktree)\n- Platform-specific files exist: daemon_windows.go, process_windows.go\n- CGO_ENABLED=0\
    \ in goreleaser; modernc.org/sqlite is pure Go\n- Race detector works on windows/amd64 in Go 1.25\n"
  acceptance_criteria:
  - Windows CI job runs `go test -race ./...`
  - Windows CI job builds with ldflags matching Linux (version, commit, date)
  - Windows CI job runs frontend tests
  - All steps pass on windows-latest runner
  out_of_scope: '- Adding Windows to the lint matrix (staticcheck/goimports are platform-independent)

    - Adding coverage reporting on Windows

    - Cross-compilation from Linux to Windows

    - Makefile Windows compatibility (CI uses direct go commands)

    '
  technical_notes: "- Race detector: supported on windows/amd64 since Go 1.19. Add -race flag.\n- ldflags: use PowerShell\
    \ equivalents for git describe/rev-parse/date.\n  Windows runners have PowerShell as default shell.\n- Frontend tests:\
    \ add `cd frontend && npm test -- --run` step.\n- Keep using direct go commands (not make) since Makefile uses bash syntax.\n"
plan:
- phase: CI Config Updates
  tasks:
  - text: Add -race flag to Windows go test command
    done: true
  - text: Add ldflags with version/commit/date to Windows go build using PowerShell
    done: true
  - text: Add frontend test step to Windows job
    done: true
- phase: Validation
  tasks:
  - text: Verify YAML syntax is valid
    done: true
  - text: Confirm PowerShell variable syntax works for ldflags on windows-latest
    done: true
extra: {}
