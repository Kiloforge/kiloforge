    tasks:
      - text: "Fix mkdir_acquire to use $PPID (or --pid flag) instead of $$ for stable PID recording"
        done: false
      - text: "Fix cmd_heartbeat to update only timestamp, preserving original PID from info file"
        done: false
      - text: "Fix mkdir_release to validate holder name before deleting lock directory"
        done: false
      - text: "Add --pid flag to acquire and heartbeat commands for explicit PID override"
        done: false
  - phase: Track State Repair
    tasks:
      - text: "Repair 3 corrupted tracks (cmd-mode-help-fe, push-conflict-resolver-fe, ui-polish-transitions-fe) to completed status"
        done: false
      - text: "Prune deps.yaml of all completed track entries"
        done: false
  - phase: Documentation
    tasks:
      - text: "Add MERGE PROTOCOL comment block to kf-merge-lock documenting correct --ours/--theirs semantics"
        done: false
      - text: "Add IMPORTANT comment in kf-merge-lock about main worktree cleanup before ff-merge"
        done: false
  - phase: Verification
    tasks:
      - text: "Test lock acquire/release/heartbeat cycle manually — verify PID is stable and holder is validated"
        done: false
      - text: "Run make test and make build to verify no regressions"
        done: false
