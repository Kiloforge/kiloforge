id: fix-nested-claude-env_20260310001000Z
title: Fix Nested Claude Session Detection тАФ Unset CLAUDECODE Env Var
type: bug
status: complete
created: 2026-03-10T00:10:00Z
updated: 2026-03-10T00:10:00Z
spec:
  summary: "All agent spawning fails silently when Kiloforge runs inside a Claude Code session. Claude detects the `CLAUDECODE` environment variable from the parent process and refuses to start: "Claude Code cannot be launched inside another Claude Code session." The spawner inherits the parent env without cleaning it, so the child `claude` process exits immediately with no stdout output."
  context: |
    This is the **root cause** of the "exit 0" issue when generating tracks from the dashboard. The agent process inherits `CLAUDECODE` from the parent environment. Claude CLI checks this env var and aborts to prevent nested sessions. Since `cmd.Stderr` goes to a log file and `cmd.Stdout` is piped for stream-json parsing, the error message is only visible in stderr (log file) тАФ but it's actually printed to the shell's stderr before the pipe is set up, so even the log file is 0 bytes.
    
    This affects ALL agent spawning methods:
    - `SpawnInteractive` (interactive agents, track generation, admin operations)
    - `SpawnDeveloper` (via `server.go` defaultSpawner)
    - `SpawnReviewer` (via `server.go` defaultSpawner)
  codebase_analysis: |
    ### Root cause
    
    - **`backend/internal/adapter/agent/spawner.go:377`** тАФ `cmd := exec.CommandContext(ctx, "claude", args...)` inherits parent env
    - No `cmd.Env` is set, so `CLAUDECODE` (and any other Claude-internal env vars) propagate to child
    - Claude CLI checks `CLAUDECODE` and exits with error before producing any stream-json output
    
    ### Other spawners with same issue
    
    - **`backend/internal/adapter/rest/server.go:176`** тАФ `SpawnReviewer`: `cmd := exec.CommandContext(ctx, "claude", args...)` тАФ no env cleaning
    - **`backend/internal/adapter/rest/server.go:192`** тАФ `ResumeDeveloper`: same issue
    
    ### Verified behavior
    
    ```
    $ cd /Users/benbaldivia/.kiloforge/repos/example-project
    $ claude --output-format stream-json --dangerously-skip-permissions -p "say hello"
    Error: Claude Code cannot be launched inside another Claude Code session.
    Nested sessions share runtime resources and will crash all active sessions.
    To bypass this check, unset the CLAUDECODE environment variable.
    ```
  acceptance_criteria:
    - All `exec.CommandContext(ctx, "claude", ...)` calls in the codebase set `cmd.Env` with `CLAUDECODE` removed
    - Create a helper function `cleanClaudeEnv()` that returns `os.Environ()` filtered to remove `CLAUDECODE` and any other Claude-internal env vars
    - `SpawnInteractive` in `spawner.go` uses cleaned env
    - `SpawnReviewer` in `server.go` uses cleaned env
    - `ResumeDeveloper` in `server.go` uses cleaned env
    - Agent spawning works when Kiloforge runs inside a Claude Code session
    - `make test` passes
  out_of_scope: |
    - Other env var conflicts between parent and child Claude sessions
    - Running multiple Claude instances concurrently (separate concern)
  technical_notes: |
    ### The fix
    
    Create a helper in `spawner.go`:
    
    ```go
    // cleanClaudeEnv returns os.Environ() with Claude-internal env vars removed
    // to prevent "nested session" detection in child claude processes.
    func cleanClaudeEnv() []string {
        var env []string
        for _, e := range os.Environ() {
            if strings.HasPrefix(e, "CLAUDECODE=") {
                continue
            }
            env = append(env, e)
        }
        return env
    }
    ```
    
    Then in each spawner, before `cmd.Start()`:
    ```go
    cmd.Env = cleanClaudeEnv()
    ```
    
    Apply to:
    1. `spawner.go:377` тАФ `SpawnInteractive`
    2. `server.go:176` тАФ `SpawnReviewer`
    3. `server.go:192` тАФ `ResumeDeveloper`
    
    ---
