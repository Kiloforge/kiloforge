id: push-conflict-resolver-skill_20260311140001Z
title: Embedded kf-conflict-resolver skill for AI-assisted merge conflict resolution
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Create the kf-conflict-resolver embedded skill that an agent uses to fetch remote
    changes, resolve merge conflicts intelligently, and complete the sync (push or pull).
  context: |
    When syncing with a remote fails due to diverged history — either on push (non-fast-forward
    rejection) or pull (diverged branches) — the user can spawn a "conflict resolver agent"
    from the Command Deck. This agent runs the kf-conflict-resolver skill which automates
    the merge resolution workflow for both directions.
    
    For push conflicts: fetch remote, merge remote into local, resolve conflicts, push.
    For pull conflicts: fetch remote, merge remote into local, resolve conflicts (pull complete).
  codebase_analysis: |
    Affected files:
    - backend/internal/adapter/skills/embedded/kf-conflict-resolver/SKILL.md (NEW)
    
    Existing skill pattern (from kf-developer/SKILL.md):
    - Skills are markdown files with structured workflow sections
    - Each skill has: purpose, prerequisites, phases, error handling
    - Skills reference project context from .agent/kf/ artifacts
    
    The skill will be invoked by the agent spawner with:
    - Working directory set to the project directory
    - Direction (push/pull) and remote branch passed as context
    - SSH key path available for authenticated push/pull
    
    The agent needs to:
    1. git fetch origin
    2. Determine merge strategy based on direction
    3. git merge origin/{remoteBranch} (or the appropriate ref)
    4. If conflicts: read each conflicted file, use AI judgment to resolve
    5. git add resolved files, git commit
    6. For push direction: git push origin main:{remoteBranch}
    7. Report success/failure back
    
    The skill should be conservative: if a conflict seems ambiguous or high-risk,
    it should report the conflict details and ask for human guidance rather than
    making a potentially incorrect merge.
  acceptance_criteria:
    - SKILL.md created at backend/internal/adapter/skills/embedded/kf-conflict-resolver/
    - Skill handles both push and pull conflict resolution directions
    - Skill handles the no-conflict case (auto-merge succeeds after fetch)
    - Skill reports clear status at each step
    - Skill escalates ambiguous conflicts rather than making risky merges
    - Skill follows the existing embedded skill patterns and conventions
    - make build succeeds (skill embedded in binary)
  out_of_scope: |
    - Backend API changes (separate track)
    - Frontend UI (separate track)
    - Interactive conflict resolution (agent resolves autonomously or escalates)
  technical_notes: |
    The skill SKILL.md should follow the structure of existing skills:
    1. Title and purpose
    2. Use when / do not use when
    3. Prerequisites (git, remote configured)
    4. Workflow phases:
       - Phase 1: Validate (check remote exists, check branch state, parse direction)
       - Phase 2: Fetch and merge (git fetch, git merge)
       - Phase 3: Resolve conflicts (if any — read files, apply resolution)
       - Phase 4: Complete sync (push for push direction, done for pull direction)
       - Phase 5: Report (success/failure summary)
    5. Error handling table
    
    The agent receives direction and remote branch as context via prompt.
    It operates in the project's main worktree directory.
plan:
