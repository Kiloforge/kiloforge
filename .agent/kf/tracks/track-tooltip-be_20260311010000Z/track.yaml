id: track-tooltip-be_20260311010000Z
title: Track deps/conflicts API — extend track endpoints with dependency and conflict data
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-09
spec:
  summary: "Extend GET /api/tracks/{trackId} and GET /api/tracks to include dependency graph and conflict risk data from deps.yaml and conflicts.yaml, enabling the frontend to visualize track relationships."
  context: |
    The backend already has a complete dependency graph (deps.yaml) and conflict risk pairs (conflicts.yaml) tracked via the pkg/kf SDK. However, none of this data is exposed through the REST API. The frontend currently receives only basic track info (id, title, status, type) and has no way to show relationships between tracks.
    
    The frontend needs this data to render visual connectors between Kanban cards showing dependency chains and conflict risk.
  codebase_analysis: |
    ### Existing backend infrastructure
    
    **pkg/kf SDK** (already implemented):
    - `deps.go` — `DepsGraph map[string][]string`, `ReadDepsFile()`, `AllDepsSatisfied()`, `HasDeps()`
    - `conflicts.go` — `ConflictPair{TrackA, TrackB, Risk, Note, Added}`, `ReadConflictsFile()`, `FindConflicts()`
    - `client.go` — `GetDepsGraph()`, `GetConflicts()`, `GetConflictsForTrack()`
    
    **Current API (openapi.yaml)**:
    - `GET /api/tracks` returns `Track[]` — only `{id, title, status, project}`
    - `GET /api/tracks/{trackId}` returns `TrackDetail` — adds spec, plan, phases, tasks but NO deps/conflicts
    - Track data read from `.agent/kf/tracks.yaml` and per-track `track.yaml` files
    
    **Service layer**:
    - `implement_service.go` — has `trackReader port.TrackReader` but only reads basic track info
    - No service method to expose deps/conflicts via API
    
    ### Files to modify
    - `backend/api/openapi.yaml` — add deps/conflicts to Track and TrackDetail schemas
    - `backend/internal/adapter/rest/api_handler.go` — extend track handlers to include relationship data
    - `backend/internal/core/service/` — add method to aggregate track + deps + conflicts
    - Generated code via `make gen-api`
  acceptance_criteria:
    - GET /api/tracks returns dependency count and conflict count per track
    - GET /api/tracks/{trackId} returns full dependency list with each dep's id, title, and status (completed/pending/in-progress)
    - GET /api/tracks/{trackId} returns full conflict list with other track id, risk level, and note
    - OpenAPI schema updated with new response fields before implementation
    - Generated code regenerated via make gen-api
    - Existing track endpoints remain backward compatible (new fields are additive)
  out_of_scope: |
    - Frontend rendering of deps/conflicts (separate FE track)
    - Modifying deps or conflicts via API (read-only for now)
    - New standalone endpoints for deps/conflicts (extend existing track endpoints instead)
  technical_notes: |
    ### Schema additions to Track (list response)
    
    ```yaml
    Track:
      properties:
        # ... existing fields ...
        deps_count:
          type: integer
          description: Number of dependencies this track has
        deps_met:
          type: integer
          description: Number of dependencies that are completed
        conflict_count:
          type: integer
          description: Number of active conflict risk pairs
    ```
    
    ### Schema additions to TrackDetail (detail response)
    
    ```yaml
    TrackDetail:
      properties:
        # ... existing fields ...
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/TrackDependency'
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/TrackConflict'
    
    TrackDependency:
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending, in-progress, completed]
    
    TrackConflict:
      properties:
        track_id:
          type: string
        track_title:
          type: string
        risk:
          type: string
          enum: [high, medium, low]
        note:
          type: string
    ```
    
    ### Implementation approach
    1. Update OpenAPI schema first (schema-first requirement)
    2. Regenerate Go code via make gen-api
    3. Extend handler to use pkg/kf client to read deps.yaml and conflicts.yaml
    4. Populate new fields in track responses
plan:
  - phase: Schema and code generation
    tasks:
      - text: Update openapi.yaml — add TrackDependency and TrackConflict schemas, extend Track with deps_count/deps_met/conflict_count, extend TrackDetail with dependencies[] and conflicts[]
        done: true
      - text: Run make gen-api to regenerate Go server code
        done: true
  - phase: Backend implementation
    tasks:
      - text: Add service method to aggregate track data with deps and conflicts using pkg/kf client
        done: true
      - text: Update GET /api/tracks handler to populate deps_count, deps_met, conflict_count per track
        done: true
      - text: Update GET /api/tracks/{trackId} handler to populate full dependencies[] and conflicts[] arrays
        done: true
  - phase: Testing and verification
    tasks:
      - text: Write unit tests for the new service method covering tracks with deps, without deps, and with conflicts
        done: true
      - text: Verify make verify-codegen passes (generated code matches schema)
        done: true
      - text: Manual test: curl track endpoints and verify deps/conflicts data appears in response
        done: true
