spec:
  summary: "Add tests for the 5 most critical untested frontend hooks: `useAgentWebSocket`, `useSSE`, `useProjects`, `useBoard`, and `useOriginSync`. These hooks contain complex logic (reconnection, exponential backoff, optimistic updates, SSE event handling) that is invisible without tests."
  context: "Frontend test coverage is 8.8% (5/57 files). All critical hooks with complex logic are untested. The existing test infrastructure (Vitest + React Testing Library) is solid — the gap is purely in coverage, not tooling."
  codebase_analysis: |
    - **F-T1 (Critical):** `hooks/useAgentWebSocket.ts` (200 lines) — WebSocket reconnection, exponential backoff, message parsing
    - **F-T4 (High):** `hooks/useProjects.ts` (142 lines) — Add/remove mutations + SSE event handlers
    - **F-T5 (High):** `hooks/useBoard.ts` (113 lines) — Board state + optimistic updates
    - **F-T7 (High):** `hooks/useSSE.ts` (69 lines) — EventSource lifecycle, retry logic
    - **F-T8 (High):** `hooks/useOriginSync.ts` — Push/pull mutations, sync status
    
    Existing test patterns: `useTour.test.ts` uses React Testing Library's `renderHook()`, proper async assertions.
  acceptance_criteria:
    - `useAgentWebSocket` tested: connection, reconnection, backoff, message parsing, cleanup
    - `useSSE` tested: EventSource creation, event handling, reconnection, cleanup
    - `useProjects` tested: add/remove mutations, SSE event updates, error handling
    - `useBoard` tested: board fetching, optimistic updates on move, error rollback
    - `useOriginSync` tested: push/pull mutations, sync status fetching
    - All tests use React Testing Library patterns consistent with existing tests
    - Tests run via `npm test` and `make test-frontend`
  out_of_scope: |
    - Page-level tests (covered by frontend-test-pages track)
    - Component tests
    - E2E tests
  technical_notes: |
    ### WebSocket testing
    Use `vitest` mock for WebSocket (`vi.stubGlobal('WebSocket', MockWebSocket)`). Test reconnection by simulating close events with non-1000 codes.
    
    ### SSE testing
    Mock `EventSource` global. Simulate `onmessage` events with typed payloads. Verify `queryClient.setQueryData` is called with correct data.
    
    ### TanStack Query testing
    Wrap hooks in `QueryClientProvider` with a fresh `QueryClient` per test. Use `renderHook()` from `@testing-library/react`.
    
