id: local-skills-install-be_20260311160000Z
title: Install skills into project repo during kf add — local-first skill distribution
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Change kf add to auto-install embedded skills into {projectDir}/.claude/skills/ with
    branded messaging ("Transforming your agent into a high-productivity track-slinging
    machine"). Update the REST API skills endpoint to support local project install. Keep
    global install as fallback for kf init.
  context: |
    Currently kf init installs all embedded skills globally to ~/.claude/skills/. The kf add
    command registers a project but does not install skills. The agent spawner already checks
    both global (~/.claude/skills/) and local ({projectDir}/.claude/skills/) directories, so
    the infrastructure for local skills already exists — it just isn't wired into the setup flow.
    
    Users shouldn't need to worry about global skill installation. When they add a project,
    kiloforge should automatically install the specialized skills into the project's repo so
    their agent can use them immediately. This makes the setup self-contained and portable.
    
    The messaging should be branded and exciting — not a dry "installing skills" but
    "Transforming your agent into a high-productivity track-slinging machine."
  codebase_analysis: |
    Key files and current behavior:
    
    1. backend/internal/adapter/skills/checker.go
       - InstallAllEmbedded(destDir) — installs all embedded skills to destDir
       - InstallEmbedded(skillName, destDir) — installs a single skill
       - CheckRequired/CheckStatus — already support globalDir + localDir params
       - hashMatches — SHA-256 freshness check works with any directory
    
    2. backend/internal/adapter/cli/add.go (runAdd)
       - Clones repo, registers project, prints success message
       - Does NOT install skills — this is where we add local install
    
    3. backend/internal/adapter/cli/init.go (runInit)
       - Calls installEmbeddedSkills(cfg) which installs to cfg.GetSkillsDir() (global)
       - This stays as-is for global fallback
    
    4. backend/internal/adapter/cli/skills.go
       - installEmbeddedSkills(cfg) — helper that installs to global dir
       - Needs a new variant: installLocalSkills(projectDir) for per-project install
    
    5. backend/internal/adapter/cli/implement.go (lines 315-357)
       - Already offers "global vs local" choice when skills are missing
       - Can be simplified: if local skills exist, skip the prompt
    
    6. backend/internal/adapter/rest/api_handler.go
       - UpdateSkills (line 1229) — installs to global dir only
       - Needs to accept optional project slug to install locally
       - GetSkillsStatus (line ~1200) — reports global status
       - checkSkillsForRole (line 2175) — already checks both dirs
    
    7. backend/internal/adapter/agent/spawner.go (line 41-58)
       - ValidateSkills already checks both global and local .claude/skills/
       - No changes needed here
    
    8. backend/internal/adapter/cli/create_project.go
       - "kf create" for local projects — should also install skills locally
    
    Patterns to follow:
    - installEmbeddedSkills in skills.go for the install helper
    - The branded messaging style matches init.go ("You're ready, Kiloforger!")
  acceptance_criteria:
    - "kf add <url>" installs all embedded skills into {projectDir}/.claude/skills/ after cloning
    - "kf create" (local project) also installs skills locally
    - Branded CLI output includes "Transforming your agent into a high-productivity track-slinging machine"
    - Skills install is idempotent (hash check skips unchanged skills)
    - REST API POST /api/skills/update accepts optional project_slug to install locally
    - Existing global install via kf init remains unchanged
    - Agent spawner continues to find skills in both global and local directories
    - Tests cover local installation path (checker_test.go) and CLI flow
  out_of_scope: |
    - Frontend changes to SkillsBanner (works as-is, future track if needed)
    - Changing the global install behavior of kf init
    - Per-skill selective installation (all embedded skills are installed)
    - Skill auto-update mechanism changes
  technical_notes: |
    The main change is adding a installLocalSkills(projectDir string) helper that calls
    skills.InstallAllEmbedded(filepath.Join(projectDir, ".claude", "skills")) and wiring
    it into runAdd and runCreateProject. The REST API needs a minor extension to accept
    a project slug parameter and resolve the project directory for local install.
    
    .claude/skills/ should be added to .gitignore in the project if not already there,
    since these are machine-local artifacts (like node_modules). However, if the user
    wants to commit them for portability, they can remove the gitignore entry.
