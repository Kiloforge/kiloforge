title: Major tour overhaul — cover notifications, swarm capacity, tracks, agents, dependencies, and traces
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Overhaul the product tour to cover the full feature set: notification center,
    swarm capacity (project and cortex level), track states and lifecycle,
    dependency and conflict risk visualization, interactive vs autonomous agent
    types, agent history on tracks, and traces. Rebrand "developer" agent type
    display as "autonomous" in the tour content (label only, not role).
  context: |
    The current tour has 7 steps covering basic onboarding: welcome, add project,
    open project, setup notice, generate tracks, board explanation, and move card.
    Many major features added since the tour was built are not covered:
    
    - **Notification center** — Bell icon + dropdown showing agents needing
      attention (BE/FE under active development, blocking this track)
    - **Swarm capacity** — SwarmPanel shows active/max agents, queue depth,
      per-project and cortex-level capacity
    - **Track states** — Tracks flow through pending → approved → in_progress →
      completed lifecycle stages
    - **Dependencies** — RelationshipOverlay draws SVG lines between cards
      showing dependency chains and conflict risk levels (high/medium/low)
    - **Agent types** — Interactive sessions (user-facing terminal) vs autonomous
      agents (developer/reviewer, background workers). User wants to rebrand
      "developer" type as "autonomous" in the tour for clarity
    - **Agent history** — Track detail page will show agents that worked on a
      track (register + traces via track-detail-register-traces tracks)
    - **Traces** — OpenTelemetry spans with trace viewer (TracePage, TraceTimeline)
      linked from board cards and track detail
  codebase_analysis: |
    **Tour system** (custom, no 3rd-party library):
    - `tourSteps.ts`: 7 steps with id, target (CSS selector), title, content,
      placement, action, and demoState reference
    - `tourDemoData.ts`: DEMO_PROJECT_SLUG, DEMO_BOARD (4 columns, 5 cards),
      DEMO_TRACKS, per-step DemoState with route + query injections
    - `TourProvider.tsx`: React context managing tour state (pending/active/
      dismissed/completed), demo data injection into TanStack Query, automatic
      navigation to required routes per step
    - `TourOverlay.tsx`: Spotlight rendering with backdrop, tooltip positioning,
      re-scan every 500ms for target movement
    - `useTour.ts`: API hook — GET/PUT /api/tour with actions (accept, advance,
      dismiss, complete)
    
    **Notification center** (pending implementation):
    - BE track: `notification-center-be_20260313060000Z` (worker-4 implementing)
    - FE track: `notification-center-fe_20260313060001Z` (pending, unregistered)
    - Will add bell icon in header with `[data-tour="notification-bell"]` target
    - SSE-driven real-time notification delivery
    
    **Swarm capacity**:
    - `SwarmPanel.tsx` — agents active/max, queue status, configurable max size
    - `useSwarmCapacity.ts` — SSE-driven capacity updates
    - API: GET /api/swarm/capacity
    
    **Dependency/conflict visualization**:
    - `RelationshipOverlay.tsx` — SVG lines between board cards
    - `useTrackRelations.ts` — fetches TrackDetail for all board cards
    - Color-coded: blue (deps), red/orange/yellow (conflict risk levels)
    
    **Traces**:
    - `TracePage.tsx` — trace detail with TraceTimeline spans
    - `TraceList.tsx` — trace summary list
    - Board cards link to traces via `card.trace_id`
    - API: GET /api/traces, GET /api/traces/{traceId}
    
    **Agent types**:
    - Domain: `AgentRoleDeveloper`, `AgentRoleReviewer` (worker/autonomous)
    - Domain: `AgentRoleArchitect`, interactive sessions
    - `IsWorkerRole()` helper distinguishes autonomous from interactive
    - Frontend displays `agent.role` directly — no type/role distinction in UI yet
  acceptance_criteria:
    - Tour expanded from 7 to ~14-15 steps covering all major features
    - New step for notification center — targets bell icon, explains agent attention alerts
    - New step for swarm capacity — targets SwarmPanel, explains agent limits and queue
    - New step for track states — highlights board columns, explains lifecycle flow
    - New step for dependency visualization — targets RelationshipOverlay toggle, explains lines/colors
    - New step for conflict risk — explains color coding (red/orange/yellow) and what conflict risk means
    - New step for agent types — explains interactive (terminal) vs autonomous (developer/reviewer background agents)
    - New step for agent history — targets track detail page, shows which agents worked on a track
    - New step for traces — targets trace link on a board card, explains OpenTelemetry observability
    - Demo data expanded with mock notifications, capacity data, dependency relationships, and trace links
    - Tour demo board updated to reflect 3-column layout (depends on board-layout-3col-fe)
    - Each new step has proper spotlight targeting (data-tour attributes on target components)
    - Tour flows logically — onboarding basics first, then advanced features
    - Existing tour steps preserved or updated (not removed)
    - "Developer" agent type described as "autonomous" in tour content (display label, not code change)
    - All tour tests updated
    - make test and make build pass
  out_of_scope: |
    - Backend changes to agent role/type enum (display-only rebrand in tour content)
    - Notification center implementation (separate tracks, this depends on them)
    - New feature implementations — tour only explains existing features
    - Tour API backend changes (existing accept/advance/dismiss/complete actions are sufficient)
  technical_notes: |
    **Step ordering approach:**
    
    The tour should flow from simple to complex:
    1. Welcome (existing)
    2. Add a project (existing)
    3. Open your project (existing)
    4. Project setup (existing, updated)
    5. Swarm capacity — show SwarmPanel, explain agent limits
    6. Generate tracks — (existing, updated)
    7. The kanban board — (existing, updated for 3-col)
    8. Track states — explain backlog/approved/in-progress lifecycle
    9. Move a card — (existing interactive step)
    10. Dependencies & conflicts — show RelationshipOverlay, explain lines
    11. Agents: interactive vs autonomous — explain the two types
    12. Notification center — show bell icon, explain attention alerts
    13. Agent history & traces — show trace link on card, explain observability
    14. Finish — congratulations, suggest next actions
    
    **Demo data expansion:**
    
    - Add mock notifications to inject during notification step
    - Add dependency/conflict relationships to demo cards
    - Add trace_id to at least one demo card (the in_progress one)
    - Add mock capacity data (e.g., 1/3 agents active)
    - Ensure demo data only injects on steps that need it (per-step injection)
    
    **data-tour attributes needed on target components:**
    
    New attributes to add (by the developer implementing this track):
    - `[data-tour="swarm-panel"]` on SwarmPanel root
    - `[data-tour="notification-bell"]` on notification bell icon (added by notification-center-fe)
    - `[data-tour="relationship-toggle"]` on RelationshipOverlay toggle button
    - `[data-tour="trace-link"]` on a board card's trace link
    - `[data-tour="track-state-column"]` on a specific column header
    
    Some of these may already exist or may need to be added as part of this track.
