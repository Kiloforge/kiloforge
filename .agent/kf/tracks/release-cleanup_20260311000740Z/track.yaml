  technical_notes: |
    ### install.sh pre-release fix
    The GitHub API `/releases/latest` endpoint excludes pre-releases. For alpha releases,
    use the `/releases` endpoint and filter for the first non-draft release:
    ```bash
    VERSION="$(curl -fsSL "https://api.github.com/repos/${REPO}/releases" \
      | grep '"tag_name"' | head -1 \
      | sed -E 's/.*"tag_name":\s*"([^"]+)".*/\1/')"
    ```
    
    ### Repo visibility
    Final step: `gh repo edit Kiloforge/kiloforge --visibility public`
    This requires admin access. The developer should confirm with the user before executing.
