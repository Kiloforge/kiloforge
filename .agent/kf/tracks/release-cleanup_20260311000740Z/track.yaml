    repo lived at Goblinlordx/crelay. It has since moved to Kiloforge/kiloforge. The old track was
    archived but its artifacts remain in the codebase with stale references. Additionally, the original
    track included Homebrew tap publishing which is being deferred ‚Äî not appropriate for an early alpha.
    This track cleans up everything so a `v0.1.0-alpha.1` tag push produces a correct release.
  codebase_analysis: |
