       - Homepage URL references Goblinlordx/crelay
    
    2. `.github/workflows/release.yml`
       - Go version `1.24` ‚Üí `1.25` (go.mod requires 1.25.0)
       - Has `HOMEBREW_TAP_TOKEN` secret in env ‚Üí REMOVE
    
    3. `CHANGELOG.md`
       - Header `## [0.1.0] ‚Äî Unreleased` ‚Üí `## [0.1.0-alpha.1] ‚Äî Unreleased`
    
    4. `README.md` (many references)
       - curl install URLs ‚Üí Kiloforge/kiloforge
       - Homebrew section (lines 34-39) ‚Üí REMOVE
       - GitHub Releases link ‚Üí Kiloforge/kiloforge
       - Clone URL ‚Üí Kiloforge/kiloforge
       - Releasing section mentions Homebrew tap, HOMEBREW_TAP_TOKEN ‚Üí REMOVE
       - Issues URL ‚Üí Kiloforge/kiloforge
       - Release tag example `v0.1.0` ‚Üí `v0.1.0-alpha.1`
    
