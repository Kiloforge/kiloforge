    - `Makefile` release-local target ‚Äî `goreleaser release --snapshot --clean`
    - `LICENSE` and `NOTICE` ‚Äî exist, referenced by .goreleaser.yaml archives
    - `.github/workflows/ci.yml` ‚Äî Go 1.25, correct
    - `.github/workflows/close-external-prs.yml` ‚Äî fine as-is
    
