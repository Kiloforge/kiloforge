    - `backend/internal/adapter/cli/version.go` ‚Äî version command prints version, commit, date, Go version, OS/arch
    - `backend/internal/adapter/cli/version_test.go` ‚Äî tests for SetVersionInfo and versionCmd registration
    - `backend/cmd/kf/main.go` ‚Äî calls cli.SetVersionInfo(version, commit, date)
