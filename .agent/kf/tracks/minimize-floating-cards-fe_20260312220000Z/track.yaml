id: minimize-floating-cards-fe_20260312220000Z
title: "Minimized agent windows as draggable edge-clamped mini-cards with notifications"
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Replace the bottom-center dock pills with small floating mini-cards that
    can be dragged along viewport edges. Add notification badges that distinguish
    "waiting for input" (agent idle after turn_end) from general unread output.
  context: |
    Currently, minimizing an agent terminal hides the window and shows a small
    pill in a fixed dock at the bottom center. The user wants minimized windows
    to appear as compact floating cards (roughly 200x60px) that can be dragged
    around but are clamped to viewport edges (bottom, left, right). The cards
    should also notify when:
    - An interactive agent is waiting for user input (turn completed)
    - A worker agent has finished (completed/failed status)
  codebase_analysis: |
    **TerminalDock** (`frontend/src/components/TerminalDock.tsx`):
    - Simple component rendering pills at bottom-center
    - Each pill shows: role dot, name, unread count badge, close button
    - Fixed position: `bottom: 0; left: 50%; transform: translateX(-50%)`
    - Z-index: 90

    **useWindowManager** (`frontend/src/hooks/useWindowManager.ts`):
    - `minimize(agentId)` — sets `minimized: true`
    - `restore(agentId)` — sets `minimized: false`, clears `unreadCount`
    - `incrementUnread(agentId)` — increments counter
    - `WindowEntry` has: agentId, name, role, minimized, unreadCount

    **useFloatingWindow** (`frontend/src/hooks/useFloatingWindow.ts`):
    - Handles drag, resize, viewport clamping for full-size windows
    - Can be reused or adapted for mini-card drag (without resize)

    **WS Message Protocol** (`backend/internal/adapter/ws/message.go`):
    - `turn_start` — emitted when agent begins processing
    - `turn_end` — emitted when agent finishes a turn
    - Frontend currently ignores these for state tracking

    **AgentTerminal** (`frontend/src/components/AgentTerminal.tsx`):
    - Calls `onActivity?.()` on new messages → triggers `incrementUnread()`
    - Does not distinguish between "output arrived" and "turn ended"
  acceptance_criteria:
    - Minimized windows appear as compact floating mini-cards (~200x60px) instead of dock pills
    - Mini-cards can be dragged along viewport edges (bottom, left, right sides)
    - Mini-cards are clamped to edges — they snap to the nearest edge and slide along it
    - Mini-cards show agent name, role-colored indicator, and notification badge
    - Notification badge distinguishes "waiting for input" (pulsing/attention style) from general unread count
    - "Waiting for input" state is derived from turn_end messages (agent finished its turn, user's turn)
    - Worker agent completion shows a "done" badge on the mini-card
    - Clicking a mini-card restores the full window
    - Close button on mini-card removes the window entirely
    - Multiple mini-cards stack along the edge without overlapping
    - Keyboard shortcut Cmd+Shift+M still toggles minimize
  out_of_scope: |
    - Agent interrupt button (separate track)
    - Input queueing (separate track)
    - Backend changes (turn_start/turn_end already exist in WS protocol)
    - Changing full-size window behavior
  technical_notes: |
    **Implementation approach:**

    1. **Track turn state in useAgentWebSocket**
       Parse `turn_start` and `turn_end` message types from the WS stream.
       Expose a `turnActive: boolean` state. When `turn_end` arrives and agent
       is not terminal, the agent is "waiting for input".

    2. **Extend WindowEntry with notification type**
       Add `notificationType?: "waiting" | "done" | "unread"` to WindowEntry.
       - "waiting" — turn_end received, agent idle, interactive role
       - "done" — agent status is completed/failed (worker roles)
       - "unread" — new messages but not specifically waiting

    3. **Replace TerminalDock with MiniCardDock**
       New component that renders mini-cards instead of pills. Each card:
       - Small floating div with role-colored left border
       - Shows name and notification badge
       - Draggable via pointer events (reuse drag logic from useFloatingWindow)
       - Position clamped to nearest viewport edge

    4. **Edge-clamping logic**
       Mini-cards snap to the nearest edge (bottom, left, right). When dragged,
       they slide along that edge. Releasing near a different edge snaps to it.
       Implementation: track which edge the card is on, constrain movement to
       that axis. On drag end, snap to nearest edge if moved away.

    5. **Stacking**
       Multiple mini-cards on the same edge stack with a small gap (e.g., 8px).
       Use the same edge-aware layout as dock pills but vertically for side edges.
