    tasks:
      - text: "Add git user identity setup (user.name, user.email) to kf-tools job before running tests"
        done: true
      - text: Add git config --global init.defaultBranch main to test job setup steps
        done: true
      - text: Add frontend build step (npm ci && npm run build) before golangci-lint in lint job
        done: true
      - text: Fix setup-go cache-dependency-path to backend/go.sum in all jobs that use it
        done: true
  - phase: "Phase 2: Test helper fixes"
    tasks:
