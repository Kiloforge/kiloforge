title: SSE Entity Subscriptions
type: feature
status: complete
created: 2026-03-09T09:15:01Z
updated: 2026-03-09T09:15:01Z
spec:
  summary: Add SSE event emission for all entity types (tracks, board, traces, projects, locks) and update frontend hooks to consume events instead of polling, achieving true real-time monitoring across the entire dashboard.
  context: |
    After the event bus infrastructure (sse-event-bus_20260309091500Z) is in place, the system needs actual event emission for each entity type. Currently, 4 out of 7 dashboard data sources rely on polling:
    
    | Entity | Current Pattern | Target |
    |--------|----------------|--------|
    | Agents | SSE (2s watcher) | Keep as-is |
    | Quota | SSE (2s watcher) | Keep as-is |
    | Tracks | 30s polling | SSE `track_update` / `track_removed` |
    | Board | 15s polling | SSE `board_update` |
    | Traces | 10s polling | SSE `trace_update` |
    | Projects | One-time fetch | SSE `project_update` / `project_removed` |
    | Locks | On-demand | SSE `lock_update` / `lock_released` |
  codebase_analysis: |
    - **Track discovery**: `service.DiscoverTracks(projectDir)` reads `.agent/conductor/tracks/` from disk — file-based, needs watcher polling
    - **Board state**: `service.NativeBoardService` has `GetBoard()`, `MoveCard()`, `SyncFromTracks()` — mutations can emit directly
    - **Trace store**: `tracing.Store` is in-memory with OTLP receiver — can emit on span completion
    - **Project store**: `persistence/jsonfile/project_store.go` has `Add()` — can emit on mutation (no `Remove()` yet, coming in project-manage-api track)
    - **Lock manager**: `lock.Manager` has `Acquire()`, `Release()`, `Heartbeat()` — can emit on state changes
    - **Frontend hooks**: `useTracks.ts` (30s poll), `useBoard.ts` (15s poll), `useTraces.ts` (10s poll), `useProjects.ts` (one-time fetch) — all need SSE handler additions
    - **App.tsx**: SSE handlers registered in `sseHandlers` memo at line 31-38 — needs expansion for new event types
  acceptance_criteria:
    - Track changes broadcast via SSE — dashboard updates without 30s wait
    - Board card movements broadcast via SSE — other viewers see changes immediately
    - New traces broadcast via SSE — trace list updates without 10s wait
    - Project add/remove broadcast via SSE — project list updates in real time
    - Lock acquire/release broadcast via SSE — lock state visible in real time
    - Frontend hooks updated to merge SSE events with initial REST fetch
    - Polling intervals removed (or converted to infrequent background sync fallback)
    - All existing SSE functionality (agents, quota) continues working
    - No performance regression — event emission is non-blocking
  out_of_scope: |
    - Changing the SSE transport to WebSockets
    - Event persistence or replay (missed events require a REST refetch)
    - Per-topic subscription filtering at the SSE endpoint (all events go to all clients)
    - Agent or quota event changes (those already work via watcher)
  technical_notes: |
    ### Backend Event Emission Strategy
    
    Two approaches based on state source:
    
    1. **Mutation-driven** (preferred for service-owned state): Emit events directly in service/handler methods after successful mutations.
       - Board: `MoveCard()` → emit `board_update`
       - Locks: `Acquire()`/`Release()` → emit `lock_update`/`lock_released`
       - Projects: `Add()`/`Remove()` → emit `project_update`/`project_removed`
    
    2. **Watcher-driven** (required for file-based state): Extend the existing watcher to poll and delta-detect.
       - Tracks: discovered from disk (`.agent/conductor/tracks/`), no mutation API — watcher must poll
       - Traces: in-memory store, but spans arrive via OTLP receiver — watcher or store hook
    
    ### Frontend Pattern
    
    Each hook follows the same pattern used by `useAgents`:
    1. Initial REST fetch for full state
    2. SSE handler merges incremental updates into state
    3. Remove `setInterval` polling
    4. Optional: keep a long-interval (e.g., 5min) background sync as drift protection
    
    ### Watcher Extension
    
    The existing watcher's `checkAndBroadcast` adds track and trace delta detection alongside agents/quota. The `watcherState` struct gains `tracks map[string]string` (id→status) and `traceCount int` fields.
    
    ---
