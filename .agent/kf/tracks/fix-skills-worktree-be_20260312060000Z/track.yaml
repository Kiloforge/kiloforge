id: fix-skills-worktree-be_20260312060000Z
title: Ensure skills are discoverable in agent worktrees
type: bug
status: pending
created: 2026-03-12
updated: 2026-03-11
spec:
  summary: |
    Skills installed to the project's .claude/skills/ directory are not found
    when agents run in worktrees with a different CWD. Ensure skills are
    available in worktree directories and improve diagnostics.
  context: |
    Kiloforge installs embedded skills to {projectDir}/.claude/skills/ during
    `kf create` and `kf add`. When agents are spawned, the Claude Code SDK
    discovers skills from the CWD's .claude/skills/ directory. However, agents
    running in git worktrees (e.g., /path/to/kiloforge-wt/worker-1) have a
    different CWD than the original project directory. The worktree does not
    contain a .claude/skills/ directory, so the SDK cannot find the skills.
    
    ValidateSkills() in spawner.go checks workDir/.claude/skills/ as the local
    dir, which is the worktree path — not the project's registered directory.
    The global dir (~/.claude/skills/) is also checked, but skills are installed
    locally per-project, not globally, during standard setup flows.
  codebase_analysis: |
    Key files:
    - backend/internal/adapter/agent/spawner.go:42-60 — ValidateSkills checks
      workDir/.claude/skills/ (worktree path) and global dir
    - backend/internal/adapter/skills/checker.go:32-40 — CheckRequired looks
      for SKILL.md in both dirs
    - backend/internal/adapter/cli/create.go:114 — installLocalSkills writes
      to projectDir/.claude/skills/
    - backend/internal/adapter/cli/add.go:161 — same for kf add
    - backend/internal/adapter/rest/api_handler.go:1398 — UpdateSkills also
      installs to project dir
    
    The gap: skills are installed to the registered project directory, but
    agents run in worktrees. No mechanism copies or symlinks skills from the
    project dir to worktree dirs.
    
    The spawner creates worktrees via ensureGitRepo() and sets workDir to the
    worktree path. The SDK session is created with WithCWD(workDir), so the
    SDK looks for skills relative to the worktree, not the project root.
  acceptance_criteria:
    - Skills are discoverable by the Claude SDK when agents run in worktrees
    - ValidateSkills correctly checks the registered project directory in addition to the worktree dir
    - Skills installation during kf create/add continues to work as before
    - Existing tests pass; new tests cover worktree skill discovery
    - No regression for agents running in the project directory directly (non-worktree)
  out_of_scope: |
    - Changes to the Claude Code SDK itself
    - Changes to the marketing site's skills page
    - Skills update mechanism (GitHub-based updates)
    - Frontend skills banner or install dialog
  technical_notes: |
    Preferred approach: When spawning an agent, resolve the registered project
    directory from the agent's project association. If the workDir differs from
    the project dir, also check {projectDir}/.claude/skills/ during validation.
    For SDK discovery, either:
    (a) Symlink {worktreeDir}/.claude/skills -> {projectDir}/.claude/skills/ at
        worktree creation time, or
    (b) Copy skills into the worktree's .claude/skills/ before spawning.
    
    Option (a) is preferred — it's lightweight, stays in sync automatically, and
    doesn't duplicate files. The symlink should be created in the spawner's
    worktree setup code (ensureGitRepo or the worktree allocation logic).
    
    Also add the project dir as a fallback in ValidateSkills so the 412 check
    doesn't incorrectly report missing skills for worktree agents.
plan:
  - phase: Diagnosis & Fix ValidateSkills
    tasks:
      - text: Add projectDir parameter to ValidateSkills so it checks {projectDir}/.claude/skills/ in addition to workDir and global dir
        done: true
      - text: Update all ValidateSkills call sites (spawner.go, api_handler.go) to pass the registered project directory
        done: true
      - text: Write unit tests for ValidateSkills with worktree workDir != projectDir scenarios
        done: true
  - phase: Ensure SDK Discovery via Symlink
    tasks:
      - text: In the worktree setup code (spawner.go or worktree allocator), create a symlink from {worktreeDir}/.claude/skills -> {projectDir}/.claude/skills/ if the project has local skills installed
        done: true
      - text: Handle edge cases: symlink already exists, target missing, Windows compatibility (copy fallback)
        done: true
      - text: Write tests for symlink creation and fallback behavior
        done: true
  - phase: Verification
    tasks:
      - text: Run full test suite (make test) to verify no regressions
        done: true
      - text: Manual verification: spawn an agent in a worktree and confirm skills are loaded by the SDK (check agent logs for skill invocation)
        done: true
