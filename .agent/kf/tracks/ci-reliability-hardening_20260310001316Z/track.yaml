id: ci-reliability-hardening_20260310001316Z
title: "CI reliability hardening — golangci-lint config, coverage thresholds, and dependency auditing"
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Add strict golangci-lint configuration, enforce test coverage thresholds in CI,
    and add dependency security auditing to close the most impactful reliability gaps.
  context: |
    The project currently runs golangci-lint with default settings (no custom config), has no
    test coverage thresholds, and does not audit dependencies for known vulnerabilities. These
    are high-impact, low-effort improvements that significantly increase reliability of both
    the codebase and the agents working on it — linting catches bugs before tests run, coverage
    thresholds prevent regression, and dependency auditing catches supply chain issues early.
  codebase_analysis: |
    Current state:
    - golangci-lint runs via `make lint` with `cd backend && golangci-lint run ./...` — no config file
    - ESLint has typescript-eslint and react-hooks but no complexity rules
    - CI (ci.yml) runs unit tests and builds but does not enforce coverage or lint strictly
    - No `go mod verify`, `go mod tidy` check, or `npm audit` in CI
    - `make verify-codegen` exists and validates OpenAPI gen — good pattern to follow

    Makefile targets to modify: `lint`, potentially new `lint-strict`, `test-coverage`
    CI file: `.github/workflows/ci.yml`
    New files: `backend/.golangci.yaml`

    Key considerations:
    - Must not break existing passing builds — start with warning-level for new linters
    - Coverage thresholds should be set at current level initially, then ratcheted up
    - go mod verify and npm audit should be non-blocking initially (warnings) then promoted
  acceptance_criteria:
    - backend/.golangci.yaml exists with strict linter set (gosec, gocritic, errorlint, govet, goimports, gofmt, staticcheck, unused, ineffassign)
    - make lint uses the new config and passes on current codebase (fix any new lint issues)
    - Go test coverage is measured and reported in CI output
    - Coverage threshold is set (initially at current baseline, with a clear path to ratchet up)
    - npm audit runs in CI (non-blocking warning initially)
    - go mod verify and go mod tidy check run in CI
    - All new checks pass on current codebase — no broken builds
    - ESLint config adds complexity rules (max cyclomatic complexity)
  out_of_scope: |
    - Adding new testing frameworks (Playwright accessibility, visual regression)
    - Rewriting existing tests to improve coverage
    - API contract validation (separate track)
    - Pre-commit hooks (can be a follow-up)
  technical_notes: |
    Implementation approach:
    1. Create .golangci.yaml with strict config, run against codebase, fix any failures
    2. Add coverage threshold to Makefile (go test -coverprofile, go tool cover -func, check threshold)
    3. Add CI steps for dependency auditing (go mod verify, npm audit --audit-level=moderate)
    4. Add go mod tidy check (run tidy, diff, fail if changes)
    5. Add ESLint complexity rule (max cyclomatic complexity ~15)
    6. Update CI workflow to include new checks

    Linter selection rationale:
    - gosec: security-focused static analysis (SQL injection, hardcoded creds, etc.)
    - gocritic: opinionated but catches real bugs (range copy, unnecessary conversions)
    - errorlint: correct error wrapping (fmt.Errorf %w, errors.Is/As)
    - goimports: import ordering and grouping
    - staticcheck: advanced static analysis (unreachable code, deprecated usage)
    - gofmt: canonical formatting
