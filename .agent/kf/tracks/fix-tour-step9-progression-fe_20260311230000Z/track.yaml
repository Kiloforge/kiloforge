id: fix-tour-step9-progression-fe_20260311230000Z
title: Fix tour step 9 blocks progression — no Next button
type: bug
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: Tour step 9 (move-card) only shows 'Skip and finish tour' with no way to advance to step 10. The wait-for-drag action has no drag detection wired up, so users are stuck and miss steps 10-14.
  context: The guided tour has 14 steps. At step 9 ('Try It: Move a Card'), the action is 'wait-for-drag' which causes TourOverlay.tsx to render only a 'Skip and finish tour' button instead of the normal Next button. There is no drag detection wired to auto-advance the tour, so users are completely stuck — the only option ends the entire tour, skipping steps 10-14 (deps-conflicts, agent-types, notification-center, traces, finish).
  codebase_analysis: |
    Key files:
    - frontend/src/components/tour/TourOverlay.tsx:136,163-175 — isWaitStep conditional hides Next button, shows only 'Skip and finish tour'
    - frontend/src/components/tour/tourSteps.ts:94-103 — step 9 definition with action: 'wait-for-drag'
    - frontend/src/components/tour/TourProvider.tsx:152-159 — nextStep callback (works fine, just never called for wait steps)
    - frontend/e2e/tour-inmemory-state.spec.ts:73-81 — E2E test acknowledges bug by using skip to end tour at step 9
    
    The wait-for-drag action was intended to make users physically drag a kanban card, but no drag-completion detection was ever wired up to advance the tour. The KanbanBoard drag handlers have no tour awareness.
  acceptance_criteria:
    - Step 9 shows a Next button that advances to step 10
    - Step 9 still shows a skip option, but it skips only this step (not the entire tour)
    - E2E test updated to verify full tour progression through all 14 steps
    - No regression in existing tour flow (welcome, dismiss, restart)
  out_of_scope: |
    - Implementing actual drag detection to auto-advance the tour (can be a follow-up)
    - Changing the tour step content or order
    - Backend tour handler changes
  technical_notes: |
    Fix approach: Change the wait-for-drag step UI to show both a 'Skip' link (skip just this step, not the entire tour) and a 'Next' button. This makes the interactive drag optional while allowing normal tour progression.
    
    In TourOverlay.tsx, the isWaitStep branch (lines 169-174) should render a Next button alongside a 'Skip step' text link, instead of only 'Skip and finish tour'. The E2E test should be updated to verify the tour can progress past step 9 to step 10+.
plan:
