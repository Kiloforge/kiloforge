id: fix-disabled-btn-styles-fe_20260312020000Z
title: Improve disabled state visibility for accent/green buttons
type: bug
status: pending
created: 2026-03-12
updated: 2026-03-10
spec:
  summary: |
    Change disabled green/accent buttons from a subtle opacity fade to a clearly
    muted style so users can immediately tell the button is non-interactive.
  context: |
    All primary action buttons use background: var(--accent) (#34d399 emerald green).
    When disabled, they only reduce opacity to 0.4-0.5. On the dark background,
    this still looks very green and clickable — users click expecting action and
    nothing happens.
  codebase_analysis: |
    11 green/accent buttons affected across these CSS modules:
    
    opacity 0.5:
      - AdvisorHub.module.css .startBtn (line ~198)
      - ConsentDialog.module.css .acceptBtn (line ~81)
      - AgentLauncher.module.css .startBtn (line ~121)
      - AddProjectForm.module.css .submitBtn (line ~190)
    
    opacity 0.4:
      - OverviewPage.module.css .spawnBtn (line ~44)
      - ProjectSettingsPanel.module.css .saveBtn (line ~121)
      - ProjectPage.module.css .promptSubmit (line ~147)
      - SyncPanel.module.css .btn (line ~162)
      - FullScreenCommand.module.css .sendBtn (line ~263)
      - AgentTerminal.module.css .sendBtn (line ~242)
    
    All follow the same pattern:
      .foo:disabled { opacity: 0.4; cursor: not-allowed; }
    Some are missing cursor: not-allowed.
    
    The accent color var is defined in index.css line 31.
  acceptance_criteria:
    - Disabled green buttons are visually distinct from active ones (not just faded)
    - All 11 affected button classes use a consistent disabled style
    - Disabled buttons show cursor: not-allowed
    - Hover effects are suppressed on disabled buttons (already done via :hover:not(:disabled))
    - No visual regressions on non-disabled button states
  out_of_scope: |
    - Non-accent buttons (red/danger buttons, transparent/ghost buttons)
    - Adding disabled state logic to components (this is CSS-only)
    - Changing the accent color itself
  technical_notes: |
    Approach: For each disabled accent button, replace the opacity-only style with:
      background: var(--border);
      color: var(--text-dim);
      opacity: 0.6;
      cursor: not-allowed;
    This gives a clearly gray, muted appearance that is unmistakably disabled.
    The border color provides a neutral gray that fits the dark theme.
plan:
  - phase: Fix disabled styles
    tasks:
      - text: Update all 11 accent button :disabled styles: set background to var(--border), color to var(--text-dim), opacity 0.6, cursor not-allowed
        done: true
      - text: Ensure all buttons have consistent :hover:not(:disabled) guards
        done: true
      - text: Verify AddProjectForm .modeBtnActive disabled state is also updated
        done: true
  - phase: Verification
    tasks:
      - text: Run make build to verify CSS compiles and no TS errors
        done: true
      - text: Run make test to ensure no test regressions
        done: true
