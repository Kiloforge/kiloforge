spec:
  summary: |
    Fix stale skill count and catalog on the site and submodule README to
    reflect the current kiloforge-skills submodule contents (21 kf-* dirs,
    no bin folder, no kf-parallel).
  context: |
    The kiloforge-skills submodule was recently simplified: it now contains
    only kf-* skill directories and a README.md. The old bin/ folder was
    removed. The submodule has 21 skills but some docs still reference 22.
    kf-parallel was removed from the submodule but is still listed in the
    submodule README skill table. kf-merge-protocol exists locally but is
    not in the submodule or site catalog.
  codebase_analysis: |
    Install commands are already correct everywhere — both the site
    (kiloforge_site/src/app/skills/page.tsx:29-32) and submodule README
    use `cp -r kf-*` which naturally copies only skill directories.
    
    Stale references:
    - kiloforge_site/src/app/skills/page.tsx:201 says "22 Claude Code skills"
      but submodule has 21
    - backend/internal/adapter/skills/embedded/README.md lists kf-parallel
      in the skill table but that directory doesn't exist in the submodule
    - kf-merge-protocol is not listed in the submodule README or site catalog
    
    Already correct (no changes needed):
    - docs/skills.md — no bin references, accurate descriptions
    - docs/kiloforge-data-formats.md — bin/ reference is about .agent/kf/bin/
      (project tooling), not skills
    - All install commands (site, submodule README)
  acceptance_criteria:
    - Site skills page shows correct skill count matching submodule contents
    - Submodule README skill table matches actual directories in the submodule
    - kf-merge-protocol added to submodule README and site catalog
    - No references to a bin/ folder in the skills installation context
  out_of_scope: |
    - Modifying install commands (they are already correct)
    - Changing docs/skills.md or docs/kiloforge-data-formats.md
    - Adding kf-merge-protocol to the submodule itself (skill file management)
  technical_notes: |
    The submodule README lives at backend/internal/adapter/skills/embedded/README.md
    and can be updated via the submodule. The site is at ../../kiloforge_site
    relative to the project root.
