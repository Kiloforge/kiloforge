spec:
  summary: Update all remaining "kiloforge" references in conductor track metadata, specs, plans, and registry files to reflect the kiloforge rebrand, and reconcile historical records with the existing kf tracking state. This covers both archived and active track documents — purely cosmetic metadata changes with zero code impact.
  context: |
    The main codebase rebrand (`rebrand-kiloforge_20260309055250Z`) was completed successfully, but it explicitly excluded historical conductor records ("Renaming archived conductor track titles — leave as-is"). This track completes the rebrand by updating those remaining references for consistency.
    
    **Important:** The repo already has `kf setup` completed — conductor artifacts (`product.md`, `tech-stack.md`, `index.md`, etc.) already use "kiloforge" naming. This track must merge historical record updates into the existing kf tracking state rather than conflicting with it. The developer should read the current state of all conductor files before making changes, and preserve any kf-era content that has been added since the rebrand.
    
    ### Scope
    
    All changes are in `.agent/conductor/` — Markdown and JSON metadata files only.
    
    | Category | Estimated References | Files |
    |----------|---------------------|-------|
    | Archived track metadata.json titles | 4 tracks with "kiloforge" in title | 4 |
    | Archived track spec.md / plan.md content | ~255 references | ~50 files |
    | Active track spec.md / plan.md content | ~182 references | ~30 files |
    | tracks.md completed entry titles | Historical titles | 1 |
    | index.md pending track listings | Historical titles | 1 |
    
    ### What NOT to change
    
    - **Git commit messages** — immutable historical record, never rewrite
    - **Track IDs** — timestamp-based, not name-based, no change needed
    - **File/directory names** — track directories use IDs not product names
  codebase_analysis: |
    **Archived tracks with "kiloforge" in titles (metadata.json):**
    1. `add-project-command_20260307122000Z` — "Implement 'kf add' Command..."
    2. `implement-command_20260307125001Z` — "'kf implement' Command..."
    3. `fix-add-remote-url_20260307130000Z` — "Fix 'kf add' to Accept Remote URLs"
    4. `impl-conductor-lock-migration_20260308150001Z` — "Migrate Conductor Skills to Use kiloforge Lock API"
    
    **Content patterns to replace:**
    - `kf init` → `kf init`
    - `kf add` → `kf add`
    - `kf up` / `kf down` → `kf up` / `kf down`
    - `kf destroy` → `kf destroy`
    - `kf implement` → `kf implement`
    - `kf status` → `kf status`
    - `~/.kiloforge/` → `~/.kiloforge/`
    - `KF_*` env vars → `KF_*`
    - "kiloforge" (product name) → "kiloforge" or "Kiloforge"
    
    **Safety:** Track IDs, cross-track dependency references, and file paths all use timestamp-based IDs — none reference the product name. This is purely a text find-replace in documentation.
  acceptance_criteria:
    - Zero "kiloforge" references remain in `.agent/conductor/tracks/` (both archived and active)
    - Zero "kiloforge" references remain in `.agent/conductor/tracks.md`
    - Zero "kiloforge" references remain in `.agent/conductor/index.md`
    - All `metadata.json` title fields updated
    - All spec.md / plan.md content updated
    - Track IDs unchanged
    - No git history rewriting
    - Existing kf-era conductor state (product.md, tech-stack.md, workflow.md, etc.) is preserved — no regressions from the merge
  out_of_scope: |
    - Git commit message history (immutable)
    - Track ID renaming (unnecessary — IDs are timestamp-based)
    - Codebase files (already rebranded in prior track)
  technical_notes: |
    - **Bulk find-replace** is safe here since all files are Markdown/JSON documentation
    - **Case sensitivity matters:** handle `kiloforge` (lowercase), `Kiloforge` (title case), `KF` (upper case for env vars) separately
    - **Context-aware replacement:** `kiloforge` as a CLI command → `kf`, `kiloforge` as a product name → "kiloforge"
    - **Verify after:** grep `-ri kiloforge .agent/conductor/tracks/` should return zero matches
    
