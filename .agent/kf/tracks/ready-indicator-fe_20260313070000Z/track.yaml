id: ready-indicator-fe_20260313070000Z
title: Show "ready to work" indicator on backlog cards and track list
type: feature
status: pending
created: 2026-03-13
updated: 2026-03-10
spec:
  summary: |
    Add a visual indicator to backlog cards (kanban) and track list items
    showing which tracks have no unmet dependencies and can be worked on
    immediately. Uses a green pulsing dot on the track list and a subtle
    green glow/badge on kanban backlog cards.
  context: |
    The project page shows tracks in two views: a kanban board (KanbanBoard)
    and a flat track list (TrackList). Both views show track status but
    neither indicates whether a track is actually ready to be claimed — i.e.,
    has no unmet dependencies. Users must mentally cross-reference the
    dependency graph to figure out which pending tracks are available.
    
    The dependency data is already available: Track objects have deps_count
    and deps_met fields, and useTrackRelations provides full dependency maps
    for board cards. The feature just needs to wire this data into visual
    indicators.
  codebase_analysis: |
    **Track type** (`frontend/src/types/api.ts`):
    - `Track` has `deps_count?: number` and `deps_met?: number`
    - A track is "ready" when `deps_count === 0` or `deps_count === deps_met`
    - Only meaningful for pending/backlog tracks (in-progress and completed
      tracks are already claimed)
    
    **TrackList** (`frontend/src/components/TrackList.tsx`):
    - Renders tracks as links with status icon (✓, ▶, ◯), track ID, and title
    - No existing dependency visualization
    - Receives Track[] — deps_count/deps_met already on each item
    
    **KanbanBoard** (`frontend/src/components/KanbanBoard.tsx`):
    - CardItem renders individual board cards
    - Board receives `dependencies?: Map<string, TrackDependency[]>` from
      useTrackRelations (already wired in ProjectPage)
    - Backlog cards have yellow left border (`.cardBacklog`)
    - A card is "ready" when its dependencies map entry is empty or all deps
      have status "completed"
    
    **KanbanBoard.module.css**:
    - Existing animations: `clampPulse` (scale + box-shadow), `cardDragging`
    - Card left border colors distinguish columns (green=done, yellow=backlog)
    - Good pattern to follow for a "ready" indicator
    
    **useTrackRelations** (`frontend/src/hooks/useTrackRelations.ts`):
    - Fetches TrackDetail for all board tracks, builds dependency maps
    - Already passed to KanbanBoard via ProjectPage
    - Can derive "ready" status: deps array empty or all completed
    
    **ProjectPage** (`frontend/src/pages/ProjectPage.tsx`):
    - Wires useTrackRelations → KanbanBoard (dependencies prop)
    - Renders TrackList with tracks from useTracks
  acceptance_criteria:
    - Track list items for pending tracks with no unmet deps show a green pulsing dot indicator
    - Track list items for pending tracks WITH unmet deps do not show the indicator
    - Completed and in-progress tracks do not show the "ready" indicator (they're already claimed/done)
    - Kanban backlog cards with no unmet dependencies show a "Ready" badge or green highlight
    - Kanban backlog cards with unmet dependencies do not show the highlight
    - Non-backlog cards (approved, in-progress, done) do not show the ready indicator
    - The green pulsing dot animation is subtle (not distracting) — slow pulse, ~2s cycle
    - Existing board animations (clampPulse, drag) are unaffected
    - make build-frontend succeeds
    - Existing tests updated/extended for ready indicator logic
  out_of_scope: |
    - Backend API changes (deps_count/deps_met already available)
    - Dependency graph visualization or editing
    - Filtering tracks by "ready" status (search track handles filtering)
    - Ready indicator on TrackDetailPage (separate concern)
  technical_notes: |
    **Ready detection helper:**
    Create a small utility function (inline or shared):
    ```typescript
    function isTrackReady(track: Track): boolean {
      if (track.status !== "pending") return false;
      return !track.deps_count || track.deps_count === track.deps_met;
    }
    ```
    
    **TrackList green pulsing dot:**
    Add a small dot (8px) before the status icon for pending+ready tracks:
    ```css
    .readyDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green, #22c55e);
      animation: readyPulse 2s ease-in-out infinite;
    }
    @keyframes readyPulse {
      0%, 100% { opacity: 0.4; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1); }
    }
    ```
    
    **KanbanBoard backlog card indicator:**
    For backlog cards, derive "ready" from the dependencies map:
    ```typescript
    const isReady = isBacklog && (
      !dependencies?.get(card.track_id)?.length ||
      dependencies?.get(card.track_id)?.every(d => d.status === "completed")
    );
    ```
    Add a small "Ready" text badge or green dot to the card. Consider adding
    a subtle green left border override (replacing the yellow backlog border)
    for ready cards.
    
    **Passing dependency data to CardItem:**
    CardItem currently doesn't receive dependency info. Add an `isReady`
    boolean prop to CardItem computed by the parent from the dependencies map.
