id: quota-gauges-fe_20260310092418Z
title: Quota gauges frontend — gauge visualizations for the Command Deck
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    The backend track (quota-gauges-be) adds budget config, rate-of-consumption
    metrics, and time-to-budget projection to the /api/quota response. This
    track builds the frontend gauge visualizations to display those metrics.
    
    Current StatCards shows 4 flat cards: Agents, Tokens (in/out), Rate Limit,
    Est. API Cost. The new design replaces these with gauge-style indicators
    that show utilization against limits and consumption velocity.
  codebase_analysis: |
    Key files to modify:
    - **StatCards.tsx** — Replace with MetricsPanel containing gauge cards.
      Currently renders 4 simple stat cards with labels and values.
    - **StatCards.module.css** — Replace with MetricsPanel.module.css using
      gauge-specific styles (arc SVG, animated fills).
    - **types/api.ts** — QuotaResponse needs new fields: budget_usd,
      budget_used_pct, rate_tokens_per_min, rate_cost_per_hour,
      time_to_budget_mins.
    - **OverviewPage.tsx** — Already renders <StatCards>, will render
      <MetricsPanel> instead.
    - **App.tsx** — Passes quota to OverviewPage, no change needed.
    
    Design patterns to follow:
    - CSS variables from index.css (--accent, --green, --yellow, --red)
    - Glassmorphic card styling (--bg-surface, --border, --blur)
    - CSS modules per component
    - formatUSD/formatTokens from utils/format.ts
  acceptance_criteria:
    - MetricsPanel replaces StatCards on OverviewPage
    - Budget gauge shows spend vs budget as arc/ring (green→yellow→red)
    - Budget gauge shows flat cost display when no budget is configured (budget_usd=0)
    - Token rate indicator shows tokens/min with trend direction
    - Cost velocity shows projected $/hour
    - Agent count retained as simple metric
    - Rate limit warning integrates into budget gauge (red state)
    - Gauges animate smoothly on value changes (CSS transitions)
    - All existing tests updated or replaced, all pass
    - Frontend builds without TS errors
  out_of_scope: |
    - Backend API changes (quota-gauges-be track)
    - Historical charts or sparklines (future enhancement)
    - Per-agent gauge breakdown
    - Budget configuration UI (uses existing settings or API)
    - Mobile-specific responsive layout
  technical_notes: |
    Implementation approach:
    1. Create GaugeCard component — SVG arc with animated dasharray fill,
       label, value text, optional subtitle. Props: value, max, label,
       color (auto from percentage), size.
    2. Create MetricsPanel component — replaces StatCards. Layout: CSS grid
       with 4 gauge cards.
    3. Gauge cards:
       a. Budget: value=estimated_cost_usd, max=budget_usd. Shows "$X / $Y"
          with percentage arc. If budget=0, show flat "$X spent" with no arc.
          Subtitle: "~Xm remaining" from time_to_budget_mins.
       b. Token Rate: value=rate_tokens_per_min, no max. Show "X tok/min"
          with a simple bar indicator. Trend arrow based on delta.
       c. Cost Rate: value=rate_cost_per_hour. Show "$X/hr" projected.
       d. Agents: value=agentCount. Simple number, keep current style.
    4. Color thresholds for budget gauge: <60% green, 60-85% yellow, >85% red.
    5. Update QuotaResponse type with new optional fields.
    6. Update or replace StatCards tests.
