id: send-pause-toggle-fe_20260311060100Z
title: "Replace interrupt button with send/pause toggle"
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Transform the send button into a dual-purpose control that toggles between
    "Send" (idle) and "Pause" (turn active), removing the separate Stop button
    from the header. Pause triggers the existing interrupt mechanism, matching
    CLI pause behavior.
  context: |
    The Command Deck's fullscreen command pane currently has a separate "Stop"
    button in the header bar that appears when a turn is active. The interrupt
    functionality has not been working well from a UX perspective. The user wants
    the send button itself to transform between "Send" and "Pause" states,
    similar to how the Claude Code CLI allows pausing with Escape during
    generation. This makes the pause action more discoverable and reduces UI
    clutter in the header.
  codebase_analysis: |
    Current implementation in CommandPane.tsx:
    - Lines 95-96: `canSend` and `canInterrupt` state derived from connection/turn state
    - Lines 132-136: Separate "Stop" button in header, visible when `canInterrupt`
    - Lines 199-201: Send button toggles label between "Send" and "Queue"
    - Lines 70-77: `handleSend` sends message, increments queueDepth if turn active
    - Lines 85-88: Esc key triggers `sendInterrupt()` (stays unchanged)
    - Lines 65-68: queueDepth resets when turn ends

    WebSocket hook (useAgentWebSocket.ts):
    - Lines 289-292: `sendInterrupt()` sends `{"type": "interrupt"}` via WebSocket
    - Lines 115-134: Turn state tracking via turn_start/turn_end messages

    Backend interrupt chain (unchanged by this track):
    - ws/handler.go readLoop receives interrupt message, calls bridge.Interrupt()
    - Bridge calls InterruptHandler → SDKSession.Interrupt() → cancels query context

    CSS in FullScreenCommand.module.css:
    - Lines 244-268: .sendBtn styles (accent background)
    - Lines 270-285: .interruptBtn styles (red border, transparent bg)
  acceptance_criteria:
    - Send button shows "Send" when no turn is active
    - Send button shows "Pause" when a turn is active
    - Clicking "Pause" triggers sendInterrupt() (same as current Stop button)
    - Clicking "Send" sends the typed message (unchanged behavior)
    - Separate "Stop" button is removed from the header bar
    - Esc key still triggers interrupt during active turn (unchanged)
    - Enter key still sends/queues messages during active turn (unchanged)
    - Queue badge still displays when messages are queued (unchanged)
    - Pause button has distinct visual styling (warning/red accent) to differentiate from Send
    - E2E test covers send/pause button state transitions
  out_of_scope: |
    - Backend interrupt mechanism changes (works fine, just UI reorganization)
    - Changes to the queue system or queue badge
    - Changes to keyboard shortcuts (Esc, Enter, Shift+Enter)
    - Changes to other components that have interrupt functionality (AgentTerminal, AgentDetailPage)
    - Changes to the WebSocket hook or message protocol
  technical_notes: |
    The send button click handler needs conditional logic:
    - If turnActive: call sendInterrupt() instead of handleSend()
    - If !turnActive: call handleSend() as before

    The button should be enabled when either canSend (for sending) or canInterrupt
    (for pausing). When turnActive, the button text changes to "Pause" and applies
    a pause-specific CSS class (e.g., .sendBtnPause) with red/warning styling
    derived from the existing .interruptBtn styles.

    The disabled state needs adjustment: during an active turn, the button should
    always be clickable (for pause) regardless of whether input text is present.
    Current disabled logic: `!canSend || !input.trim()` — needs to become
    `!canSend || (!turnActive && !input.trim())`.
