id: fix-track-progress_20260311110000Z
title: Fix track progress — count archived as finalized
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Add track progress to CLI status command and fix dashboard to show
    completed+archived as "done" instead of just "completed", giving an
    accurate picture of project progress.
  context: |
    The dashboard ProjectMetadataView shows "Completed: X" and "Total: Y"
    separately, with archived tracks shown conditionally. When most tracks
    are archived, progress looks deceptively low (e.g., 2/20 instead of
    17/20). The CLI `kf status` command doesn't show track progress at all.
  codebase_analysis: |
    **Backend:**
    - `pkg/kf/project.go`: `TrackSummary` struct has Total, Pending,
      InProgress, Completed, Archived fields. `GetTrackSummary()` counts
      each status separately.
    - `internal/adapter/cli/status.go`: `runStatus()` shows orchestrator,
      quota, and agent costs — no track info. Uses `NewCLIRuntimeFromConfig`
      which provides quota and agent services.
    - `internal/adapter/rest/api_handler.go`: `GetProjectMetadata()` calls
      `kfClient.GetTrackSummary()` and passes all fields through.
    
    **Frontend:**
    - `types/api.ts`: `TrackSummary` interface matches backend struct.
    - `components/ProjectMetadataView.tsx`: Displays Total, Completed,
      In Progress, Pending as separate items. Archived shown conditionally
      when > 0. No combined "done" count.
    
    **No API change needed** — TrackSummary already returns both completed
    and archived; frontend/CLI just need to sum them.
  acceptance_criteria:
    - CLI `kf status` shows track progress line: Tracks X/Y done (Z pending, W in-progress) where done = completed + archived
    - Dashboard ProjectMetadataView shows Done count (completed + archived) as the primary completion metric
    - Dashboard still shows breakdown (pending, in-progress) as secondary stats
    - Archived tracks no longer shown as a separate confusing counter
  out_of_scope: |
    - Backend API changes (TrackSummary struct is fine as-is)
    - Progress bars or percentage calculations
    - Per-track progress in the summary
  technical_notes: |
    CLI approach:
    - In runStatus(), after loading quota, create a kf.Client for the
      current project directory and call GetTrackSummary()
    - Print: "Tracks:      X/Y done (Z pending, W in-progress)"
    - If no tracks found or error, skip the section gracefully
    
    Frontend approach:
    - In ProjectMetadataView, compute done = summary.completed + summary.archived
    - Show "Done" with the combined count, "In Progress", "Pending"
    - Drop the conditional archived display
