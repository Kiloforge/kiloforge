id: agent-idle-suspend-be_20260312020000Z
title: Auto-suspend interactive agents when all browser connections close
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-10
spec:
  summary: |
    Add connection-aware auto-suspension for interactive agents. When all browser
    WebSocket connections to an interactive agent disconnect, suspend the agent after
    a configurable grace period. Worker agents (developer, reviewer) are unaffected.
  context: |
    Kiloforge has two conceptual agent categories:
    
    1. **Interactive agents** — require a user present. Roles: interactive, architect,
       advisor-product, advisor-reliability, setup, conflict-resolver. These use the
       SDK Client with WebSocket bridge for turn-based interaction.
    
    2. **Worker agents** — run autonomously. Roles: developer, reviewer. These use
       one-shot SDK Query and have no browser connection.
    
    Currently, interactive agents continue running indefinitely even after all browser
    windows/tabs close. This wastes API tokens and occupies swarm capacity slots. The
    user expects interactive agents to pause when they close the window, and resume
    when they come back.
    
    Multiple browser tabs can observe the same agent simultaneously (first is read-write,
    rest are read-only). Suspension must only trigger when ALL connections drop to zero,
    not when a single tab closes.
  codebase_analysis: |
    **SessionManager** (`backend/internal/adapter/ws/session.go`):
    - `sessions map[string][]*Session` — per-agent session list
    - `AddSession()` — appends to list, returns isPrimary flag
    - `RemoveSession()` — removes from list, deletes map entry when empty
    - Already detects when sessions drop to zero (line 88: `len == 0 → delete`)
    - No callback mechanism when connections change — needs adding
    
    **Agent spawning** (`backend/internal/adapter/agent/spawner.go`):
    - `SpawnInteractive()` — creates SDK session, registers in `activeAgents` map
    - `StopAgent()` — removes from activeAgents, cancels relay, closes SDK session, marks "stopped"
    - `monitorSDKSession()` — waits for SDK context done, cleans up bridge
    - Need new `SuspendAgent()` method similar to StopAgent but marks "suspended" instead
    
    **Domain** (`backend/internal/core/domain/agent.go`):
    - `AgentStatusSuspended` exists — non-terminal, can be resumed
    - `IsAdvisorRole()` helper exists for advisor- prefix
    - No `IsWorkerRole()` or `IsInteractiveRole()` helper yet
    - Agent roles defined as constants but no grouping by category
    
    **Config** (`backend/internal/adapter/config/config.go`):
    - Resolution chain: defaults → JSON → env → flags
    - Existing pattern for duration config (AgentMaxDuration in timeout track)
    
    **Shutdown/Recovery** (`backend/internal/adapter/agent/shutdown.go`, `recovery.go`):
    - ShutdownAll sends SIGINT → wait → SIGKILL, marks "suspended"
    - Recovery detects stale PIDs on startup, marks "suspended"
    - ResumeAgent creates new SDK session for suspended agents
    
    **WS Handler** (`backend/internal/adapter/ws/handler.go`):
    - `handleAgentWS` — on session.ctx.Done(), logs "client disconnected" and returns
    - `defer RemoveSession()` fires on disconnect — this is the trigger point
  acceptance_criteria:
    - Domain helper IsWorkerRole() returns true for developer and reviewer roles
    - SessionManager fires a callback when an agent's connection count drops to zero
    - SessionManager fires a callback when an agent's connection count goes from zero to non-zero
    - SessionManager exposes SessionCount(agentID) method
    - New ConnectionSuspender coordinates grace period timers per agent
    - Grace period is configurable via KF_AGENT_IDLE_SUSPEND_SECONDS (default 30)
    - When grace period expires with zero connections, interactive agent is suspended (SIGINT + status "suspended")
    - Worker agents (developer, reviewer) are never auto-suspended by connection loss
    - If a browser reconnects during the grace period, the suspension timer is cancelled
    - Suspended agents can be resumed via existing POST /api/agents/{id}/resume
    - Agent ShutdownReason set to "idle_disconnect" for connection-based suspension
    - OpenAPI schema includes connected_clients field in Agent response
    - Config API includes agentIdleSuspendSeconds field
    - All new logic has unit tests
  out_of_scope: |
    - Frontend UI changes (separate FE track)
    - Changing the WebSocket protocol or message format
    - Auto-resume on reconnect (user must explicitly resume)
    - Per-agent grace period override
    - SSE connection tracking (only WebSocket agent connections count)
  technical_notes: |
    **Implementation approach:**
    
    1. **Domain: Add IsWorkerRole helper**
       Add `IsWorkerRole(role string) bool` returning true for "developer" and "reviewer".
       All other roles are implicitly interactive.
    
    2. **SessionManager: Connection callbacks**
       Add `OnDisconnect` and `OnReconnect` callback fields. Fire OnDisconnect in
       RemoveSession when sessions drop to zero. Fire OnReconnect in AddSession when
       going from zero to non-zero sessions. Expose `SessionCount(agentID) int`.
    
    3. **ConnectionSuspender: Grace period coordinator**
       New struct in `backend/internal/adapter/agent/suspend.go`:
       - Holds reference to Spawner (for SuspendAgent) and config (for grace period)
       - `OnAgentDisconnected(agentID)` — starts a timer
       - `OnAgentReconnected(agentID)` — cancels the timer
       - Timer fires → check agent role is not worker → call SuspendAgent
       - Thread-safe: mutex protects timer map
    
    4. **Spawner: Add SuspendAgent method**
       Similar to StopAgent but marks "suspended" instead of "stopped":
       - Remove from activeAgents map
       - Cancel relay goroutine
       - Close SDK session (sends SIGINT to Claude CLI)
       - Set status="suspended", ShutdownReason="idle_disconnect", SuspendedAt=now
       - Publish capacity_changed event
    
    5. **Config: Add IdleSuspendSeconds**
       Default 30. Env var KF_AGENT_IDLE_SUSPEND_SECONDS. Value 0 disables.
    
    6. **Server wiring**
       In serve.go or server.go, create ConnectionSuspender, wire its callbacks
       to SessionManager.OnDisconnect/OnReconnect, pass spawner reference.
    
    7. **OpenAPI: Add connected_clients**
       Integer field on Agent schema. Populated from SessionManager.SessionCount()
       in the list/get agent handlers.
