id: status-worktree-awareness_20260310180000Z
title: "Add worktree awareness and structured template to kf-status"
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Add a WORKTREES section to kf-track status showing each worktree's branch,
    idle/WIP state, and commits ahead of main. Update the kf-status skill to
    present a structured output template with ready tracks and in-progress work
    mapped to worktrees.
  context: |
    The kf-status skill and kf-track status CLI currently show track progress,
    dependency state, and blockers — but have no visibility into the actual
    worktree topology. Users managing multiple developer worktrees need to see
    at a glance which worktrees are idle vs actively working, and what commits
    they have ahead of main.
  codebase_analysis: |
    - `cmd_status()` in `.agent/kf/bin/kf-track` (line 1551-1950) generates the
      full status report with sections: OVERALL PROGRESS, ACTIVE TRACKS,
      CURRENT FOCUS, READY TO START, BLOCKED
    - `git worktree list --porcelain` provides worktree paths and branches
    - `git log main..<branch> --oneline` gives commit divergence per worktree
    - The skill file at `~/.claude/skills/kf-status/SKILL.md` instructs agents
      to run `kf-track status` then add assessment/recommendations
    - No active tracks touch kf-track or kf-status — zero conflict risk
  acceptance_criteria:
    - "kf-track status outputs a WORKTREES section showing each worktree name, branch, idle/WIP status, commits ahead count, and latest commit subject"
    - "WIP worktrees (commits ahead > 0) are clearly distinguished from idle ones"
    - "The main worktree is included but labeled as 'main' role"
    - "kf-status SKILL.md includes a structured output template showing ready tracks and WIP-by-worktree"
    - "The skill instructs agents to correlate in-progress tracks with worktree WIP when possible"
  out_of_scope: |
    - No persistent worktree-to-track assignment metadata
    - No changes to track claiming/assignment workflow
    - No worktree creation/deletion commands
  technical_notes: |
    Approach: Add a helper function in kf-track that runs git worktree list
    --porcelain, parses each entry, checks divergence from main via git rev-list,
    and formats a table. Insert this section between OVERALL PROGRESS and ACTIVE
    TRACKS in cmd_status(). Update SKILL.md with a new step and output template.
plan:
  - phase: "CLI — worktree section in kf-track status"
    tasks:
      - text: "Add _worktree_section() helper to kf-track that parses git worktree list --porcelain, computes commits ahead of main, and formats a WORKTREES table"
        done: false
      - text: "Integrate _worktree_section() call into cmd_status() between OVERALL PROGRESS and ACTIVE TRACKS sections"
        done: false
      - text: "Test kf-track status output includes WORKTREES section with correct idle/WIP labels"
        done: false
  - phase: "Skill — update kf-status SKILL.md"
    tasks:
      - text: "Add a new step to SKILL.md that instructs agents to read the WORKTREES section and correlate WIP worktrees with in-progress tracks"
        done: false
      - text: "Add a structured output template to SKILL.md showing the desired format: ready tracks + WIP-by-worktree summary"
        done: false
  - phase: "Verification"
    tasks:
      - text: "Run kf-track status --ref main and verify WORKTREES section renders correctly"
        done: false
      - text: "Verify SKILL.md is well-formed and instructions are clear"
        done: false
extra: {}
