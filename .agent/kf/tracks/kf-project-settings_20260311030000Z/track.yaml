id: kf-project-settings_20260311030000Z
title: Project settings system — config.yaml schema, CLI commands, and Go SDK reader
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Formalize the kf project settings system: expand config.yaml with a documented schema,
    add `kf-track config` CLI subcommands (list/get/set), and add a pkg/kf Go reader so
    the backend can consume settings. First new setting: `enforce_dep_ordering`.
  context: |
    `.agent/kf/config.yaml` already exists with a single field (`primary_branch: main`).
    There is no schema, no CLI support for reading/writing settings, and no Go SDK function
    to load config.yaml from the backend.
    
    The upcoming work-queue-be track needs a project-level setting to control whether
    dependency ordering is enforced during track scheduling. Without a settings system,
    this would need to be hardcoded or managed ad hoc.
    
    This track creates the infrastructure so that:
    1. Agent skills can read/write settings via `kf-track config get/set`
    2. The Go backend can read settings via `pkg/kf.Client.GetConfig()`
    3. New settings can be added by just extending the schema — no plumbing needed
    
    Additionally, the `enforce_dep_ordering` setting controls work queue behavior:
    - When true (default): the scheduler skips tracks whose dependencies aren't all completed.
      If a track is skipped, the scheduler continues trying the next track in the queue
      (drain-loop) until either no eligible tracks remain or no worker slots are available.
    - When false: tracks are popped in queue order regardless of dependency status.
      The developer agent is responsible for checking deps at claim time.
  codebase_analysis: |
    ### Existing config.yaml
    Location: `.agent/kf/config.yaml`
    Current content: `primary_branch: main` with a header comment.
    No schema, no validation, no CLI commands.
    
    ### kf-track CLI (.agent/kf/bin/kf-track)
    ~2100 lines, bash. Subcommands include add, update, list, deps, conflicts, etc.
    No `config` subcommand exists. Adding one follows the existing pattern:
    `kf-track config list|get|set`.
    
    ### pkg/kf Go SDK (backend/pkg/kf/)
    Client struct with KFDir path. Has readers for tracks, deps, conflicts, project info.
    No config.yaml reader exists. Adding `config.go` with `GetConfig()` follows the
    existing pattern (file path helper + reader method on Client).
    
    ### Config adapter (backend/internal/adapter/config/)
    Application-level config (ports, paths, flags). Separate from kf project settings.
    These are runtime config; kf config.yaml is project-level settings.
    
    ### Work queue (pending track: work-queue-be)
    Plans dependency-aware scheduling with Kahn's algorithm. Currently hardcodes
    dependency checking. Should consume `enforce_dep_ordering` from config.yaml to
    make this behavior optional. The drain-loop behavior (keep popping when a track
    is skipped) is a refinement to the scheduling loop that should be implemented
    when `enforce_dep_ordering` is true.
  acceptance_criteria:
    - config.yaml schema documented in header comments with all known fields and their types/defaults
    - `kf-track config list` — prints all settings with current values and defaults
    - `kf-track config get <key>` — prints the value of a single setting (dot-notation for nested)
    - `kf-track config set <key> <value>` — sets a value, creating the key if needed, validates type
    - `enforce_dep_ordering` setting added to config.yaml (boolean, default: true)
    - pkg/kf/config.go: ProjectConfig struct with all settings and typed fields
    - pkg/kf Client.GetConfig() reads and parses config.yaml, returns ProjectConfig with defaults applied
    - Unit tests for config parsing, default application, and CLI subcommands
  out_of_scope: |
    - Backend REST API endpoint for settings (can be added in a future track if needed)
    - Frontend settings UI (separate concern)
    - Implementing the drain-loop in the work queue scheduler (that's work-queue-be's responsibility)
    - Migration of existing application-level config to this system (they serve different purposes)
  technical_notes: |
    ### config.yaml schema (after this track)
    
    ```yaml
    # Kiloforge Project Configuration
    #
    # SCHEMA:
    #   primary_branch: string (default: "main")
    #     The branch agents read track state from.
    #
    #   enforce_dep_ordering: bool (default: true)
    #     When true, the work queue scheduler skips tracks with unmet dependencies
    #     and continues to the next eligible track (drain-loop). When false, tracks
    #     are popped in order regardless of dependency status.
    
    primary_branch: main
    enforce_dep_ordering: true
    ```
    
    ### CLI subcommand design
    
    ```bash
    kf-track config list
    # Output:
    # primary_branch: main (default: main)
    # enforce_dep_ordering: true (default: true)
    
    kf-track config get primary_branch
    # Output: main
    
    kf-track config set enforce_dep_ordering false
    # Updates config.yaml, preserving comments and formatting
    ```
    
    Implementation: YAML parsing in bash via simple line-based approach (config.yaml
    is flat key-value, no nesting needed for now). Use `yq` if available, fall back
    to sed/awk for portability.
    
    ### Go SDK addition
    
    ```go
    // config.go
    type ProjectConfig struct {
        PrimaryBranch       string `yaml:"primary_branch"`
        EnforceDepOrdering  bool   `yaml:"enforce_dep_ordering"`
    }
    
    func DefaultConfig() ProjectConfig {
        return ProjectConfig{
            PrimaryBranch:      "main",
            EnforceDepOrdering: true,
        }
    }
    
    func (c *Client) GetConfig() (*ProjectConfig, error) { ... }
    ```
    
    Uses `gopkg.in/yaml.v3` (already a dependency) for parsing. Applies defaults
    for missing fields.
    
    ### Drain-loop behavior (documented for work-queue-be to implement)
    
    When `enforce_dep_ordering` is true, the scheduler's `SpawnUpToLimit()` loop:
    1. Pop the top track from the queue
    2. Check if all its deps are completed
    3. If yes: assign to a worker, decrement available slots
    4. If no: skip it, continue to the next track in the queue
    5. Repeat until no tracks remain or no slots available
    6. Skipped tracks remain in the queue — they'll be re-evaluated when a
       dependency completes (via OnAgentComplete → re-evaluate deps)
    
    This prevents the queue from stalling when the top track is blocked but
    lower-priority tracks are ready.
