spec:
  summary: |
    Create the kiloforge/kiloforge private repo on GitHub, push the full history,
    update the origin remote, and adjust CI workflows for the new org context.
  context: |
    The project currently lives at Goblinlordx/crelay (private). The kiloforge
    GitHub org already exists (created 2026-03-08, sole member: Goblinlordx) with
    one existing repo (Kiloforge/example-project). The user wants to establish
    kiloforge/kiloforge as the canonical home, private for now.
  codebase_analysis: |
    Current state:
    - Origin remote: git@github.com:Goblinlordx/crelay.git
    - Gitea remote: http://localhost:3000/conductor/main.git (local dev)
    - GitHub auth: Goblinlordx via keyring, scopes: gist, read:org, repo, workflow
    - Org: Kiloforge (free plan, unlimited private repos)
    - kiloforge/kiloforge does NOT exist yet

    Files that reference the repo:
    - .github/workflows/ci.yml — no repo-specific references
    - .github/workflows/close-external-prs.yml — may reference Goblinlordx/crelay
    - .github/workflows/release.yml — may reference repo name
    - go.mod — currently uses "kiloforge" as module name (not github path)
    - No import path changes needed (module is "kiloforge", not "github.com/...")

    Note: go.mod module path is just "kiloforge" (not github.com/Goblinlordx/crelay),
    so no Go import path refactoring is needed. This is a remote/CI migration only.
  acceptance_criteria:
    - kiloforge/kiloforge private repo exists on GitHub
    - All branches and tags pushed to kiloforge/kiloforge
    - Origin remote updated to point to kiloforge/kiloforge
    - CI workflows trigger and pass on the new repo
    - close-external-prs.yml updated for new org context if needed
    - Old Goblinlordx/crelay repo archived or redirected (user decision)
  out_of_scope: |
    - Go module path changes (already uses "kiloforge", not github path)
    - Deleting the old Goblinlordx/crelay repo (user decision, not automated)
    - Making the repo public (user wants private for now)
    - Setting up GitHub org settings (teams, permissions, branch protection)
  technical_notes: |
    Steps:
    1. gh repo create kiloforge/kiloforge --private --description "..."
    2. git remote set-url origin git@github.com:kiloforge/kiloforge.git
    3. git push origin --all && git push origin --tags
    4. Verify CI triggers on the new repo
    5. Update any workflow files that hardcode Goblinlordx/crelay
    6. Optionally archive old repo: gh repo archive Goblinlordx/crelay

    The Goblinlordx/crelay repo can be kept as a redirect or archived later
    at the user's discretion — this track does not delete it.
