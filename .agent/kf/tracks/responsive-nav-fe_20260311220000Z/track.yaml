spec:
  summary: "Add responsive navigation to the header — hamburger menu on mobile/tablet screens"
  context: |
    The header navigation currently assumes desktop width. On narrow screens,
    nav links overflow and the header becomes unusable.
  acceptance_criteria:
    - Hamburger button visible on screens ≤768px, hidden on desktop
    - Nav links collapse into vertical dropdown on mobile
    - Hamburger animates to X when menu is open
    - Nav links close menu on click
    - Subtitle, dividers, and labels hidden on mobile to save space
