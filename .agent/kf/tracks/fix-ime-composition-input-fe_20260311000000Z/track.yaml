id: fix-ime-composition-input-fe_20260311000000Z
title: Fix IME composition causing premature message sends
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Add e.isComposing guard to all keyboard event handlers that trigger message
    submission, preventing Korean/CJK IME composition events from prematurely
    sending or splitting user input.
  context: |
    When typing in Korean (or other CJK languages using IME), the browser fires
    keydown events during character composition. The current keyboard handlers
    check for Enter (or Cmd/Ctrl+Enter) without verifying e.isComposing, causing
    composition-phase keypresses to trigger message sends prematurely. This splits
    partially-composed Korean text across multiple messages.
  codebase_analysis: |
    6 components have vulnerable keyboard handlers:
    
    1. AgentTerminal.tsx (line ~129) — handleKeyDown checks Enter+!shiftKey → handleSend()
    2. CommandPane.tsx (line ~79) — handleKeyDown checks Enter+!shiftKey → handleSend()
    3. AgentDetailPage.tsx (line ~348) — TerminalSection handleKeyDown checks Enter+!shiftKey → handleSend()
    4. AdvisorHub.tsx (line ~137) — onKeyDown checks Enter+(metaKey||ctrlKey) → handleLaunch()
    5. AgentLauncher.tsx (line ~113) — onKeyDown checks Enter+(metaKey||ctrlKey) → handleSubmit()
    6. ProjectSettingsPanel.tsx (line ~78) — onKeyDown checks Enter → handleSaveBranch()
    
    All use <textarea> or <input> elements with onKeyDown handlers. None check
    the e.isComposing property or use compositionstart/compositionend events.
  acceptance_criteria:
    - All 6 keyboard handlers include e.isComposing early-return guard
    - Korean text can be typed with spaces without triggering premature sends
    - Enter key still correctly submits when not in IME composition mode
    - Existing keyboard shortcuts (Shift+Enter for newline, Cmd/Ctrl+Enter for submit) still work
  out_of_scope: |
    - Refactoring input components into a shared abstraction
    - Adding new keyboard shortcuts or changing submission behavior
    - Non-keyboard input methods
  technical_notes: |
    The fix is straightforward: add `if (e.isComposing) return;` at the top of
    each onKeyDown handler, before any key checks. The e.isComposing property is
    a standard KeyboardEvent property supported in all modern browsers and exposed
    by React's SyntheticEvent. No polyfill or ref-based composition tracking needed.
    
    Note: e.nativeEvent.isComposing should also be checked as a fallback for
    older React versions, but React 19 (our version) correctly proxies isComposing
    on the synthetic event.
