id: remove-password-persistence_20260308210000Z
title: Remove Password from Config Persistence
type: chore
status: complete
created: 2026-03-08T21:00:00Z
updated: 2026-03-08T21:00:00Z
spec:
  summary: "Clear `GiteaAdminPass` from the saved config after `kf init` creates the API token. Post-init, all Gitea API calls use token auth only — the plaintext password should never persist on disk."
  context: "Currently, `kf init` generates a random admin password, uses it to create the Gitea admin user and an API token, then saves both the password and token to `~/.kiloforge/config.json`. Every post-init command (`up`, `status`, `add`, etc.) creates a `NewClient(url, user, password)` and then calls `SetToken()` if a token exists. The password persists unnecessarily as plaintext on disk."
  codebase_analysis: |
    - **`config.go:20`** — `GiteaAdminPass string` field persisted via `json:"gitea_admin_pass,omitempty"`
    - **`manager.go:61-84`** — `Configure()` is the only place password is truly needed: creates admin user via CLI exec, then creates API token via BasicAuth
    - **`client.go:28-35`** — `NewClient(baseURL, username, password)` stores password; `do()` falls back to BasicAuth when no token set
    - **`init.go:65-66`** — Password generated if empty, saved to config
    - **`init.go:135`** — Password printed to stdout during init (useful for manual Gitea access)
    - **11 call sites** across CLI commands (`up.go`, `status.go`, `add.go`, `sync.go`, `board.go`, `implement.go`, `down.go`, `serve.go`, `server.go`) all follow the pattern: `NewClient(url, user, pass)` then `SetToken(token)` — the password is never actually used post-init because the token is always set
    - **`env_adapter.go:19`** — `KF_GITEA_ADMIN_PASS` env var support
    - **`flags_adapter.go:14`** — `WithGiteaAdminPass` flag option
  acceptance_criteria:
    - After `kf init` succeeds and saves config, `config.json` does NOT contain `gitea_admin_pass`
    - All post-init commands (`up`, `down`, `status`, `add`, `sync`, `board`, `implement`, `serve`) work with token-only auth
    - `NewClient` has a token-based constructor for post-init usage (no password parameter needed)
    - `kf init` still prints the password to stdout so users can manually log into Gitea if needed
    - `kf init --admin-pass` flag still works for initial setup
    - Password is still accepted via `KF_GITEA_ADMIN_PASS` env var for init
    - Existing `config.json` files with a password field are handled gracefully (field ignored post-init)
    - All existing tests pass
  out_of_scope: |
    - Encrypting or vaulting the API token (separate concern)
    - Removing the password from the `Config` struct entirely (it's still needed in-memory during init)
    - Token rotation or refresh mechanisms
  technical_notes: |
    **Approach:**
    
    1. Add `NewClientWithToken(baseURL, username, token)` constructor — used by all post-init callers
    2. In `manager.Configure()`, after token creation succeeds, clear `cfg.GiteaAdminPass` before returning (so the subsequent `cfg.Save()` in `init.go` omits it)
    3. Refactor all 11 CLI call sites from `NewClient(url, user, pass) + SetToken(token)` to `NewClientWithToken(url, user, token)`
    4. Keep `NewClient(url, user, pass)` for init-time usage (BasicAuth for token creation)
    5. Add `json:"-"` tag consideration: we can't use `json:"-"` because init needs to save the password temporarily. Instead, clear the field before saving.
    
    **Migration:** Existing configs with `gitea_admin_pass` will still load (the field exists in the struct), but the password won't be used since the token is always present post-init. The field will be cleaned up on next `init` or can be manually removed.
    
    ---
