spec:
  summary: |
    Create a sourceable shell helper at .agent/kf/bin/kf-worktree-env that detects git worktree context, exports required env vars, and reports worktree constraints. Update CLAUDE.md to inform agents about it and update the Makefile to fix missing GIT_DIR/GIT_WORK_TREE in test targets.
  context: |
    This repo uses git worktrees extensively for parallel agent development (architect-*, developer-*, reviewer-*). Worktrees cause several issues that agents hit:

    1. **Go VCS stamping** — `.git` is a file (not a directory) in worktrees, so Go's VCS stamping fails. Need to export `GIT_DIR=$(git rev-parse --git-common-dir)` and `GIT_WORK_TREE=$(git rev-parse --show-toplevel)`.

    2. **Branch lockout** — A worktree's checked-out branch can't be checked out by another worktree. Agents need to know which branches are occupied.

    3. **Shared git state** — All worktrees share the same `.git` directory (refs, config, hooks). Merges in one worktree affect all others.

    4. **Path confusion** — `git rev-parse --show-toplevel` returns the worktree root, `--git-common-dir` returns the shared `.git` dir. Agents often confuse these.

    The CLAUDE.md currently documents the Go build fix manually, but agents don't always follow it. A shell helper makes it reliable and composable — agents just source it.

    The Makefile has the fix in `build-backend` and `test-e2e` but is MISSING it in `test`, `test-smoke`, `test-integration`, `test-all`, and `test-coverage` targets.
  codebase_analysis: |
    ### Current state

    **CLAUDE.md** (lines 3-20): Documents the worktree build fix with manual export commands.
    Agents are told to prefix `go build`/`go test` with env vars or use Makefile targets.

    **Makefile**:
    - `build-backend` (line 27): Has `GIT_DIR`/`GIT_WORK_TREE` fix
    - `test-e2e` (line 48): Has fix
    - `test` (line 38): MISSING fix
    - `test-smoke` (line 42): MISSING fix
    - `test-integration` (line 45): MISSING fix
    - `test-all` (line 51): MISSING fix
    - `test-coverage` (line 55): MISSING fix

    ### Helper design

    The helper should be a sourceable script (`. .agent/kf/bin/kf-worktree-env`) that:
    1. Detects if running in a worktree
    2. Exports `GIT_DIR` and `GIT_WORK_TREE` (idempotent — safe to source multiple times)
    3. Sets `KF_IS_WORKTREE=1` or `KF_IS_WORKTREE=0` for scripts to check
    4. Sets `KF_WORKTREE_NAME` (e.g., "developer-1", "architect-2")
    5. Sets `KF_MAIN_WORKTREE` (path to main worktree)
    6. Prints a brief summary when sourced (can be silenced with `KF_QUIET=1`)
    7. Optionally lists occupied branches (`--show-branches` flag)

    When run as a command (not sourced), it should print the same info to stdout for inspection.
  acceptance_criteria:
    - "kf-worktree-env exists at .agent/kf/bin/kf-worktree-env and is executable"
    - "Sourcing the script exports GIT_DIR, GIT_WORK_TREE, KF_IS_WORKTREE, KF_WORKTREE_NAME, KF_MAIN_WORKTREE"
    - "Script is idempotent — sourcing multiple times produces identical results"
    - "Script works in both worktree and non-worktree repos (sets KF_IS_WORKTREE=0 in normal repos)"
    - "CLAUDE.md updated to reference kf-worktree-env as the recommended approach (replacing manual export instructions)"
    - "Makefile test, test-smoke, test-integration, test-all, and test-coverage targets fixed with GIT_DIR/GIT_WORK_TREE"
    - "Script has --help output documenting env vars it sets"
  out_of_scope: |
    - Modifying kf-track or kf-track-content (they don't run Go commands)
    - Updating skill SKILL.md files (handled by skills-cli-migration track, already completed)
    - Changing the merge lock protocol
    - Automating worktree creation/deletion
  technical_notes: |
    ### Script design: .agent/kf/bin/kf-worktree-env

    ```bash
    #!/usr/bin/env bash
    # Detect git worktree context and export env vars for Go builds.
    # Usage: source .agent/kf/bin/kf-worktree-env   (export env vars)
    #        .agent/kf/bin/kf-worktree-env           (print info only)
    #        .agent/kf/bin/kf-worktree-env --help    (show help)

    Detection logic:
    - if [ -f .git ] then we're in a worktree (in worktrees, .git is a file pointing to the main repo)
    - if [ -d .git ] then we're in a normal repo or the main worktree

    Exported vars:
    - GIT_DIR=$(git rev-parse --git-common-dir)
    - GIT_WORK_TREE=$(git rev-parse --show-toplevel)
    - KF_IS_WORKTREE=1|0
    - KF_WORKTREE_NAME=$(basename $(pwd))
    - KF_MAIN_WORKTREE=$(git worktree list --porcelain | head -1 | sed 's/worktree //')
    ```

    ### CLAUDE.md update

    Replace the manual export instructions with:
    ```
    Before running go commands in a worktree, source the helper:
      . .agent/kf/bin/kf-worktree-env

    This exports GIT_DIR and GIT_WORK_TREE automatically.
    `make build` and `make test` already handle this — prefer Makefile targets when available.
    ```

    ### Makefile fix

    Add GIT_DIR/GIT_WORK_TREE to all Go test targets. Pattern:
    ```makefile
    test: ensure-dist
    	cd backend && GIT_DIR=$$(git rev-parse --git-common-dir) GIT_WORK_TREE=$$(cd .. && pwd) \
    		go test -race ./...
    ```

    Apply to: test, test-smoke, test-integration, test-all, test-coverage
