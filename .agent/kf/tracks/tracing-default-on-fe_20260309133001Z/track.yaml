spec:
  summary: "Add a settings area to the dashboard with a toggle to enable/disable tracing, backed by the `GET/PUT /api/config` endpoints from the BE track."
  context: "The BE track (`tracing-default-on-be_20260309133000Z`) exposes `GET /api/config` and `PUT /api/config` endpoints. The frontend needs a UI control so users can toggle tracing without editing config files. This could live in a settings panel, header dropdown, or inline on the traces tab."
  codebase_analysis: |
    ### Current frontend
    - `frontend/src/components/TraceList.tsx` — already shows "enable tracing in config" empty state message
    - `frontend/src/hooks/useTraces.ts` — fetches trace data
    - `frontend/src/App.tsx` — main app with tab navigation
    - No existing settings panel or config hook
    
    ### Approach
    - Add `useConfig` hook that fetches `GET /api/config` and provides `updateConfig()` via `PUT /api/config`
    - Add a toggle switch in the traces tab header (or a settings section) for `tracing_enabled`
    - Update the TraceList empty state to include the toggle instead of just a text message
  acceptance_criteria:
    - Dashboard shows tracing enabled/disabled toggle
    - Toggle calls `PUT /api/config` with `{"tracing_enabled": bool}`
    - Toggle state reflects current config from `GET /api/config`
    - TraceList empty state includes the toggle when tracing is disabled
    - `npm run build` succeeds
  out_of_scope: |
    - Backend config API (covered by BE track)
    - Full settings page (just the tracing toggle for now)
    - OTLP endpoint configuration
  technical_notes: |
    ### useConfig hook
    ```typescript
    const { config, updateConfig, loading } = useConfig();
    // config = { tracing_enabled: true, dashboard_enabled: true }
    // updateConfig({ tracing_enabled: false })
    ```
    
    ### Toggle placement
    Place inline on the traces tab, near the TraceList header. Simple switch component with label "Tracing: Enabled/Disabled". Shows a note that changes take effect on next orchestrator restart.
    
    ---
