id: impl-gitea-issue-api_20260308170000Z
title: Extend Gitea Client with Issue, Label, and Project Board APIs
type: feature
status: complete
created: 2026-03-08T17:00:00Z
updated: 2026-03-08T17:00:00Z
spec:
  summary: Add Gitea API methods for creating/updating issues, managing labels, and project board (kanban) operations — columns, cards, and card movement. Foundation for track-to-board sync.
  context: The Gitea client currently supports 14 methods covering repos, PRs, webhooks, and SSH keys. To sync conductor tracks with a Gitea kanban board, we need issue CRUD, label management, and project board APIs. Gitea's REST API v1 supports all of these.
  codebase_analysis: |
    - **Gitea client**: `internal/adapter/gitea/client.go` — 14 methods, generic `do()` HTTP helper, token+basic auth
    - **Port interface**: `internal/core/port/gitea_client.go` — subset of client methods (PR-focused)
    - **Tests**: `internal/adapter/gitea/client_test.go` — comprehensive httptest-based table-driven tests
    - **Pattern**: All API calls use `c.do(ctx, method, path, body)` → `([]byte, error)`
    - **Label creation**: `AddLabel()` already creates labels if missing + adds to issue — good pattern to follow
    
    ### API endpoints to implement
    
    ```
    POST   /api/v1/repos/{owner}/{repo}/issues                        — create issue
    PATCH  /api/v1/repos/{owner}/{repo}/issues/{number}               — update issue
    GET    /api/v1/repos/{owner}/{repo}/issues?state=X&labels=Y       — list issues
    POST   /api/v1/repos/{owner}/{repo}/labels                        — create label (already partial)
    POST   /api/v1/repos/{owner}/{repo}/projects                      — create project board
    GET    /api/v1/repos/{owner}/{repo}/projects                      — list projects
    POST   /api/v1/repos/{owner}/{repo}/projects/{id}/columns         — create column
    GET    /api/v1/repos/{owner}/{repo}/projects/{id}/columns         — list columns
    POST   /api/v1/repos/{owner}/{repo}/projects/{id}/columns/{id}/cards — create card
    PATCH  /api/v1/repos/{owner}/{repo}/projects/{id}/columns/{id}/cards/{id} — move card
    ```
  acceptance_criteria:
    - `CreateIssue(ctx, repo, title, body, labels) → (int, error)` — returns issue number
    - `UpdateIssue(ctx, repo, issueNum, updates) → error` — update title, body, state (open/closed)
    - `GetIssues(ctx, repo, state, labels) → ([]Issue, error)` — list with filters
    - `EnsureLabels(ctx, repo, labels []LabelDef) → error` — idempotent batch label creation
    - `CreateProject(ctx, repo, title, desc) → (int, error)` — create project board
    - `GetProjects(ctx, repo) → ([]Project, error)` — list projects
    - `CreateColumn(ctx, projectID, title) → (int, error)` — add column to board
    - `GetColumns(ctx, projectID) → ([]Column, error)` — list columns
    - `CreateCard(ctx, columnID, issueID) → (int, error)` — add issue to column
    - `MoveCard(ctx, cardID, columnID) → error` — move card between columns
    - Port interface updated with new methods
    - Table-driven httptest tests for all new methods
    - All existing tests pass, build succeeds
  out_of_scope: |
    - Using these APIs (that's track 2 and 3)
    - Gitea SDK or code generation — hand-written HTTP like existing code
    - Milestone support (can be added later if needed)
  technical_notes: |
    ### Issue types for return values
    
    ```go
    type Issue struct {
        Number int    `json:"number"`
        Title  string `json:"title"`
        State  string `json:"state"` // "open", "closed"
    }
    
    type LabelDef struct {
        Name  string `json:"name"`
        Color string `json:"color"`
    }
    
    type Project struct {
        ID    int    `json:"id"`
        Title string `json:"title"`
    }
    
    type Column struct {
        ID    int    `json:"id"`
        Title string `json:"title"`
    }
    ```
    
    These can live in the gitea adapter package as API response types (not domain types).
    
    ### EnsureLabels pattern
    
    ```go
    func (c *Client) EnsureLabels(ctx context.Context, repo string, labels []LabelDef) error {
        // GET existing labels, diff, POST missing ones
        // Idempotent — safe to call multiple times
    }
    ```
    
    ---
