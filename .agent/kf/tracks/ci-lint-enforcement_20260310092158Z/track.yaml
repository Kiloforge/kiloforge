id: ci-lint-enforcement_20260310092158Z
title: "Fix CI lint failures — gofmt violations, local lint enforcement, VCS fix"
type: bug
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Fix 2 gofmt violations failing CI lint, add -buildvcs=false to TestBinaryBuilds
    for GitHub Actions shallow clones, and add `make lint` to workflow.md so developer
    agents catch formatting issues before merge.
  context: |
    CI lint job fails on golangci-lint's gofmt formatter due to formatting violations
    in two files. TestBinaryBuilds fails on GitHub Actions because VCS stamping doesn't
    work reliably in shallow clones. Developer agents don't run `make lint` locally
    because workflow.md only mandates `make test` and `make build`, so formatting
    issues slip through to CI.
  codebase_analysis: |
    Affected files:
    - backend/internal/core/testutil/mocks.go — line 117: double blank line before
      ListAgents function (gofmt requires single blank line between top-level decls)
    - backend/internal/adapter/agent/timeout_reaper_test.go — lines 61-64: alignment
      padding on fakeEventBus one-liner methods (gofmt strips alignment whitespace)
    - backend/cmd/kf/main_test.go — TestBinaryBuilds runs `go build` with GIT_DIR/
      GIT_WORK_TREE but no -buildvcs=false; fails on GitHub Actions shallow clones
    - .agent/kf/workflow.md — verification commands section only lists `make test`
      and `make build`; missing `make lint`

    CI config (.github/workflows/ci.yml):
    - Lint job uses golangci/golangci-lint-action@v7 with v2.11
    - backend/.golangci.yaml enables gofmt and goimports in formatters section
    - `make lint` target exists in Makefile (runs golangci-lint + npm lint)

    No pre-commit hooks or local formatting enforcement exists.
  acceptance_criteria:
    - "`make lint` passes locally with zero gofmt violations"
    - "TestBinaryBuilds passes on GitHub Actions shallow clones"
    - "workflow.md includes `make lint` as a required verification command"
    - "CI lint job passes green"
  out_of_scope: |
    - Adding pre-commit hooks (separate improvement)
    - Changing golangci-lint configuration
    - Frontend lint issues (none identified)
    - CI workflow restructuring
  technical_notes: |
    Fix approach:
    1. mocks.go: Remove the extra blank line at line 117 (trivial)
    2. timeout_reaper_test.go: Remove alignment padding from fakeEventBus methods —
       gofmt normalizes to single space before opening brace
    3. main_test.go: Add "-buildvcs=false" to the go build args in TestBinaryBuilds.
       The test validates compilation, not VCS metadata. The Makefile already handles
       VCS detection separately.
    4. workflow.md: Add `make lint` to the verification commands section
