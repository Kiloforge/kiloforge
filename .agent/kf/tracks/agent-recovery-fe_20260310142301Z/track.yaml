id: agent-recovery-fe_20260310142301Z
title: Agent recovery UI — resume, replace, and suspended state display
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Update the dashboard to properly handle suspended and resume-failed agents.
    Fix canResume() to include suspended agents, display recovery metadata
    (suspended_at, shutdown_reason, resume_error), and add a "Replace" action
    for agents that can't be resumed.
  context: |
    When the orchestrator restarts after a shutdown, agents come up as "suspended"
    (paused). The frontend has partial support: StatusBadge renders "suspended" with
    gray styling, AgentGrid sorts suspended agents at priority 3, and the history
    page includes "suspended" in filter options.
    
    However, the recovery UX is broken:
    - canResume() only allows resume for stopped/completed/failed interactive agents
    - Suspended agents have no "Resume" button
    - resume_error and suspended_at fields exist in the Agent type but aren't shown
    - When resume fails (status "resume-failed"), there's no recovery path in the UI
    - No "Replace" action exists to spawn a fresh agent for the same work
  codebase_analysis: |
    Key files:
    - frontend/src/hooks/useAgentActions.ts:36-52 — canResume() checks:
      status === "stopped" || "completed" || "failed" AND role === "interactive"
      Missing: "suspended" and "force-killed" statuses, non-interactive roles
    - frontend/src/components/StatusBadge.tsx — renders status string with CSS class.
      Has .suspended style (gray) but no visual indicator of resumability.
    - frontend/src/components/StatusBadge.module.css — .suspended and .suspending
      share gray styling. No .resume-failed or .force-killed styles.
    - frontend/src/components/AgentCard.tsx — shows Resume button via canResume().
      No "Replace" action exists.
    - frontend/src/pages/AgentDetailPage.tsx — metaGrid shows basic agent info but
      does NOT display suspended_at, shutdown_reason, or resume_error.
    - frontend/src/types/api.ts — Agent interface has suspended_at, shutdown_reason,
      resume_error as optional fields. Already typed correctly.
    - frontend/src/components/AgentGrid.tsx — statusOrder has suspended at 3.
    - frontend/src/pages/AgentHistoryPage.tsx — STATUS_OPTIONS includes "suspended"
      but not "resume-failed" or "force-killed".
    
    The BE track (agent-recovery-be) adds:
    - Resume support for all agent roles (not just interactive)
    - POST /api/agents/{id}/replace endpoint
    - "replaced" status
  acceptance_criteria:
    - Suspended agents show "Resume" button in both AgentCard and AgentDetailPage
    - Resume works for all agent roles (developer, reviewer, interactive)
    - AgentDetailPage shows suspended_at, shutdown_reason, and resume_error when present
    - Resume-failed agents show "Replace" button with confirmation
    - Replace action calls POST /api/agents/{id}/replace and navigates to new agent
    - StatusBadge has distinct visual for resume-failed (red-ish) and force-killed
    - AgentHistoryPage filter includes resume-failed and force-killed options
    - User sees clear message when agent is being replaced ("Session could not be
  out_of_scope: |
    - Backend changes (separate BE track)
    - Dashboard-level recovery banner (startup notification)
    - Swarm page recovery UI
    - Auto-resume toggle in settings
  technical_notes: |
    Implementation approach:
    
    1. Fix canResume() — extend to include "suspended" and "force-killed" statuses.
       Remove the role === "interactive" restriction since the BE now supports
       resuming all roles. Keep canResume false for "resume-failed" (use Replace
       instead).
    
    2. Add canReplace() — returns true when status is "resume-failed" or
       "force-killed" (terminal states where the original session is unrecoverable).
    
    3. Update useAgentActions — add replaceMutation calling
       POST /api/agents/{id}/replace. On success, invalidate agent queries and
       navigate to the new agent's detail page.
    
    4. Update AgentCard — add Replace button (red/warning style) when canReplace().
       Show confirmation dialog: "This agent's session could not be recovered.
       Replace with a new agent for the same work?"
    
    5. Update AgentDetailPage — add recovery info section to metaGrid:
       - suspended_at → "Suspended at: {timestamp}"
       - shutdown_reason → "Reason: {reason}"
       - resume_error → "Resume error: {error}" (red text)
       Add Resume and Replace buttons in actionBar.
    
    6. Update StatusBadge.module.css — add styles for:
       - .resume-failed (red-orange, indicates action needed)
       - .force-killed (red, indicates forceful termination)
       - .replaced (dim, indicates superseded)
    
    7. Update AgentHistoryPage — add "resume-failed", "force-killed", "replaced"
       to STATUS_OPTIONS filter.
    
    8. Add types — add ReplaceAgentResponse type (wraps Agent) to api.ts.
