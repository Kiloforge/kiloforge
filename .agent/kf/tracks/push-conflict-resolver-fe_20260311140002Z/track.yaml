id: push-conflict-resolver-fe_20260311140002Z
title: Sync conflict resolution UI — detect 409 on push/pull and offer resolver agent
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Update the SyncPanel to detect sync conflicts (409) on both push and pull, and offer
    the user an option to spawn a conflict resolver agent with live agent terminal.
  context: |
    After the backend returns 409 on push conflict (new) or pull conflict (existing), the
    frontend needs to:
    1. Detect the 409 specifically (vs generic errors)
    2. Show a conflict-specific error with a "Resolve Conflicts" button
    3. When clicked, call POST /api/projects/{slug}/resolve-conflict with direction
    4. Open an AgentTerminal to monitor the resolver agent
    5. After completion, refresh sync status
    
    The existing SyncPanel shows errors as text in a red dismissible box for both push
    and pull. The 409 case should instead show a structured conflict message with an
    action button. The pull endpoint already returns 409 for diverged branches but the
    frontend currently shows it as a generic error.
  codebase_analysis: |
    Affected files:
    - frontend/src/hooks/useOriginSync.ts — Detect 409 on push and pull, set conflict state with direction
    - frontend/src/components/SyncPanel.tsx — Show conflict UI with "Resolve Conflicts" button for both directions
    - frontend/src/pages/ProjectPage.tsx — Wire resolver agent spawn and AgentTerminal
    - frontend/src/types/api.ts — Add ResolveConflictResponse type if needed
    
    Current push error handling in useOriginSync.ts:
      onError: (err) => {
        if (err instanceof FetchError) {
          const body = err.body as { error?: string };
          setError(body?.error || `Error ${err.status}`);
        } else {
          setError("Network error");
        }
      }
    
    Current pull error handling is similar — all errors set the same error state.
    Both need to distinguish 409 from other errors.
    
    The spawn + terminal pattern already exists in ProjectPage.tsx for admin operations:
      <AdminPanel onStartOperation={setAdminAgentId} />
      {adminAgentId && <AgentTerminal agentId={adminAgentId} ... />}
  acceptance_criteria:
    - Push conflict (409) shows conflict-specific message with "Resolve Conflicts" button
    - Pull conflict (409) shows conflict-specific message with "Resolve Conflicts" button
    - Clicking "Resolve Conflicts" calls resolve-conflict endpoint with correct direction (push/pull)
    - Agent terminal opens showing resolver agent progress
    - After resolver agent completes, sync status refreshes automatically
    - Non-conflict errors (500, network) still show as generic error
    - Consent/skills gates work for the resolve-conflict endpoint (403/412 cascading)
  out_of_scope: |
    - Backend changes (separate track)
    - The resolver skill itself (separate track)
    - Manual conflict resolution UI (file-by-file diff viewer)
  technical_notes: |
    Approach:
    1. In useOriginSync, add conflict state: { active: boolean, direction: "push"|"pull" }.
       On push/pull error with status 409, set conflict state instead of generic error.
    2. Export conflict state and clearConflict function.
    3. SyncPanel receives conflict prop. When active, render a conflict banner with
       "Resolve Conflicts" button instead of the generic error box.
    4. ProjectPage adds a resolveConflict mutation that calls the endpoint with direction,
       gets back an agent_id, and opens AgentTerminal.
    5. On terminal close, invalidate sync status query and clear conflict state.
