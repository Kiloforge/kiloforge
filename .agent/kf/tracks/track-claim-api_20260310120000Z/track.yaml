id: track-claim-api_20260310120000Z
title: "Track claim API — server-side claim detection via scoped locks"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Add track claim/release endpoints to the orchestrator using the existing
    lock manager with track-scoped locks. Wire up the existing assigned_worker
    field in BoardCard. Enrich track listing with claim status.
  context: |
    Developers working in parallel worktrees see tracks as "available" when
    they've already been claimed by other workers. The root cause is that
    track status in tracks.yaml stays "pending" until completion — there's no
    intermediate "claimed" state visible to other workers.

    The orchestrator server already has:
    - General-purpose lock manager (adapter/lock/manager.go) with TTL, heartbeat,
      blocking acquire — currently used for merge locks via track:merge scope
    - assigned_worker field in BoardCard domain model and board_cards SQLite table
      (never populated)
    - Agent Ref field tracking which git branch each agent is on
    - GET /api/projects/{slug}/branches endpoint listing worktree branches

    This track adds a proper claim API so the server becomes the source of truth
    for track ownership.
  codebase_analysis: |
    Key files:
    - backend/api/openapi.yaml — API spec, needs new claim endpoints
    - backend/internal/adapter/lock/manager.go — Lock manager, reuse with track:{trackId} scopes
    - backend/internal/core/domain/board.go — BoardCard has AssignedWorker field (unused)
    - backend/internal/adapter/persistence/sqlite/board_store.go — Persistence layer
    - backend/internal/core/service/board_service.go — Service layer for board ops
    - backend/internal/adapter/rest/api_handler.go — REST handlers

    Lock manager API:
    - Acquire(ctx, scope, holder, ttl) — scope will be "track:{trackId}"
    - Release(scope, holder)
    - Heartbeat(scope, holder, ttl)
    - List() — already returns all active locks

    The lock manager persists to locks.json and is thread-safe with mutex.
    It supports waiter notification for blocking acquire.
  acceptance_criteria:
    - POST /api/tracks/{trackId}/claim acquires a track-scoped lock and sets assigned_worker on the board card
    - DELETE /api/tracks/{trackId}/claim releases the lock and clears assigned_worker
    - POST /api/tracks/{trackId}/claim/heartbeat extends the claim TTL
    - GET /api/tracks returns claim status (claimed_by, claimed_at) for each track
    - Claiming an already-claimed track returns 409 Conflict with holder info
    - Claims auto-expire via lock TTL if worker crashes (no heartbeat)
    - All endpoints follow existing OpenAPI schema-first pattern (oapi-codegen)
  out_of_scope: |
    - CLI integration (handled by fix-developer-availability track)
    - Dashboard UI for claim visualization (future track)
    - Automatic claim on agent spawn (future enhancement)
  technical_notes: |
    Approach: Reuse existing lock manager with scope pattern "track:{trackId}".
    The lock holder string is the agent/worker identifier.

    Claim flow:
    1. POST /api/tracks/{trackId}/claim with holder ID and TTL
    2. Lock manager acquires "track:{trackId}" scope
    3. On success: update BoardCard.AssignedWorker via BoardService
    4. Return claim info (holder, expires_at)

    Release flow:
    1. DELETE /api/tracks/{trackId}/claim with holder ID
    2. Lock manager releases "track:{trackId}" scope
    3. Clear BoardCard.AssignedWorker

    TTL default: 120s with 30s heartbeat (same as merge lock).
    Crash recovery: lock auto-expires, assigned_worker cleared on next query.
