# Track Dependency Graph
#
# PROTOCOL:
#   This file is the canonical source for track dependency ordering.
#   It is an adjacency list: each key is a track ID, its value is a list
#   of track IDs that MUST complete before it can start.
#
# FORMAT:
#   <track-id>:
#     - <dependency-track-id>
#     - <dependency-track-id>
#
#   Tracks with no dependencies use an empty list:
#   <track-id>: []
#
# RULES:
#   - Only pending and in-progress tracks are listed here.
#   - Completed and archived tracks are removed during cleanup.
#   - The architect skill MUST update this file when creating new tracks.
#   - The developer skill MUST check this file before claiming a track:
#     a track is claimable only when ALL its dependencies are completed.
#   - Cycles are forbidden. If detected, the architect must restructure.
#
# ORDERING:
#   - Track entries sorted alphabetically by track ID.
#   - Dependency lists sorted alphabetically within each entry.
#   - Stable ordering keeps diffs minimal and predictable.
#
# MAINTENANCE:
#   - Architect adds entries in Step 10 (track creation).
#   - Developer removes entries when marking a track complete.
#   - /kf-manage bulk-archive prunes completed entries.
#
# UPDATED: 2026-03-10

