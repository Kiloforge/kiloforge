spec:
  summary: Add Stop, Resume, and Delete action buttons to AgentCard and AgentDetailPage. Show contextual actions based on agent status (Stop for running agents, Resume for stopped/completed, Delete for non-running agents). Include confirmation dialogs for destructive actions and optimistic TanStack Query updates.
  context: "The backend track (`agent-lifecycle-be_20260310030000Z`) adds REST endpoints for stop (`POST /api/agents/{id}/stop`), resume (`POST /api/agents/{id}/resume`), and delete (`DELETE /api/agents/{id}`). The frontend needs to expose these capabilities through the existing agent UI components."
  codebase_analysis: |
    - **AgentCard** (`components/AgentCard.tsx`): Currently has "Attach" (interactive only) and "View Log" buttons. Actions row at bottom of card. Props: `agent`, `onViewLog`, `onAttach`
    - **AgentDetailPage** (`pages/AgentDetailPage.tsx`): Shows agent metadata grid, log viewer, terminal section. No action buttons for lifecycle management
    - **AgentHistoryPage** (`pages/AgentHistoryPage.tsx`): Table of all agents with name, role, status, ref, uptime, cost
    - **Mutation pattern**: `useMutation` with `fetcher<T>(url, { method })`, callbacks for `onSuccess`/`onError`
    - **SSE events**: `agent_update` and `agent_removed` already handled in `App.tsx` via `useAgents` hook — UI will auto-update when backend sends events
    - **Agent type** (`types/api.ts`): Has `status`, `session_id`, `finished_at` fields needed for conditional rendering
  acceptance_criteria:
    - AgentCard shows "Stop" button for running/waiting agents
    - AgentCard shows "Resume" button for stopped/completed/failed agents (interactive role only)
    - AgentCard shows "Delete" button for non-running agents
    - AgentDetailPage shows Stop/Resume/Delete actions in a toolbar
    - Stop action calls `POST /api/agents/{id}/stop`, shows loading state
    - Resume action calls `POST /api/agents/{id}/resume`, auto-attaches terminal on success
    - Delete action calls `DELETE /api/agents/{id}` with confirmation dialog
    - Delete navigates back to home if on AgentDetailPage
    - SSE events automatically refresh agent state (no manual refetch needed)
    - Error responses shown via toast notifications (existing toast system)
    - AgentHistoryPage table has an actions column with Stop/Resume/Delete
  out_of_scope: |
    - Bulk stop/delete (select multiple agents)
    - Auto-cleanup settings UI
    - Agent restart (stop + resume in one action)
  technical_notes: |
    ### Button Visibility Logic
    ```
    Running/Waiting → Show: Stop
    Stopped/Completed/Failed → Show: Resume (interactive only), Delete
    ```
    
    ### Mutation Hooks
    Create a `useAgentActions` hook (or inline mutations) using TanStack Query `useMutation`:
    - `stopAgent(id)` → `POST /api/agents/{id}/stop`
    - `resumeAgent(id)` → `POST /api/agents/{id}/resume` → returns agent with ws_url
    - `deleteAgent(id)` → `DELETE /api/agents/{id}`
    
    On success, invalidate `queryKeys.agents()` and `queryKeys.agent(id)`. SSE will also push updates so this is belt-and-suspenders.
    
    ### Confirmation Dialog
    Use a simple confirm dialog for Delete (browser `window.confirm` or a styled modal). Stop doesn't need confirmation — it's easily reversible via Resume.
    
    ---
