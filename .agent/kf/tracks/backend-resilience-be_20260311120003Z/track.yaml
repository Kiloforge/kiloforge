id: backend-resilience-be_20260311120003Z
title: "Backend resilience — config validation, DB safety, log hardening"
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: "Add rows.Err() checks to SQLite store iterators, add config Validate() method, fix log file permissions, add migration down blocks, wrap compound DB ops in transactions."
  context: |
    Production audit identified several resilience gaps in the backend: SQLite row iteration
    loops silently skip errors (missing rows.Err() checks), configuration has no runtime
    validation, log files are world-readable, and database migrations lack rollback blocks.
  codebase_analysis: |
    Issues found:
    1. Missing rows.Err() in iteration loops:
       - agent_store.go:257 — row scan errors silently skipped with continue
       - project_store.go:58 — same pattern
       - trace_store.go:219,346,369 — same pattern
       - queue_store.go has rows.Err() at 140,272 (correct — use as template)
    2. No config.Validate() method — OrchestratorPort not range-checked, DataDir not verified
    3. Log file permissions 0644 in cli/daemon.go:41, cli/serve.go:42 — should be 0640
    4. Migration files 001-004 have no -- +goose Down blocks for rollback
    5. project_store.go:67-77 — Add+Save not wrapped in transaction
    6. context.Background() used in agent/spawner.go:274,354,482,496,631,645 for long-lived
       operations instead of deriving from server context
  acceptance_criteria:
    - All SQLite store row iteration loops check rows.Err() after loop completion
    - Silently-skipped row scan errors are logged (not silently continued)
    - config.Validate() method exists and is called during Resolve()
    - OrchestratorPort validated to 1-65535 range
    - DataDir validated as non-empty
    - Log files created with 0640 permissions
    - All 4 migration files have -- +goose Down blocks
    - Compound store operations wrapped in transactions where atomicity matters
    - All tests pass
  out_of_scope: |
    - Structured logging migration (separate, larger effort)
    - Context propagation overhaul for agent spawner (requires careful design)
    - Request logging middleware (separate track)
  technical_notes: |
    For rows.Err(): follow the pattern in queue_store.go — check rows.Err() after the
    for rows.Next() loop and return the error. For row scan failures, log the error
    and continue (don't fail the entire query for one bad row).

    For config validation: add a Validate() method to Config struct, call it at the
    end of Resolve(). Return descriptive errors for each invalid field.

    For migration down blocks: add DROP TABLE or ALTER TABLE DROP COLUMN as appropriate.
    These should be safe rollbacks, not destructive.
