id: install-script_20260311130000Z
title: Add curl-pipe install script for one-line kf installation
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Create a shell install script that users can run via curl | sh to automatically
    detect OS/arch, download the latest kf release binary from GitHub, and install it.
  context: |
    Kiloforge currently offers three install methods: Homebrew tap, manual binary download
    from GitHub Releases, and building from source. The manual download requires the user
    to navigate to the releases page, identify the correct archive for their platform,
    download it, extract it, and move the binary to their PATH — too many steps.
    
    Most modern CLI tools (e.g., rustup, nvm, homebrew itself) offer a one-liner curl
    install. The user wants the same for kf: a single command they can copy/paste to
    install the latest version.
  codebase_analysis: |
    Affected files:
    - install.sh (NEW) — the install script, placed at repo root for easy GitHub raw URL access
    - README.md — update Installation section to include the curl one-liner
    
    Release infrastructure (from .goreleaser.yaml):
    - Archive naming: kf_{VERSION}_{OS}_{ARCH}.tar.gz (or .zip for Windows)
    - Binary name inside archive: kf
    - Supported platforms: darwin/amd64, darwin/arm64, linux/amd64, linux/arm64
    - Windows: kf_{VERSION}_{OS}_{ARCH}.zip — shell script won't target Windows (use .zip manually)
    - GitHub repo for releases API: Goblinlordx/crelay
    - Checksum file: checksums.txt included in each release
    
    GitHub API endpoint for latest release:
      https://api.github.com/repos/Goblinlordx/crelay/releases/latest
    
    The script should:
    1. Detect OS (uname -s → darwin/linux) and arch (uname -m → x86_64→amd64, arm64/aarch64→arm64)
    2. Query GitHub API for latest release tag
    3. Construct download URL from tag + OS + arch
    4. Download the .tar.gz archive
    5. Extract the kf binary
    6. Install to /usr/local/bin (or user-specified INSTALL_DIR)
    7. Optionally verify checksum
  acceptance_criteria:
    - Script detects OS (darwin, linux) and architecture (amd64, arm64)
    - Script fetches latest release tag from GitHub API
    - Script downloads correct archive for detected platform
    - Script extracts kf binary and installs to /usr/local/bin (configurable via INSTALL_DIR env var)
    - Script provides clear error messages for unsupported platforms (e.g., Windows)
    - Script is idempotent — running again upgrades to latest version
    - README.md updated with curl one-liner install command
    - Script works on macOS and Linux without dependencies beyond curl/tar/uname
  out_of_scope: |
    - Windows PowerShell installer (separate track if needed)
    - Checksum verification (nice-to-have, not required for initial version)
    - Version pinning (always installs latest)
    - Uninstall script
  technical_notes: |
    Approach: Create install.sh at repo root. The script uses curl to query the GitHub
    Releases API, parses the latest tag with grep/sed (no jq dependency), constructs
    the download URL, and extracts the binary.
    
    Usage will be:
      curl -fsSL https://raw.githubusercontent.com/Goblinlordx/crelay/main/install.sh | sh
    
    Or with custom install dir:
      curl -fsSL https://raw.githubusercontent.com/Goblinlordx/crelay/main/install.sh | INSTALL_DIR=~/.local/bin sh
    
    The script should use set -e for safety, print progress messages, and handle
    common failure modes (no curl, unsupported OS, GitHub API rate limiting, etc.).
plan:
  - phase: Implementation
    tasks:
      - text: Create install.sh at repo root — detect OS/arch, fetch latest release from GitHub API, download archive, extract and install kf binary
        done: true
      - text: Update README.md Installation section — add curl one-liner as the first/primary install method
        done: true
  - phase: Verification
    tasks:
      - text: Run shellcheck on install.sh (if available) or manually verify POSIX compliance
        done: true
      - text: Run make build and make test to verify no breakage from new file
        done: true
