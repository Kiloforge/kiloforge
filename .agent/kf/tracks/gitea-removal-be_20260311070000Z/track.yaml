id: gitea-removal-be_20260311070000Z
title: Remove Gitea dependency — strip adapter, webhook handlers, proxy, and lifecycle commands
type: refactor
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Remove all Gitea-related code: adapter package, port interfaces, webhook handlers,
    reverse proxy, Docker compose service, CLI lifecycle commands, and config fields.
    ~3,600 lines of deletion across 27 files. Preserves: orchestrator, diff system,
    merge lock, dashboard, track management.
  context: |
    The project has outgrown its original Gitea-based workflow. Gitea was used for
    webhook-driven PR automation (spawn reviewer on PR create, trigger merge on approval)
    and as a reverse-proxied code browsing dashboard. The core development workflow
    (worktree-based branch → implement → merge lock → rebase → ff-merge) is entirely
    Gitea-independent. The custom git diff system, merge lock (HTTP + mkdir dual-mode),
    and kf-developer/kf-reviewer skills all operate without Gitea.
    
    Reviews are no longer providing sufficient value to justify the Gitea infrastructure.
    The existing diff endpoint (/api/projects/{slug}/diff) provides structured diff output
    via native git, which is sufficient for code review needs.
  codebase_analysis: |
    Files to DELETE entirely (11 files, ~1,500 LOC):
    - backend/internal/adapter/gitea/client.go (299 lines)
    - backend/internal/adapter/gitea/client_test.go (347 lines)
    - backend/internal/adapter/gitea/issues.go (121 lines)
    - backend/internal/adapter/gitea/issues_test.go (230 lines)
    - backend/internal/adapter/gitea/manager.go (85 lines)
    - backend/internal/adapter/gitea/manager_test.go (52 lines)
    - backend/internal/adapter/proxy/gitea.go (29 lines)
    - backend/internal/adapter/proxy/gitea_test.go (149 lines)
    - backend/internal/core/port/gitea_client.go (23 lines)
    - backend/internal/core/port/merger.go (11 lines)
    - backend/internal/core/port/project_gitea_client.go (13 lines)
    
    Files to MODIFY (10+ files, ~2,100 LOC to remove):
    - backend/internal/adapter/rest/server.go — remove gitea.Client field, WithGiteaProxy
      option, webhook handlers (handleWebhook + all event handlers ~200 lines), proxy mount
    - backend/internal/adapter/cli/init.go — remove Gitea startup, admin setup, token creation
    - backend/internal/adapter/cli/up.go — remove Gitea check/start
    - backend/internal/adapter/cli/down.go — remove Gitea stop
    - backend/internal/adapter/cli/serve.go — remove Gitea auto-start, WithGiteaProxy
    - backend/internal/core/service/pr_service.go — remove or gut (Merger/GiteaClient deps)
    - backend/internal/core/service/project_service.go — remove ProjectGiteaClient dep,
      repo creation, webhook registration
    - backend/internal/core/service/cleanup_service.go — remove MergePR, CommentOnPR,
      DeleteBranch calls
    - backend/internal/adapter/config/config.go — remove GiteaPort, GiteaAdminUser,
      GiteaAdminPass, GiteaAdminEmail, APIToken fields, GiteaURL() method
    - backend/internal/adapter/compose/template.go — remove gitea service from template
    
    No external Gitea SDK in go.mod — custom HTTP client only. No go.mod changes needed.
    No frontend changes needed — frontend has no direct Gitea imports.
  acceptance_criteria:
    - All files in backend/internal/adapter/gitea/ deleted
    - All files in backend/internal/adapter/proxy/ related to Gitea deleted
    - Port interfaces (gitea_client.go, merger.go, project_gitea_client.go) deleted
    - CLI commands (init, up, down, serve) no longer reference Gitea
    - REST server compiles without Gitea client, webhook handlers, or proxy
    - Services (PR, project, cleanup) compile without Gitea dependencies
    - Config struct has no Gitea-related fields
    - Docker compose template has no gitea service
    - "make build" succeeds
    - "make test" passes (tests that tested Gitea-specific code are removed)
    - Orchestrator starts and serves REST API without Gitea
  out_of_scope: |
    - Replacing webhook automation with an alternative event system (future work if needed)
    - Modifying kf-developer or kf-reviewer skills (they're already platform-agnostic)
    - Removing the diff system (it's git-native and stays)
    - Removing the merge lock system (it's Gitea-independent and stays)
    - Frontend changes (no direct Gitea dependency)
  technical_notes: |
    Approach: work bottom-up from adapters to services.
    1. Delete leaf adapter files first (gitea package, proxy package, port interfaces)
    2. Fix compilation errors in services that imported deleted packages
    3. Simplify CLI commands (remove Gitea lifecycle calls)
    4. Clean REST server (remove webhook handlers and proxy)
    5. Clean config (remove fields)
    6. Clean docker compose template
    7. Verify build + tests
    
    The PR service may be gutted entirely or reduced to a minimal tracking struct
    depending on whether any PR tracking is still useful without Gitea webhooks.
    The cleanup service's merge logic (MergePR via API) should be removed — merges
    already happen locally via git ff-only in the developer workflow.
    
    Project service's AddProject should be simplified to just clone + register locally
    without creating a Gitea repo or registering webhooks.
