id: github-repo-templates_20260310001945Z
title: "GitHub repo templates — issue templates, PR template, and external PR auto-close workflow"
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Add standard GitHub repository templates (bug report, feature request, PR template)
    and a workflow that auto-closes pull requests from non-org members.
  context: |
    As kiloforge prepares for public release, the GitHub repo needs standard community
    templates for issues and PRs, plus a security workflow to auto-close external PRs
    (the project is not accepting outside contributions at this time).
  codebase_analysis: |
    The repo already has CI (.github/workflows/ci.yml) and release (.github/workflows/release.yml)
    workflows. No issue or PR templates exist yet. The .github/ directory structure is already
    established.

    Files to create:
    - .github/ISSUE_TEMPLATE/bug_report.md — bug report template with environment info fields
    - .github/ISSUE_TEMPLATE/feature_request.md — feature request template
    - .github/PULL_REQUEST_TEMPLATE.md — PR template with summary, changes, test plan
    - .github/workflows/close-external-prs.yml — auto-close PRs from non-org members
  acceptance_criteria:
    - Bug report issue template exists with fields for description, reproduction steps, expected/actual behavior, and environment
    - Feature request issue template exists with fields for problem, proposed solution, alternatives
    - PR template exists with summary, related issues, changes list, and test plan checklist
    - Auto-close workflow triggers on pull_request_target opened events
    - Auto-close workflow allows MEMBER, OWNER, and COLLABORATOR associations
    - Auto-close workflow posts a polite comment directing to issues before closing
    - All templates use standard GitHub frontmatter (name, about, title prefix, labels)
  out_of_scope: |
    - GitHub Discussions setup
    - CONTRIBUTING.md or CODE_OF_CONDUCT.md
    - Branch protection rules (configured via GitHub settings, not files)
  technical_notes: |
    Straightforward file creation. Use actions/github-script@v7 for the auto-close workflow.
    The PR template test plan should reference project-specific commands (go test, npm run build).
plan:
  - phase: "Issue Templates"
    tasks:
      - text: "Create .github/ISSUE_TEMPLATE/bug_report.md with environment fields (OS, kf version, Docker version, Claude Code version)"
        done: false
      - text: "Create .github/ISSUE_TEMPLATE/feature_request.md with problem/solution/alternatives structure"
        done: false
  - phase: "PR Template"
    tasks:
      - text: "Create .github/PULL_REQUEST_TEMPLATE.md with summary, related issues, changes, and test plan checklist"
        done: false
  - phase: "Security Workflow"
    tasks:
      - text: "Create .github/workflows/close-external-prs.yml using actions/github-script@v7"
        done: false
      - text: "Verify workflow allows MEMBER, OWNER, COLLABORATOR and closes others with a polite message"
        done: false
  - phase: "Verification"
    tasks:
      - text: "Validate all YAML frontmatter in issue templates is well-formed"
        done: false
      - text: "Validate workflow YAML syntax"
        done: false
