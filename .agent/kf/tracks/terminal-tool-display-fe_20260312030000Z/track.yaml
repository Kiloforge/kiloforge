id: terminal-tool-display-fe_20260312030000Z
title: "Human-readable tool call display in agent terminal"
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Replace raw JSON tool input display with human-readable summaries per tool
    type. Hide noisy system init messages. Show a label line by default with
    detail on expand.
  context: |
    The agent terminal currently shows tool calls as raw JSON (e.g., the full
    {"command": "...", "description": "..."} object). Users want a Claude
    Code-like experience where each tool type shows its most relevant field
    as a summary line, with full detail available on expand.

    System "init" messages currently render as "sys init {JSON}" which is
    noise — Claude CLI hides these entirely.
  codebase_analysis: |
    ToolUseBubble in TerminalBubbles.tsx renders toolName badge + raw
    JSON.stringify(msg.toolInput, null, 2) in a <pre> block on expand.
    toolInput is Record<string, unknown> — already parsed, not a string.

    Known tool input shapes (from Claude SDK):
      Bash: {command: string, description?: string}
      Read: {file_path: string, offset?: number, limit?: number}
      Write: {file_path: string, content: string}
      Edit: {file_path: string, old_string: string, new_string: string}
      Glob: {pattern: string, path?: string}
      Grep: {pattern: string, path?: string, type?: string, ...}
      Agent: {prompt: string, description?: string}
      WebFetch: {url: string}
      WebSearch: {query: string}
      NotebookEdit: {notebook_path: string, ...}

    SystemBubble renders all system messages including init/debug. These
    should be filtered or displayed as minimal indicators.
  acceptance_criteria:
    - Bash tool shows description as label, command in collapsible detail
    - Glob tool shows pattern as label (e.g., "**/*.tsx")
    - Grep tool shows pattern as label (e.g., /ToolResult/)
    - Read tool shows file_path as label
    - Write tool shows file_path as label
    - Edit tool shows file_path as label
    - Agent tool shows description as label
    - WebFetch shows URL as label, WebSearch shows query
    - Unknown tools fall back to JSON display
    - System "init" messages are hidden (not rendered)
    - System "debug" messages are hidden
    - Collapsible detail still available for all tool types
  out_of_scope: |
    - Backend changes (tool input format is already correct)
    - Syntax highlighting of tool output
    - New WebSocket message types
  technical_notes: |
    Add a formatToolSummary(toolName, toolInput) function that returns
    {label: string, detail?: string} based on tool name. Replace the
    current JSON.stringify display with this. For SystemBubble, return
    null for init/debug subtypes.
plan:
  - phase: "Tool Display Formatting"
    tasks:
      - text: "Add formatToolSummary() function that extracts label and detail per tool type (Bash, Read, Write, Edit, Glob, Grep, Agent, WebFetch, WebSearch, fallback)"
        done: false
      - text: "Refactor ToolUseBubble to use formatToolSummary — show label as primary text, detail in collapsible block"
        done: false
      - text: "Update CSS: add .toolSummary style for the label line, keep .toolInput for detail block"
        done: false
  - phase: "System Message Filtering"
    tasks:
      - text: "In SystemBubble (or MessageDispatch), return null for system messages with subtype 'init' or 'debug'"
        done: false
  - phase: "Verification"
    tasks:
      - text: "Build frontend (make build-frontend) — verify no type errors"
        done: false
      - text: "Run frontend tests (make test) — verify no regressions"
        done: false
extra: {}
