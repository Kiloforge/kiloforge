id: create-project-fe_20260310150001Z
title: Add create-from-scratch mode to Add Project UI
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: ">"
  context: |
    The backend track (create-project-be) adds a CreateProject endpoint that
    accepts a name with no remote_url. The frontend currently requires a valid
    remote URL in AddProjectForm — the URL_PATTERN regex rejects anything that
    isn't a git remote, and the name field is optional (auto-derived from URL).
    
    This track updates the UI so users can toggle between "Clone from remote"
    and "Create new" modes. In "Create new" mode the remote URL field is hidden,
    name becomes required, and the form POSTs with only the name field.
  codebase_analysis: |
    Key files to modify:
    
    1. frontend/src/components/AddProjectForm.tsx
       - Currently has URL_PATTERN validation, remote_url required
       - Name field is optional, derived from URL when empty
       - Uses useProjects().addProject(url, name?, sshKey?)
       - Need: mode toggle, conditional field visibility, adjusted validation
    
    2. frontend/src/hooks/useProjects.ts
       - addProject(url, name?, sshKey?) calls POST /api/projects
       - Need: support calling with no URL (name-only) for create mode
       - AddProjectRequest type needs remote_url made optional
    
    3. frontend/src/types/api.ts
       - AddProjectRequest has remote_url: string (required)
       - Need: make remote_url optional to match backend schema change
    
    4. frontend/src/components/AddProjectForm.test.tsx
       - Existing tests cover clone mode
       - Need: tests for create mode toggle, validation, submission
    
    5. frontend/src/pages/OverviewPage.tsx / OverviewPage.test.tsx
       - AddProjectForm is rendered here
       - No changes needed unless form props change
  acceptance_criteria:
    - AddProjectForm shows a mode toggle (Clone / Create New)
    - In Clone mode, behavior is identical to current (no regression)
    - In Create New mode, remote URL field is hidden and name is required
    - Submitting in Create New mode sends POST with name only (no remote_url)
    - Validation prevents empty name in Create New mode
    - AddProjectRequest type has remote_url as optional
    - Unit tests cover both modes including validation and submission
    - Existing clone-mode tests continue to pass
  out_of_scope: |
    - Backend API changes (separate track: create-project-be)
    - CLI changes (handled in BE track)
    - Project templates or scaffolding
    - SSH key selection for create mode (no remote to authenticate against)
  technical_notes: |
    Approach: Add a state variable for mode ("clone" | "create") with a toggle
    at the top of the form. Conditionally render fields based on mode:
    - Clone mode: URL (required) + Name (optional) + SSH Key selector
    - Create mode: Name (required) only
    
    The useProjects hook's addProject function needs to accept an optional URL.
    When URL is empty/undefined, send { name } only in the request body.
    
    Keep the toggle simple — two buttons or a segmented control that matches
    the existing glass-morphism design system.
