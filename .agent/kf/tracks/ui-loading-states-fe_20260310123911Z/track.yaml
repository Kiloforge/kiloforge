        done: false
  - phase: "Animations — Modal and toast transitions"
    tasks:
      - text: "Add fadeIn/fadeOut @keyframes to modal overlay and dialog CSS modules (RemoveProjectDialog, ConsentDialog, AgentLauncher, SkillsInstallDialog, AdvisorHub dialog)"
        done: false
