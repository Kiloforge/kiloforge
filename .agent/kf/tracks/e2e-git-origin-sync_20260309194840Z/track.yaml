id: e2e-git-origin-sync_20260309194840Z
title: E2E Tests: Git Origin Sync — Push, Pull, Status, and Error Handling
type: chore
status: pending
created: 2026-03-09T19:48:40Z
updated: 2026-03-09
spec:
  summary: Comprehensive E2E tests for the Git origin sync feature: displaying sync status (ahead/behind/synced/diverged), pushing to remote, pulling from remote, and handling sync errors, covering happy path, edge cases, and expected failures.
  context: |
    Kiloforge bridges local Git repositories with a Gitea instance and optionally with an upstream origin remote. The sync feature allows users to push local changes to the origin remote and pull upstream changes. The relevant endpoints are:
    
    - `POST /api/projects/{slug}/push` — push local commits to origin remote
    - `POST /api/projects/{slug}/pull` — pull from origin remote
    - `GET /api/projects/{slug}/sync-status` — returns sync state: `synced`, `ahead`, `behind`, or `diverged`, with commit counts
    
    The frontend displays a sync panel per project showing the current status, push/pull buttons, and feedback on operation results. Buttons are disabled when the operation is not applicable (e.g., push disabled when synced).
  codebase_analysis: |
    ### Relevant endpoints
    
    - Sync status: `GET /api/projects/{slug}/sync-status` — returns `{"status": "ahead|behind|synced|diverged", "ahead_count": N, "behind_count": N}`
    - Push: `POST /api/projects/{slug}/push` — returns 200 on success with updated status, or error
    - Pull: `POST /api/projects/{slug}/pull` — returns 200 on success with updated status, or error
    
    ### UI components
    
    - Sync status badge: shows colored indicator (green=synced, yellow=ahead, blue=behind, red=diverged)
    - Push button: enabled when ahead or diverged, disabled when synced or behind
    - Pull button: enabled when behind or diverged, disabled when synced or ahead
    - Operation feedback: success/error toast or inline message after push/pull
  acceptance_criteria:
    - Sync status displays correctly: synced, ahead, behind, diverged
    - Push button sends POST to push endpoint — success feedback shown
    - Pull button sends POST to pull endpoint — success feedback shown
    - Sync panel updates after push/pull operations
    - Push disabled when already synced
    - Pull disabled when already synced
    - Diverged state shows both push and pull options
    - Edge cases: push while pull in progress, rapid status polling
    - Failure cases: push to unreachable remote, pull with merge conflict, network timeout
  out_of_scope: |
    - Gitea webhook-driven sync
    - Merge lock interaction during push/pull
    - SSH key configuration for remote access
    - Multi-branch sync
  technical_notes: |
    ### Test data setup
    
    Tests need projects with configured origin remotes. Use the E2E test server's project seeding to create projects in various sync states. The mock/test Gitea instance (or a bare git repo) can serve as the origin remote for E2E tests.
    
    ### Simulating sync states
    
    - **Synced:** project repo and origin are at the same commit
    - **Ahead:** add a commit to the local project repo without pushing
    - **Behind:** add a commit to the origin repo directly
    - **Diverged:** add different commits to both local and origin
    
    Use direct git commands in the test setup to manipulate repo state.
    
    ### Button state verification
    
    Use Playwright to check button disabled/enabled state via `isDisabled()` or `toBeDisabled()` matchers. Verify button text or icons reflect the operation.
    
    ### Error simulation
    
    - Unreachable remote: configure a project with a non-routable origin URL
    - Merge conflict: create diverged state where the same file is modified differently
    - Network timeout: may need server-side mock or a slow-responding origin
    
    ### Developer agent instructions
    
    When building this track, use the Playwright MCP skill to verify E2E tests work in the browser. Run tests in headed mode during development for visual verification. Use `apiClient` helper for direct REST calls to sync endpoints.
    
    ---
plan:
  - phase: Sync Status Display Tests
    tasks:
      - text: Synced state — seed a project where local and origin are at the same commit, navigate to project page, verify sync status shows "synced" with green indicator, verify both push and pull buttons are disabled
        done: true
      - text: Ahead state — seed a project with 2 local commits not pushed to origin, navigate to project page, verify sync status shows "ahead" with commit count (2), verify push button is enabled and pull button is disabled
        done: true
      - text: Behind state — seed a project where origin has 3 commits not yet pulled, navigate to project page, verify sync status shows "behind" with commit count (3), verify pull button is enabled and push button is disabled
        done: true
      - text: Diverged state — seed a project where local has 1 unpushed commit and origin has 2 unpulled commits, navigate to project page, verify status shows "diverged" with both counts, verify both push and pull buttons are enabled
        done: true
  - phase: Push Tests
    tasks:
      - text: Push happy path — seed project in "ahead" state, click push button via Playwright, verify POST to `/api/projects/{slug}/push` succeeds, verify success feedback displayed (toast or inline message)
        done: true
      - text: Push feedback — after successful push, verify sync status updates to "synced", verify push button becomes disabled, verify ahead count resets to 0
        done: true
      - text: Push disables when synced — seed project in "synced" state, verify push button is disabled and not clickable, verify no POST request is sent when attempting to interact with disabled button
        done: true
  - phase: Pull Tests
    tasks:
      - text: Pull happy path — seed project in "behind" state, click pull button via Playwright, verify POST to `/api/projects/{slug}/pull` succeeds, verify success feedback displayed
        done: true
      - text: Pull feedback — after successful pull, verify sync status updates to "synced", verify pull button becomes disabled, verify behind count resets to 0
        done: true
      - text: Pull disables when synced — seed project in "synced" state, verify pull button is disabled and not clickable
        done: true
  - phase: Sync Panel Tests
    tasks:
      - text: Panel updates after operations — perform push on an "ahead" project, verify panel updates from "ahead" to "synced" without page reload; perform pull on a "behind" project, verify panel updates similarly
        done: true
      - text: Diverged state UI — seed diverged project, verify UI shows both ahead and behind counts, verify both push and pull buttons are present with appropriate labels, verify user can choose which operation to perform
        done: true
      - text: Refresh behavior — navigate to project page, change sync state via API (add commit to origin), trigger manual refresh or wait for polling interval, verify status updates from "synced" to "behind"
        done: true
  - phase: Edge and Failure Cases
    tasks:
      - text: Concurrent operations — seed "diverged" project, initiate push, immediately attempt pull (or vice versa), verify the server handles gracefully (queues or rejects second operation), verify no UI corruption
        done: true
      - text: Unreachable remote — seed project with a non-routable origin URL (e.g., `git://192.0.2.1/repo.git`), attempt push, verify error feedback is displayed with meaningful message (e.g., "Remote unreachable"), verify sync status remains unchanged
        done: true
      - text: Merge conflict handling — seed diverged project where the same file is modified in both local and origin, attempt pull, verify error feedback indicates merge conflict, verify sync status still shows "diverged"
        done: true
