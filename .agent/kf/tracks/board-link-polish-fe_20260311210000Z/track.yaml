id: board-link-polish-fe_20260311210000Z
title: Polish board relationship link visuals
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Restyle the kanban board dependency/conflict SVG overlay — thicker strokes
    with glow filter, straight lines instead of Bezier curves, edge-anchored
    endpoints, flowing animation, and semi-transparency.
  context: |
    The RelationshipOverlay component renders SVG paths between kanban cards to
    show dependency and conflict relationships. Current implementation uses thin
    (1.5px) dashed Bezier curves anchored from card centers. User feedback says
    the lines are too thin, the curves look unusual, and lines should connect
    from card edges rather than centers.
  codebase_analysis: |
    Key files:
    - frontend/src/components/RelationshipOverlay.tsx — computeBezierPath()
      generates cubic Bezier SVG paths from card center-to-center (lines 34-56).
      Card positions come from getBoundingClientRect() relative to the board
      container (lines 69-83). Lines are rendered as <path> elements (lines 157-188).
    - frontend/src/components/RelationshipOverlay.module.css — stroke-width: 1.5,
      dashed patterns, flowDash and pulseLine keyframe animations, opacity 0.3-0.6.
    - frontend/src/components/RelationshipOverlay.test.tsx — tests for
      computeBezierPath and component rendering.
    - frontend/src/index.css — CSS variables: --accent (#34d399), --red (#f06c6c),
      --orange (#e8944a), --yellow (#f0c541), --text-dim (#a3a3a3).
  acceptance_criteria:
    - Lines use straight segments (no Bezier curves)
    - Lines anchor from nearest card edge (left/right for cross-column, top/bottom for same-column)
    - Stroke width is 2.5-3px (noticeably thicker than current 1.5px)
    - Lines have a soft glow effect using SVG filter (Gaussian blur composite)
    - Lines are semi-transparent (opacity ~0.5-0.6)
    - Dependency lines have a smooth flowing animation (animated dash-offset or gradient)
    - Conflict lines retain pulsing animation with glow
    - Existing RelationshipOverlay tests pass (updated for new path format)
  out_of_scope: |
    - Changing the toggle UI or show/hide behavior
    - Adding new relationship types beyond deps and conflicts
    - Changing how card positions are computed (getBoundingClientRect approach stays)
    - Backend changes
  technical_notes: |
    Approach:
    1. Replace computeBezierPath with computeEdgePath that uses M/L straight lines
       and anchors from the nearest edge of each card based on relative positions.
    2. Add SVG <defs> with <filter> elements for glow (feGaussianBlur + feComposite).
    3. Increase stroke-width to ~2.5-3px, set unified semi-transparent opacity.
    4. Adjust animations: slower dash flow for deps, pulsing glow intensity for conflicts.
    5. Update test expectations for the new straight-line path format.
