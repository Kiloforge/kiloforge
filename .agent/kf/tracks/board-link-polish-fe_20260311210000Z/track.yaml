      - text: Anchor from card edges: for cross-column lines use right edge of left card → left edge of right card; for same-column lines use bottom/top edges
        done: true
      - text: Keep vertical spread offset for overlapping lines (lineIndex * spread)
        done: true
      - text: Update RelationshipOverlay.test.tsx path expectations for straight-line format
        done: true
  - phase: Visual Styling
    tasks:
      - text: Increase stroke-width from 1.5 to 2.5-3px for both depLine and conflictLine classes
        done: true
      - text: Add SVG <defs> with <filter> glow effects — feGaussianBlur + feComposite for neon glow on stroke color; apply via filter attribute
        done: true
      - text: Set unified semi-transparent opacity (0.5-0.6) across all line types; remove per-class opacity fragmentation
        done: true
      - text: Update conflict risk colors to use same glow filter with risk-colored glow
        done: true
  - phase: Animation & Verification
    tasks:
      - text: Replace flowDash with smoother flowing animation (slower dash-offset or gradient); add subtle glow pulse that modulates filter intensity
        done: true
      - text: Verify overlay renders correctly with 0, 1, and many relationships; run full test suite
        done: true
