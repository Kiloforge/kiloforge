id: onboarding-ux-fe_20260310073721Z
title: "Progressive onboarding UX — ease beginners in, empower power users"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: >
    Enhance the dashboard onboarding experience with a getting-started checklist,
    improved empty states with actionable guidance, and contextual help tooltips
    for key concepts. Simple for beginners, discoverable depth for power users.
  context: |
    Research identified several UX friction points for new users:
    - The "Tracks" concept isn't explained inline — users see track cards
      without understanding what a track is
    - Queue vs Agents can be conflated initially
    - Sync status symbols (arrows) aren't universally understood
    - The overview page has 6 major sections — potentially overwhelming on
      first visit with no data
    - After the tour completes, there's no persistent "what to do next" guide
    - Empty states are functional but minimal (one-liner messages)

    The goal is progressive disclosure: beginners see a clear path forward
    (checklist, rich empty states), while power users discover advanced features
    naturally through tooltips and contextual help without being blocked.
  codebase_analysis: |
    Existing patterns to build on:
    - **TourProvider/TourOverlay**: 7-step interactive tour with demo data.
      Well-architected but tour completion leaves no persistent guidance.
    - **Empty states**: Found in OverviewPage, ProjectPage, AgentHistoryPage.
      Currently single-line messages, sometimes with CLI command hints.
    - **SkillsBanner**: Persistent banner pattern — could inspire a persistent
      "getting started" checklist banner.
    - **SettingsMenu**: Currently 2 items — could host "restart tour" and
      "show help tooltips" toggle.
    - **CSS variables**: Design system supports info/warning/success colors
      and glassmorphic surfaces for tooltip cards.

    Key files to modify:
    - frontend/src/pages/OverviewPage.tsx (empty states, checklist)
    - frontend/src/components/tour/TourOverlay.tsx (enhanced tour steps)
    - frontend/src/pages/ProjectPage.tsx (concept explanations)
    - New: GettingStartedChecklist component
    - New: HelpTooltip component for inline concept explanations
  acceptance_criteria:
    - Getting-started checklist appears on OverviewPage when <2 projects registered
    - Checklist items reflect actual progress (init done, project added, track generated, agent spawned)
    - Checklist auto-dismisses after all items complete or user manually dismisses
    - Key concepts have inline help tooltips (Tracks, Queue, Agents, Sync)
    - Empty states include actionable next steps with CLI command examples
    - Tour completion toast suggests next concrete action
    - Power features (admin ops, sync, relationships) remain discoverable but not prominent for beginners
  out_of_scope: |
    - Backend API changes (checklist state from existing data, no new endpoints)
    - CLI changes (that's the cli-error-ux-be track)
    - Kiloforger branding (that's the kiloforger-branding track)
    - Redesigning the overall layout or navigation
    - Adding new pages or routes
  technical_notes: |
    Implementation approach:
    1. Create GettingStartedChecklist component that reads from existing
       /api/status and /api/projects to determine completion state
    2. Checklist items: (a) Kiloforge running ✓, (b) Add a project,
       (c) Generate tracks, (d) Spawn your first agent
    3. Dismiss state in localStorage (like ModelWarningBanner pattern)
    4. Create reusable HelpTooltip component for inline concept definitions
    5. Enhance empty states in OverviewPage with richer guidance
    6. Add help tooltips to section headers (Agents, Tracks, Queue)
    7. Update tour completion toast with specific next-step suggestion
