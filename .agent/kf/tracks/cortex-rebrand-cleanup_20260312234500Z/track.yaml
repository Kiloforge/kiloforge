updated: 2026-03-10
spec:
  summary: |
    Rename remaining "orchestrator" → "Cortex" and "Dashboard" → "Command Deck"
    in CLI output, log messages, error strings, config validation, OpenAPI
    description, goreleaser, backend docs, PID/log file names, shutdown reason,
    and frontend test assertions.
  context: |
    Previous rebrand tracks (cortex-rebrand-be, command-deck-fe, docs-branding-cleanup,
    site-rebrand) completed the bulk of rebranding but missed many internal and
    user-facing references. A comprehensive audit found 30+ remaining "orchestrator"
    references and 8 "Dashboard" CLI output labels that should use the new branding.
    
    Swarm branding was also audited — it is already consistent throughout the
    codebase with no old terminology remaining. No swarm changes needed.
  codebase_analysis: |
    **ORCHESTRATOR → CORTEX (missed references):**
    
    User-facing CLI strings:
    - serve.go:29 — "Run the orchestrator in the foreground (internal)" → "Run the Cortex..."
    - serve.go:164 — "Orchestrator starting on %s:%d" → "Cortex starting..."
    - serve.go:172 — "Orchestrator stopped" → "Cortex stopped"
    - dashboard.go:26-28 — "web dashboard server without starting the orchestrator" → "...Cortex"
    
    Config validation errors:
    - config.go:117 — "config: orchestrator_port %d out of range" → "config: cortex_port..."
    - config.go:120 — "config: orchestrator_host must not be empty" → "config: cortex_host..."
    
    Log prefix:
    - server.go:159 — "[orchestrator]" → "[cortex]"
    
    Shutdown reason (user-visible in FE):
    - shutdown.go:77 — "orchestrator shutdown" → "cortex shutdown"
    - AgentDetailPage.test.tsx:199,203 — test assertions for shutdown reason
    - AgentCard.test.tsx:180,181 — test assertions for shutdown reason
    
    PID/log file names:
    - pidfile.go:13 — "orchestrator.pid" → "cortex.pid" (with backward compat check)
    - daemon.go:40, serve.go:41 — "orchestrator.log" → "cortex.log" (with backward compat)
    
    OpenAPI & release:
    - openapi.yaml:4 — API description says "orchestrator API"
    - .goreleaser.yaml:54 — "Local AI agent orchestrator"
    
    Code comments (non-user-facing but should match branding):
    - server.go:33,130,157,345 — "orchestrator server", "orchestrator REST API", etc.
    - daemon.go:72 — "sends SIGTERM to the orchestrator daemon"
    - spawner.go:160 — "without needing the orchestrator"
    
    Backend docs:
    - docs/design-agent-orchestration.md — 5+ references
    - docs/commands.md — 6+ references
    - docs/architecture.md — 2+ references
    
    **DASHBOARD → COMMAND DECK (missed CLI references):**
    
    CLI output labels:
    - up.go:108 — "Dashboard:  %s" → "Command Deck:  %s"
    - up.go:147 — "Dashboard:   %s" → "Command Deck:   %s"
    - status.go:44 — "Dashboard:   http://..." → "Command Deck:   http://..."
    - status.go:46 — "Dashboard:   disabled" → "Command Deck:   disabled"
    
    CLI command help:
    - dashboard.go:25 — Short: "Start the web dashboard" → "Start the Command Deck"
    - dashboard.go:26-28 — Long description references "web dashboard"
    - dashboard.go:100 — "Dashboard running at http://..." → "Command Deck running at..."
    
    CLI flag help:
    - root.go:53 — "Do not open the dashboard in a browser" → "Do not open the Command Deck..."
    
    Internal function/variable names (dashboardURL, dashboardCmd, etc.) stay as-is.
  acceptance_criteria:
    - No user-facing string contains "orchestrator" (grep confirms zero hits outside code identifiers, config keys, and env vars)
    - CLI output labels show "Command Deck" instead of "Dashboard"
    - Log prefix is "[cortex]" instead of "[orchestrator]"
    - Shutdown reason is "cortex shutdown" (frontend tests updated to match)
    - OpenAPI description says "Cortex API" instead of "orchestrator API"
    - .goreleaser.yaml description updated
    - PID file uses "cortex.pid" with fallback to "orchestrator.pid" for existing installs
    - Log file uses "cortex.log" with fallback to "orchestrator.log" for existing installs
    - backend/docs/*.md updated consistently
    - Config validation errors use "cortex_port" / "cortex_host" terminology
    - make test, make lint, make build all pass
  out_of_scope: |
    - Renaming Go struct fields (OrchestratorPort, OrchestratorHost) — these are internal
      identifiers with JSON backward compatibility via tags; renaming would break config files
    - Renaming env vars (KF_ORCH_PORT, KF_ORCH_HOST, KF_ORCH_URL) — breaking change for users
    - Renaming JSON config keys (orchestrator_port, orchestrator_host) — breaking change
    - Renaming Go package/directory names (adapter/dashboard stays as internal package name)
    - Renaming internal function names (dashboardURL, dashboardCmd, etc.)
    - Swarm-related changes — already consistently branded
    - Frontend component changes — already done in command-deck-fe track
  technical_notes: |
    **PID/log file backward compatibility:**
    The PID file (orchestrator.pid) and log file (orchestrator.log) are on-disk
    artifacts. Renaming them requires a migration path:
    1. Check for old file name first, rename if found
    2. Use new name for fresh installs
    3. This avoids breaking running daemons on upgrade
    
    For pidfile.go, update the constant but add a migration in New() or Write()
    that renames orchestrator.pid → cortex.pid if the old file exists.
    
    For log files in daemon.go and serve.go, same pattern: check for old name,
    rename or create with new name.
    
    **Config validation errors:**
    These are error strings, not config keys. Changing "orchestrator_port" to
    "cortex_port" in error messages is a display-only change — the actual JSON
    key remains "orchestrator_port" for backward compatibility.
    
    **Shutdown reason string:**
    The string "orchestrator shutdown" is stored in agent records and displayed
    in the frontend. Changing it to "cortex shutdown" is safe — it only affects
    new shutdowns. Old records will still show "orchestrator shutdown" but that's
    acceptable for historical data.
    
    **OpenAPI regeneration:**
    After updating openapi.yaml description, run `make generate` to regenerate
    server/client stubs. The description change is cosmetic — no API contract change.
