id: status-enrich_20260311000000Z
title: Enrich kf-track status with deps, conflicts, and claimed/available info
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-09
spec:
  summary: Add dependency details, conflict risk pairs, and claimed/available labeling to the kf-track status command output, and update the kf-status skill to document the new sections.
  context: |
    The `kf-track status` command currently shows overall progress, an active tracks table, current focus, ready-to-start, and blocked sections. However it lacks:
    1. Per-track dependency info in the active tracks table (how many deps, satisfied or not)
    2. Conflict risk pairs — the conflicts.yaml data is never surfaced in status output
    3. Clear claimed vs available labeling — in-progress tracks are "claimed" by a developer, ready tracks are "available" for claiming, but this isn't explicit in the output
    
    The kf-status skill wraps this command and adds assessment. The skill docs need updating to reflect the new output sections.
  codebase_analysis: |
    ### kf-track status command
    - File: `.agent/kf/bin/kf-track` — `cmd_status()` function at line 1551
    - Already reads `deps.yaml` to compute ready vs blocked tracks (line 1723-1757)
    - Already reads `tracks.yaml` for status counts
    - Does NOT read `conflicts.yaml` at all
    - Active tracks table columns: Status | Track ID | Type | Tasks
    - Status values shown: "IN-PROG" and "PENDING"
    
    ### Data sources available
    - `tracks.yaml` — track registry with status field
    - `tracks/deps.yaml` — adjacency list of dependencies
    - `tracks/conflicts.yaml` — risk pairs with format: `<id-a>/<id-b>: {"risk":"...","note":"...","added":"..."}`
    - Per-track `track.yaml` — has plan with task completion data
    
    ### kf-status skill
    - Embedded: `backend/internal/adapter/skills/embedded/kf-status/SKILL.md`
    - Global: `~/.claude/skills/kf-status/SKILL.md`
    - Step 2 documents the output sections; needs updating
    
    ### No claimed_by field exists
    - Track status is the only indicator: `in-progress` = claimed, `pending` + deps satisfied = available
    - No owner/worktree attribution exists in tracks.yaml
    - The status labels should make this distinction explicit without adding new fields
  acceptance_criteria:
    - Active tracks table shows dep count per track (e.g., '2/2 met' or 'no deps') alongside existing columns
    - In-progress tracks labeled as 'CLAIMED' instead of 'IN-PROG' in the status column
    - Ready-to-start pending tracks labeled as 'AVAILABLE' instead of 'PENDING'
    - Blocked pending tracks labeled as 'BLOCKED'
    - New 'Conflict Risk' section appears after Ready to Start, listing active conflict pairs with risk level and note
    - kf-status SKILL.md updated to document new output sections (both embedded and global copies)
    - kf-track status --ref main renders all new sections correctly
  out_of_scope: |
    - Adding a claimed_by or owner field to tracks.yaml
    - Worktree attribution (which developer has a track)
    - Changes to kf-track list or kf-track get commands
    - Changes to the kf-status skill assessment logic (Step 3)
  technical_notes: |
    ### Active tracks table changes
    
    Current:
    ```
    Status     Track ID                                         Type     Tasks
    ---------- ------------------------------------------------ -------- ----------
    IN-PROG    some-track_20260310...                           feature  3/10 (30%)
    PENDING    other-track_20260310...                          chore    0/8 (0%)
    ```
    
    New:
    ```
    Status     Track ID                                         Type     Tasks        Deps
    ---------- ------------------------------------------------ -------- ------------ ----------
    CLAIMED    some-track_20260310...                           feature  3/10 (30%)   2/2 met
    AVAILABLE  other-track_20260310...                          chore    0/8 (0%)     no deps
    BLOCKED    blocked-track_20260310...                        feature  0/5 (0%)     1/3 met
    ```
    
    ### Conflict Risk section
    
    New section after "Ready to Start":
    ```
    --------------------------------------------------------------------------------
                              CONFLICT RISK
    --------------------------------------------------------------------------------
    
      dashboard-theme.../project-metadata-fe...  [medium]
        Both modify frontend CSS/components — theme should merge first.
    ```
    
    ### Implementation approach
    1. Read conflicts.yaml in cmd_status() alongside deps.yaml
    2. Compute dep counts per track (already partially done for ready/blocked logic)
    3. Change status labels: in-progress→CLAIMED, pending+ready→AVAILABLE, pending+blocked→BLOCKED
    4. Add Deps column to active tracks table
    5. Add Conflict Risk section between Ready to Start and Blocked sections
plan:
  - phase: Status command enhancements
    tasks:
      - text: Add deps count column to active tracks table — for each active track, count total deps and satisfied deps from deps.yaml, display as 'N/M met' or 'no deps'
        done: true
      - text: Change status labels in active tracks table: in-progress→CLAIMED, pending+ready→AVAILABLE, pending+blocked→BLOCKED
        done: true
      - text: Add Conflict Risk section — read conflicts.yaml, filter to pairs where both tracks are active, display risk level and truncated note
        done: true
      - text: Update Current Focus section to use 'Claimed' labeling consistent with table
        done: true
  - phase: Skill documentation update
    tasks:
      - text: Update backend/internal/adapter/skills/embedded/kf-status/SKILL.md Step 2 to document new output sections (Deps column, CLAIMED/AVAILABLE/BLOCKED labels, Conflict Risk section)
        done: true
      - text: Copy updated SKILL.md to ~/.claude/skills/kf-status/SKILL.md and verify both are in sync
        done: true
  - phase: Verification
    tasks:
      - text: Run kf-track status --ref main and verify all new sections render correctly with current project data
        done: true
