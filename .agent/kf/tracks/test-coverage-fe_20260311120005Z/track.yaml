  technical_notes: |
    Use existing test patterns: @testing-library/react, vitest, msw for API mocking.
    Follow established patterns in AgentCard.test.tsx and SwarmPanel.test.tsx.
    For AgentTerminal: mock WebSocket, test message rendering and input submission.
    For dialogs: test open/close, confirm/cancel actions, form validation.
