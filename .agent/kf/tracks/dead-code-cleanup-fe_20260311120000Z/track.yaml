spec:
  summary: |
    Delete StatCards, TerminalDock, and AdvisorHub components (all unused in production)
    plus the dead useProjectBranches hook. Removes ~600 lines of dead code before alpha.
  context: |
    Preparing for alpha release. Codebase audit identified several frontend components
    that were developed but never integrated into the app's route tree or imported by
    any production component. These add maintenance burden and confusion without value.
  codebase_analysis: |
    - StatCards.tsx + StatCards.module.css: Complete component rendering agent count,
      token usage, rate limit, and API cost. Never imported anywhere in production code.
    - TerminalDock.tsx + TerminalDock.test.tsx + TerminalDock.module.css: Renders
      minimized terminal pills in a dock. Superseded by MiniCardDock. Has tests but
      no production imports.
    - AdvisorHub.tsx + AdvisorHub.test.tsx + AdvisorHub.module.css: Advisor launch UI.
      Fully implemented with tests but never integrated into App.tsx or any page.
    - useProjectBranches hook in useDiff.ts: Queries /api/projects/{slug}/branches
      but is never called by any component.
  acceptance_criteria:
    - StatCards.tsx and StatCards.module.css are deleted
    - TerminalDock.tsx, TerminalDock.test.tsx, and TerminalDock.module.css are deleted
    - AdvisorHub.tsx, AdvisorHub.test.tsx, and AdvisorHub.module.css are deleted
    - useProjectBranches export is removed from useDiff.ts (keep useProjectDiff)
    - No remaining imports reference deleted modules (build succeeds)
    - Existing frontend tests pass (npm test)
  out_of_scope: |
    - No new components or replacements are added
    - SwarmPanel and queue-related frontend code stays (still wired to API)
    - No changes to backend code
  technical_notes: |
    Pure deletion track. Each component is self-contained with no reverse dependencies.
    Verify with: grep -r "StatCards\|TerminalDock\|AdvisorHub\|useProjectBranches" frontend/src/
    after deletion to confirm no dangling references.
