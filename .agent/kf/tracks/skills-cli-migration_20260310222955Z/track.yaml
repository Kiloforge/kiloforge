id: skills-cli-migration_20260310222955Z
title: Migrate kf skills to use CLI tools exclusively and fix branch cleanup bug
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-09
spec:
  summary: Update all kf skill SKILL.md files to replace direct file access (git show, Read, manual edits) with kf-track and kf-track-content CLI commands. Also fix the branch deletion order bug in kf-developer where git branch -d runs before git checkout.
  context: |
    The kf CLI tools (kf-track and kf-track-content) were created to provide a stable interface for managing track data. However, many skills still instruct agents to directly access kf data files via `git show`, Read tool, or manual file edits. This bypasses the CLI's validation, canonical formatting, and error handling.
    
    Additionally, kf-developer's post-merge cleanup step (11e) tells agents to delete the implementation branch BEFORE switching to the home branch, which fails because git won't delete the branch you're currently on.
    
    The canonical source of truth for skills is:
    - `backend/internal/adapter/skills/embedded/kf-*/SKILL.md` — embedded skills compiled into the binary
    
    The user also has global installed copies that active agents use:
    - `~/.claude/skills/kf-*/SKILL.md` — must also receive these updates so running agents benefit immediately
    
    There is also a stale `skills/` directory at the repo root that is a redundant copy. This should be deleted entirely as part of this track — it creates sync confusion.
  codebase_analysis: |
    ### Direct file access patterns found (by skill)
    
    **kf-developer** (HIGH priority):
    - `git show ${PRIMARY_BRANCH}:.agent/kf/tracks/{trackId}/track.yaml` → use `kf-track get {trackId}`
    - `git show ${PRIMARY_BRANCH}:.agent/kf/tracks/deps.yaml` → use `kf-track deps check {trackId}`
    - `git show` to verify kf files exist → use `kf-track status` or file existence checks
    - Branch cleanup: `git branch -d` before `git checkout` → SWAP ORDER
    - `git show` for config.yaml primary_branch → use `kf-track config` or read config.yaml (acceptable)
    
    **kf-implement** (HIGH priority — most violations):
    - Direct edits to `metadata.json` for status changes → use `kf-track update --status`
    - Direct edits to `plan.md` for task marking → use `kf-track-content task X.Y --done`
    - Manual plan.md parsing for task discovery → use `kf-track-content progress`
    - Direct reads of spec.md, plan.md → use `kf-track-content show --section spec|plan`
    - Direct reads of metadata.json → use `kf-track get`
    
    **kf-architect** (MEDIUM priority):
    - `git show main:.agent/kf/tracks.yaml` in Phase 4 → use `kf-track list --active --json`
    - Reference to reading deps.yaml directly → use `kf-track deps list`
    - Pre-flight `git show` checks → acceptable for existence validation
    
    **kf-report** (MEDIUM priority):
    - Direct reads of tracks.yaml → use `kf-track list --json`
    - Direct reads of spec.md/plan.md → use `kf-track-content show`
    - `git show {SHA}:...` for compaction recovery → ACCEPTABLE (historical git data, no CLI equivalent)
    
    **kf-reviewer** (LOW priority):
    - `git show main:.agent/kf/tracks/{trackId}/spec.md` → use `kf-track-content show --section spec`
    
    ### Files to modify (repo locations)
    
    For each affected skill, update the canonical embedded copy and mirror the change to global:
    - `backend/internal/adapter/skills/embedded/{skill}/SKILL.md` (canonical — source of truth)
    - `~/.claude/skills/{skill}/SKILL.md` (global — also update so active agents benefit immediately)
    
    Affected skills: kf-developer, kf-implement, kf-report, kf-reviewer, kf-architect
    
    Additionally, delete the redundant `skills/` directory at the repo root entirely.
    
    ### CLI commands available for replacement
    
    Registry: `kf-track list [--active] [--json] [--ref main]`, `kf-track get {id}`, `kf-track update {id} --status {status}`
    Content: `kf-track-content show {id} [--section spec|plan|header]`, `kf-track-content task {id} X.Y --done|--pending`, `kf-track-content progress {id} [--json]`
    Deps: `kf-track deps list`, `kf-track deps check {id}`
    Conflicts: `kf-track conflicts list`
  acceptance_criteria:
    - kf-developer cleanup step 11e: git checkout runs BEFORE git branch -d (bug fix)
    - kf-developer: all git show reads of track data replaced with kf-track/kf-track-content CLI
    - kf-implement: all direct metadata.json edits replaced with kf-track update CLI
    - kf-implement: all direct plan.md edits replaced with kf-track-content task CLI
    - kf-implement: all direct spec.md/plan.md reads replaced with kf-track-content show CLI
    - kf-architect: git show tracks.yaml replaced with kf-track list --active --json
    - kf-report: direct tracks.yaml reads replaced with kf-track list --json (git show for recovery is acceptable)
    - kf-reviewer: git show spec/plan reads replaced with kf-track-content show
    - Embedded copies (canonical) and ~/.claude/skills/ (global) are updated consistently
    - Redundant skills/ directory at repo root is deleted
    - No references to legacy metadata.json or manual plan.md editing remain in updated skills
  out_of_scope: |
    - Adding new CLI commands to kf-track or kf-track-content (use existing commands)
    - Changing the merge lock protocol (lock file access is acceptable implementation detail)
    - kf-setup, kf-new-track, kf-manage, kf-validate (minimal or no direct file access issues)
    - Go backend code changes (separate track: backend-kf-sdk-adoption)
  technical_notes: |
    ### Approach
    
    For each skill, replace direct file access patterns with CLI equivalents:
    
    | Direct Access | CLI Replacement |
    |---------------|----------------|
    | `git show main:.agent/kf/tracks.yaml` | `kf-track list --json --ref main` |
    | `git show ...tracks/{id}/track.yaml` | `kf-track-content show {id}` |
    | `git show ...tracks/deps.yaml` | `kf-track deps list` or `kf-track deps check {id}` |
    | Edit metadata.json status field | `kf-track update {id} --status {status}` |
    | Edit plan.md task markers [x]/[ ] | `kf-track-content task {id} X.Y --done` |
    | Read plan.md for progress | `kf-track-content progress {id} --json` |
    | Read spec.md | `kf-track-content show {id} --section spec` |
    | Read plan.md | `kf-track-content show {id} --section plan` |
    
    ### Branch cleanup fix (kf-developer Step 11e)
    
    Current (wrong):
    ```bash
    git branch -d {type}/{trackId}     # fails: can't delete current branch
    git checkout {developer-home-branch}
    ```
    
    Fixed:
    ```bash
    git checkout {developer-home-branch}  # switch away first
    git branch -d {type}/{trackId}        # then safe to delete
    ```
    
    ### Acceptable direct access (do NOT replace)
    
    - Reading `.agent/kf/config.yaml` for primary_branch (no CLI command for this)
    - `git show` for pre-flight existence checks (acceptable, could use CLI but low value)
    - `git show {SHA}:...` for historical compaction recovery (kf-report — no CLI equivalent for git history reads)
    - Lock file read/write (implementation detail of merge protocol)
    - `git add` of kf files after CLI operations (agents still need to commit)
