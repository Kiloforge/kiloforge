id: agent-diff-panel-fe_20260312210900Z
title: Per-file diff panel in agent terminal windows
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-10
spec:
  summary: Add a chat/diff toggle to AgentTerminal floating windows. Diff mode shows a file tree of changed files with single-file-at-a-time diff display, reusing the existing project diff API and diff components.
  context: |
    The Command Deck's AgentTerminal floating windows currently only show the chat/message view.
    Users want to see what files an agent has changed while it works, without navigating away to
    the agent detail page. The backend already has a diff API (GET /api/projects/{slug}/diff?branch={branch})
    that returns per-file diffs, and agents store their branch in the ref field. The existing
    DiffView component renders all files at once — this track creates a single-file-at-a-time
    variant embedded in the terminal window.
  codebase_analysis: |
    Key files and patterns:
    - frontend/src/components/AgentTerminal.tsx (242 lines) — floating window with chat, uses useAgentWebSocket
    - frontend/src/hooks/useWindowManager.ts (322 lines) — manages WindowEntry {agentId, name, role, initialX, initialY, minimized, unreadCount}
    - frontend/src/components/diff/DiffView.tsx (70 lines) — existing diff viewer with FileList sidebar + FileDiff content, but renders ALL files
    - frontend/src/components/diff/FileList.tsx (43 lines) — sidebar file list with status badges (A/M/D/R)
    - frontend/src/components/diff/FileDiff.tsx (68 lines) — per-file diff renderer with collapsible hunks
    - frontend/src/hooks/useDiff.ts — useProjectDiff(slug, branch) hook, queries GET /api/projects/{slug}/diff?branch={branch}
    - frontend/src/types/api.ts — FileDiff, DiffResponse, DiffStats types already defined
    - App.tsx handleAttach callback has access to agents array with full agent data including ref (branch)
    - AgentDetailPage already shows DiffView conditionally when agent has worktree + project slug
  acceptance_criteria:
    - AgentTerminal header has a chat/diff toggle that switches the full window content
    - Diff mode shows a file tree sidebar listing changed files with status indicators (A/M/D/R)
    - Selecting a file in the tree shows only that single file's diff in the content area
    - Diff toggle is hidden when the agent has no project slug or branch
    - Diff panel respects window resize/maximize/snap behaviors
    - Loading, error, and empty states are handled gracefully
  out_of_scope: |
    - Backend API changes (existing diff endpoint is sufficient)
    - Split-pane view showing chat and diff simultaneously (full toggle only)
    - Inline code editing or applying changes from the diff view
    - Real-time diff updates via SSE/WebSocket (manual refresh or re-query is fine)
  technical_notes: |
    Approach:
    1. Extend WindowEntry with slug/branch metadata so AgentTerminal knows which project to diff
    2. Create AgentDiffPanel component adapting existing diff components for single-file display
    3. Add viewMode state to AgentTerminal with toggle in header bar
    4. Reuse useProjectDiff hook and FileDiff component — no new API calls needed
    
    The existing FileList component can be reused directly. FileDiff renders a single file's
    hunks and is already designed for individual use. The main new component (AgentDiffPanel)
    wires these together with single-file selection logic.
