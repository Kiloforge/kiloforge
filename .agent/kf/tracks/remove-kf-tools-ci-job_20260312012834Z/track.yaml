id: remove-kf-tools-ci-job_20260312012834Z
title: Remove dead kf-tools CI job
type: chore
status: pending
created: 2026-03-12
updated: '2026-03-12'
spec:
  summary: 'Delete the kf-tools CI job from .github/workflows/ci.yml. It references .agent/kf/bin/tests/run_tests.sh which
    was deleted in commit 547a956c. These tests belong in the kiloforge-skills repo, not in the application repo.

    '
  context: 'The kf-tools CI job was added when kf-track shell tooling lived in this repo

    with its own test suite (run_tests.sh, 784 lines). Commit 547a956c replaced

    the shell tools with Python equivalents and deleted the test script, but did

    not remove the CI job that invoked it. The job now fails on every CI run.


    The kf-tools (Python CLI scripts in .agent/kf/bin/) are vendored from the

    kiloforge-skills repo. Their tests should live alongside the source in that

    repo, not here.

    '
  codebase_analysis: "- .github/workflows/ci.yml: lines 9-22 define the `kf-tools` job running on\n  ubuntu-latest and macos-latest,\
    \ calling .agent/kf/bin/tests/run_tests.sh\n- .agent/kf/bin/tests/ directory no longer exists (deleted in 547a956c)\n\
    - No other CI jobs depend on the kf-tools job\n- The remaining CI jobs (lint, test, build-windows, deps) are unaffected\n"
  acceptance_criteria:
  - The kf-tools job is completely removed from .github/workflows/ci.yml
  - No references to .agent/kf/bin/tests/ remain in CI config
  - All other CI jobs remain unchanged
  - CI passes after the change
  out_of_scope: '- Writing replacement tests for kf-tools in this repo

    - Modifying any kf-tools source code

    - Changes to kiloforge-skills repo

    '
  technical_notes: 'Single file edit: remove the entire `kf-tools` job block (lines 9-22) from

    .github/workflows/ci.yml. No other files need changes.

    '
plan:
