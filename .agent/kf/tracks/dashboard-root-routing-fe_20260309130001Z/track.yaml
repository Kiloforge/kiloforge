spec:
  summary: "Update all frontend API endpoints and routing from `/-/` prefix to `/` prefix, matching the backend route restructuring. Update BrowserRouter basename and all fetch URLs."
  context: "The backend track `dashboard-root-routing-be_20260309130000Z` moves the dashboard from `/-/*` to `/` and the API from `/-/api/*` to `/api/*`. The frontend must update all hardcoded path references to match."
  codebase_analysis: |
    ### BrowserRouter (`frontend/src/main.tsx`)
    - Line 9: `<BrowserRouter basename="/-/">` ‚Üí `<BrowserRouter basename="/">`
    
    ### API fetch calls (all hooks)
    Every hook uses `/-/api/` prefix:
    - `useAgents.ts` ‚Äî `fetch("/-/api/agents")`
    - `useQuota.ts` ‚Äî `fetch("/-/api/quota")`
    - `useTraces.ts` ‚Äî `fetch("/-/api/traces")`
    - `useTracks.ts` ‚Äî `fetch("/-/api/tracks...")`
    - `useBoard.ts` ‚Äî `fetch("/-/api/board/...")`
    - `useProjects.ts` ‚Äî `fetch("/-/api/projects")`, `fetch("/-/api/ssh-keys")`
    - `useSkillsStatus.ts` ‚Äî `fetch("/-/api/skills")`
    - `LogViewer.tsx` ‚Äî `fetch("/-/api/agents/{id}/log")`
    - `App.tsx` ‚Äî `fetch("/-/api/status")`
    
    ### SSE endpoint
    - `useSSE.ts` or `App.tsx` ‚Äî `"/-/events"` ‚Üí `"/events"`
    
    ### Navigation links
    - `TracePage.tsx` ‚Äî `/-/dashboard` links
    - `AgentCard.tsx` ‚Äî `${giteaURL}/-/pulls/{prNumber}` ‚Äî this is a Gitea internal link, NOT our prefix. These should change to `${giteaURL}/gitea/` or be left as-is since `giteaURL` points to Gitea's actual URL
    
    ### Gitea links in components
    - `AgentCard.tsx` references `giteaURL` for PR links. Since Gitea moves to `/gitea/`, the `giteaURL` from the status API should already include the `/gitea/` subpath (backend returns it). Verify this works.
  acceptance_criteria:
    - BrowserRouter basename changed to `"/"`
    - All `/-/api/` fetch calls changed to `/api/`
    - SSE endpoint changed from `/-/events` to `/events`
    - Internal navigation links updated (no `/-/` prefix)
    - Gitea PR links still work (via `giteaURL` from status API)
    - `npm run build` succeeds
    - Dashboard loads at `localhost:4001/` with correct routing
  out_of_scope: |
    - Backend route changes (covered by BE track)
    - Gitea configuration
    - Admin username changes
  technical_notes: |
    ### Path change summary
    | Current | New |
    |---------|-----|
    | `/-/api/*` | `/api/*` |
    | `/-/events` | `/events` |
    | `/-/dashboard` | `/dashboard` |
    | `/-/tracks/{id}` | `/tracks/{id}` |
    | `basename="/-/"` | `basename="/"` |
    
    ### Approach
    Simple find-and-replace of `/-/api/` ‚Üí `/api/` and `/-/events` ‚Üí `/events` across all frontend source files. Update BrowserRouter basename. Verify build succeeds.
    
    ---
