id: fix-ws-reconnect-be_20260312010000Z
title: Fix WebSocket reconnect — agent terminal stays connecting forever after close/reopen
type: bug
status: pending
created: 2026-03-12
updated: 2026-03-10
spec:
  summary: |
    After closing an agent terminal and reopening it (either via Attach or Resume),
    the WebSocket connection stays in "connecting" state forever. The agent is running
    but the terminal never receives messages.
  context: |
    Users report: open an interactive agent chat → close the terminal window →
    click "Attach" again (or "Resume" for stopped agents) → terminal shows
    "Connecting..." indefinitely. The agent is still alive and working but the
    UI is stuck.
    
    This is a backend + frontend coordination bug spanning the WebSocket handler,
    bridge lifecycle, and relay goroutine management.
  codebase_analysis: |
    **Root causes identified across two scenarios:**
    
    **Scenario 1 — Agent still running, close window, re-attach:**
    
    When the user closes the terminal window, the frontend unmounts the
    AgentTerminal component, which closes the WebSocket connection. On the
    backend, `handleAgentWS` exits via `session.ctx.Done()` (handler.go:80).
    The bridge and relay remain alive since the agent is still running.
    
    When the user clicks "Attach" again, `useAgentWebSocket` creates a new
    WebSocket to `/ws/agent/{id}`. This SHOULD work because the bridge is
    still registered. However:
    
    1. `handler.go:66` — Hardcodes `StatusMsg("running", nil)` regardless
       of actual agent state. If the agent completed between close and
       reopen, the client gets a false "running" status, then the handler
       immediately hits `bridge.Done` and sends "completed" + closes the
       socket. The frontend sees a rapid open→close cycle and enters
       reconnection loop with exponential backoff.
    
    2. `useAgentWebSocket.ts:163-173` — On WebSocket close, checks
       `agentStatusRef.current` to decide whether to reconnect. If the
       status message hasn't been processed yet (race between onmessage
       and onclose), it sees `null` and enters infinite reconnect loop.
    
    **Scenario 2 — Agent stopped, user clicks Resume:**
    
    1. StopAgent unregisters the bridge (`api_handler.go:648`)
    2. ResumeAgent creates new SDK session, new bridge, new relay
       (`api_handler.go:700-707`)
    3. On resume success, `AgentCard.tsx:102-103` calls `onAttach(agent.id)`
       opening a new terminal window
    4. The new terminal connects via WebSocket — bridge exists, connection
       succeeds
    5. **BUT**: The resumed SDK session calls `Connect()` which starts
       the Claude CLI resume process. If this takes time (common — it
       needs to load session context), the relay goroutine blocks on
       `ia.Output` waiting for first message. Meanwhile the WebSocket
       handler sits in `select` waiting on `bridge.Done`.
    6. The client gets the `StatusMsg("running")` and the buffer replay
       (which is empty for a newly resumed session), then... nothing.
       No agent output arrives until the SDK session fully initializes.
    7. The frontend shows "connected" but the terminal appears frozen.
       If the user closes and reopens during this limbo, it works the
       same way.
    
    **Scenario 3 — Race between bridge cleanup and reconnect:**
    
    `monitorSDKSession` (spawner.go) calls `sessionEndCallback` which
    runs `UnregisterBridge()`. If the agent completes while the terminal
    is closed, the bridge is removed. When the user clicks Attach,
    `GetBridge()` returns false → handler returns HTTP 404 → WebSocket
    upgrade fails → frontend enters reconnect loop forever (it never
    gets a "completed" status to know the agent is done).
    
    **Key files:**
    - `backend/internal/adapter/ws/handler.go` — WS handler hardcodes "running"
    - `backend/internal/adapter/ws/session.go` — Bridge/relay lifecycle
    - `backend/internal/adapter/rest/api_handler.go` — Stop/Resume endpoints
    - `backend/internal/adapter/agent/spawner.go` — monitorSDKSession callback
    - `frontend/src/hooks/useAgentWebSocket.ts` — Reconnect logic
  acceptance_criteria:
    - Closing and reopening a terminal for a running agent immediately shows buffered output and resumes receiving messages
    - Closing and reopening a terminal for a completed agent shows the completion status, not "connecting forever"
    - Resuming a stopped agent and attaching shows a "connecting"/"resuming" state then transitions to live output
    - Frontend stops reconnecting when it learns the agent is in a terminal state (completed/failed/stopped)
    - No bridge/relay resource leaks from repeated close/reopen cycles
  out_of_scope: |
    - Changing the WebSocket protocol or message format
    - Adding persistent chat history (messages are already buffered in RingBuffer)
    - Frontend terminal UI changes beyond connection state handling
  technical_notes: |
    **Fix 1 — WS handler: check actual agent status instead of hardcoding "running"**
    `handler.go:66` should query the agent store for current status before
    sending the initial status message. If the agent is completed/failed/stopped,
    send that status and close gracefully.
    
    **Fix 2 — WS handler: handle missing bridge gracefully**
    When `GetBridge()` returns false, instead of returning 404, check the
    agent store. If the agent exists but is in a terminal state, upgrade
    the WebSocket, send the terminal status, and close cleanly. This lets
    the frontend know the agent is done instead of getting a raw 404.
    
    **Fix 3 — Frontend: handle 404 on WebSocket as terminal state**
    If the WebSocket upgrade fails with 404, fetch agent status via REST
    (`GET /api/agents/{id}`) to determine if the agent is done. If so,
    stop reconnecting and show the terminal status.
    
    **Fix 4 — Frontend: guard reconnect against null agentStatus**
    In `useAgentWebSocket.ts:163`, before entering reconnect mode,
    also check if the WebSocket was open long enough to have received
    a status. If it closed immediately (< 1s), fetch agent status via
    REST before retrying.
