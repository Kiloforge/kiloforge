id: fix-agent-resume-session-id-be_20260312000000Z
title: "Fix agent resume — capture real Claude session ID from SDK"
type: bug
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: Agent resume is broken because the stored session ID is a self-generated UUID, not the real Claude SDK session ID. Resume attempts fail silently because `claude --resume <our-uuid>` finds no matching session file.
  context: |
    The agent spawner generates its own UUID for each agent's SessionID at spawn time
    (spawner.go lines 257, 326, 501). This UUID is stored in AgentInfo.SessionID and
    persisted to SQLite. However, the Claude CLI/SDK creates its own independent session
    ID internally. When resume is attempted via `WithResume(sessionID)` or
    `claude --resume <sessionID>`, the CLI looks for a session file matching that ID
    and fails because our UUID doesn't correspond to any real session.

    The real session ID is available in ResultMessage.SessionID returned by the SDK
    after each turn, but it is only logged — never captured and stored back to the
    agent record.
  codebase_analysis: |
    Key files:
    - backend/internal/adapter/agent/sdk_client.go:
      - NewSDKSession (line 58): no session ID passed to SDK — it generates its own
      - NewSDKSessionWithResume (line 97): passes our UUID via WithResume — wrong ID
      - relayResponse (line 198): receives ResultMessage with real SessionID (line 320) but only logs it
      - QueryOneShot (line 455): same — receives ResultMessage.SessionID but only logs it (line 533)
    - backend/internal/adapter/agent/spawner.go:
      - SpawnDeveloper (line 326): sessionID := uuid.New().String() — our UUID
      - SpawnInteractive (line 501): same
      - ResumeAgent (line 745): uses agent.SessionID (our UUID) for WithResume — broken
      - ResumeDeveloper (line 696): uses agent.SessionID for execClaudeResume — broken
    - backend/internal/adapter/agent/recovery.go:
      - execClaudeResume (line 157): runs `claude --resume <our-uuid>` — can't find session
      - RecoverAll (line 77): calls starter.Start with our UUID — broken

    The fix requires capturing ResultMessage.SessionID and persisting it to the agent store
    so that subsequent resume calls use the correct ID.
  acceptance_criteria:
    - After an agent completes its first turn, AgentInfo.SessionID in the store reflects the real Claude SDK session ID (not the self-generated UUID)
    - Resuming an interactive agent via the UI Resume button successfully restores the session
    - Resuming a developer/reviewer agent via ResumeDeveloper uses the correct session ID
    - RecoveryManager auto-recovery uses the correct session ID
    - Existing tests pass with no regressions
  out_of_scope: |
    - Frontend changes (the Resume button already works correctly — the issue is BE-only)
    - Adding new E2E tests for resume flow (would require mocking the Claude CLI)
    - Changing the initial UUID generation (still useful as a pre-session identifier)
  technical_notes: |
    Fix approach:

    1. Add a session ID update callback to SDKSession. When relayResponse receives a
       ResultMessage with a non-empty SessionID that differs from the stored one, invoke
       the callback to persist the real ID.

    2. For QueryOneShot (developer/reviewer one-shot agents), return the real session ID
       alongside the final status so runSDKAgent can update the store.

    3. Wire the callback in SpawnInteractive and ResumeAgent so the store is updated
       on the first turn completion.

    4. The callback should call store.UpdateSessionID (new method) or do a FindAgent +
       update SessionID + AddAgent upsert pattern already used elsewhere in the spawner.
plan:
  - phase: Capture real session ID
    tasks:
      - text: "Add a sessionIDCallback field to SDKSession and a SetSessionIDCallback method. In handleResponseMessage, when a ResultMessage has a non-empty SessionID, invoke the callback with the real ID."
        done: false
      - text: "Modify QueryOneShot to capture and return the real session ID from ResultMessage alongside the final status string (change return signature to include sessionID)."
        done: false
      - text: "In runSDKAgent (spawner.go), after QueryOneShot returns, update the agent store with the real session ID if one was returned."
        done: false
  - phase: Wire callback in spawner
    tasks:
      - text: "In SpawnInteractive, after creating the SDKSession, set a sessionIDCallback that calls store.FindAgent + updates SessionID + store.AddAgent (upsert pattern)."
        done: false
      - text: "In ResumeAgent, same — wire the sessionIDCallback so that if the session ID changes on resume, the store is updated."
        done: false
  - phase: Verification
    tasks:
      - text: "Add a unit test in sdk_client_test.go that verifies the sessionIDCallback is invoked when a ResultMessage with a SessionID is received."
        done: false
      - text: "Add a unit test verifying QueryOneShot returns the real session ID."
        done: false
      - text: "Run make test, make build, make lint — verify no regressions."
        done: false
