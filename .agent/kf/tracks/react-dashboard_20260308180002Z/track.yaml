spec:
  summary: Build a full React dashboard replacing the vanilla JS/HTML static files. The dashboard provides real-time agent monitoring, quota tracking, track status, and log viewing — all powered by the existing backend API and SSE stream.
  context: "After the monorepo restructure (`monorepo-restructure_20260308180001Z`), the frontend lives in `frontend/` with Vite + React + TypeScript. This track implements the actual dashboard UI, replacing the placeholder app with a production-quality interface."
  codebase_analysis: |
    - **Existing API endpoints** (no changes needed):
      - `GET /api/agents` — list all agents with enriched data
      - `GET /api/agents/{id}` — single agent details
      - `GET /api/agents/{id}/log?lines=N&follow=true` — agent log streaming
      - `GET /api/quota` — total and per-agent quota usage
      - `GET /api/tracks` — track listing from tracks.md
      - `GET /api/status` — system status (Gitea URL, agent counts, cost, SSE clients)
      - `GET /events` — SSE stream (agent_update, agent_removed, quota_update events)
    - **Current UI features** (must replicate):
      - 4 stat cards (total agents, total cost, rate limit, total tokens)
      - Agent card grid (status badge, role, ref, uptime, cost, log button)
      - Track list table (ID, title, status)
      - Log viewer modal (fetch + follow mode)
      - SSE auto-reconnection
      - Gitea PR links
    - **SSE event types**: `agent_update` (full agent JSON), `agent_removed` ({id}), `quota_update` (full quota)
    - **Dark theme** with status-based colors (green=running, yellow=waiting, blue=completed, red=failed)
  acceptance_criteria:
    - Dashboard renders at `/` with all existing functionality replicated
    - Real-time updates via SSE (agent status changes appear without refresh)
    - Agent cards show: status badge, role, ref (linked to Gitea), uptime, cost
    - Log viewer with line-limited fetch and follow (streaming) mode
    - Quota display: total cost, tokens, rate limit warning
    - Track listing: ID, title, status with appropriate styling
    - System status: Gitea URL, agent histogram, SSE client count
    - Responsive layout (works on desktop, reasonable on tablet)
    - Dark theme consistent with kiloforge branding
    - TypeScript strict mode, no `any` types in component props
    - `npm run build` produces optimized bundle under 500KB gzipped
  out_of_scope: |
    - Backend API changes (use existing endpoints as-is)
    - Authentication/authorization
    - Board/kanban visualization (future track)
    - Mobile-specific responsive design
    - Internationalization
  technical_notes: |
    ### Recommended Stack
    
    - **React 19** + TypeScript
    - **Vite** for build/dev
    - **CSS Modules** or **Tailwind CSS** for styling (keep it simple, no heavy UI library)
    - **No state management library** — React hooks + context sufficient for this scale
    - **EventSource API** for SSE (native browser, no library needed)
    
    ### Component Structure
    
    ```
    src/
    ├── App.tsx                 # Main layout, SSE connection
    ├── hooks/
    │   ├── useAgents.ts        # Agent state + SSE updates
    │   ├── useQuota.ts         # Quota state + SSE updates
    │   ├── useTracks.ts        # Track list fetching
    │   └── useSSE.ts           # SSE connection management
    ├── components/
    │   ├── StatCards.tsx        # Summary stat cards row
    │   ├── AgentGrid.tsx       # Agent card grid
    │   ├── AgentCard.tsx       # Individual agent card
    │   ├── TrackList.tsx       # Track status table
    │   ├── LogViewer.tsx       # Modal log viewer
    │   ├── StatusBadge.tsx     # Colored status badge
    │   └── ConnectionStatus.tsx # SSE connection indicator
    ├── types/
    │   └── api.ts              # TypeScript types matching backend JSON
    └── utils/
        └── format.ts           # USD formatting, token formatting, duration
    ```
    
