id: rebrand-conductor-to-kf-skills_20260311070000Z
title: Rebrand conductor references to kf in embedded skills submodule
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Replace all .agent/conductor/ path references with .agent/kf/ across 9 stale
    skill files in the kiloforge-skills submodule (117 occurrences), then update
    the submodule pointer in the parent repo. The kf-setup skill is the most
    critical — it creates the entire project structure under the wrong path.
  context: |
    The kiloforge-skills submodule at backend/internal/adapter/skills/embedded
    contains 22 skills. 14 of them already reference .agent/kf/ (the correct
    path), but 9 still reference the old .agent/conductor/ path from before the
    rebrand. This causes kf-setup and other skills to create/look for files
    under .agent/conductor/ instead of .agent/kf/, breaking the setup flow.
  codebase_analysis: |
    Affected files (9 files, 117 occurrences of .agent/conductor/):
    - kf-setup/SKILL.md (18 hits) — CRITICAL: creates project structure
    - kf-manage/resources/implementation-playbook.md (51 hits)
    - kf-compact-archive/SKILL.md (19 hits)
    - kf-new-track/SKILL.md (13 hits)
    - kf-manage/scripts/archive_track.sh (5 hits)
    - kf-bulk-archive/SKILL.md (4 hits)
    - kf-revert/SKILL.md (3 hits)
    - kf-validate/SKILL.md (3 hits)
    - kf-manage/SKILL.md (1 hit)

    The submodule is kiloforge/kiloforge-skills on GitHub. Changes must be
    committed inside the submodule first, then the parent repo updates its
    submodule pointer.
  acceptance_criteria:
    - Zero occurrences of .agent/conductor in the embedded skills submodule
    - All 9 affected files have .agent/conductor/ replaced with .agent/kf/
    - Submodule commit is clean and pushed to kiloforge-skills repo
    - Parent repo submodule pointer updated to the new commit
    - No functional changes beyond the path rename
  out_of_scope: |
    - Modernizing old file format references (tracks.md → tracks.yaml, metadata.json → track.yaml, etc.)
    - Changes to skills that already use .agent/kf/ paths
    - Changes outside the submodule
  technical_notes: |
    This is a mechanical find-and-replace: .agent/conductor/ → .agent/kf/ across
    all affected files. The submodule is a separate git repo, so the workflow is:
    1. cd into the submodule
    2. Create a branch, make the replacements, commit
    3. Push to kiloforge-skills remote
    4. cd back to parent, update submodule pointer, commit
