id: fullscreen-cmd-fe_20260310180000Z
title: Full-screen command mode — immersive multi-pane terminal overlay
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: Add a full-viewport terminal mode that overlays the dashboard, supporting single and multi-pane agent terminals with keyboard shortcuts for enter/exit, pane splitting, and agent switching.
  context: The Command Deck dashboard has floating agent terminal windows (AgentTerminal) managed by useWindowManager, with tiling/snapping support. Users want an immersive, distraction-free terminal experience that takes over the full viewport — like a terminal multiplexer (tmux/screen) built into the dashboard. The existing infrastructure (WebSocket messaging via useAgentWebSocket, message rendering via MessageDispatch/TerminalBubbles, keyboard shortcuts via useKeyboardShortcuts) provides all the building blocks.
  codebase_analysis: |
    Key files:
    - frontend/src/App.tsx — root layout, routing, window manager integration (toggle entry point)
    - frontend/src/components/AgentTerminal.tsx — floating terminal with WebSocket, MessageDispatch, input field
    - frontend/src/components/terminal/TerminalBubbles.tsx — message bubble renderer (reusable as-is)
    - frontend/src/hooks/useWindowManager.ts — window registry, tiling, z-index (reference patterns)
    - frontend/src/hooks/useAgentWebSocket.ts — WebSocket connection per agent (reuse directly)
    - frontend/src/hooks/useKeyboardShortcuts.ts — global keyboard binding (extend with new shortcuts)
    - frontend/src/hooks/useFloatingWindow.ts — drag/resize logic (not needed in full-screen, but reference)
    - frontend/src/App.module.css — header, main layout (z-index layering reference)
    - frontend/src/components/AgentTerminal.module.css — message list, input styles (reuse patterns)
    
    Patterns to follow:
    - CSS Modules co-located with components
    - Design tokens via CSS custom properties (--bg, --bg-surface-elevated, --border, --text, etc.)
    - Glassmorphism: backdrop-filter blur on elevated surfaces
    - Role-based color coding (developer=green, reviewer=orange, interactive=green)
    - z-index tiers: header=50, floating windows=100+, modals=100 with backdrop
  acceptance_criteria:
    - Cmd+Shift+F toggles full-screen command mode on/off
    - Full-screen overlay covers entire viewport above all dashboard chrome
    - Single-pane mode shows one agent terminal with agent picker and connection status
    - Cmd+D splits active pane vertically; Cmd+Shift+D splits horizontally
    - Cmd+W closes active pane (last pane exits full-screen mode)
    - Cmd+[ and Cmd+] navigate focus between panes
    - Each pane can be assigned to a different running agent
    - Message rendering reuses existing TerminalBubbles/MessageDispatch
    - Escape key exits full-screen mode
    - Layout state persists in localStorage across page reloads
    - E2E tests cover enter/exit toggle, single-pane terminal, and split pane interaction
    - All existing tests pass (make test)
  out_of_scope: |
    - Backend changes (all WebSocket/SSE infrastructure exists)
    - Modifying existing AgentTerminal component (compose, don't modify)
    - Persistent layout serialization to backend (localStorage only for now)
    - Command palette / slash-command input (separate future track)
    - Mobile/responsive layout (desktop-first)
  technical_notes: |
    Architecture:
    - New top-level component FullScreenCommand rendered in App.tsx at z-index 200 (above everything)
    - Compose existing hooks (useAgentWebSocket, useKeyboardShortcuts) rather than creating new ones
    - Pane state managed by a new useCommandPanes hook: tree of panes (leaf=terminal, branch=split)
    - Each pane renders a lightweight terminal view reusing MessageDispatch and the input pattern from AgentTerminal
    - Enter via Cmd+Shift+F (or button in header); exit via Escape or same shortcut
    - Multi-pane: binary split tree — each split creates two children (horizontal or vertical)
    - Agent picker dropdown in pane header to assign/switch agents per pane
    - Focus ring on active pane, keyboard navigation between panes (Cmd+[ / Cmd+])
    - Smooth enter/exit transitions (opacity + scale, 200ms)
    - Layout state persisted to localStorage for session continuity
