title: Align dashboard UI with kiloforge.dev design guide
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-09
spec:
  summary: Update the kiloforge dashboard frontend to match the design guide created in the design-guide track — replacing the current opaque navy theme with the kiloforge.dev glassmorphism visual language, Geist typography, and emerald-cyan brand gradient.
  context: |
    The design-guide track produces .agent/kf/code_styleguides/ui-design.md with the complete kiloforge.dev visual language. This track applies those design tokens and patterns to the existing dashboard, bringing visual consistency between the marketing site and the product.
    
    The dashboard is a React 19 + Vite 7 app using CSS Modules for component-scoped styles. Global tokens are defined in frontend/src/index.css as CSS custom properties. The migration involves:
    1. Updating CSS custom properties to match the design guide tokens
    2. Replacing opaque card backgrounds with glass panel pattern
    3. Adding Geist font
    4. Updating border-radius scale
    5. Applying brand gradient where appropriate
  codebase_analysis: |
    ### Current dashboard theme (frontend/src/index.css)
    
    ```css
    :root {
      --bg: #0f1117;        /* → #0a0a0a */
      --surface: #1a1d27;   /* → rgba(30,30,30,0.4) glass */
      --border: #2a2d3a;    /* → rgba(255,255,255,0.08) */
      --text: #e1e4ed;      /* → #ededed */
      --text-dim: #8b8fa3;  /* → rgba(255,255,255,0.5) */
      --accent: #6c8cff;    /* → emerald-cyan gradient for brand */
      --green: #3dd68c;     /* keep — good for status */
      --yellow: #f0c541;    /* keep */
      --red: #f06c6c;       /* keep */
      --orange: #e8944a;    /* keep */
      --radius: 8px;        /* → scale: 16/12/8 */
    }
    ```
    
    ### Component files that use theme tokens (CSS modules)
    
    Every .module.css file under frontend/src/components/ and frontend/src/pages/ references these CSS vars. The migration is mostly token-level — update the vars and most things update automatically.
    
    Key files needing manual attention:
    - `index.css` — global token definitions (primary change target)
    - Components using `background: var(--surface)` — need glass panel CSS added
    - Components with hardcoded colors or box-shadows
    - Header/nav component — needs glass treatment + border update
    - Card components (AgentCard, StatCards, TrackList) — glass panel migration
    
    ### Font migration
    
    Current: system font stack
    Target: Geist (loaded via @font-face or CDN)
    Fallback: system stack preserved as fallback
    
    ### Scope of visual change
    
    This is a **theme migration**, not a layout change:
    - Color tokens change → most components update via CSS vars
    - Glass panel pattern added → components with var(--surface) bg need border/backdrop updates
    - Font changes → single @font-face addition + body font-family update
    - Border-radius scale → update --radius and add --radius-lg, --radius-sm vars
    - Brand gradient → add to key accent areas (active states, primary buttons, highlights)
  acceptance_criteria:
    - index.css CSS custom properties updated to match design guide tokens
    - Body background is #0a0a0a (deep black, not navy)
    - Surface panels use glass pattern: rgba(30,30,30,0.4) bg + rgba(255,255,255,0.08) border
    - Geist font loaded and set as primary font-family with system fallback
    - Border-radius scale: --radius-lg (16px), --radius (12px), --radius-sm (8px)
    - Brand gradient (emerald→cyan) used for primary accent areas
    - Status colors preserved (green/yellow/red/orange unchanged)
    - Header/nav has glass treatment with backdrop blur
    - Favicon replaced with clean icon.png from kiloforge.dev (not the full hero artwork)
    - Logo (kf_logo.webp) added to dashboard header/nav alongside 'Kiloforge' text
    - All existing pages render correctly with new theme (no broken layouts)
    - No hardcoded colors remain that conflict with new theme
  out_of_scope: |
    - Layout changes or component restructuring
    - Adding new pages or features
    - Responsive design improvements
    - Light mode / theme switching
    - Animation or motion design changes
    - Marketing site changes
  technical_notes: |
    ### Migration strategy
    
    1. **Update global tokens first** (index.css) — this propagates to all components via CSS vars
    2. **Add Geist font** — @font-face declaration or import from CDN
    3. **Add glass-panel utility** — a reusable CSS class or mixin for the glass pattern
    4. **Audit each component** — check for hardcoded colors, add glass treatment where var(--surface) is used
    5. **Test visually** — compare before/after screenshots of key pages
    
    ### New CSS custom properties (from design guide)
    
    ```css
    :root {
      /* Backgrounds */
      --bg: #0a0a0a;
      --surface: rgba(30, 30, 30, 0.4);
      --surface-hover: rgba(30, 30, 30, 0.6);
    
      /* Borders */
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
    
      /* Text */
      --text: #ededed;
      --text-dim: rgba(255, 255, 255, 0.5);
    
      /* Brand */
      --accent: #34d399;
      --accent-gradient: linear-gradient(to right, #34d399, #22d3ee);
    
      /* Status (preserved) */
      --green: #3dd68c;
      --yellow: #f0c541;
      --red: #f06c6c;
      --orange: #e8944a;
    
      /* Radius scale */
      --radius-lg: 16px;
      --radius: 12px;
      --radius-sm: 8px;
    }
    ```
    
    ### Glass panel pattern
    
    ```css
    .glass-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .glass-panel:hover {
      border-color: var(--border-hover);
    }
    ```
    
    ### Risk assessment
    
    LOW risk — this is a cosmetic-only change:
    - No logic changes
    - CSS vars mean most updates propagate automatically
    - Status colors preserved (functional meaning unchanged)
    - Layout untouched
