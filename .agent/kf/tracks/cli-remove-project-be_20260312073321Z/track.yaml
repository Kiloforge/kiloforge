id: cli-remove-project-be_20260312073321Z
title: "Add `kf remove` CLI command for project removal"
type: feature
status: pending
created: 2026-03-12
updated: 2026-03-12
spec:
  summary: |
    Add a `kf remove <slug>` Cobra command that calls the existing
    ProjectService.RemoveProject(). All backend plumbing (service, store,
    REST API, frontend) already exists — only the CLI adapter is missing.
  context: |
    The project lifecycle currently supports add, create, list, and destroy
    via CLI, but there is no way to remove a single project from the command
    line. The service layer (ProjectService.RemoveProject), SQLite store
    (ProjectStore.Remove), REST endpoint (DELETE /api/projects/{slug}), and
    frontend dialog (RemoveProjectDialog) are all implemented. Only the CLI
    command is missing.
  codebase_analysis: |
    Key existing code:
    - Service: backend/internal/core/service/project_service.go:228
      RemoveProject(ctx, slug, cleanup bool) — deregisters project, optionally
      deletes repos/{slug}/, projects/{slug}/, and internal mirror dirs.
    - Store: backend/internal/adapter/persistence/sqlite/project_store.go:85
      Remove(slug) — DELETE FROM projects WHERE slug = ?
    - REST: backend/internal/adapter/rest/api_handler.go — DELETE /api/projects/{slug}
      with ?cleanup=true query param.
    - CLI patterns: backend/internal/adapter/cli/ — all commands use NewCLIRuntime()
      to get service access. destroy.go is the closest pattern (confirmation prompt,
      --force flag). projects.go shows how to list/lookup projects.
    - Root registration: backend/internal/adapter/cli/root.go:54 — rootCmd.AddCommand().
  acceptance_criteria:
    - "`kf remove <slug>` deregisters a project from the store"
    - "`kf remove <slug> --cleanup` also deletes local filesystem data (repos/, projects/, internal mirrors)"
    - "Without --force, the user is prompted for confirmation showing what will be removed"
    - "`kf remove <slug> --force` skips confirmation"
    - "Removing a non-existent slug returns a clear error message"
    - "Unit tests cover: successful remove, remove with cleanup, not-found error, and flag parsing"
  out_of_scope: |
    - Changes to the service layer, store, REST API, or frontend (all already implemented)
    - Tab-completion or shell autocomplete for slugs
    - Batch removal of multiple projects
  technical_notes: |
    Follow the destroy.go pattern for confirmation UX. Use NewCLIRuntime() to
    access rt.Projects.RemoveProject(). Register the new command in root.go
    init(). The command file should be backend/internal/adapter/cli/remove.go
    with tests in remove_test.go following existing test patterns.
