id: guided-tour-be_20260309203000Z
title: Guided Tour State API and Demo Seed Data (Backend)
type: feature
status: complete
created: 2026-03-09T20:30:00Z
updated: 2026-03-09T20:30:00Z
spec:
  summary: Add backend support for a guided onboarding tour: tour state persistence in SQLite, REST endpoints to read/update tour progress, and a demo board endpoint that returns simulated kanban data for the walkthrough without spawning real agents.
  context: New users landing on the Kiloforge dashboard for the first time have no guidance on how to add a project, generate tracks, or use the kanban board. A guided tour walks them through the complete workflow using simulated data so they can learn the UI without needing a real project or agent. The backend stores tour state (accepted/dismissed/current step) so it persists across sessions.
  codebase_analysis: |
    ### Existing patterns
    
    - **Config store** — `backend/internal/adapter/persistence/sqlite/config_store.go` stores key-value pairs in `config` table. Already used for `app` config and `agent_permissions_consent`.
    - **Consent pattern** — `consent.go` stores `agent_permissions_consent` as a timestamped config key. Tour state can follow the same pattern.
    - **REST API** — `backend/internal/adapter/rest/api_handler.go` handles all endpoints. New tour endpoints follow the same handler pattern.
    - **Board data** — `BoardState` has `columns []string` and `cards map[string]BoardCard`. The demo endpoint returns a synthetic board matching this shape.
    
    ### Config table reuse
    
    Tour state is a simple JSON blob stored under key `"tour_state"`:
    
    ```json
    {
      "status": "active",
      "current_step": 3,
      "started_at": "2026-03-09T20:00:00Z",
      "dismissed_at": null,
      "completed_at": null
    }
    ```
    
    Status values: `"pending"` (never started), `"active"` (in progress), `"dismissed"` (user declined), `"completed"` (user finished tour).
  acceptance_criteria:
    - Tour state stored in SQLite `config` table under key `"tour_state"`
    - `GET /api/tour` — returns current tour state (defaults to `{"status": "pending"}` if no record)
    - `PUT /api/tour` — updates tour state (accept, advance step, dismiss, complete)
    - `GET /api/tour/demo-board` — returns simulated board data with 3 demo tracks in backlog column
    - Demo board data includes realistic track titles, types, and timestamps
    - Tour state defaults to `"pending"` on fresh install (no migration needed — absence of key = pending)
    - `go test ./...` passes
  out_of_scope: |
    - Frontend tour UI (covered by `guided-tour-fe_20260309203001Z`)
    - Actual project creation during tour (tour uses simulation)
    - `kf setup` command (future track if needed)
    - Demo repo creation on GitHub
  technical_notes: |
    ### Tour state store
    
    ```go
    // backend/internal/adapter/persistence/sqlite/tour_store.go
    
    type TourState struct {
        Status      string     `json:"status"`       // pending|active|dismissed|completed
        CurrentStep int        `json:"current_step"` // 0-indexed step number
        StartedAt   *time.Time `json:"started_at,omitempty"`
        DismissedAt *time.Time `json:"dismissed_at,omitempty"`
        CompletedAt *time.Time `json:"completed_at,omitempty"`
    }
    
    func (s *Store) GetTourState() (TourState, error)
    func (s *Store) UpdateTourState(state TourState) error
    ```
    
    ### Demo board endpoint
    
    Returns a `BoardState` with 3 simulated tracks:
    
    ```json
    {
      "columns": ["backlog", "approved", "in_progress", "in_review", "done"],
      "cards": {
        "demo-auth-flow": {
          "track_id": "demo-auth-flow",
          "title": "Add User Authentication",
          "type": "feature",
          "column": "backlog",
          "position": 0
        },
        "demo-fix-login": {
          "track_id": "demo-fix-login",
          "title": "Fix Login Redirect Loop",
          "type": "bug",
          "column": "backlog",
          "position": 1
        },
        "demo-refactor-api": {
          "track_id": "demo-refactor-api",
          "title": "Refactor API Error Handling",
          "type": "refactor",
          "column": "backlog",
          "position": 2
        }
      }
    }
    ```
    
    ### REST endpoints
    
    ```
    GET  /api/tour           → TourState
    PUT  /api/tour           → TourState (updated)
    GET  /api/tour/demo-board → BoardState (simulated)
    ```
    
    ---
