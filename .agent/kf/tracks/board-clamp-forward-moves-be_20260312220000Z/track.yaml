spec:
  summary: |
    Add ClampForwardMove domain helper and use it in MoveCard to enforce that
    users can only manually promote backlogâ†’approved. All other forward moves
    are clamped to current column. Done is system-only.
  context: |
    The kanban board currently allows users to drag cards to any column,
    including "done". This bypasses the agent workflow â€” tracks should only
    reach "in_progress" when the swarm picks them up, and "done" when the
    developer agent completes implementation. Users should only be able to
    approve tracks (backlogâ†’approved) or demote them (backward moves).
  codebase_analysis: |
    - domain.ColumnOrder maps columns to ordinal positions (board.go:22-27)
    - domain.IsForwardMove / IsBackwardMove exist (board.go:35-47)
    - MoveCard in board_service.go (lines 37-76) validates column name and
      same-column no-op but does NOT restrict forward movement distance
    - The lifecycle service (lifecycle_service.go:85-93) uses IsBackwardMove
      to halt agents on demotion â€” clamping must happen BEFORE lifecycle hooks
    - MoveCard REST handler (api_handler.go:1565-1596) calls board service
      then publishes event â€” the clamped column should be returned to the
      caller so the frontend can show the actual landing column
    - BoardMoveCardResult (port/board.go) carries FromColumn/ToColumn â€” the
      ToColumn should reflect the clamped value, not the user's requested value
  acceptance_criteria:
    - MoveCard clamps backlogâ†’{in_progress,done} to approved
    - MoveCard clamps approvedâ†’{in_progress,done} to approved (no-op)
    - MoveCard clamps in_progressâ†’done to in_progress (no-op)
    - Backward moves are unrestricted
    - backlogâ†’approved is the only valid manual forward move
    - SyncFromTracks (system sync) is NOT affected by clamping â€” it sets columns directly
    - REST response ToColumn reflects the clamped column, not the requested one
  out_of_scope: |
    - Frontend UI changes (separate FE track)
    - Auto-pickup of approved tracks by swarm (existing swarm scheduling)
    - Backward move restrictions
  technical_notes: |
    Add ClampForwardMove(fromCol, toCol string) string to domain/board.go.
    Rules: if forward move, max target is one step from current column, and
    never beyond approved for manual moves. If the clamped column equals the
    current column, MoveCard should return early (same-column no-op).
    The clamping function should be pure (no side effects) for easy testing.
