  summary: Create a comprehensive UI design guide document at .agent/kf/code_styleguides/ui-design.md that captures the kiloforge.dev visual language — glassmorphism, color system, typography, spacing, and component patterns — so agents implementing UI features can reference a single authoritative style guide.
  context: |
    The kiloforge.dev marketing site establishes a strong visual identity that the product dashboard should align with. Currently there is no UI design guide — agents implementing frontend features have no reference for colors, typography, spacing, or component patterns. This leads to inconsistent visual decisions.
    
    The design guide will live alongside the existing Go and build style guides in .agent/kf/code_styleguides/ and be referenced by the ui-design-standards skill when agents are building frontend components.
  codebase_analysis: |
    ### kiloforge.dev visual language (extracted via Playwright)
    
    **Color System:**
    - Background: `#0a0a0a` (pure deep black)
    - Surface/Glass panels: `rgba(30, 30, 30, 0.4)` (semi-transparent dark)
    - Borders: `rgba(255, 255, 255, 0.08)` (subtle white, ~8% opacity)
    - Text primary: `#ededed` (near-white)
    - Text secondary: dimmed white (~50-66% opacity)
    - Brand gradient: emerald-400 (`#34d399`) → cyan-400 (`#22d3ee`)
    - Accent surfaces: `white/5` (`rgba(255,255,255,0.05)`) for icon backgrounds
    - Interactive hover: `white/10` → `white/20` progression
    - Domain-specific accent dots: emerald (infra), cyan (orchestration), amber (agents), violet (tracing), rose (gitea)
    
    **Typography:**
    - Primary font: Geist (modern sans-serif by Vercel)
    - Monospace: used for role subtitles ("Human Director", "Local Control Plane"), code blocks, CLI commands
    - H1: 96px bold (hero only)
    - H2: ~48px bold (section headers)
    - H3: 20px semibold (card titles)
    - Body: 16-18px regular
    - Labels/subtitles: 14px, often in monospace with accent color
    
    **Glass Panels (glassmorphism):**
    - Background: `rgba(30, 30, 30, 0.4)`
    - Border: `1px solid rgba(255, 255, 255, 0.08)`
    - Border-radius: 16px (large panels), 12px (buttons/code blocks), 8px (icon containers)
    - Hover: border brightens to `rgba(255, 255, 255, 0.15)`
    - No box-shadow on panels (clean, flat glass)
    
    **Layout Patterns:**
    - Subtle grid overlay: `linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px)` repeating
    - Decorative gradient lines between sections: `white/20` fading gradients
    - Generous vertical spacing between sections
    - Max content width with centered layout
    - 3-column grid for feature cards, responsive
    
    **Interactive Elements:**
    - Pill buttons: `border-radius: 9999px` with `white/10` bg, `white/10` border
    - Rectangular buttons: `border-radius: 12px` with `white/20` bg
    - Code blocks: glass-panel style with `border-radius: 12px`
    - Hover transitions: smooth opacity/border changes
    
    **Iconography:**
    - Icons in 48x48 containers with `white/5` background, `border-radius: 8px`
    - Colored icons matching domain accent (emerald for infra, cyan for orchestration, etc.)
    
    ### Current dashboard styling (frontend/src/index.css)
    
    - Background: `#0f1117` (navy-tinted dark, not pure black)
    - Surface: `#1a1d27` (opaque, no glass effect)
    - Border: `#2a2d3a` (opaque dark)
    - Text: `#e1e4ed`
    - Accent: `#6c8cff` (blue, no gradient)
    - Status colors: green `#3dd68c`, yellow `#f0c541`, red `#f06c6c`, orange `#e8944a`
    - Font: system stack (-apple-system, BlinkMacSystemFont, etc.)
    - Radius: 8px everywhere
    - No glassmorphism, no gradients, no grid overlay
    
    ### Existing style guides
    
    - `.agent/kf/code_styleguides/go.md` — Go coding standards
    - `.agent/kf/code_styleguides/build.md` — Build process docs
    - No UI/frontend design guide exists
