  technical_notes: |
    ### Document structure
    
    The guide should be structured as:
    
    1. **Design Philosophy** — Brief description of the visual language (dark, glassy, technical, premium)
    2. **Color System** — All color tokens with hex/rgba values and usage rules
       - Backgrounds (page, surface, elevated)
       - Text (primary, secondary, dimmed)
       - Brand (gradient, accent)
       - Status (success, warning, error, info)
       - Domain accents (infrastructure, orchestration, agents, etc.)
    3. **Typography** — Font families, size scale, weight scale, line heights
       - When to use monospace vs sans-serif
       - Heading hierarchy
    4. **Spacing & Layout** — Spacing scale, container max-widths, grid patterns
    5. **Glass Panels** — The signature component pattern with exact CSS
    6. **Interactive Elements** — Buttons, links, inputs, focus/hover states
    7. **Iconography** — Container patterns, color mapping
    8. **Branding Assets** — Logo and favicon sources, usage rules, placement guidance
    9. **Status Semantics** — Color mapping for application states
    10. **CSS Custom Properties** — The complete set of `--var` tokens
    
    ### Branding assets (from kiloforge.dev)
    
    - **Logo**: `kf_logo.webp` — the anvil/forge artwork, used at 32px (nav) and large (hero)
      - Source: https://kiloforge.dev/kf_logo.webp (985x493 native)
      - Nav size: 32x16 (small, alongside "Kiloforge" text)
    - **Favicon**: `icon.png` — clean icon variant for browser tabs
      - Source: https://kiloforge.dev/icon.png
    - **OG Image**: `og_image.png` for social sharing
      - Source: https://kiloforge.dev/og_image.png
    - Current dashboard uses the full hero artwork as favicon (oversized, not clean icon)
    
    ### Key design decisions to document
    
    - Use Geist font (or acceptable fallbacks)
    - Glass panels are the primary surface pattern (NOT opaque cards)
    - Brand gradient (emerald→cyan) for emphasis, not blue
    - Generous border-radius scale: 16px panels, 12px buttons, 8px small elements
    - White-opacity borders (NOT opaque colored borders)
    - Status colors are preserved from current dashboard (green/yellow/red/orange work well)
    - Grid overlay pattern is optional decorative element for hero/landing areas
    
    ### Agent usage
    
    The guide should start with a note like:
    ```
    This is the authoritative UI design reference for the kiloforge dashboard.
    When implementing any frontend component, consult this guide for colors,
    typography, spacing, and component patterns. Do not invent new design tokens.
    ```
