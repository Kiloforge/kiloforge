id: merge-init-into-up_20260311193000Z
title: "Merge kf init into kf up — single entry point with auto-setup"
type: refactor
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Absorb all kf init logic into kf up so users only need kf up / kf down.
    Remove the init command and update all error messages and help text.
  context: |
    Currently kf has two commands for starting: `kf init` (first-time setup + start)
    and `kf up` (restart only). This forces users to remember which to use and creates
    a confusing "not initialized" error when they naturally try `kf up` first.

    The UX should be: `kf up` always works — it detects first-run vs restart and does
    the right thing. `kf down` stops. That's it.
  codebase_analysis: |
    Affected files:
    - backend/internal/adapter/cli/up.go — absorb init logic with first-run detection
    - backend/internal/adapter/cli/init.go — DELETE or convert to alias
    - backend/internal/adapter/cli/root.go — remove initCmd registration (or alias it)
    - backend/internal/adapter/cli/errhelp.go — update notInitializedError to say "kf up"
    - backend/internal/adapter/cli/errhelp_test.go — update test expectations
    - backend/internal/adapter/cli/down.go — remove notInitializedError, just report "not running"

    Current init flow (init.go:runInit):
    1. prereq.Check() — verify required tools
    2. prereq.CheckClaudeAuth() — warn if not authenticated
    3. config.Resolve() with optional --data-dir flag
    4. Idempotency: if already running, report status and return
    5. os.MkdirAll(cfg.DataDir) — create data directory
    6. Analytics opt-in prompt (only if cfg.AnalyticsEnabled == nil)
    7. cfg.Save() — persist config
    8. startDaemon() — spawn kf serve
    9. installEmbeddedSkills(cfg) — auto-install skills
    10. browser.Open() — open dashboard

    Current up flow (up.go:runUp):
    1. config.Resolve() — fails with notInitializedError if no config
    2. startDaemon() or report already running
    3. browser.Open()

    Key insight: config.Resolve() actually succeeds without init — JSONAdapter
    returns zero config on missing file, DefaultsAdapter fills defaults. The
    "not initialized" error is artificial. First-run detection should check
    whether config.json exists in the data directory.

    16 commands reference notInitializedError() — all need updating from
    "kf init" to "kf up".

    The --data-dir flag currently lives on initCmd. It should move to rootCmd
    (persistent flag) or upCmd so it's still accessible.
  acceptance_criteria:
    - "kf up" performs first-time setup if config.json doesn't exist (create dir, analytics prompt, save config, install skills)
    - "kf up" on subsequent runs just starts the daemon (no prompts, no skill install)
    - "kf init" either removed entirely or prints deprecation pointing to "kf up"
    - All error messages say "kf up" instead of "kf init"
    - "--data-dir" flag still works (moved to upCmd or rootCmd)
    - "kf down" works unchanged
    - Existing tests updated and passing
    - Idempotency preserved — "kf up" when already running just reports status
  out_of_scope: |
    - Changing kf down behavior
    - Adding new flags or configuration options
    - Changing the daemon/serve internals
  technical_notes: |
    Approach:
    1. Move --data-dir flag to rootCmd as persistent flag (available to all commands)
    2. Add isFirstRun(dataDir) helper — checks if config.json exists
    3. Rewrite runUp to: resolve config → if first run, do init steps → start daemon
    4. Keep init.go but make it print deprecation message + call runUp
    5. Update notInitializedError() text: "kf init" → "kf up"
    6. Update errhelp_test.go assertions
    7. Update root.go Long description

    First-run detection: check os.Stat(filepath.Join(dataDir, "config.json")).
    If ErrNotExist → first run. This is reliable because init always calls cfg.Save().
