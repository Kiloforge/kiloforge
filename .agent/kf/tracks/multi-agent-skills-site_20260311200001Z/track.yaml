id: multi-agent-skills-site_20260311200001Z
title: "Add agent tool selector to kiloforge.dev skills page"
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: >
    Add a second selector dimension to the skills page install section on
    kiloforge.dev. Users select their agent tool (Claude Code, OpenCode, Amp,
    Codex, Antigravity) AND their platform (macOS/Linux, Windows) to get a
    tailored install command. Commands wipe existing kf-* skills before copying
    to clean up orphans. Also remove kf-reviewer from the skill catalog.
  context: |
    The skills page at kiloforge.dev currently assumes Claude Code and provides
    a simple unix/windows platform toggle. Multiple AI coding agents now support
    the SKILL.md format, each with a different skills directory. Users need to
    select their agent tool to get the correct install command.

    The site is a Next.js static export at ../../kiloforge_site (relative to the
    kiloforge main repo). It uses React 19, Tailwind CSS 4, Framer Motion, and
    lucide-react icons.
  codebase_analysis: |
    Target file: kiloforge_site/src/app/skills/page.tsx (445 lines)

    Current install section (lines 207-271):
    - Platform type: "unix" | "windows"
    - installCommands: Record<Platform, string> — two commands, one per platform
    - Both target ~/.claude/skills/ only
    - No cleanup of existing kf-* directories
    - Uses glass-panel styled <pre> with copy button and CopiedToast animation

    Current UI pattern for platform selector (lines 224-238):
    - Pill-style toggle group with icon + label per option
    - Active state: bg-white/10, white text, border
    - Inactive state: neutral-400 text, transparent border

    Skill catalog (lines 96-155):
    - skillCategories array with 6 categories
    - "Review & Quality" category (line 127) contains kf-reviewer

    Description (line 202):
    - "22 Claude Code skills that turn your terminal..." — needs updating to be agent-agnostic

    Agent tool install directory mapping:
      Claude Code:   ~/.claude/skills/
      OpenCode:      ~/.config/opencode/skills/
      Amp:           ~/.config/amp/skills/
      Codex:         ~/.agents/skills/
      Antigravity:   ~/.gemini/antigravity/skills/

    Windows equivalents use $HOME\ prefix instead of ~/

    Install command pattern (with cleanup):
    Unix:    SKILLS_DIR=<path> && rm -rf "$SKILLS_DIR"/kf-* && git clone --depth 1 https://github.com/Kiloforge/kiloforge-skills.git /tmp/kf-skills && cp -r /tmp/kf-skills/kf-* "$SKILLS_DIR/" && rm -rf /tmp/kf-skills
    Windows: $d="<path>"; Remove-Item "$d\kf-*" -Recurse -Force -EA 0; git clone --depth 1 https://github.com/Kiloforge/kiloforge-skills.git $env:TEMP\kf-skills; Copy-Item $env:TEMP\kf-skills\kf-* $d\ -Recurse; Remove-Item $env:TEMP\kf-skills -Recurse -Force
  acceptance_criteria:
    - Skills page has an agent tool selector with 5 options (Claude Code, OpenCode, Amp, Codex, Antigravity)
    - Agent tool selector is visually separate from the platform (macOS-Linux / Windows) selector
    - Selecting a different agent tool changes the install command's target directory
    - All install commands include a kf-* cleanup step before copying
    - The description text is agent-agnostic (not "Claude Code skills")
    - kf-reviewer is removed from the skill catalog
    - The "Requires Claude Code" text in the install section is updated to list the selected agent tool
    - Copy-to-clipboard works correctly for all agent × platform combinations
  out_of_scope: |
    - Project-scoped installation UI (global install only for now)
    - Backend changes to the kiloforge repo
    - Changes to the install.sh script for the kf binary itself
    - Adding new pages to the site
  technical_notes: |
    Target repo: /Users/benbaldivia/dev-2/kiloforge_site/
    This is NOT in the kiloforge main repo. The developer must work in the
    kiloforge_site directory.

    UI design approach:
    - Add a new state dimension: agentTool (type AgentTool = "claude" | "opencode" | "amp" | "codex" | "antigravity")
    - Create an agent tool selector row ABOVE the platform selector
    - Use the same pill-style toggle pattern but with agent tool icons/labels
    - The install command is computed from the (agentTool, platform) tuple
    - Consider a small info note under the agent selector: "OpenCode and Amp also read from ~/.claude/skills/"

    The page uses Framer Motion for animations and lucide-react for icons.
    Follow existing patterns for new UI elements.
