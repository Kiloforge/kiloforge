id: agent-recovery-be_20260310142300Z
title: Agent startup recovery and replace-agent flow
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Wire RecoveryManager into server startup so agents suspended during shutdown
    come up as "suspended" (paused). Extend the resume API to support all agent
    roles (not just interactive). Add a replace-agent endpoint for when resume
    fails — marks the old agent terminal and spawns a fresh one for the same
    ref/role.
  context: |
    When the orchestrator shuts down (SIGTERM/SIGINT), ShutdownManager correctly
    suspends running agents (SIGINT → wait → SIGKILL). Their status becomes
    "suspended" or "force-killed" in SQLite. However, on restart nothing happens —
    RecoveryManager.RecoverAll() exists but is never called from serve.go.
    
    The resume REST endpoint (POST /api/agents/{id}/resume) currently only works
    for interactive agents — it creates an SDK session with WS bridge. Developer
    and reviewer agents that were suspended have no way to resume from the UI.
    
    When resume fails (session expired, worktree missing), the agent enters
    "resume-failed" status with no recovery path — the user must manually delete
    it and spawn a replacement. There should be a "replace" action that automates
    this: mark old agent terminal, spawn new agent for the same ref/role/worktree.
  codebase_analysis: |
    Key files:
    - backend/internal/adapter/agent/recovery.go — RecoveryManager exists, fully
      implemented with stale detection + resume logic. NOT wired into startup.
    - backend/internal/adapter/cli/serve.go — runServe() creates all stores and
      server but never instantiates or calls RecoveryManager.
    - backend/internal/adapter/rest/server.go:327-339 — ShutdownAll() on exit
      works correctly, marks agents "suspended"/"force-killed".
    - backend/internal/adapter/rest/api_handler.go:621-648 — ResumeAgent handler
      calls h.interSpawner.ResumeAgent() which only returns InteractiveAgent (has
      WS bridge). Developer agents need a different resume path.
    - backend/internal/adapter/agent/spawner.go:626-719 — Spawner.ResumeAgent()
      creates SDK session + WS bridge. Works for any agent with valid SessionID
      but the REST handler is hardcoded to interactive flow.
    - backend/internal/adapter/agent/shutdown.go — ProcessAlive(), signalProcess(),
      killProcess() all work correctly.
    - backend/internal/core/domain/agent.go — AgentStatus constants include
      suspended, force-killed, resume-failed. IsTerminal() correctly excludes
      suspended.
    - backend/api/openapi.yaml — resume endpoint exists but response assumes
      interactive agent. No replace endpoint.
    
    recovery.go bug: Lines 87-89 and 99-101 modify in-memory AgentInfo fields
    (ResumeError) via FindAgent pointer but never call store.Save() per-agent —
    only one Save() at line 130. The SQLite store's FindAgent returns a pointer
    to a cached struct, so the in-memory mutation works, but only if Save() is
    called before any reload. This is fragile.
  acceptance_criteria:
    - On startup, stale agents (running/waiting but PID dead) are marked "suspended"
    - Suspended agents remain paused until user explicitly resumes them
    - Resume API accepts suspended agents of any role (interactive, developer, reviewer)
    - Developer/reviewer resume spawns a one-shot SDK agent (not interactive WS bridge)
    - Replace API marks old agent as terminal and spawns a new agent for same ref/role
    - Replace response includes the new agent's ID
    - ResumeError is persisted correctly in SQLite (not just in-memory)
    - Startup recovery is logged (count of stale agents detected)
  out_of_scope: |
    - Auto-resume on startup (agents always come up paused — user decides)
    - Frontend changes (separate FE track)
    - Swarm-level recovery (swarm controller re-assigning work)
    - Config option for recovery mode (keep it simple: always paused)
  technical_notes: |
    Implementation approach:
    
    1. Wire recovery into serve.go — after creating agentStore and before srv.Run():
       ```go
       rm := agent.NewRecoveryManager(agentStore, nil)
       result := rm.DetectStale()  // New method: only marks stale, no resume
       log.Printf("Recovery: %d stale agents marked suspended", len(result.Marked))
       ```
       Use a new DetectStale() method instead of RecoverAll() — we want paused-on-start
       behavior, not auto-resume.
    
    2. Extend resume endpoint — split ResumeAgent handler into two paths:
       - Interactive: existing flow (SDK session + WS bridge)
       - One-shot (developer/reviewer): call ResumeDeveloper() which uses
         execClaudeResume() to launch claude --resume in background, update PID
         and status. No WS bridge needed.
    
    3. Add replace endpoint — POST /api/agents/{id}/replace:
       - Validate old agent is in terminal/resume-failed state
       - Extract ref (track ID), role, worktree_dir, model from old agent
       - Mark old agent status to "replaced" (new terminal status)
       - Spawn new agent with same parameters
       - Return new agent in response
    
    4. Fix ResumeError persistence — add explicit field update in SQLite store
       rather than relying on in-memory pointer mutation.
    
    5. OpenAPI schema changes:
       - Add POST /api/agents/{id}/replace endpoint
       - Add "replaced" to status enum
       - Update resume endpoint description to clarify all-role support
