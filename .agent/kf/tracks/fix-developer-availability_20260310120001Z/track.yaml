id: fix-developer-availability_20260310120001Z
title: "Fix track availability detection — CLI branch awareness + skill updates"
type: chore
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Fix bug where tracks show as "available" when already claimed by workers
    on implementation branches. Updates kf-track CLI to cross-reference git
    branches, fixes worker-* naming convention in kf-developer skill, and
    syncs both embedded and global copies.
  context: |
    When developers check track availability (via kf-track list, kf-status,
    or kf-dispatch), tracks appear as "AVAILABLE" even when another worker
    has already created an implementation branch (e.g., feature/{trackId}).

    Root cause: kf-track list reads only tracks.yaml status field. The
    developer skill never updates status to "in-progress" when claiming.
    The claim check (branch scanning) only runs when a specific track ID
    is provided for claiming — not during listing.

    Additionally, the kf-developer skill references "developer-*" worktree
    naming but actual worktrees use "worker-*" naming convention.

    Live example: worker-2 is on feature/quota-gauges-be_20260310092417Z
    and worker-4 is on feature/reliability-metrics-be_20260310093038Z,
    but both tracks show as "pending" in tracks.yaml and "AVAILABLE" in
    kf-track list output.
  codebase_analysis: |
    Key files:
    - .agent/kf/bin/kf-track — Shell script CLI, ~2000 lines
      - cmd_list (lines ~502-661): filters by status, no branch check
      - cmd_status (lines ~1551-2020): shows AVAILABLE/CLAIMED based on
        tracks.yaml status only
    - backend/internal/adapter/skills/embedded/kf-developer/SKILL.md — embedded copy
    - ~/.claude/skills/kf-developer/SKILL.md — global copy
    - Both copies are currently identical (658 lines)

    The kf-track script is a bash script that parses tracks.yaml (YAML)
    and deps.yaml. It has no git branch awareness currently.

    The developer skill Step 3.2 already does branch scanning for claim
    validation of a specific track — this logic needs to be extracted
    and made available to the list/status commands.
  acceptance_criteria:
    - kf-track list --active shows "claimed" status for tracks with existing implementation branches
    - kf-track list --unclaimed filters out claimed tracks
    - kf-track status shows "CLAIMED (by worker-N)" instead of "AVAILABLE" for claimed tracks
    - Dual-mode detection — uses server claim API when orchestrator is running, falls back to git branch scanning
    - kf-developer SKILL.md uses worker-* naming convention (not developer-*)
    - Both embedded and global copies of kf-developer SKILL.md are identical after update
    - kf-dispatch output correctly excludes claimed tracks from available list
  out_of_scope: |
    - Server-side claim API (handled by track-claim-api track)
    - Dashboard UI changes
    - Changes to kf-architect or kf-reviewer skills
  technical_notes: |
    Branch scanning approach (fallback mode):
    Run `git branch --list 'feature/*' 'bug/*' 'chore/*' 'refactor/*'`
    and extract track IDs from branch names. Cross-reference against
    active tracks to mark as "claimed".

    Server mode (when orchestrator running):
    Query GET /api/tracks with claim status enrichment. The server
    returns claimed_by info from the lock manager.

    Detection: Try server first (curl with 1s timeout to KF_ORCH_URL),
    fall back to branch scanning if unreachable.

    Skill naming fix: Replace all instances of "developer-*",
    "developer-1", "developer-2", "developer-3" with "worker-*",
    "worker-1", "worker-2", "worker-3" respectively. Both in the
    worktree convention section and throughout the document.
