id: queue-project-scope-fe_20260310050001Z
title: "Work queue project scoping — dual views (project-scoped and global) in dashboard"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: Show project-scoped queue on the project page and global queue on the overview page. Pass project slug when starting queue from project context. Reuse existing QueuePanel component for both views.
  context: |
    The work queue frontend (work-queue-fe) is completed with a QueuePanel on the OverviewPage.
    Currently it shows global queue status (all projects mixed together). After the BE track adds
    project filtering via ?project= query param, the frontend needs to:
    1. Show project-scoped queue when viewing a specific project
    2. Show global queue on the overview page
    3. Pass project slug when starting the queue from a project context
  codebase_analysis: |
    ### QueuePanel (components/QueuePanel.tsx)
    - Stateless component receiving QueueStatus props + callbacks
    - Already displays items, active workers, start/stop, max workers
    - No project awareness — just renders whatever data it gets
    - Can be reused as-is for both views (data filtering happens in the hook)

    ### useQueue hook (hooks/useQueue.ts)
    - Fetches from /api/queue with no project filter
    - start() accepts optional project?: string but callers don't pass it
    - handleQueueUpdate handles SSE queue events
    - Need: accept optional projectSlug param to filter queries

    ### OverviewPage (pages/OverviewPage.tsx)
    - Already integrates QueuePanel with global data
    - Should continue showing global view (no changes needed)

    ### ProjectPage (pages/ProjectPage.tsx)
    - Currently has no queue panel
    - Should add QueuePanel with project-scoped data
    - Start button should pass project slug

    ### API types (types/api.ts)
    - QueueStatus, QueueItem, QueueSettings already defined
    - No changes needed to types
  acceptance_criteria:
    - OverviewPage shows global queue (all projects, as today)
    - ProjectPage shows project-scoped queue filtered to that project's items
    - Starting queue from ProjectPage passes the project slug to POST /api/queue/start
    - Starting queue from OverviewPage starts globally (no project filter)
    - QueuePanel component reused for both views without modification
    - SSE updates correctly refresh the appropriate view (global or project-scoped)
  out_of_scope: |
    - Backend API changes (handled by BE track)
    - Per-project queue settings (max_workers is global)
    - Queue history or completed items view
    - Project selector dropdown on the queue panel
  technical_notes: |
    ### useQueue hook changes

    Accept optional projectSlug parameter:
    ```typescript
    function useQueue(projectSlug?: string): UseQueueResult {
      const { data } = useQuery({
        queryKey: projectSlug ? ['queue', projectSlug] : ['queue'],
        queryFn: () => fetcher<QueueStatus>(
          projectSlug ? `/api/queue?project=${projectSlug}` : '/api/queue'
        ),
      });

      const start = async (project?: string) => {
        await startMutation.mutateAsync(project ?? projectSlug);
      };
      // ...
    }
    ```

    ### ProjectPage integration

    Add QueuePanel to ProjectPage, passing the slug:
    ```typescript
    const { queue, loading, start, stop, ... } = useQueue(project.slug);
    // render QueuePanel with these props
    ```

    ### SSE handling

    The handleQueueUpdate callback should invalidate the correct query key.
    When project-scoped, invalidate ['queue', slug]. When global, invalidate ['queue'].
    Both should invalidate on queue events since a project event affects the global view too.
