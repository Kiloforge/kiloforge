spec:
  summary: Update the dashboard's interactive agent terminal to display structured output from the enriched WebSocket protocol — tool calls, thinking blocks, text content, and turn boundaries instead of flat raw text.
  context: "The backend track (`sdk-agent-migration-be_20260310014147Z`) migrates the agent spawner to the Claude Agent SDK and enriches the WebSocket protocol with structured message types: `turn_start`, `text`, `tool_use`, `thinking`, `turn_end`, and `system`. The frontend currently displays all agent output as flat text strings via the `output` message type. This track updates the frontend to render the structured messages with appropriate visual treatment."
  codebase_analysis: |
    - **`frontend/src/hooks/useAgentWebSocket.ts`**: Currently handles 4 message types (`output`, `input`, `status`, `error`). Needs to handle new types and store structured message data.
    - **`frontend/src/components/AgentTerminal.tsx`**: Modal terminal component with `MessageBubble` that renders text with basic markdown code formatting. Needs new bubble types for tool calls, thinking blocks, and turn boundaries.
    - **`frontend/src/components/AgentTerminal.module.css`**: Styling for terminal — needs new styles for tool use blocks, thinking blocks, turn separators.
    - **`frontend/src/pages/AgentDetailPage.tsx`**: Has inline terminal with duplicate `TerminalBubble` — should share components with AgentTerminal.
  acceptance_criteria:
    - WebSocket hook handles new message types: `turn_start`, `text`, `tool_use`, `thinking`, `turn_end`, `system`
    - Text messages render as before (markdown code formatting preserved)
    - Tool use messages display tool name, collapsible input JSON
    - Thinking blocks display in a distinct visual style (muted/italic, collapsible)
    - Turn boundaries shown as visual separators with turn number
    - Turn end shows cost/usage summary (tokens, cost USD) if available
    - System messages (warnings, errors) display with appropriate severity styling
    - Backward compatible: still handles legacy `output` messages from older backend
    - AgentDetailPage shares terminal components (no duplicate rendering logic)
  out_of_scope: |
    - Backend agent spawner changes (separate track)
    - Tool result display (would require backend to forward tool results — future enhancement)
    - Streaming text deltas (SDK StreamEvent — future enhancement for real-time character-by-character display)
  technical_notes: |
    ### New WSMessage Structure
    
    Extend the `WSMessage` type to carry structured data:
    ```typescript
    type WSMessage = {
      type: 'input' | 'text' | 'tool_use' | 'thinking' | 'turn_start' | 'turn_end' | 'system' | 'status' | 'error' | 'output';
      text?: string;
      timestamp: number;
      // Structured fields
      turnId?: string;
      toolName?: string;
      toolId?: string;
      toolInput?: Record<string, unknown>;
      thinking?: string;
      costUsd?: number;
      usage?: { input_tokens: number; output_tokens: number; cache_read_tokens: number; cache_creation_tokens: number };
      subtype?: string;
      data?: Record<string, unknown>;
    };
    ```
    
    ### Component Architecture
    
    - `TurnSeparator` — horizontal rule with turn number
    - `TextBubble` — existing text rendering (reused)
    - `ToolUseBubble` — tool name badge + collapsible JSON input
    - `ThinkingBubble` — muted italic block, collapsible
    - `TurnEndSummary` — inline cost/token summary after turn separator
    - `SystemBubble` — warning/error/info with severity icon
    
    ### Backward Compatibility
    
    Legacy `output` messages are treated as `text` messages for rendering. The hook maps `output` → `text` internally so old backends still work.
    
    ---
