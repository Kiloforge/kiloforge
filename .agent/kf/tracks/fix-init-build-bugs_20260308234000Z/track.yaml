id: fix-init-build-bugs_20260308234000Z
title: Fix Init Ctrl+C, Build Failure Propagation, and VCS Stamping
type: bug
status: complete
created: 2026-03-08T23:40:00Z
updated: 2026-03-08T23:40:00Z
spec:
  summary: "Fix three related bugs: (1) Ctrl+C doesn't cancel `kf init` when blocked on `fmt.Scanln()`, (2) frontend build failures don't stop the overall build, and (3) backend build fails due to VCS stamping in worktree setup."
  context: "Users cannot cleanly interrupt `kf init` with Ctrl+C if it reaches an interactive prompt (e.g., skills install). The build system has two issues: frontend build failures are silently ignored (a stub HTML placeholder masks the problem), and backend builds fail in worktree setups because Go's VCS stamping can't find git tags."
  codebase_analysis: |
    ### Bug 1: Ctrl+C blocked during init
    
    - **`cli/init.go:51-52`** — correctly sets up `signal.NotifyContext` for cancellation
    - **`cli/init.go:169`** — calls `offerSkillsInstall(cfg)` **without passing context**
    - **`cli/skills.go:157-202`** — `offerSkillsInstall()` uses `fmt.Scanln()` which blocks the goroutine indefinitely, ignoring context cancellation
    - The signal is caught but the blocking `Scanln` prevents the command from exiting
    - All other init operations (`manager.Start`, `manager.Configure`, `registerSSHKey`) correctly receive and respect context
    
    ### Bug 2: Frontend build failure ignored
    
    - **`Makefile:15`** — `build: build-frontend build-backend` — if `build-frontend` fails, make continues
    - **`Makefile` `ensure-dist` target** — creates a stub `index.html` placeholder so the backend embeds successfully even without a real frontend build
    - **`dashboard/embed.go`** — embeds whatever is in `dist/`, including the stub
    - Result: users get a binary with a broken dashboard showing "Frontend not built" instead of a build error
    
    ### Bug 3: VCS stamping failure
    
    - **`Makefile:22`** — `cd backend && go build -o ../$(BINARY) ./cmd/kiloforge` — no `-buildvcs=false`
    - In worktree setups (bare repo + worktrees), `git describe --tags` fails with exit 128 (no tags)
    - Go 1.18+ enables VCS stamping by default, which queries git and fails
  acceptance_criteria:
    - Ctrl+C cleanly cancels `kf init` at any point, including during interactive prompts
    - `offerSkillsInstall()` receives context and uses context-aware input reading (not bare `fmt.Scanln`)
    - `make build` fails immediately if `build-frontend` fails — no fallback to stub HTML
    - `ensure-dist` target removed or only used for `make build-backend` (dev convenience), not for `make build`
    - `make build` passes `-buildvcs=false` to avoid VCS stamping failures in worktree setups
    - All three bugs have regression tests or are verified manually
  out_of_scope: |
    - Refactoring the entire init flow
    - Adding git tags for VCS versioning (can be done later)
    - Frontend build error diagnosis (separate from propagation fix)
  technical_notes: |
    **Bug 1 fix — context-aware input:**
    ```go
    func offerSkillsInstall(ctx context.Context, cfg *config.Config) {
        ch := make(chan string, 1)
        go func() {
            var answer string
            fmt.Scanln(&answer)
            ch <- answer
        }()
        select {
        case <-ctx.Done():
            fmt.Println("\nCancelled.")
            return
        case answer := <-ch:
            // process answer
        }
    }
    ```
    
    **Bug 2 fix — Makefile:**
    ```makefile
    build:
    	$(MAKE) build-frontend && $(MAKE) build-backend
    ```
    
    **Bug 3 fix — Makefile:**
    ```makefile
    build-backend: ensure-dist
    	cd backend && go build -buildvcs=false -o ../$(BINARY) ./cmd/kiloforge
    ```
    
