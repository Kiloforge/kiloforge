        done: true
  - phase: Update backend role mapping
    tasks:
      - text: Update domain/agent.go: rename AgentRoleAdvisor and add new advisor role constants
        done: true
      - text: Update checker.go RequiredSkillsForRole for advisor-product and advisor-reliability roles
        done: true
      - text: Update checker.go SkillCommandForRole for new advisor role → /kf-advisor-* mapping
        done: true
      - text: Update checker.go AllRequiredSkills to iterate new advisor role names
        done: true
      - text: Update openapi.yaml SpawnInteractiveRequest.role enum: replace product-advisor with advisor-product, add advisor-reliability
        done: true
      - text: Run make generate to regenerate server.gen.go and client.gen.go
        done: true
  - phase: Tests and verification
    tasks:
      - text: Update checker_test.go: TestRequiredSkillsForRole, TestSkillCommandForRole, TestAllRequiredSkills for new role names
        done: true
      - text: Update any other test files referencing old role names (e2e, api_handler tests)
        done: true
      - text: Run make build and make test — verify all pass
        done: true
