id: posthog-analytics_20260310214100Z
title: Activate PostHog analytics with real API key and frontend SDK
type: feature
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Replace the placeholder PostHog API key in defaults.go with the real project key,
    add posthog-js to the frontend with core page view and event tracking, instrument
    key backend lifecycle events, and verify events flow to the PostHog dashboard.
  context: |
    The backend analytics infrastructure is already built:
    - backend/internal/adapter/analytics/posthog.go — async event tracker with buffered sender
    - backend/internal/adapter/analytics/noop.go — no-op fallback when disabled
    - backend/internal/adapter/analytics/identity.go — anonymous ID (SHA-256 of hostname+dataDir)
    - backend/internal/adapter/analytics/defaults.go — placeholder key "phc_kiloforge_placeholder"
    - Config reads KF_POSTHOG_API_KEY env var or posthog_api_key from config.json
    - KF_ANALYTICS_ENABLED env var controls opt-in/opt-out (default: enabled)
    
    Backend already tracks these events:
    - "cli_command" in root.go PersistentPreRun (covers "kf up" → cli_command with command="up")
    - "project_added" in api_handler.go
    - "app_started" in serve.go
    
    The spawner already has a trackEvent() helper (spawner.go ~line 212) that checks
    for nil analytics and fires events. SpawnDeveloper and SpawnReviewer already call
    trackEvent("agent_spawned", ...). SpawnInteractive is missing this call.
    
    CRITICAL: Events must fire regardless of entry point (CLI, REST API, queue service,
    board lifecycle). Place analytics at the service/adapter layer, NOT at handler level.
    
    Existing event infrastructure at service layer:
    - queue_service.go already publishes "track_completed" via event bus (line 410)
    - lifecycle_service.go handles HandleRejection() (line 62) — no analytics yet
    - track_reader.go RemoveTrack() (line 289) — no analytics yet
    
    User-requested events to track (priority):
    - "app_started" — kf up / server start (already exists)
    - "agent_session_started" — when any agent session begins (spawner layer)
    - "agent_session_resumed" — when an agent session is resumed (spawner layer)
    - "track_created" — when a track is registered (any path)
    - "track_completed" — when a track is marked complete (any path)
    - "track_rejected" — when a track is rejected/deleted (any path)
    
    Frontend has zero analytics — no PostHog SDK, no page tracking, no event tracking.
  codebase_analysis: |
    Analytics insertion points (service/adapter layer for all-entry-point coverage):
    
    Agent events (adapter/agent/spawner.go — already has trackEvent() helper):
    - SpawnDeveloper (line 384): already fires "agent_spawned" ✓
    - SpawnReviewer (line 299): already fires "agent_spawned" ✓
    - SpawnInteractive (~line 550): MISSING — add "agent_spawned"
    - ResumeDeveloper (line 728): MISSING — add "agent_session_resumed"
    - ResumeAgent (line 811): MISSING — add "agent_session_resumed"
    
    Track events (need analytics wired into service layer):
    - track_created: No single Go backend path creates tracks in all cases.
      Tracks are created via Python kf-track CLI and via REST seed endpoint.
      Best insertion: REST API POST /api/tracks/seed (track_seed.go:106) and
      wherever the board adds a new card (board_service.go). Also consider the
      kf SDK client.AddTrack() in pkg/kf/client.go:90 as the lowest common point.
    - track_completed: queue_service.OnAgentComplete() line 410 already publishes
      event bus "track_completed". Wire PostHog analytics to the same path, or
      add to board_service MoveCard when target column is "done".
    - track_rejected: lifecycle_service.HandleRejection() line 62 and
      track_reader.RemoveTrack() line 289 — add analytics to both.
    
    Frontend:
    - frontend/src/main.tsx — React entry point, add PostHog provider
    - frontend/package.json — add posthog-js dependency
    - backend/internal/adapter/analytics/defaults.go — replace placeholder key
  acceptance_criteria:
    - defaults.go contains a real PostHog project API key (not placeholder)
    - posthog-js is installed in the frontend
    - Frontend initializes PostHog in main.tsx with the same project key
    - Frontend tracks page views on route changes
    - Events appear in the PostHog dashboard when running locally
    - Backend fires agent_session_started for ALL spawn paths (developer, reviewer, interactive)
    - Backend fires agent_session_resumed for ALL resume paths (ResumeDeveloper, ResumeAgent)
    - Backend fires track_created, track_completed, track_rejected at the service/adapter layer
    - Analytics can be disabled via KF_ANALYTICS_ENABLED=false
  out_of_scope: |
    - User-facing analytics opt-in/opt-out UI (config/env var is sufficient)
    - Self-hosted PostHog setup
    - Comprehensive frontend event instrumentation beyond page views
  technical_notes: |
    The user will provide the PostHog project API key (phc_...). The developer should:
    1. Update defaults.go with the real key
    2. Ensure all spawn/resume paths in spawner.go fire analytics events
    3. Wire analytics tracker into service layer (queue_service, lifecycle_service,
       track_reader) so track lifecycle events fire from any entry point
    4. Add posthog-js to frontend, init in main.tsx
    5. Add automatic page view tracking via React Router
    6. Test locally that events reach PostHog cloud
