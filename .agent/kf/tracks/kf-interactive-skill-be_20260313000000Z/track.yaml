id: kf-interactive-skill-be_20260313000000Z
title: Create kf-interactive embedded skill for general-purpose kf-aware agents
type: feature
status: pending
created: 2026-03-13
updated: 2026-03-13
spec:
  summary: |
    Create a new embedded skill "kf-interactive" that gives agents full
    kf-system awareness (tracks, product context, project structure) while
    acting as a general-purpose interactive assistant. Wire it into the
    backend role/skill mapping.
  context: |
    Currently, interactive agents launched from the dashboard use the
    "architect" role, which forces the kf-architect workflow (track
    generation). Users want a general-purpose agent that understands the
    kf system (can read tracks, check status, navigate the project) but
    responds freely to any user request — code changes, questions, debugging,
    etc. — without being locked into a specific skill workflow.

    The "interactive" role already exists in the backend but currently maps
    to requiring `kf-architect` skill and has no skill command prefix. It
    needs its own dedicated skill that loads kf context without imposing a
    specific workflow.
  codebase_analysis: |
    **Skills system** (`backend/internal/adapter/skills/`):
    - `checker.go` defines `RequiredSkillsForRole()` and `SkillCommandForRole()`
    - "interactive" role currently requires `kf-architect` (line 73-76)
    - `SkillCommandForRole("interactive")` returns "" — no skill prefix
    - `AllRequiredSkills()` iterates known roles including "interactive"
    - Embedded skills live in `backend/internal/adapter/skills/embedded/{name}/SKILL.md`
    - Skills use YAML frontmatter (name, description, metadata)

    **Role definitions** (`backend/internal/core/domain/agent.go`):
    - No `AgentRoleInteractive` constant exists — "interactive" is used as a
      string literal in the API handler
    - `IsAdvisorRole()` and `IsWorkerRole()` don't cover "interactive"

    **API handler** (`backend/internal/adapter/rest/api_handler.go`):
    - `SpawnInteractiveAgent` defaults role to "interactive" (line ~470)
    - Prepends skill command via `SkillCommandForRole(role)` (line ~493)
    - Currently, interactive gets no prefix — user prompt goes raw

    **OpenAPI spec** (`backend/api/openapi.yaml`):
    - SpawnInteractiveRequest role enum: [interactive, architect, advisor-product, advisor-reliability]
    - No changes needed — "interactive" is already in the enum

    **Existing skill pattern** (e.g., `kf-architect/SKILL.md`):
    - YAML frontmatter: name, description, metadata.argument-hint
    - Markdown body with instructions
    - Skills load project context: product.md, tech-stack.md, tracks.yaml, etc.
  acceptance_criteria:
    - New embedded skill `kf-interactive` exists at `backend/internal/adapter/skills/embedded/kf-interactive/SKILL.md`
    - Skill instructs the agent to load kf project context (product.md, tech-stack.md, tracks, etc.)
    - Skill does NOT impose a specific workflow — agent responds freely to any request
    - Skill mentions available kf commands the agent can use (/kf-status, /kf-architect, etc.)
    - `RequiredSkillsForRole("interactive")` returns `kf-interactive` instead of `kf-architect`
    - `SkillCommandForRole("interactive")` returns `/kf-interactive`
    - Backend tests pass — existing agent spawn flow works with new skill
    - `make build` succeeds with embedded skill
  out_of_scope: |
    - Frontend changes (separate track)
    - Changes to developer/reviewer/architect role flows
    - New API endpoints
    - Changes to OpenAPI spec (interactive role already exists)
  technical_notes: |
    **Skill content approach:**
    The kf-interactive skill should be lightweight — it's not a multi-phase
    workflow like kf-architect. It should:

    1. Load project context on first invocation:
       - `.agent/kf/product.md` (product description)
       - `.agent/kf/tech-stack.md` (technology stack)
       - `.agent/kf/tracks.yaml` (track registry, via `kf-track list`)
       - `.agent/kf/workflow.md` (if exists)

    2. Tell the agent it can use kf CLI tools:
       - `.agent/kf/bin/kf-track` for track queries
       - `.agent/kf/bin/kf-track-content` for reading track specs/plans
       - Standard skills via slash commands: /kf-status, /kf-architect, etc.

    3. Instruct the agent to respond freely — it's a general-purpose
       assistant that happens to know about the project's kf context.
       It should NOT automatically run a workflow.

    **Role mapping changes in checker.go:**
    ```go
    case "interactive":
      return []RequiredSkill{
        {Name: "kf-interactive", Reason: "required for interactive agent spawning"},
      }
    ```

    ```go
    case "interactive":
      return "/kf-interactive"
    ```

    **Domain constant (optional):**
    Add `AgentRoleInteractive AgentRole = "interactive"` to domain/agent.go
    for consistency with other role constants.
