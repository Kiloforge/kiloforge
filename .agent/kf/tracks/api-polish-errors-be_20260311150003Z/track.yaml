id: api-polish-errors-be_20260311150003Z
title: "API polish — structured error responses, status code consistency, and request logging"
type: chore
status: pending
created: 2026-03-11
updated: 2026-03-11
spec:
  summary: |
    Improve REST API error handling with consistent status codes, add structured request
    logging middleware, and enhance the health endpoint with readiness checks.
  context: |
    The REST API returns generic error messages ("internal server error", "failed to
    load agent state") without distinguishing error types. Some handlers return 400 for
    conditions that should be 404 or 409. There is no request logging middleware. The
    health endpoint only returns OK without checking subsystem health.
  codebase_analysis: |
    Error handling issues in backend/internal/adapter/rest/api_handler.go:
    - Line 1436: MoveCard returns 400 for all errors (should be 404 for not found, 409 for invalid move)
    - Line 1470: SyncBoard returns 400 for project not found (should be 404)
    - Line 365, 378: Generic "failed to load" without logging root cause
    - Line 653: os.Remove error silently swallowed (should log)

    Health endpoint (lines 173-183):
    - Only returns {status: "ok"} — no database, Gitea, or quota checks
    - No distinction between liveness and readiness

    Missing request logging:
    - backend/internal/adapter/rest/server.go line 149 has basic logger
    - No middleware logging request method, path, status code, duration

    Shutdown concerns:
    - backend/internal/adapter/rest/server.go line 305 uses context.Background() instead of provided ctx
    - ShutdownTimeout hardcoded at 10s (line 317)
  acceptance_criteria:
    - Error responses use appropriate HTTP status codes (404 for not found, 409 for conflict, 422 for validation)
    - All handler errors are logged with context before returning to client
    - Request logging middleware logs method, path, status code, and duration for every request
    - Health endpoint checks database connectivity
    - Suppressed errors (os.Remove, etc.) are logged at warn level
    - Shutdown uses provided context, not Background()
  out_of_scope: |
    - Adding PATCH endpoints or new API routes
    - Changing the OpenAPI schema (status code changes are implementation-only)
    - Rate limiting headers
    - CLI output improvements (separate track)
  technical_notes: |
    Approach:
    1. Create error classification helper: mapServiceError(err) -> (statusCode, message)
    2. Add Fiber middleware for request logging using slog
    3. Audit api_handler.go for incorrect status codes and fix
    4. Add database ping to health check
    5. Fix shutdown to use provided context
plan:
  - phase: "Error Classification"
    tasks:
      - text: Create error mapping helper in rest package — classify service errors to appropriate HTTP status codes (404, 409, 422, 500)
        done: false
      - text: Audit and fix status codes in api_handler.go — MoveCard, SyncBoard, and other handlers returning generic 400
        done: false
  - phase: "Logging"
    tasks:
      - text: Add request logging middleware to Fiber — log method, path, status code, and duration using slog
        done: false
      - text: Add error logging to handlers that currently swallow errors (os.Remove, silent failures)
        done: false
  - phase: "Health & Shutdown"
    tasks:
      - text: Enhance health endpoint to check database connectivity (SQLite ping)
        done: false
      - text: Fix shutdown to use provided context instead of context.Background()
        done: false
  - phase: "Verification"
    tasks:
      - text: Run make test and make build
        done: false
extra: {}
