id: fix-consent-zindex-fe_20260311230000Z
title: Fix ConsentDialog z-index — render above other modals
type: bug
status: pending
created: 2026-03-11
updated: 2026-03-10
spec:
  summary: |
    Bump ConsentDialog overlay z-index from 100 to 110 so the dangerous-permissions
    notice always renders above SetupRequiredDialog and SkillsInstallDialog.
  context: |
    When starting a new project, the ConsentDialog (dangerous permission notice)
    can appear behind the SetupRequiredDialog ("Run Setup" modal). Clicking outside
    the setup modal closes it before the consent dialog can be interacted with.
    All dialogs share z-index: 100, so DOM render order determines stacking.
  codebase_analysis: |
    All dialog overlays use z-index: 100:
    - ConsentDialog.module.css .overlay — z-index: 100 (also used by SetupRequiredDialog, SkillsInstallDialog)
    - AgentLauncher.module.css .overlay — z-index: 100
    - ConfirmDialog.module.css .overlay — z-index: 100
    - RemoveProjectDialog.module.css .overlay — z-index: 100
    
    ConsentDialog is a permission gate — it MUST be interactable before any other
    dialog. In ProjectPage.tsx (lines 437-456), ConsentDialog, SkillsInstallDialog,
    and SetupRequiredDialog can all be visible simultaneously.
    
    Current z-index hierarchy: header=50, terminalDock=90, dialogs=100, fullscreen=200, tour=10000, toast=11000.
  acceptance_criteria:
    - ConsentDialog renders above SetupRequiredDialog and SkillsInstallDialog
    - ConsentDialog renders above AgentLauncher
    - Other dialogs (ConfirmDialog, RemoveProjectDialog) unchanged at z-index 100
    - No visual regression in non-overlapping dialog scenarios
  out_of_scope: |
    - Full modal manager/provider system
    - Dialog queuing logic
    - Changing dialog rendering order in component tree
  technical_notes: |
    Simple fix: bump ConsentDialog.module.css .overlay z-index from 100 to 110.
    Since SetupRequiredDialog and SkillsInstallDialog import ConsentDialog.module.css
    styles, verify they have their own overlay classes or share the same one.
    If they share the same CSS module, need to add a separate higher-z overlay
    class for ConsentDialog specifically.
plan:
  - phase: Fix
    tasks:
      - text: Check if ConsentDialog, SetupRequiredDialog, and SkillsInstallDialog share the same CSS module or have separate overlay classes
        done: true
      - text: Add a .consentOverlay class at z-index 110 in ConsentDialog.module.css (or bump .overlay if only ConsentDialog uses it)
        done: true
      - text: Apply the higher-z class to ConsentDialog.tsx overlay element
        done: true
  - phase: Verification
    tasks:
