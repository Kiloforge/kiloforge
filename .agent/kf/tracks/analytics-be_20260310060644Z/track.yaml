id: analytics-be_20260310060644Z
title: "PostHog product analytics — backend integration"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Add server-side PostHog product telemetry with opt-out support during init,
    config toggle, and instrumented domain events (agent lifecycle, project, track).
  context: |
    As the software owner, we need visibility into how kiloforge is used in the wild —
    which features are adopted, how many agents are spawned, session durations, etc.
    PostHog's free tier (1M events/month) provides this via a simple HTTP capture API.
    Since kiloforge runs on localhost, client-side JS analytics won't work reliably —
    all telemetry must be sent server-side from the Go backend.

    Users must be able to opt out during `kiloforge init` and toggle analytics on/off
    via the config system (JSON, env var, or API). Analytics is enabled by default.
  codebase_analysis: |
    Config system (backend/internal/adapter/config/):
    - Config struct at config.go:13-35 uses *bool pointers for optional booleans
    - Provider chain: defaults → JSON → env → flags (config.go:79-114)
    - EnvAdapter reads KF_* vars (env_adapter.go:11-44)
    - JSON save strips sensitive fields (json_adapter.go:40-48)
    - Existing pattern: DashboardEnabled *bool, QueueEnabled *bool

    Init flow (backend/internal/adapter/cli/init.go):
    - Non-interactive except SSH key selection (prompt.go:18-66)
    - Integration point: after line 138 (before SSH key registration)
    - Interactive prompt pattern in prompt.go uses bufio.Scanner

    Service wiring (backend/internal/adapter/cli/serve.go):
    - Stores and services created at lines 73-119
    - REST server options built at lines 100-107
    - Integration point: after consent store (line 115)

    Config API (backend/api/openapi.yaml):
    - GET/PUT /api/config already exists (lines 1012-1050)
    - Handler at api_handler.go:217-248 returns/updates DashboardEnabled
    - Extend ConfigResponse and UpdateConfigRequest schemas

    Event bus (backend/internal/core/port/event_bus.go):
    - Publish/Subscribe pattern, used by dashboard watcher
    - Event types in domain/events.go (agent_update, project_update, etc.)

    Agent lifecycle (backend/internal/adapter/agent/spawner.go):
    - Span events: agent.spawned (line 206), agent.failed/completed (lines 309-315)
    - CompletionCallback fired at line 323
    - Session end at monitorSDKSession (lines 607-633)
  acceptance_criteria:
    - PostHog events are sent server-side via HTTP POST to /capture endpoint
    - Analytics is enabled by default; users can opt out during `kiloforge init`
    - Config field `AnalyticsEnabled *bool` with env var KF_ANALYTICS_ENABLED
    - GET/PUT /api/config includes analyticsEnabled field
    - Anonymous device ID (hashed machine identifier, no PII)
    - Events captured — agent_spawned, agent_completed, project_added, track_completed, cli_command
    - When analytics is disabled, no HTTP calls are made to PostHog
    - PostHog API key is configurable but ships with a default (public write-only key)
    - All telemetry calls are fire-and-forget (never block user operations)
  out_of_scope: |
    - Frontend analytics UI/dashboard (separate FE track)
    - Client-side JS tracking
    - User identification or PII collection
    - Self-hosted PostHog deployment
    - Detailed per-request HTTP analytics (page views, etc.)
  technical_notes: |
    PostHog HTTP API: POST https://us.i.posthog.com/capture with JSON body:
      { "api_key": "phc_...", "event": "event_name", "distinct_id": "anon-id", "properties": {...} }

    Anonymous ID: SHA-256 hash of (hostname + data dir path). Stable per machine,
    not reversible, no PII. Stored nowhere — computed on startup.

    Architecture:
    - New port: port.AnalyticsTracker interface { Track(event string, props map[string]any) }
    - New adapter: adapter/analytics/posthog.go (HTTP client implementation)
    - Noop adapter when disabled: adapter/analytics/noop.go
    - Service decides which adapter based on config at startup
    - Fire-and-forget: use a buffered channel + background goroutine for sends
    - Graceful shutdown: drain buffer on context cancellation (with timeout)

    Config changes:
    - Add AnalyticsEnabled *bool to Config struct (default true via defaults.go)
    - Add PostHogAPIKey string (default: embedded public write key)
    - Env var: KF_ANALYTICS_ENABLED, KF_POSTHOG_API_KEY

    Init prompt: "Help improve kiloforge by sending anonymous usage data? (Y/n)"
    - Default yes (just press enter)
    - Saves to config.json
