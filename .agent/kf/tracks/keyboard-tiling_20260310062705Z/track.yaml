id: keyboard-tiling_20260310062705Z
title: "Keyboard shortcuts for window tiling and arrangement"
type: feature
status: pending
created: 2026-03-10
updated: 2026-03-10
spec:
  summary: |
    Add keyboard shortcuts for tiling, minimizing, maximizing, and cycling
    between open agent terminal windows, enabling efficient multi-agent
    workflow without mouse interaction.
  context: |
    With multiple draggable/resizable agent windows open simultaneously (from
    Tracks 1 and 2), users need quick keyboard-driven ways to arrange them.
    Manual drag/resize is tedious when you want a standard layout like
    side-by-side or quad-tile. Keyboard shortcuts provide instant tiling.
  codebase_analysis: |
    **Current keyboard handling:**
    - AgentTerminal: Cmd/Ctrl+Enter to send, Shift+Enter for newline, ESC to close
    - AgentLauncher: Cmd/Ctrl+Enter to submit
    - No global keyboard shortcut system exists
    - No useHotkeys or similar hook

    **After Tracks 1 & 2:**
    - useFloatingWindow hook manages position/size per window
    - useWindowManager tracks all open windows with z-index
    - Each window has agentId as unique key

    **Key files to create/modify:**
    - New: frontend/src/hooks/useKeyboardShortcuts.ts — global shortcut handler
    - Modify: frontend/src/pages/App.tsx — register shortcuts
    - Modify: useWindowManager — add tile/minimize/maximize methods
    - New: frontend/src/components/ShortcutHelp.tsx — help overlay (Cmd+?)
  acceptance_criteria:
    - "Cmd/Ctrl+Shift+T: Tile all open windows evenly (auto-detect best layout: 2=side-by-side, 3=one-left-two-right, 4=quad)"
    - "Cmd/Ctrl+Shift+]: Cycle focus to next window"
    - "Cmd/Ctrl+Shift+[: Cycle focus to previous window"
    - "Cmd/Ctrl+Shift+M: Minimize/restore focused window"
    - "Cmd/Ctrl+Shift+F: Maximize/restore focused window (fill viewport)"
    - "Cmd/Ctrl+Shift+W: Close focused window"
    - "Cmd/Ctrl+Shift+Left/Right: Snap focused window to left/right half"
    - "Cmd/Ctrl+?: Show keyboard shortcuts help overlay"
    - Shortcuts do not fire when a textarea/input has focus (except window-level ones)
    - Shortcuts are discoverable via a help overlay
    - Tiling preserves open windows — only repositions/resizes
  out_of_scope: |
    - Custom shortcut configuration / rebinding
    - Drag-to-snap (snap to edges/other windows while dragging)
    - Saved layout presets
    - Tab-based interface as alternative to tiling
  technical_notes: |
    Global shortcut handler approach:
    - useEffect with keydown listener on document
    - Check for modifier keys (metaKey || ctrlKey) + shiftKey + key
    - Skip when event.target is INPUT/TEXTAREA (except for window-level shortcuts)
    - Call window manager methods for tile/minimize/maximize/cycle

    Tiling algorithm:
    - Get viewport dimensions and number of open windows
    - 1 window: center at 80% viewport
    - 2 windows: side-by-side, each 50% width, 90% height
    - 3 windows: left half + right half split vertically
    - 4 windows: quad grid, each 50% × 50%
    - 5+ windows: auto-grid (Math.ceil(sqrt(n)) columns)
    - Apply 8px gap between tiles
    - Account for header height (60px) in viewport calc

    Minimize: store previous position/size, collapse to title bar only
    (40px height, fixed at bottom of screen, stacked horizontally).
    Restore: return to stored position/size.

    Maximize: store previous position/size, fill viewport (minus header).
    Restore: return to stored position/size.
