name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kf-tools:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@kiloforge.dev"
          git config --global init.defaultBranch main

      - name: Run kf-track test suite
        run: .agent/kf/bin/tests/run_tests.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (required for Go embed)
        run: cd frontend && npm ci && npm run build

      - name: Install Go linters
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Go vet
        run: cd backend && go vet ./...

      - name: Staticcheck
        run: cd backend && staticcheck ./...

      - name: gofmt check
        run: |
          FMTFILES=$(cd backend && gofmt -l .)
          if [ -n "$FMTFILES" ]; then
            echo "Files not formatted by gofmt:"
            echo "$FMTFILES"
            exit 1
          fi

      - name: goimports check
        run: |
          IMPFILES=$(cd backend && goimports -l -local github.com/benbaldivia/crelay .)
          if [ -n "$IMPFILES" ]; then
            echo "Files not formatted by goimports:"
            echo "$IMPFILES"
            exit 1
          fi

      - name: Frontend lint
        run: cd frontend && npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@kiloforge.dev"
          git config --global init.defaultBranch main

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Run Go tests with coverage
        run: |
          cd backend && go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | grep '^total:'

      - name: Run frontend tests
        run: cd frontend && npm test -- --run

      - name: Build binary
        run: make build-backend

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Go module verify
        run: cd backend && go mod verify

      - name: Go mod tidy check
        run: |
          cd backend
          cp go.mod /tmp/go.mod.bak && cp go.sum /tmp/go.sum.bak
          go mod tidy
          diff go.mod /tmp/go.mod.bak && diff go.sum /tmp/go.sum.bak || \
            (echo "FAIL: go.mod or go.sum is not tidy" && exit 1)

      - name: npm audit
        run: cd frontend && npm ci && npm audit --audit-level=moderate
